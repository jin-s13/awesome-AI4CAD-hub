  reasoning: The paper introduces a novel weakly-supervised probabilistic approach
    using diffusion to handle ambiguities in monocular perception and inexact CAD
    matches. Its strengths include zero-shot adaptation to real domains and surpassing
    supervised state-of-the-art on Scan2CAD, but it relies on synthetic training and
    monocular depth/mask estimates, and focuses on retrieval/alignment rather than
    full CAD generation.
  has_real_world: true
  analysis:
    innovations:
    - First weakly-supervised probabilistic approach for CAD model retrieval and alignment
      from a single RGB image.
    - Uses a diffusion model to learn distributions over shape, pose, and scale, enabling
      multi-hypothesis generation to handle depth/scale ambiguity and inexact shape
      matches.
    - Trained solely on synthetic data, leveraging monocular depth and mask estimates
      for zero-shot adaptation to real domains.
    - Multi-hypothesis generation surpasses supervised state-of-the-art on Scan2CAD
      by 5.9% with only 8 hypotheses.
    methodology: DiffCAD is a probabilistic diffusion model that predicts distributions
      of CAD model shape, pose, and scale from an RGB image. It is trained only on
      synthetic data, using monocular depth and mask estimates to enable zero-shot
      transfer to real images. The model generates multiple plausible CAD reconstructions
      to capture inherent ambiguities.
    key_results: Despite training only on synthetic data, DiffCAD with 8 hypotheses
      outperforms the supervised state-of-the-art on the Scan2CAD dataset by 5.9%.

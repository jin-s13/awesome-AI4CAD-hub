  related_work_outline:
  - 'Mainstream direction: Constructing unified multimodal benchmarks that evaluate
    the generation of editable parametric CAD models from diverse inputs (text, images,
    meshes, point clouds) using multiple metrics beyond geometric fidelity.'
  - 'Shared research pattern: Evaluations combine geometric similarity (e.g., Chamfer
    distance, IoU), program executability, and emerging engineering-oriented quality
    checks; they consistently reveal performance degradation under geometric complexity
    and modality shift.'
  - 'Key differences: Some benchmarks stress manufacturing, functionality, and assemblability
    (MUSE), while others emphasize broad task and modality coverage (UniCAD, CADBench)
    or interactive robustness against ambiguous prompts (ProCAD); evaluation protocols
    range from static metric suites to VLM-based judging and proactive clarification
    loops.'
  - 'Trend evolution: Within the 2025–2026 frontier, the field is moving from single-task
    CAD datasets to unified multi-task, multi-modal suites, and from pure geometry
    metrics toward design-intent and engineering-validity assessments, with early
    exploration of interactive evaluation.'
  - 'Open questions: Whether task distributions cover real-world CAD workflows, how
    well automatic judges align with human expert decisions, the stability of model
    rankings across different benchmarks and compute budgets, and the practicality
    of interactive clarification in production settings.'
  related_work_outline_zh:
  - 主流方向：构建统一多模态基准，从多种输入（文本、图像、网格、点云）生成可编辑参数化CAD模型，并使用超越几何保真度的多指标评估。
  - 研究共性：评估结合几何相似度（如Chamfer距离、IoU）、程序可执行性以及新兴的面向工程的质量检查；一致揭示模型在几何复杂度和模态偏移下的性能退化。
  - 关键差异：部分基准侧重可制造性、功能性和可装配性（如MUSE），另一些强调广泛的任务和模态覆盖（如UniCAD、CADBench），或针对模糊提示的交互鲁棒性（如ProCAD）；评估协议从静态指标集扩展到基于VLM的评判和主动澄清循环。
  - 趋势演进：在2025-2026前沿，领域正从单一任务CAD数据集转向统一的、多任务多模态套件，从纯几何指标转向设计意图和工程有效性评估，并开始探索交互式评估。
  - 开放问题：任务分布是否覆盖真实CAD工作流，自动评判与人类专家决策的一致性，模型排名在不同基准和计算预算下的稳定性，以及交互式澄清在生产环境中的实用性。
  literature_review:
    line_of_work_matrix:
    - line: Unified multimodal CAD benchmarks and dataset construction
      what_it_solves: Providing shared evaluation protocols and diverse data spanning
        multiple input modalities and CAD tasks, enabling systematic comparison of
        generation models.
      what_remains_open: Whether the benchmark task distributions capture the complexity
        of real engineering design processes, and whether conclusions remain stable
        across implementations and compute budgets.
    - line: Engineering-intent evaluation metrics and stress tests
      what_it_solves: Probing beyond aggregate geometric similarity to assess manufacturability,
        functionality, assemblability, and robustness under distribution shifts, revealing
        failure modes that simple metrics miss.
      what_remains_open: Alignment between proxy metrics (including VLM judges) and
        the downstream design decisions users actually care about, and the reliability
        boundaries of automatic judges.
    - line: Interactive evaluation protocols for robustness
      what_it_solves: Testing CAD generation under ambiguous user inputs by incorporating
        proactive clarification loops, reducing invalid outputs and improving robustness
        with low interaction overhead.
      what_remains_open: Whether the clarification overhead remains acceptable in
        real user experiences, and how well the protocol generalizes to broader CAD
        tasks beyond text-to-CAD generation.
    consensus:
    - Current CAD benchmarks are moving from single-modality, single-task setups to
      unified multi-modal, multi-task evaluation suites.
    - 'All evaluations combine geometric fidelity metrics with program-oriented checks
      (e.g., executability) and identify a common failure cascade: model performance
      drops with geometric complexity and under modality shift.'
    - Specialized mesh-to-CAD models often outperform general-purpose vision-language
      models on idealized inputs, but their rankings change across different metrics.
    disagreements:
    - 'Evaluation target: MUSE targets manufacturability, functionality, and assemblability
      of assemblies, while CADBench and UniCAD emphasize geometric reconstruction
      and broad task coverage.'
    - 'Assessment mechanism: MUSE uses a VLM-based automatic judge with design-specific
      rubrics, whereas other benchmarks rely on static geometric metrics or program
      validity checks without interactive or LLM-based judging.'
    - 'Interaction mode: ProCAD introduces a proactive clarification agent before
      generation, effectively testing robustness to ambiguity, while most other benchmarks
      assume fixed, unambiguous inputs.'
    open_questions:
    - How can benchmarks be designed to reflect the iterative, human-in-the-loop nature
      of real CAD workflows without compromising reproducibility?
    - What is the inter-rater agreement between automatic VLM judges and human CAD
      experts, and under what conditions do VLM judges fail?
    - Do model rankings remain consistent across the different benchmark suites (CADBench,
      UniCAD, MUSE) when controlling for implementation details and compute budget?
    - Is the interactive clarification overhead introduced by protocols like ProCAD
      acceptable in time-sensitive engineering design tasks, and can it be extended
      to multi-turn or collaborative CAD scenarios?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 统一多模态CAD基准与数据集构建
      解决的问题: 提供共享评估协议和覆盖多种输入模态、CAD任务的多样化数据，使生成模型的系统性比较成为可能。
      尚未覆盖: 基准任务分布是否捕捉了真实工程设计过程的复杂性，以及结论在不同实现和计算预算下是否保持稳定。
    - 路线: 面向工程意图的评估指标与压力测试
      解决的问题: 在聚合几何相似度之外，检验可制造性、功能性、可装配性以及在分布偏移下的鲁棒性，揭示简单指标遗漏的失败模式。
      尚未覆盖: 代理指标（包括VLM评判器）与用户真正关心的下游设计决策之间的一致性，以及自动评判器的可靠性边界。
    - 路线: 面向鲁棒性的交互式评估协议
      解决的问题: 通过引入主动澄清循环，测试在模糊用户输入下CAD生成的质量，以低交互开销减少无效输出并提高鲁棒性。
      尚未覆盖: 澄清开销在真实用户体验中是否可接受，以及该协议在文本到CAD之外的更广泛CAD任务上的泛化程度。
    共识:
    - 当前CAD基准正从单模态、单任务设置转向统一的多模态、多任务评估套件。
    - 所有评估均将几何保真度指标与面向程序的检查（如可执行性）相结合，并识别出共同的失败级联：模型性能随几何复杂度和模态偏移而下降。
    - 在理想化输入下，专用网格到CAD模型通常优于通用视觉语言模型，但它们的排名在不同指标下会发生变化。
    分歧:
    - 评估目标：MUSE针对装配体的可制造性、功能性和可装配性，而CADBench和UniCAD侧重于几何重建和广泛的任务覆盖。
    - 评估机制：MUSE采用基于VLM的自动评判器与设计专用评分标准，而其他基准依靠静态几何指标或程序有效性检查，没有交互式或基于LLM的评判。
    - 交互模式：ProCAD在生成前引入主动澄清智能体，有效测试对模糊性的鲁棒性，而大多数其他基准假设固定的、无歧义的输入。
    开放问题:
    - 如何设计基准以反映真实CAD工作流中迭代的、人在回路中的特性，同时不损害可复现性？
    - 自动VLM评判器与人类CAD专家之间的评分者间一致性如何？在什么条件下VLM评判器会失效？
    - 在控制实现细节和计算预算的情况下，模型排名在不同基准套件（CADBench、UniCAD、MUSE）之间是否保持一致？
    - 像ProCAD这样的交互式澄清协议所引入的交互开销，在时间敏感的工程设计任务中是否可接受？它能否扩展到多轮或协作式CAD场景？

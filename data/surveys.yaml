  related_work_outline_zh:
  - 主流方向：多模态生成框架与基准，从文本、图像或3D数据生成可编辑的参数化CAD程序（主要是通过CadQuery生成的B-Rep），强调几何保真度、可执行性与工程约束。
  - 研究共性：工作分为两大类：(1)构建大规模、经过执行验证并带有设计意图评分标准的基准；(2)开发基于LLM或状态空间模型的生成方法，将CAD构造分解为层次化推理、结构对齐或可微分参数曲面。
  - 关键差异：方法在表示方式（显式程序合成 vs. 可微分参数面片）、交互模式（一次性生成 vs. 主动澄清）、评测目标（重建精度 vs. 可制造性/功能性）以及监督信号（特选数据集
    vs. 无标注3D数据结合点级监督）上存在差异。
  - 趋势演进：2026年的前沿从仅关注几何重建转向包含可装配性、制造约束和主动消歧的工程就绪CAD，并伴随新基准揭示了从可执行代码到有效几何再到设计意图的失败级联。
  - 开放问题：对未见零件族和复杂操作（如扫掠、放样）的泛化能力仍然很差；在平衡几何保真度、参数紧凑性和工程准则的评估指标上缺乏共识；基于VLM的设计意图评判器的可验证性尚未充分探索。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal benchmarks for programmatic CAD
      what_it_solves: Provides standardized, execution-verified evaluation suites
        with diverse modalities, metrics, and design rubrics to systematically measure
        progress in CAD program generation.
      what_remains_open: Generalization across unseen part families and complex operations
        is limited; alignment between automated metrics (e.g., Chamfer distance) and
        engineering requirements (manufacturability, assemblability) is not yet established.
    - line: LLM-driven parametric CAD synthesis from text
      what_it_solves: Leverages large language models to translate natural language
        descriptions into executable parametric CAD scripts (CadQuery), handling structural
        reasoning and parameter grounding.
      what_remains_open: Models often hallucinate parametric details, fail on complex
        geometries like sweeps/lofts, and produce superficially plausible but unfaithful
        programs; robustness to ambiguous prompts is still a challenge.
    - line: Differentiable parametric surface generation
      what_it_solves: Enables end-to-end training of B-Rep generation from raw point
        or image supervision without CAD-specific annotations, bridging the gap between
        editable CAD and unannotated 3D data.
      what_remains_open: The approach depends on the quality of tessellation and may
        not capture the full topological flexibility of explicit programmatic representations;
        scaling to industrial-level complexity is unverified.
    - line: Proactive clarification and interactive generation
      what_it_solves: Introduces an agentic loop that audits text prompts, asks targeted
        clarification questions, and resolves specification ambiguities before code
        synthesis, improving robustness with low interaction overhead.
      what_remains_open: The interaction cost and the quality of generated clarification
        questions need further evaluation in real-world design workflows; the approach
        is currently limited to the text-to-CAD modality.
    - line: State-space models for long CAD sequences
      what_it_solves: Addresses the generation of long parametric CAD sequences by
        using a Mamba-based architecture, which can handle extended dependencies better
        than traditional transformers.
      what_remains_open: Effectiveness is demonstrated only on sequence length metrics;
        its impact on downstream editability, geometric fidelity, and engineering
        constraints is not reported.
    consensus:
    - Parametric CAD representations (B-Reps, CadQuery scripts) are the dominant editable
      output format because they support downstream engineering workflows.
    - Current LLMs and VLMs can produce plausible coarse geometry but systematically
      fail to produce faithful, engineering-ready parametric programs, especially
      for complex operations.
    - Evaluation must move beyond geometric reconstruction to include executability,
      design intent alignment, manufacturability, and assemblability.
    - 'There is a clear failure cascade: generating executable code does not guarantee
      valid geometry, and valid geometry does not guarantee meeting design specifications.'
    disagreements:
    - Some works advocate for explicit program synthesis with code-generating LLMs,
      while others argue for differentiable parametric surfaces that can be trained
      on unannotated data, avoiding the complexity of program generation.
    - 'Evaluation targets differ: one set of benchmarks prioritizes geometric fidelity
      and compactness, while newer benchmarks emphasize manufacturing and assembly
      constraints, leading to potentially conflicting model rankings.'
    - 'Interaction modes vary: one work introduces proactive clarification as a necessary
      component, while others assume a single-shot generation setting, raising the
      question of whether clarification should be part of the core generation task.'
    - 'Supervision strategies differ: curated text-to-CadQuery datasets vs. large-scale
      unannotated 3D data with point-level supervision, leading to trade-offs between
      precision and scale.'
    open_questions:
    - Can models trained on existing CAD families generalize to unseen part families
      and complex parametric operations like sweeps and lofts?
    - How should evaluation metrics be designed to simultaneously balance geometric
      accuracy, parametric compactness, and engineering criteria such as tolerances
      and material constraints?
    - What is the reliability of VLM-based judges for design intent alignment, and
      how do they correlate with human engineering assessments?
    - Is proactive clarification a necessary component for production-grade CAD generation,
      or can prompt engineering and better training data eliminate the need for interaction?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 程序化CAD的多模态基准
      解决的问题: 提供标准化、经过执行验证的评估套件，涵盖多样模态、指标和设计评分标准，系统性地衡量CAD程序生成的进展。
      尚未覆盖: 对未见零件族和复杂操作的泛化能力有限；自动指标（如Chamfer距离）与工程需求（可制造性、可装配性）之间的对齐尚未建立。
    - 路线: 基于LLM的文本到参数化CAD合成
      解决的问题: 利用大语言模型将自然语言描述翻译为可执行的参数化CAD脚本（CadQuery），处理结构推理和参数接地。
      尚未覆盖: 模型经常在参数细节上产生幻觉，在扫掠/放样等复杂几何上失败，并生成表面合理但实际不忠实的程序；对模糊提示的鲁棒性仍是挑战。
    - 路线: 可微分参数曲面生成
      解决的问题: 支持从原始点云或图像监督直接端到端训练B-Rep生成，无需CAD特定标注，弥合可编辑CAD与无标注3D数据之间的鸿沟。
      尚未覆盖: 方法依赖于曲面细分质量，可能无法捕捉显式程序化表示的完整拓扑灵活性；工业级复杂度的扩展性未经验证。
    - 路线: 主动澄清与交互式生成
      解决的问题: 引入智能体循环，在代码合成前审核文本提示、提出有针对性的澄清问题并解决规格歧义，以低交互开销提高鲁棒性。
      尚未覆盖: 交互成本及生成澄清问题的质量需在实际设计工作流中进一步评估；该方法目前仅限于文本到CAD模态。
    - 路线: 用于长CAD序列的状态空间模型
      解决的问题: 通过使用基于Mamba的架构处理长参数化CAD序列的生成，相较传统变换器能更好地处理长程依赖。
      尚未覆盖: 有效性仅在序列长度指标上得到展示；其对下游可编辑性、几何保真度和工程约束的影响未报告。
    共识:
    - 参数化CAD表示（B-Rep、CadQuery脚本）是主流的可编辑输出格式，因为它们支持下游工程工作流。
    - 当前LLM和VLM能够生成看似合理的粗略几何，但系统性地无法生成忠实、工程就绪的参数化程序，尤其对于复杂操作。
    - 评估必须超越几何重建，纳入可执行性、设计意图对齐、可制造性和可装配性。
    - 存在明显的失败级联：生成可执行代码不保证有效几何，有效几何不保证满足设计规格。
    分歧:
    - 一些工作提倡使用代码生成LLM进行显式程序合成，而另一些则主张使用可微分参数曲面，可在无标注数据上训练，避免了程序生成的复杂性。
    - 评测目标不同：一组基准优先考虑几何保真度和紧凑性，而较新的基准强调制造和装配约束，可能导致相互矛盾的模型排名。
    - 交互模式不同：一项工作引入主动澄清作为必要组件，而其他工作假设一次性生成设定，引发澄清是否应成为核心生成任务的一部分的问题。
    - 监督策略不同：特选的文本到CadQuery数据集 vs. 大规模无标注3D数据结合点级监督，导致精度与规模之间的权衡。
    开放问题:
    - 在现有CAD家族上训练的模型能否泛化到未见零件族和复杂的参数化操作，如扫掠和放样？
    - 评估指标应如何设计，以同时平衡几何精度、参数紧凑性和公差、材料约束等工程准则？
    - 基于VLM的设计意图对齐评判器的可靠性如何，它们与人类工程评估的相关性如何？
    - 主动澄清对于生产级CAD生成是必要组件，还是通过提示工程和更好的训练数据可以消除交互需求？

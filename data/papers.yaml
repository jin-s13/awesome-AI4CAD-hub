  abstract_cn: 我们探索如何使机器像人类建模师一样使用深度强化学习（RL）来建模3D形状。在Maya等3D建模软件中，建模师通常通过两个步骤创建网格模型：（1）使用一组基本体近似形状；（2）编辑基本体的网格以生成精细几何体。受这种基于艺术家的建模启发，我们提出了一种基于RL的两步神经框架来学习3D建模策略。通过在交互环境中执行动作并收集奖励，智能体首先学习将目标形状解析为基本体，然后编辑几何体。为了有效训练建模智能体，我们引入了一种结合启发式策略、模仿学习和强化学习的新型训练算法。实验表明，智能体能够学习到良好的策略，生成规则且结构感知的网格模型，这证明了所提出的RL框架的可行性和有效性。

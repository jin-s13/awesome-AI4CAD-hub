  title_cn: 'A2Z-10M+: 面向AI辅助CAD建模与逆向工程的A-to-Z BRep注释几何深度学习'
  abstract_cn: 从3D扫描、草图或简单文本提示中逆向工程和快速原型制作计算机辅助设计（CAD）模型在工业产品设计中至关重要。然而，近期几何深度学习技术的进展缺乏对存储在边界表示（BRep）中的参数化CAD特征的多模态理解。本研究提出了最大的多模态注释与元数据汇编，包含100万个ABC
    CAD模型的1000万条注释，即A2Z，以解锁前所未有的BRep学习水平。A2Z包括：(i) 具有显著3D扫描特征的高分辨率网格，(ii) 3D手绘草图，附带(iii)
    BRep共边、角点和表面的几何与拓扑信息，以及(iv) 描述机械领域产品的文本描述和标签。创建这样精心结构化的大规模数据（需要近5TB存储空间）以支持前所未有的CAD学习/检索任务极具挑战性。我们使用新颖的指标、GPT-5、Gemini以及广泛的人工反馈机制评估了多模态注释的规模、质量和多样性。为此，我们还将由熟练专业人员设计的额外2.5万个电子外壳（如平板电脑、端口）CAD模型合并到A2Z数据集中。随后，我们在15万个CAD模型的子集上训练并基准测试了一个基础模型，用于从3D扫描中检测BRep共边和角点顶点，这是CAD逆向工程中的关键下游任务。注释数据集、指标和检查点将公开发布，以支持众多研究方向。

  related_work_outline:
  - 'Mainstream direction: Establishing standardized benchmarks and evaluation protocols
    for programmatic CAD generation, with a focus on multi-modal inputs (text, image,
    3D) and executable B-Rep or script outputs.'
  - 'Shared research pattern: Proposing a dataset or benchmark that defines tasks,
    metrics, and baselines, then revealing failure modes of current LLMs or specialized
    models, followed by improvements via agentic frameworks, better representations,
    or feedback loops.'
  - 'Key differences: Evaluation targets range from geometric fidelity and code executability
    to engineering-level criteria like manufacturability and FEA compliance; interaction
    modes include one-shot generation, proactive clarification, and iterative self-improvement;
    representations vary from CadQuery scripts to parametric Bézier surfaces and multi-part
    STEP files.'
  - 'Trend evolution: The field is moving from single-modal geometric reconstruction
    toward multi-modal, engineering-aware generation with agentic workflows and physics-based
    feedback, though the evidence is concentrated in 2026 and may reflect the current
    frontier rather than a long-term trend.'
  - 'Open questions: Can current approaches bridge the gap from geometric correctness
    to engineering-ready designs? How can formal theory constrain or guarantee the
    functional validity of generated CAD? How well do benchmarks generalize to real
    industrial workflows and unseen part families?'
  related_work_outline_zh:
  - 主流方向：为程序化CAD生成建立标准化基准与评估协议，重点处理多模态输入（文本、图像、三维）并输出可执行的B-Rep或脚本。
  - 研究共性：提出数据集或基准，定义任务、指标和基线，揭示当前LLM或专用模型的失败模式，然后通过智能体框架、更好的表示或反馈循环进行改进。
  - 关键差异：评估目标从几何保真度和代码可执行性，到可制造性、FEA合规等工程级标准；交互模式包括一次性生成、主动澄清和迭代自改进；表示形式涵盖CadQuery脚本、参数化贝塞尔曲面以及多部件STEP文件。
  - 趋势演进：正从单模态几何重建转向多模态、工程感知的生成，采用智能体工作流和基于物理的反馈，但现有证据集中在2026年，可能反映当前前沿而非长期趋势。
  - 开放问题：当前方法能否弥合从几何正确到工程就绪的差距？形式化理论如何约束或保证生成CAD的功能有效性？基准在多大程度上能泛化到真实工业流程和未见零件族？
  literature_review:
    line_of_work_matrix:
    - line: Standardized multi-modal CAD benchmarks
      what_it_solves: Defines unified evaluation settings, metrics, and baselines
        for programmatic CAD generation from text, images, and 3D data, enabling controlled
        comparison and revealing failure cascades.
      what_remains_open: Whether current benchmarks and metrics capture real-world
        engineering requirements; generalization to unseen part families remains limited
        even after fine-tuning.
    - line: LLM-based CAD script generation with grounding or clarification
      what_it_solves: Generates executable CAD programs (e.g., CadQuery) from natural
        language by grounding primitives or proactively clarifying ambiguous prompts,
        improving robustness and reducing invalid outputs.
      what_remains_open: Fine-grained engineering constraints (e.g., stress, manufacturability)
        are not evaluated; handling of complex operations like sweeps and lofts is
        unreliable; validation is limited to geometric similarity.
    - line: Multi-modal generative models with differentiable parametric surfaces
      what_it_solves: Learns to produce editable B-Reps from point-level supervision
        without CAD annotations, using differentiable tessellation of parametric patches,
        supporting text, image, and point input modalities.
      what_remains_open: The approach relies on unannotated 3D data and point-level
        supervision, but formal guarantees on geometric or topological correctness
        are absent; user preference and generative controllability are only partially
        validated.
    - line: Self-improving agents with engineering feedback
      what_it_solves: Integrates finite element analysis and other engineering signals
        into the generation loop, allowing iterative refinement of multi-part CAD
        assemblies toward better geometric and functional compliance.
      what_remains_open: No agent achieves strict FEA passing in first-attempt sweeps;
        overall compliance with typed requirements is low (~20%); the feedback improves
        geometric Box-IoU but does not yet guarantee functional validity.
    consensus:
    - Current LLMs and specialized models fail to reliably produce engineering-ready
      CAD, often recovering coarse geometry but missing fine structure, design parameters,
      and complex operations.
    - Multi-modal inputs and executable program outputs are the dominant paradigm,
      but evaluation metrics remain fragmented across geometric fidelity, executability,
      and engineering criteria.
    - Agentic workflows, clarification, and feedback loops can improve performance,
      but generalization to unseen shapes and tasks remains a critical bottleneck.
    disagreements:
    - 'Evaluation targets: some benchmarks emphasize geometric reconstruction and
      code executability, while others focus on manufacturability, functionality,
      and FEA-based validation, reflecting different assumptions about what constitutes
      a successful CAD model.'
    - 'Representation: works differ in output format—CadQuery scripts, parametric
      Bézier surfaces, or multi-part STEP files—which affects editability, industry
      compatibility, and the types of constraints that can be enforced.'
    - 'Interaction mode: one-shot generation versus proactive clarification versus
      iterative self-improvement, each making different trade-offs between automation
      and user involvement.'
    - 'Supervision and training data: some use curated text-CAD pairs with supervised
      fine-tuning, others rely on unannotated 3D point clouds with differentiable
      rendering, and yet others use execution verification or FEA as weak feedback.'
    open_questions:
    - What formal definitions or constraints could bridge the gap between geometric
      similarity metrics and engineering validity (e.g., stress, assembly, manufacturability)?
    - How can the failure modes identified by benchmarks (brittleness under modality
      shift, misinterpreting design parameters, substituting complex operations) be
      mitigated through model design or training?
    - To what extent do the current benchmarks reflect the diversity and complexity
      of real industrial CAD workflows, and what would be required to close that gap?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 标准化多模态CAD基准
      解决的问题: 为从文本、图像和3D数据生成程序化CAD定义统一的评估设置、指标和基线，实现受控对比并揭示失败级联。
      尚未覆盖: 当前基准和指标是否捕捉到真实工程需求；即使经过微调，对未见零件族的泛化能力仍然有限。
    - 路线: 基于LLM的CAD脚本生成与接地或澄清
      解决的问题: 通过基元接地或主动澄清模糊提示，从自然语言生成可执行CAD程序（如CadQuery），提升鲁棒性并减少无效输出。
      尚未覆盖: 细粒度工程约束（如应力、可制造性）未被评估；对扫掠、放样等复杂操作的可靠性不足；验证局限于几何相似性。
    - 路线: 基于可微分参数曲面的多模态生成模型
      解决的问题: 利用参数化面片的可微分曲面细分，从点级监督学习生成可编辑B-Rep，无需CAD标注，支持文本、图像和点云输入。
      尚未覆盖: 方法依赖未标注3D数据和点级监督，缺乏几何或拓扑正确性的形式化保证；用户偏好和生成可控性仅部分验证。
    - 路线: 基于工程反馈的自改进智能体
      解决的问题: 将有限元分析等工程信号集成到生成循环中，使多部件CAD装配体能够迭代优化，朝更好的几何和功能合规性改进。
      尚未覆盖: 无智能体能在首次尝试中通过严格的FEA；类型化需求总体合规率仅约20%；反馈改善了几何Box-IoU，但尚未保证功能有效性。
    共识:
    - 当前LLM和专用模型尚无法可靠生成工程就绪的CAD，往往能恢复粗略几何，但缺失精细结构、设计参数，且会替换复杂操作。
    - 多模态输入和可执行程序输出是主导范式，但评估指标在几何保真度、可执行性和工程标准之间仍碎片化。
    - 智能体工作流、澄清和反馈循环能够提升性能，但对未见形状和任务的泛化仍是关键瓶颈。
    分歧:
    - 评估目标：一些基准强调几何重建和代码可执行性，另一些则关注可制造性、功能性和基于FEA的验证，反映了对成功CAD模型的不同假设。
    - 表示形式：输出格式存在差异——CadQuery脚本、参数化贝塞尔曲面或多部件STEP文件——影响可编辑性、工业兼容性以及可施加的约束类型。
    - 交互模式：一次性生成与主动澄清、迭代自改进之间的差异，在自动化程度和用户参与之间做出不同权衡。
    - 监督与训练数据：部分工作使用精标注文本-CAD对进行监督微调，部分依赖未标注3D点云与可微分渲染，还有的利用执行验证或FEA作为弱反馈。
    开放问题:
    - 什么样的形式化定义或约束可以弥合几何相似性指标与工程有效性（如应力、装配、可制造性）之间的差距？
    - 基准所揭示的失败模式（模态转换下的脆弱性、设计参数误读、复杂操作替换）如何通过模型设计或训练得到缓解？
    - 当前基准在多大程度上反映了真实工业CAD工作流的多样性和复杂性，弥合这一差距需要什么？

  related_work_outline:
  - 'Mainstream direction: LLM- and MLLM-driven parametric CAD program generation
    from text, images, meshes, and point clouds, emphasizing editable B-Rep construction
    sequences and engineering-aware design automation.'
  - 'Shared research pattern: Representing CAD as executable scripts (e.g., CadQuery)
    or structured construction sequences, trained with supervised fine-tuning, RL,
    or GANs, and evaluated on geometric fidelity and executability.'
  - 'Key differences: Methods diverge in representation granularity (hierarchical
    trees vs. flat sequences), training paradigm (SFT+RL vs. GAN-based generation
    vs. hybrid optimization), evaluation focus (geometric similarity vs. manufacturability/functionality),
    and interaction mode (single-pass generation vs. proactive clarification).'
  - 'Trend evolution: Rapid shift from single-task, single-modality models to multi-task,
    multi-modal unified frameworks; evaluation criteria expanding from pure geometry
    to engineering attributes (manufacturability, assemblability); emergence of agentic
    interaction for robustness.'
  - 'Open questions: Robustness under modality shift, scalability of long-sequence
    parametric generation, generalization to real-world engineering constraints, attribution
    of gains in interactive clarification, and whether evaluation protocols isolate
    method contributions from surrounding system choices.'
  related_work_outline_zh:
  - 主流方向：基于LLM和MLLM的参数化CAD程序生成，从文本、图像、网格、点云生成可编辑B-Rep构建序列，走向工程可感知的设计自动化。
  - 研究共性：以可执行脚本（如CadQuery）或结构化构建序列表示CAD，采用监督微调、RL或GAN训练，并评估几何保真度与可执行性。
  - 关键差异：方法在表示粒度（层次树 vs 平坦序列）、训练范式（SFT+RL vs GAN生成 vs 混合优化）、评测重点（几何相似度 vs 可制造性/功能性）和交互模式（单次生成
    vs 主动澄清）上存在显著分歧。
  - 趋势演进：从单任务单模态快速转向多任务多模态统一框架，评测标准从纯几何扩展到制造性、装配性等工程属性，并出现面向鲁棒性的智能体交互。
  - 开放问题：模态迁移鲁棒性、长序列参数化生成的可扩展性、对真实工程约束的泛化、交互式澄清的收益归因，以及评测协议是否真正隔离了方法贡献。
  literature_review:
    line_of_work_matrix:
    - line: LLM-based text-to-CAD program generation with B-Rep grounding
      what_it_solves: Translating natural language descriptions into executable parametric
        CAD scripts, often with stepwise reasoning or hierarchical structure alignment
        to improve geometric accuracy and structural consistency.
      what_remains_open: Robustness to ambiguous or underspecified prompts, generalization
        beyond curated training distributions, and whether the B-Rep grounding strategy
        limits applicability to other CAD formats or operations.
    - line: Multi-modal reconstruction and generation for CAD (mesh/image/point cloud
        to program)
      what_it_solves: Recovering editable parametric CAD construction sequences from
        raw 3D or 2D observations, bridging between perception and editable design
        representations.
      what_remains_open: Hybrid optimization-based methods may not scale to highly
        complex freeform geometries; end-to-end models show brittleness under modality
        shift, and the contribution of the optimization versus the learned prior is
        unclear.
    - line: Unified multi-modal benchmarks and evaluation protocols for AI-assisted
        CAD
      what_it_solves: Providing standardized testbeds and metrics that cover geometric
        fidelity, executability, and engineering intents (manufacturability, functionality,
        assemblability) across diverse input modalities.
      what_remains_open: Current benchmarks reveal a failure cascade from executable
        code to engineering-ready design; VLM-based judges introduce their own biases,
        and benchmark coverage of real-world manufacturing constraints is still limited.
    - line: State-space and sequence modeling architectures for long CAD sequences
      what_it_solves: Handling longer parametric CAD sequences that exceed the context
        limitations of standard transformers, enabling generation of more complex
        designs.
      what_remains_open: Evaluation is restricted to specific datasets; the trade-off
        between sequence length, geometric complexity, and generation validity is
        not systematically ablated, and transfer to other CAD representations is untested.
    - line: Agentic frameworks for interactive CAD generation
      what_it_solves: Improving robustness to ambiguous prompts by proactively clarifying
        user intent before synthesis, reducing invalidity and geometric errors.
      what_remains_open: The gain may be attributed to the underlying LLM's reasoning
        capability rather than the clarification strategy itself; the interaction
        overhead and quality of generated clarification questions are not yet benchmarked
        against human-in-the-loop baselines.
    consensus:
    - Executable program representations (e.g., CadQuery scripts) are the preferred
      output format, as they guarantee geometric validity and enable downstream editing.
    - Multi-modal inputs (text, images, meshes, point clouds) are being integrated
      into unified frameworks to lower the skill barrier and leverage diverse data
      sources.
    - Evaluation is moving beyond geometric similarity (Chamfer distance, IoU) to
      include engineering criteria such as manufacturability, functionality, and assemblability.
    - Pre-training or fine-tuning on large CAD-specific corpora, combined with reinforcement
      learning or structured alignment, consistently improves generation quality.
    disagreements:
    - 'Representation granularity: some methods decompose CAD models into hierarchical
      construction trees with explicit part-level reasoning, while others treat the
      sequence as a flat token stream or use state-space models for long sequences.'
    - 'Training paradigm: approaches range from supervised fine-tuning plus RL on
      LLMs, to GAN-based latent space generation, to hybrid optimization that iteratively
      fits operations with geometric feedback.'
    - 'Evaluation focus: benchmark-driven work emphasizes executability and engineering
      intent (manufacturability, assemblability), whereas reconstruction-focused work
      prioritizes volumetric overlap and surface distance.'
    - 'Interaction mode: most methods are single-pass generative models, but one line
      of work introduces proactive clarification agents that engage in multi-turn
      dialogue before code generation.'
    open_questions:
    - Can models trained on clean mesh inputs maintain robustness under real-world
      sensing noise and modality shifts, as indicated by the brittleness observed
      in CADBench?
    - What is the relative contribution of the learned generative prior versus the
      optimization procedure in hybrid mesh-to-CAD methods, and how does this affect
      scalability to highly complex geometries?
    - Do current benchmarks adequately capture the diversity of real-world engineering
      constraints, or are they biased toward the specific CAD kernels and operations
      used in dataset construction?
    - To what extent does the performance gain from agentic clarification depend on
      the base LLM's reasoning capability, and how would it compare to a simple prompt-engineering
      baseline?
    - Are the reported improvements in long-sequence CAD generation from state-space
      models transferable to other CAD representation types (e.g., freeform surfaces)
      beyond the evaluated parametric sequences?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于LLM的文本到CAD程序生成与B-Rep接地
      解决的问题: 将自然语言描述转化为可执行的参数化CAD脚本，常通过逐步推理或层次结构对齐提高几何精度和结构一致性。
      尚未覆盖: 对模糊或欠指定提示的鲁棒性，在精选训练分布之外的泛化，以及B-Rep接地策略是否限制了对其他CAD格式或操作的适用性。
    - 路线: 多模态CAD重建与生成（网格/图像/点云到程序）
      解决的问题: 从原始3D或2D观测中恢复可编辑的参数化CAD构建序列，连接感知与可编辑设计表示。
      尚未覆盖: 基于混合优化的方法可能无法扩展到高度复杂的自由曲面几何；端到端模型在模态转换下表现出脆弱性，优化与学习先验各自的贡献未明确。
    - 路线: 面向AI辅助CAD的统一多模态基准与评测协议
      解决的问题: 提供覆盖几何保真度、可执行性和工程意图（可制造性、功能性、可装配性）的标准化测试平台与指标，涵盖多种输入模态。
      尚未覆盖: 现有基准揭示了从可执行代码到工程就绪设计的失败级联；基于VLM的评判器引入自身偏见，且基准对真实制造约束的覆盖仍有限。
    - 路线: 面向长CAD序列的状态空间与序列建模架构
      解决的问题: 处理超出标准 Transformer 上下文限制的更长的参数化CAD序列，使更复杂设计的生成成为可能。
      尚未覆盖: 评估局限于特定数据集；序列长度、几何复杂度和生成有效性之间的权衡缺乏系统消融，对其他CAD表示的迁移性未经测试。
    - 路线: 面向交互式CAD生成的智能体框架
      解决的问题: 通过在合成前主动澄清用户意图，提高对模糊提示的鲁棒性，减少无效和几何错误。
      尚未覆盖: 收益可能归因于底层LLM的推理能力而非澄清策略本身；交互开销和生成的澄清问题质量尚未与人类在回路基线进行基准比较。
    共识:
    - 可执行程序表示（如CadQuery脚本）是首选输出格式，因其能保证几何有效性并支持下游编辑。
    - 多模态输入（文本、图像、网格、点云）被整合到统一框架中，以降低使用门槛并利用多样化数据源。
    - 评估正从几何相似度（Chamfer距离、IoU）扩展到包含可制造性、功能性和可装配性等工程标准。
    - 在大规模CAD专有语料上预训练或微调，并结合强化学习或结构化对齐，能持续提升生成质量。
    分歧:
    - 表示粒度：一些方法将CAD模型分解为层次化构建树进行显式部件级推理，另一些则将其视为平坦的token流或使用状态空间模型处理长序列。
    - 训练范式：方法涵盖对LLM的监督微调加RL、基于GAN的潜在空间生成，以及通过几何反馈迭代拟合操作的混合优化。
    - 评测重点：以基准为导向的工作强调可执行性和工程意图（可制造性、可装配性），而以重建为重点的工作则优先考虑体积重叠和表面距离。
    - 交互模式：大多数方法是单次生成模型，但有一条工作线引入了主动澄清智能体，在代码生成前进行多轮对话。
    开放问题:
    - 在干净网格输入上训练的模型能否在真实世界感知噪声和模态转换下保持鲁棒性，正如CADBench所揭示的脆性所暗示？
    - 在混合网格到CAD方法中，学习到的生成先验与优化过程各自的相对贡献是什么，这对高度复杂几何的可扩展性有何影响？
    - 当前基准是否充分捕捉了真实世界工程约束的多样性，还是偏向于数据集构建中使用的特定CAD内核和操作？
    - 智能体澄清带来的性能提升在多大程度上依赖于基础LLM的推理能力，与简单的提示工程基线相比如何？
    - 状态空间模型在长序列CAD生成中报告的性能提升是否可迁移到所评估参数化序列之外的其他CAD表示类型（如自由曲面）？

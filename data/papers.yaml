  title_cn: LLM4CAD：用于三维计算机辅助设计生成的多模态大语言模型
  abstract_cn: 能够处理多种输入模态（如文本和图像）的多模态大语言模型（LLM）的发展为其在工程设计中的应用带来了新的前景，例如三维计算机辅助设计（CAD）模型的生成。然而，关于多模态LLM生成三维设计对象的能力知之甚少，且缺乏定量评估。在本研究中，我们开发了一种方法，使两个LLM——GPT-4和GPT-4V——能够生成三维CAD模型（即LLM4CAD），并通过实验评估其有效性。为了解决多模态LLM研究数据稀缺的问题，我们创建了一个数据合成流水线，用于生成典型机械部件（如齿轮和弹簧）的CAD模型、草图和图像数据，并利用Amazon
    Mechanical Turk收集带有尺寸信息的自然语言描述。我们将CAD程序（用于CAD设计的编程脚本）定位为桥梁，促进LLM的文本输出转化为具体的CAD设计对象。我们关注两个关键能力：生成语法正确的CAD程序（Cap1）以及通过交并比量化的解析后三维形状的准确性（Cap2）。结果表明，GPT-4和GPT-4V在三维CAD生成方面均展现出潜力。具体而言，平均来看，GPT-4V在处理仅文本输入时表现优于多模态输入（如文本加图像），在Cap1和Cap2上均超过后者。然而，在考察机械部件的类别特定结果时，虽然Cap2仍呈现相同趋势，但对于更复杂的几何形状（如弹簧和齿轮），多模态输入在Cap1上的优势愈发明显。多模态LLM在增强三维CAD生成方面的潜力是明确的，但其应用必须根据待生成目标CAD模型的复杂度进行仔细校准。
  tldr_cn: 探索使用多模态大语言模型（GPT-4、GPT-4V）通过CAD程序生成三维CAD模型，并定量评估语法正确性和形状精度。
  analysis_cn:

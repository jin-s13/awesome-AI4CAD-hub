  related_work_outline_zh:
  - 主流方向：研究正趋向于多模态、可编程的CAD生成，将文本、图像或点云转换为可执行的B-Rep脚本，并大力推动工业级基准和工程约束验证。
  - 研究共性：多数工作采用大语言模型或生成架构生成参数化CAD程序，并逐渐从几何度量转向功能性、可制造性和设计意图的对齐评估。
  - 关键差异：论文在评估目标（几何保真度 vs. 工程意图）、交互模式（单次生成 vs. 主动澄清）、反馈信号（无、有限元分析、视觉渲染）和核心表示（CadQuery脚本、贝塞尔曲面、状态空间序列）上存在分歧。
  - 趋势演进：证据显示从早期仅关注几何重建跃升至复杂装配体、多模态输入和闭环优化；顶级论文集中在2026年，表明这是前沿爆发期而非长期历史趋势。
  - 开放问题：如何保证对未见工业零件族的泛化，如何将物理仿真作为训练信号而非事后检查，以及如何平衡可编辑性与几何精度，仍然是未解决的问题。
  literature_review:
    line_of_work_matrix:
    - line: Standardized multi-modal CAD generation benchmarks
      what_it_solves: Provides unified evaluation frameworks across input modalities
        (image, point cloud, text) and tasks (generation, QA, editing), replacing
        fragmented, modality-specific metrics.
      what_remains_open: Benchmarks mostly rely on static datasets and metrics that
        do not fully capture real-world engineering constraints such as tolerance
        stack-up, assembly kinematics, or downstream manufacturing fitness.
    - line: LLM-driven programmatic CAD synthesis
      what_it_solves: Enables end-to-end generation of executable CAD scripts from
        natural language, leveraging large language models to understand design intent
        and produce parameterized B-Rep models.
      what_remains_open: Models struggle with fine-grained geometric abstraction,
        often substituting complex operations with simpler sketch-and-extrude patterns,
        and generalization to novel part families remains limited.
    - line: Differentiable parametric surfaces for point-supervised B-Rep generation
      what_it_solves: Allows training on unannotated 3D data by representing B-Reps
        as differentiable Bézier patches, removing the need for expensive CAD-specific
        annotations.
      what_remains_open: The generated editable B-Reps may lack design-intent feature
        trees and parametric constraints, limiting their direct use in iterative engineering
        workflows.
    - line: Feedback-driven self-improving design agents
      what_it_solves: Introduces external feedback loops such as finite element analysis,
        proactive clarification, and visual rendering to transition from one-shot
        generation to iterative refinement, improving geometric and physical consistency.
      what_remains_open: Even with feedback, models fail to meet strict engineering
        requirements; the feedback signals are not yet integrated as training objectives
        and cannot fully replace human design expertise.
    consensus:
    - Geometric similarity alone is insufficient; the community agrees on the need
      for multi-faceted evaluation covering functionality, manufacturability, and
      design intent alignment.
    - LLMs show promise in generating CAD scripts but consistently fail on complex
      operations (e.g., sweeps, lofts) and precise parameterization, often simplifying
      the intended geometry.
    - Multi-modal, unified frameworks that accept text, image, and point cloud inputs
      are becoming the dominant architectural paradigm.
    - Performance on idealized benchmarks significantly overestimates real-world industrial
      applicability, revealing a serious out-of-distribution generalization gap.
    disagreements:
    - 'Evaluation priority: some benchmarks emphasize code executability and geometric
      fidelity, while others reward design-intent alignment and engineering feasibility,
      with no agreed-upon ranking.'
    - 'Interaction mode: one-shot generation is the default, but proactive clarification
      is proposed as an alternative, indicating disagreement on whether user interaction
      is necessary or too costly.'
    - 'Feedback signal: physical simulation (FEA) is used as a post-hoc validator,
      while visual rendering and blueprint schemas serve as intermediate guidance;
      the optimal feedback type and integration point remain contested.'
    - 'Core representation: papers choose among CadQuery scripts, state-space models,
      and differentiable Bézier patches, reflecting different assumptions about the
      best trade-off between editability, scalability, and geometric fidelity.'
    open_questions:
    - Can finite element analysis or other physics-based simulations be integrated
      as a differentiable training signal rather than a terminal validation step?
    - Do current benchmarks accurately reflect the iterative editing and parameter-change
      demands typical of real-world CAD workflows?
    - How can generative models achieve robust generalization to unseen industrial
      part families without large-scale, annotated CAD datasets?
    - Can proactive clarification or feedback mechanisms maintain low interaction
      overhead while significantly improving compliance with complex engineering requirements?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 标准化多模态CAD生成基准
      解决的问题: 为不同输入模态（图像、点云、文本）和任务（生成、问答、编辑）提供统一的评估框架，替代碎片化、模态特定的度量。
      尚未覆盖: 基准主要依赖静态数据集和指标，尚未充分捕捉真实世界工程约束，如公差累积、装配运动学或下游可制造性。
    - 路线: 基于LLM的程序化CAD合成
      解决的问题: 利用大语言模型从自然语言理解设计意图，端到端生成可执行的CAD脚本，产出参数化B-Rep模型。
      尚未覆盖: 模型在细粒度几何抽象上仍有困难，常将复杂操作用简单草图拉伸替代，且对新颖零件族的泛化能力有限。
    - 路线: 可微分参数曲面驱动的点监督B-Rep生成
      解决的问题: 通过将B-Rep表示为可微分贝塞尔曲面，使模型能在未标注的3D数据上训练，消除了昂贵的CAD特定标注需求。
      尚未覆盖: 生成的可编辑B-Rep可能缺乏设计意图特征树和参数约束，限制了其在迭代式工程工作流中的直接使用。
    - 路线: 反馈驱动的自改进设计智能体
      解决的问题: 引入有限元分析、主动澄清和视觉渲染等外部反馈回路，将一次性生成转变为迭代优化，从而改善几何与物理一致性。
      尚未覆盖: 即使使用反馈，模型仍无法满足严格的工程需求；反馈信号尚未被用作训练目标，且无法完全替代人类设计经验。
    共识:
    - 仅靠几何相似度并不足够；社区一致认为需要涵盖功能性、可制造性和设计意图对齐的多维度评估。
    - LLM在生成CAD脚本方面展现出潜力，但在复杂操作（如扫掠、放样）和精确参数化上持续失败，往往简化设计的几何意图。
    - 接受文本、图像和点云输入的多模态统一框架正在成为主流架构范式。
    - 在理想化基准上的表现显著高估了真实工业适用性，揭示了严重的分布外泛化缺口。
    分歧:
    - 评估优先级：一些基准强调代码可执行性和几何保真度，而另一些则奖励设计意图对齐和工程可行性，目前尚无公认的排序。
    - 交互模式：单次生成是默认方式，但主动澄清被提出作为替代方案，表明在是否需要用户交互及其成本上存在分歧。
    - 反馈信号：物理仿真（FEA）用作事后验证器，而视觉渲染和蓝图模式用作中间引导；最佳反馈类型和集成点尚未达成共识。
    - 核心表示：论文在CadQuery脚本、状态空间模型和可微分贝塞尔曲面之间做出选择，反映出对可编辑性、可扩展性和几何保真度之间权衡的不同假设。
    开放问题:
    - 有限元分析或其他基于物理的仿真能否被集成为可微训练信号，而不仅仅是终端验证步骤？
    - 当前基准是否准确反映了真实CAD工作流中常见的迭代式编辑和参数更改需求？
    - 在没有大规模、带标注CAD数据集的情况下，生成模型如何实现对未见工业零件族的鲁棒泛化？
    - 主动澄清或反馈机制能否在保持低交互开销的同时，显著提升对复杂工程需求的满足程度？

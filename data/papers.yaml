  title_cn: 面向基于ICL的CAD代码生成的设计规范平铺
  abstract_cn: 大型语言模型（LLMs）在代码生成方面展现了卓越的能力，但由于训练数据稀缺，在计算机辅助设计（CAD）代码生成等特定领域任务上表现不佳。上下文学习（ICL）通过任务特定的示例提供了一种无需训练的替代方案。然而，现有的选择策略优先考虑相似性或点态多样性，往往产生冗余选择，无法满足复杂CAD设计规范中的组合需求。在这项工作中，我们提出知识充分性作为示例选择的原则性目标，旨在最大程度地满足设计规范中的所有需求。为实现这一目标，我们引入了设计规范平铺（DST），通过提取多粒度设计组件并测量所选示例覆盖查询组件的比例（平铺比）来量化知识充分性。我们证明最大化这一目标构成子模最大化，并提供了一个具有(1-1/e)近似保证的多项式时间贪心算法。大量实验表明，DST显著提高了CAD代码生成质量，在ICL中持续优于现有的示例选择策略。

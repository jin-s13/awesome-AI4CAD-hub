  related_work_outline:
  - 'Mainstream direction: Building multi-modal CAD program generation and evaluation
    systems that convert text, images, meshes, or point clouds into editable parametric
    CAD programs, with a strong emphasis on standardized benchmarks and metrics.'
  - 'Shared research pattern: All works adopt executable parametric CAD representations
    (CadQuery scripts, B-Rep sequences, parametric patches) and evaluate via multi-metric
    protocols covering geometric fidelity, executability, and increasingly engineering
    constraints.'
  - 'Key differences: Input modalities vary (text, image, mesh, point cloud); evaluation
    targets differ (geometric accuracy vs. manufacturability/assemblability); interaction
    modes range from one-shot generation to proactive clarification; output representations
    include code, operation sequences, and differentiable surfaces.'
  - 'Trend evolution: The field has rapidly consolidated around unified multi-modal
    benchmarks and LLM-based generation in 2026, moving from single-task evaluation
    toward multi-task, multi-modal frameworks and from direct generation toward optimization-based
    and interactive agent-based approaches.'
  - 'Open questions: Generalization to unseen part families remains limited; complex
    operations like sweeps and lofts are poorly handled; the gap between geometric
    metrics and real-world engineering usability is unaddressed; the cost-benefit
    of interactive clarification in practical workflows is unknown.'
  related_work_outline_zh:
  - 主流方向：构建多模态CAD程序生成与评估系统，将文本、图像、网格或点云转化为可编辑的参数化CAD程序，并高度重视标准化基准与度量指标。
  - 研究共性：所有工作均采用可执行的参数化CAD表示（CadQuery脚本、B-Rep序列、参数化面片），并通过覆盖几何保真度、可执行性及日益增多的工程约束的多指标协议进行评估。
  - 关键差异：输入模态不同（文本、图像、网格、点云）；评估目标不同（几何精度 vs. 可制造性/可装配性）；交互模式从一次性生成到主动澄清不等；输出表示包括代码、操作序列和可微曲面。
  - 趋势演进：该领域在2026年迅速围绕统一多模态基准和基于LLM的生成方法整合，从单任务评估转向多任务多模态框架，从直接生成转向基于优化和交互式智能体的方法。
  - 开放问题：对未见零件族的泛化能力仍然有限；扫掠、放样等复杂操作处理不佳；几何指标与真实工程可用性之间的差距尚未解决；交互式澄清在实际工作流中的成本效益未知。
  literature_review:
    line_of_work_matrix:
    - line: Multi-modal CAD generation benchmarks and evaluation protocols
      what_it_solves: Standardized evaluation of AI-assisted CAD program generation
        across diverse inputs, tasks, and metrics, enabling controlled comparison
        of models.
      what_remains_open: Coverage of real-world engineering constraints (manufacturability,
        assemblability) is still limited; correlation between benchmark metrics and
        downstream engineering utility is unverified.
    - line: LLM-based CAD program synthesis
      what_it_solves: Direct generation of executable CAD scripts from natural language
        descriptions, leveraging pre-trained language models and code generation capabilities.
      what_remains_open: Support for complex geometric operations (sweeps, lofts)
        is weak; parametric accuracy and structural plausibility of generated programs
        need improvement; generalization to unseen part families is poor.
    - line: Visual/geometric to CAD reconstruction
      what_it_solves: Recovery of editable parametric CAD construction sequences from
        meshes, point clouds, or images, often via optimization or learned fitting.
      what_remains_open: Robustness to noise and modality shift is insufficient; reconstruction
        quality degrades with geometric complexity; design intent understanding is
        absent.
    - line: Interactive and proactive CAD generation agents
      what_it_solves: Robust text-to-CAD generation under ambiguous user prompts by
        introducing clarification dialogues or iterative refinement before code synthesis.
      what_remains_open: Trade-off between interaction overhead and generation efficiency;
        state tracking and user modeling across multiple clarification turns are unexplored.
    - line: Differentiable CAD representation and generation
      what_it_solves: Learning to generate editable B-Reps from point-level supervision
        without CAD-specific annotations, using differentiable parametric surfaces.
      what_remains_open: Support for complex topologies is limited; impact of training
        data scale and quality on fidelity is unclear; compatibility with industrial
        CAD kernels is not demonstrated.
    consensus:
    - Executable parametric CAD programs (CadQuery scripts, B-Rep operation sequences)
      are the preferred editable intermediate representation.
    - Multi-metric evaluation is necessary, combining geometric fidelity (Chamfer
      distance, IoU) with program validity (executability, invalid ratio).
    - Current models, including frontier LLMs, fail to reliably produce engineering-ready
      CAD models, especially for complex parts and fine-grained constraints.
    disagreements:
    - 'Input modality: some systems focus on text-only prompts, while others support
      images, meshes, or point clouds, leading to different encoder architectures
      and training data requirements.'
    - 'Evaluation target: benchmarks differ in whether they prioritize geometric reconstruction
      accuracy or downstream engineering properties like manufacturability and assemblability.'
    - 'Interaction mode: one-shot generation versus multi-turn proactive clarification,
      reflecting different assumptions about user effort and prompt quality.'
    - 'Output representation: code-generating models output CadQuery scripts, while
      reconstruction methods produce operation sequences or parametric surface patches,
      affecting editability and downstream tool compatibility.'
    open_questions:
    - How can benchmarks incorporate real-world engineering constraints to close the
      gap between geometric metrics and industrial usability?
    - What training strategies or architectures can improve generalization to unseen
      part families and complex operations like sweeps and lofts?
    - Can interactive clarification significantly improve generation reliability without
      imposing prohibitive user burden in practical design workflows?
    - How do differentiable CAD representations scale to complex topologies and integrate
      with existing CAD kernels?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD生成基准与评估协议
      解决的问题: 标准化评估AI辅助CAD程序生成，覆盖多种输入、任务和指标，实现模型的可控比较。
      尚未覆盖: 对真实工程约束（可制造性、可装配性）的覆盖仍然有限；基准指标与下游工程效用之间的相关性未经验证。
    - 路线: 基于LLM的CAD程序合成
      解决的问题: 从自然语言描述直接生成可执行CAD脚本，利用预训练语言模型和代码生成能力。
      尚未覆盖: 对复杂几何操作（扫掠、放样）的支持不足；生成程序的参数准确性和结构合理性有待提升；对未见零件族的泛化能力差。
    - 路线: 视觉/几何到CAD重建
      解决的问题: 从网格、点云或图像恢复可编辑的参数化CAD构建序列，通常通过优化或学习拟合实现。
      尚未覆盖: 对噪声和模态转换的鲁棒性不足；重建质量随几何复杂度下降；缺乏对设计意图的理解。
    - 路线: 交互式与主动式CAD生成智能体
      解决的问题: 在模糊用户提示下实现鲁棒的文本到CAD生成，通过在代码合成前引入澄清对话或迭代优化。
      尚未覆盖: 交互开销与生成效率之间的权衡；多轮澄清中的状态追踪和用户建模尚未探索。
    - 路线: 可微分CAD表示与生成
      解决的问题: 在没有CAD特定标注的情况下，从点级监督学习生成可编辑的B-Rep，使用可微分参数曲面。
      尚未覆盖: 对复杂拓扑的支持有限；训练数据规模和质量对保真度的影响不明确；与工业CAD内核的兼容性未经验证。
    共识:
    - 可执行的参数化CAD程序（CadQuery脚本、B-Rep操作序列）是首选的、可编辑的中间表示。
    - 多指标评估是必要的，需结合几何保真度（Chamfer距离、IoU）与程序有效性（可执行性、无效比率）。
    - 当前模型，包括前沿LLM，无法可靠地生成工程就绪的CAD模型，尤其对于复杂零件和细粒度约束。
    分歧:
    - 输入模态：部分系统专注于纯文本提示，而其他系统支持图像、网格或点云，导致编码器架构和训练数据需求不同。
    - 评估目标：基准在优先考虑几何重建精度还是下游工程属性（如可制造性和可装配性）上存在差异。
    - 交互模式：一次性生成与多轮主动澄清，反映了对用户负担和提示质量的不同假设。
    - 输出表示：代码生成模型输出CadQuery脚本，而重建方法产生操作序列或参数化面片，影响可编辑性和下游工具兼容性。
    开放问题:
    - 基准如何纳入真实工程约束，以缩小几何指标与工业可用性之间的差距？
    - 哪些训练策略或架构可以改善对未见零件族和扫掠、放样等复杂操作的泛化能力？
    - 交互式澄清能否在实际设计工作流中显著提高生成可靠性，而不带来过高的用户负担？
    - 可微分CAD表示如何扩展到复杂拓扑，并与现有CAD内核集成？

  abstract_cn: 广义缠绕数（GWN）是一个标量场，支持对曲面几何（包括非水密、重叠和嵌套边界表示）进行鲁棒的包含性查询。虽然查询可以轻松地在样本上并行化，但在参数曲线和曲面上的直接计算对于大型复杂模型仍然成本高昂。当前最先进的快速GWN方法利用空间索引来近似GWN，通常结合泰勒展开来近似远处几何基元簇的GWN贡献。然而，这些方法仅适用于离散输入（如三角形网格和点云），若应用于曲面输入，则会在边界附近引入包含性误差。我们通过一种包围体层次结构（Bounding
    Volume Hierarchy）扩展了对快速GWN评估的支持，该结构适用于任意二维NURBS曲线集合和三维裁剪NURBS曲面片，并在层次节点中高效存储预计算的矩数据。在查询层次结构时，对远处簇使用近似计算，同时对附近的NURBS基元进行直接评估，从而在保持查询点附近几何特征的同时实现亚线性复杂度。我们性能改进的核心在于预处理阶段对NURBS基元采用自适应细分策略，在保持包含性决策与直接评估相同精度的同时，创建更好的空间划分。我们通过大量二维和三维数据集展示了我们方法的性能和精度。

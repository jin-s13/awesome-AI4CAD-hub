  title_cn: CMT：一种用于多模态条件CAD生成的级联MAR与拓扑预测器
  abstract_cn: 尽管准确且用户友好的计算机辅助设计（CAD）对于工业设计和制造至关重要，但现有方法由于表示过于简化或架构无法支持多模态设计需求，仍难以实现这一目标。本文尝试从方法和数据集两方面解决该问题。首先，我们提出了一种带有拓扑预测器的级联MAR（CMT），这是首个基于边界表示（B-Rep）的CAD生成多模态框架。具体而言，级联MAR能够有效捕获B-Rep中关键的“边-面-体”先验，而拓扑预测器则直接从MAR的紧凑令牌中估计B-Rep的拓扑结构。其次，为促进大规模训练，我们开发了一个大规模多模态CAD数据集mmABC，包含超过130万个B-Rep模型及其多模态标注（点云、文本描述和多视角图像）。大量实验表明，CMT在条件和无条件CAD生成任务中均表现优越。例如，在ABC数据集的无条件生成任务中，相比最先进方法，我们将覆盖率提升了+10.68%，有效比率提升了+10.3%。在mmABC的图像条件CAD生成任务中，CMT还将倒角距离提升了+4.01。

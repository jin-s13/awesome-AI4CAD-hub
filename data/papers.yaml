  abstract_cn: 计算机辅助设计（CAD）通过创建精确、可编辑的三维模型，支撑着现代工程与制造。然而，CAD研究通常孤立地研究各项任务，而多模态、多任务学习因缺乏统一基准而受到阻碍。为填补这一空白，我们提出了UniCAD，一个全面的多模态CAD学习基准，涵盖点云到CAD重建、文本/图像到CAD生成以及CAD问答，覆盖多种输入模态。伴随该基准，我们提出了UniCAD-MLLM，一个通用的多模态大语言模型，能够接收文本、图像、草图、点云，并在单一框架内以端到端方式执行这些异构任务。在UniCAD和Fusion360基准上的大量实验表明，UniCAD-MLLM在所有任务上均达到了最先进的性能，超越了现有的任务特定和多任务基线。我们将发布数据集、代码和预训练模型，以加速未来研究。

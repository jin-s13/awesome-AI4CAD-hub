  title_cn: FR-CSG：面向构造实体几何的快速可靠建模
  abstract_cn: 从CAD模型中重建CSG树是逆向工程中的一个关键课题。尽管CSG重建已取得显著进展，但在捕捉几何细节和实现高效性方面仍存在挑战。此外，由于非轴对齐的体积基元因离散化误差无法保持共面特性，现有的布尔运算在CSG建模过程中常导致零体积表面并遭受拓扑错误。为解决这些问题，我们提出了一种新颖的工作流程，以实现快速的CSG重建和可靠的前向建模。首先，我们采用特征移除和模型细分技术将模型分解为子组件。这通过简化模型复杂度显著加速了重建过程。然后，我们引入了一种更合理的基元生成与过滤方法，并利用尺寸相关的优化方法重建CSG树。通过将特征作为附加节点重新添加到CSG树中，我们的方法不仅保留了精细细节，还确保了所得CSG树的简洁性、语义完整性和可编辑性。最后，我们开发了一种共面基元离散化方法，将基元表示为大平面，并在求交后提取原始三角形。我们扩展了三角形的分类，并引入了一种共面感知的布尔树评估技术，从而即使在极端退化情况下也能实现无零体积表面的流形且水密的建模结果。我们证明了我们的方法优于现有最先进方法。此外，我们的方法生成的CSG树包含丰富的语义信息，支持多样化的模型编辑任务。

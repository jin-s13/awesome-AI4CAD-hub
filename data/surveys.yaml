  related_work_outline:
  - 'Mainstream direction: Multi-modal generation and reconstruction of editable parametric
    CAD (programs or B-Rep) from images, meshes, point clouds, and text, increasingly
    driven by large language/multimodal models and accompanied by unified benchmarks.'
  - 'Shared research pattern: All works convert unstructured inputs into structured
    CAD representations, optimize for geometric fidelity and executability, and evaluate
    with a mix of geometric metrics and program validity, while acknowledging brittleness
    under distribution shift.'
  - 'Key differences: Representation choices (CadQuery scripts vs. B-Rep primitives
    vs. parametric surfaces) dictate editability and training data requirements; supervision
    ranges from full CAD sequence annotations to point-level signals; evaluation protocols
    diverge between geometric accuracy and engineering criteria like manufacturability.'
  - 'Trend evolution: The field has moved from early parametric sequence modeling
    to recent LLM-based multi-modal frameworks and comprehensive benchmarks (2024–2026),
    with growing emphasis on functional and assemblability assessment beyond pure
    geometry.'
  - 'Open questions: How to achieve robust, high-fidelity CAD generation under ambiguous
    inputs and complex geometries; how to align evaluation metrics with downstream
    engineering utility; and how to unify representations for both precise reconstruction
    and flexible editing.'
  related_work_outline_zh:
  - 主流方向：从图像、网格、点云和文本等多模态输入生成或重建可编辑的参数化CAD（程序或B-Rep），越来越多地由大语言/多模态模型驱动，并伴随统一基准的出现。
  - 研究共性：所有工作都将非结构化输入转换为结构化CAD表示，优化几何保真度和可执行性，并混合使用几何指标和程序有效性进行评估，同时承认模型在分布偏移下的脆弱性。
  - 关键差异：表示选择（CadQuery脚本 vs. B-Rep基元 vs. 参数曲面）决定了可编辑性和训练数据需求；监督信号从完整CAD序列标注到点级监督不等；评估协议在几何精度与可制造性等工程标准之间分化。
  - 趋势演进：领域从早期参数化序列建模发展到近期基于LLM的多模态框架和综合基准（2024–2026），越来越强调超越纯粹几何的功能性和可装配性评估。
  - 开放问题：如何在模糊输入和复杂几何下实现鲁棒、高保真的CAD生成；如何使评估指标与下游工程效用对齐；如何统一表示以兼顾精确重建和灵活编辑。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD program generation from multi-modal inputs
      what_it_solves: Translates text, images, or 3D data into executable CAD scripts
        (e.g., CadQuery) or construction sequences, enabling editable and compact
        design representations.
      what_remains_open: Robustness to ambiguous prompts, precise reconstruction of
        complex geometries, and integration of engineering constraints beyond geometric
        validity.
    - line: Direct B-Rep generation and reconstruction from 3D data
      what_it_solves: Produces boundary representation models directly from meshes
        or point clouds using differentiable parametric surfaces or hybrid optimization,
        bypassing intermediate program representations.
      what_remains_open: Scalability to unannotated data, generalization of differentiable
        representations across diverse topologies, and handling of long parametric
        sequences.
    - line: Benchmarks and evaluation protocols for CAD generation
      what_it_solves: Provides standardized multi-modal datasets and metrics (geometric
        fidelity, executability, manufacturability, assemblability) to systematically
        compare models and reveal failure modes.
      what_remains_open: Alignment of proxy metrics with real engineering requirements,
        reliability of VLM-based judges, and cross-benchmark generalization of model
        rankings.
    - line: Interactive and proactive CAD generation
      what_it_solves: Improves robustness to underspecified inputs by introducing
        clarification agents that resolve ambiguities before code synthesis, reducing
        invalid outputs.
      what_remains_open: Efficiency of multi-turn interaction, extension to non-text
        modalities, and preservation of user experience without excessive query overhead.
    consensus:
    - Editable parametric CAD (programs or B-Rep) is the preferred output representation
      for downstream engineering use.
    - Deep generative models, especially LLMs and MLLMs, are the dominant backbone
      for mapping unstructured inputs to structured CAD.
    - Current models exhibit a failure cascade from executable code to valid geometry
      to engineering-ready design, with performance degrading under geometric complexity
      and modality shift.
    - Evaluation must go beyond geometric similarity to include executability, compactness,
      and increasingly functional and manufacturability criteria.
    disagreements:
    - 'Representation: Some works generate imperative CAD scripts (CadQuery), others
      predict B-Rep primitives or parametric surface patches, leading to different
      editability and training data requirements.'
    - 'Supervision: Methods rely on full CAD construction sequence annotations, point-level
      supervision, or purely text-code pairs, creating a trade-off between data availability
      and reconstruction accuracy.'
    - 'Evaluation target: Benchmarks emphasize different aspects—geometric fidelity
      (CADBench), engineering intent (MUSE), or multi-task unification (UniCAD)—causing
      model rankings to vary across protocols.'
    - 'Interaction mode: Most systems are single-shot generators, while ProCAD introduces
      proactive clarification, raising questions about the cost and benefit of interactive
      refinement.'
    open_questions:
    - How can we design a unified CAD representation that combines the precision of
      direct B-Rep fitting with the editability of parametric programs?
    - What evaluation protocol can reliably predict downstream engineering success
      (e.g., simulation, manufacturing) without expensive human studies?
    - How can models be made robust to ambiguous, noisy, or out-of-distribution inputs
      without sacrificing fidelity on clean data?
    - What is the minimal supervision signal needed to train a general-purpose CAD
      generator that works across modalities and object categories?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 从多模态输入生成参数化CAD程序
      解决的问题: 将文本、图像或3D数据转换为可执行的CAD脚本（如CadQuery）或构建序列，实现可编辑且紧凑的设计表示。
      尚未覆盖: 对模糊提示的鲁棒性、复杂几何的精确重建，以及超越几何有效性的工程约束集成。
    - 路线: 从3D数据直接生成与重建B-Rep
      解决的问题: 使用可微分参数曲面或混合优化直接从网格或点云生成边界表示模型，绕过中间程序表示。
      尚未覆盖: 对未标注数据的可扩展性、可微分表示在不同拓扑上的泛化能力，以及长参数序列的处理。
    - 路线: CAD生成的基准与评估协议
      解决的问题: 提供标准化的多模态数据集和指标（几何保真度、可执行性、可制造性、可装配性），以系统比较模型并揭示失败模式。
      尚未覆盖: 代理指标与真实工程需求的对齐、基于VLM评判器的可靠性，以及模型排名在不同基准间的泛化性。
    - 路线: 交互式与主动式CAD生成
      解决的问题: 通过引入澄清智能体在代码合成前解决歧义，提高对欠指定输入的鲁棒性，减少无效输出。
      尚未覆盖: 多轮交互的效率、向非文本模态的扩展，以及在不增加过多查询开销下保持用户体验。
    共识:
    - 可编辑的参数化CAD（程序或B-Rep）是下游工程应用的首选输出表示。
    - 深度生成模型，尤其是LLM和MLLM，是将非结构化输入映射到结构化CAD的主要骨干。
    - 当前模型存在从可执行代码到有效几何再到工程就绪设计的失败级联，性能随几何复杂度和模态转换而下降。
    - 评估必须超越几何相似性，纳入可执行性、紧凑性，并越来越多地考虑功能性和可制造性标准。
    分歧:
    - 表示方式：部分工作生成命令式CAD脚本（CadQuery），其他工作预测B-Rep基元或参数曲面面片，导致可编辑性和训练数据需求不同。
    - 监督信号：方法依赖完整CAD构建序列标注、点级监督或纯文本-代码对，在数据可得性与重建精度之间形成权衡。
    - 评测目标：基准强调不同方面——几何保真度（CADBench）、工程意图（MUSE）或多任务统一（UniCAD）——导致模型排名在不同协议下变化。
    - 交互模式：多数系统为单次生成器，而ProCAD引入主动澄清，引发关于交互式精化成本与收益的问题。
    开放问题:
    - 如何设计统一的CAD表示，兼具直接B-Rep拟合的精度和参数化程序的可编辑性？
    - 何种评估协议能可靠预测下游工程成功（如仿真、制造），而无需昂贵的人工研究？
    - 如何使模型对模糊、噪声或分布外输入具有鲁棒性，同时不牺牲在干净数据上的保真度？
    - 训练一个跨模态和物体类别的通用CAD生成器所需的最小监督信号是什么？

  abstract_cn: 桌面制造技术（如3D打印）日益流行，因为它们降低了按需生产定制物体的成本和复杂性。不幸的是，这些早期采用者（常被称为“创客”）的活跃社区并未得到当前可用软件管线的良好服务。当今用户必须组合一系列特殊的工具，这些工具通常是原本为专家设计的专有软件的改造变体。本文提出基础编程语言技术，以提升计算机辅助设计（CAD）软件管线的严谨性、降低复杂性并增加新功能，适用于3D打印等应用。组合性、指称语义、编译器正确性和程序合成在我们的方法中均扮演关键角色，其出发点是将实体几何视为一种编程语言。具体而言，我们定义了一种纯函数式CAD语言LambdaCAD以及一种多边形表面网格中间表示。然后我们定义了两种语言到3D实体的指称语义，以及一个从CAD到网格的编译器，并附有语义保持的证明。我们通过开发一种基于求值上下文的新型合成算法来展示这一基础的有效性，该算法可将从在线创客社区下载的难以编辑的网格“反编译”回更易编辑的CAD程序。所有原型均用OCaml实现，以便进一步探索函数式编程在桌面制造中的应用。

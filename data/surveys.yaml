  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD models (command sequences,
    code, STEP) from multimodal inputs (images, text, point clouds, meshes) using
    large language/vision models, with emphasis on geometric fidelity and executability.'
  - 'Shared research pattern: All works adopt a sequence-to-sequence or code-generation
    paradigm, represent CAD as structured programs, and evaluate via geometric similarity
    metrics and validity rates.'
  - 'Key differences: Input modality (image, text, mesh, point cloud), target CAD
    representation (command sequence, CadQuery, STEP B-rep, pointer-based), generation
    strategy (autoregressive, evolutionary, RL fine-tuning, hybrid optimization),
    and benchmark choice.'
  - 'Trend evolution: Moving from single-modality autoregressive models toward unified
    multimodal LLMs/VLMs, with increasing use of reinforcement learning and retrieval
    augmentation to improve geometric precision and complex topology handling.'
  - 'Open questions: Cross-modal generalization to real-world inputs, scalability
    to multi-part assemblies, integration with industrial CAD standards, and lack
    of a unified evaluation benchmark.'
  related_work_outline_zh:
  - 主流方向：从多模态输入（图像、文本、点云、网格）生成可编辑的参数化CAD模型（命令序列、代码、STEP），强调几何保真度和可执行性。
  - 研究共性：均采用序列到序列或代码生成范式，将CAD表示为结构化程序，并通过几何相似性指标和有效性比率进行评估。
  - 关键差异：输入模态（图像、文本、网格、点云）、目标CAD表示（命令序列、CadQuery、STEP B-rep、基于指针的序列）、生成策略（自回归、演化、强化学习微调、混合优化）以及基准选择。
  - 趋势演进：从单模态自回归模型向统一多模态LLM/VLM发展，越来越多地使用强化学习和检索增强来提升几何精度和复杂拓扑处理能力。
  - 开放问题：对真实世界输入的跨模态泛化、多零件装配体的可扩展性、与工业CAD标准的集成，以及缺乏统一的评估基准。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD sequence generation
      what_it_solves: Generating valid CAD construction sequences from scratch or
        from a latent space, enabling automated design exploration.
      what_remains_open: Handling very long sequences with complex topology, and ensuring
        the generated models meet industrial-grade complexity and editability.
    - line: Image/mesh-to-CAD reconstruction
      what_it_solves: Recovering editable parametric CAD programs from visual or geometric
        data (images, meshes), bridging reverse engineering and design reuse.
      what_remains_open: Robustness to real-world images, occlusions, and diverse
        rendering conditions; generalization beyond training shapes.
    - line: Text-to-CAD generation
      what_it_solves: Mapping natural language descriptions to executable CAD code
        or STEP models, lowering the barrier for non-expert design.
      what_remains_open: Capturing precise geometric intent from ambiguous language,
        and scaling to complex assemblies with multiple constraints.
    - line: Unified multimodal CAD models
      what_it_solves: A single model handling multiple CAD tasks (reconstruction,
        generation, QA) across different input modalities.
      what_remains_open: Cross-task interference, real-world deployment feasibility,
        and whether a unified model outperforms specialized ones on each task.
    consensus:
    - Editable parametric representations (command sequences, code, STEP) are preferred
      over static mesh or point cloud outputs.
    - Geometric fidelity is measured primarily by volumetric IoU, Chamfer Distance,
      and validity/executability rates.
    - Large language and vision-language models are the dominant backbone, fine-tuned
      on CAD-specific data.
    - Training data is typically derived from public CAD datasets (Fusion360, DeepCAD)
      or synthetically augmented.
    disagreements:
    - 'Input modality: some works focus on single modalities (image-only, text-only),
      while others propose unified multi-modal ingestion.'
    - 'CAD representation: command sequences vs. CadQuery Python code vs. STEP B-rep
      vs. pointer-based entity selection, each with different expressiveness and editability
      trade-offs.'
    - 'Generation strategy: autoregressive decoding vs. evolutionary optimization
      vs. reinforcement learning post-training, leading to different speed–quality–stability
      profiles.'
    - 'Evaluation benchmark: no single benchmark is universally adopted; works report
      on DeepCAD, Fusion360, UniCAD, MCB, or custom datasets, making direct comparison
      difficult.'
    open_questions:
    - How well do these methods generalize to real-world photographs or hand-drawn
      sketches, as opposed to synthetic renderings?
    - Can current approaches scale to multi-part assemblies with inter-part constraints
      and standard industrial formats?
    - What is the trade-off between generation flexibility and adherence to manufacturing
      constraints (e.g., fillet, chamfer, tolerance)?
    - Is a unified multimodal model truly more effective than a collection of specialized
      models for each CAD task?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 参数化CAD序列生成
      解决的问题: 从零或潜在空间生成有效的CAD构建序列，实现自动化设计探索。
      尚未覆盖: 处理具有复杂拓扑的长序列，确保生成的模型达到工业级复杂度和可编辑性。
    - 路线: 图像/网格到CAD重建
      解决的问题: 从视觉或几何数据（图像、网格）恢复可编辑的参数化CAD程序，连接逆向工程与设计重用。
      尚未覆盖: 对真实世界图像、遮挡和多样化渲染条件的鲁棒性；超出训练形状的泛化能力。
    - 路线: 文本到CAD生成
      解决的问题: 将自然语言描述映射为可执行的CAD代码或STEP模型，降低非专家设计门槛。
      尚未覆盖: 从模糊语言中捕获精确几何意图，并扩展到具有多重约束的复杂装配体。
    - 路线: 统一多模态CAD模型
      解决的问题: 单一模型处理多种CAD任务（重建、生成、问答），覆盖不同输入模态。
      尚未覆盖: 跨任务干扰、实际部署可行性，以及统一模型是否在每个任务上优于专用模型。
    共识:
    - 可编辑的参数化表示（命令序列、代码、STEP）优于静态网格或点云输出。
    - 几何保真度主要通过体积交并比、倒角距离和有效性/可执行率来衡量。
    - 大型语言和视觉语言模型是主要骨干，并在CAD特定数据上进行微调。
    - 训练数据通常来自公开CAD数据集（Fusion360、DeepCAD）或通过合成增强获得。
    分歧:
    - 输入模态：部分工作专注于单一模态（仅图像、仅文本），而其他工作提出统一的多模态输入。
    - CAD表示：命令序列 vs. CadQuery Python代码 vs. STEP B-rep vs. 基于指针的实体选择，各有不同的表达能力和可编辑性权衡。
    - 生成策略：自回归解码 vs. 演化优化 vs. 强化学习后训练，导致不同的速度-质量-稳定性特征。
    - 评估基准：没有普遍采用的单一基准；工作在DeepCAD、Fusion360、UniCAD、MCB或自定义数据集上报告，难以直接比较。
    开放问题:
    - 这些方法在真实世界照片或手绘草图上泛化效果如何，而非合成渲染图？
    - 当前方法能否扩展到具有零件间约束和标准工业格式的多零件装配体？
    - 生成灵活性与制造约束（如倒圆角、倒角、公差）之间的权衡是什么？
    - 统一多模态模型是否真的比每个CAD任务的专用模型集合更有效？

  title_cn: 'CAD-SIGNet: 基于逐层草图实例引导注意力的点云CAD语言推断'
  abstract_cn: 计算机辅助设计（CAD）领域的逆向工程一直是一个长期追求的目标，但尚未完全实现。其主要目标是从给定3D扫描的物理对象中揭示其背后的CAD过程。我们提出了CAD-SIGNet，一种端到端可训练的自回归架构，用于从输入点云中恢复表示为草图与拉伸序列的CAD模型的设计历史。我们的模型通过点云与CAD语言嵌入之间的逐层交叉注意力来学习CAD视觉-语言表示。特别地，提出了一种新的草图实例引导注意力（SGA）模块，以重建草图的细粒度细节。由于其自回归特性，CAD-SIGNet不仅能够从输入点云重建对应CAD模型的唯一完整设计历史，还能提供多种合理的设计选择。这使得交互式逆向工程场景成为可能，为设计师提供设计过程中的多个下一步选择。在公开可用的CAD数据集上进行的大量实验展示了我们的方法在两种设置下相对于现有基线模型的有效性，即完整设计历史恢复和从点云的条件自动补全。
  tldr_cn: 端到端自回归模型利用草图实例引导注意力从点云恢复CAD设计历史（草图与拉伸）
  analysis_cn:
    innovations:
    - 用于从点云恢复CAD设计历史的端到端可训练自回归架构
    - 点云与CAD语言嵌入之间的逐层交叉注意力
    - 用于细粒度草图细节重建的草图实例引导注意力（SGA）模块
    - 生成多种合理设计选择，实现交互式逆向工程
    methodology: CAD-SIGNet是一种自回归模型，从输入点云中恢复草图与拉伸操作序列。它采用点云特征与CAD语言嵌入之间的逐层交叉注意力，并利用草图实例引导注意力模块重建精细草图细节。该模型在公开CAD数据集上进行端到端训练，并在完整设计历史恢复和条件自动补全任务上进行评估。
    key_results: CAD-SIGNet在完整设计历史恢复和从点云的条件自动补全任务上优于现有基线模型，如在公开CAD数据集上的大量实验所示。

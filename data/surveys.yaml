  related_work_outline:
  - 'Mainstream direction: Reconstructing and generating editable parametric CAD construction
    sequences from visual, textual, or multi-modal inputs.'
  - 'Shared research pattern: Formalizing CAD as either a command sequence, a code
    script, or a structured STEP file, then applying sequence models, large language/vision
    models, or state-space models to learn geometry-aware generation or reconstruction.'
  - 'Key differences: Representation choices include command sequences, Python code,
    and STEP B-rep; supervision signals range from geometric losses to reinforcement
    learning with geometric rewards; evaluation emphasizes validity, editability,
    and fidelity.'
  - 'Trend evolution: Within the 2025–2026 frontier, work has shifted from geometry-only
    reconstruction toward LLM/VLM-driven code generation, multi-modal unification,
    and handling of longer, topologically complex programs.'
  - 'Open questions: Generalization to real-world images and unseen operations, maintaining
    topological correctness in long sequences, and bridging to downstream engineering
    workflows like CAE and CAM.'
  related_work_outline_zh:
  - 主流方向：从视觉、文本或多模态输入重建并生成可编辑的参数化CAD构建序列。
  - 研究共性：将CAD形式化为命令序列、代码脚本或STEP文件，再应用序列模型、大语言/视觉模型或状态空间模型进行几何感知的生成或重建。
  - 关键差异：表示方式包括命令序列、Python代码和STEP B-rep；监督信号涵盖几何损失、强化学习几何奖励；评测侧重有效性与可编辑性。
  - 趋势演进：在2025–2026窗口内，已从纯几何重建转向LLM/VLM驱动的代码生成、多模态统一以及更长、拓扑更复杂程序的生成。
  - 开放问题：对真实图像和未见操作的泛化、长序列中拓扑一致性的保持、以及与CAE/CAM等下游工程工作流的衔接。
  literature_review:
    line_of_work_matrix:
    - line: Visual-to-parametric CAD reconstruction
      what_it_solves: Recovers editable CAD construction sequences from meshes, images,
        or point clouds, enabling downstream editing and parametric modification.
      what_remains_open: Robustness to real-world images, complex topologies, and
        unseen construction operations; reliance on training data from specific CAD
        tools limits cross-tool transfer.
    - line: Language/vision-driven CAD code generation
      what_it_solves: Generates executable CAD code (Python, STEP) from natural language
        or images, lowering the expertise barrier for creating valid 3D models.
      what_remains_open: Topological integrity of generated B-rep models, generalization
        beyond the seen code syntax and operation sets, and integration with constraint-based
        design intent.
    - line: Long-sequence parametric CAD generative modeling
      what_it_solves: Models long sequences of parametric operations to generate complex
        CAD models with richer construction histories.
      what_remains_open: Scalability to industrial-length sequences while maintaining
        global geometric consistency and avoiding invalid operations.
    - line: Unified multi-modal multi-task CAD frameworks
      what_it_solves: Handles reconstruction, generation, and question answering across
        multiple input modalities in a single model, reducing the need for task-specific
        pipelines.
      what_remains_open: Performance on rare or zero-shot modality combinations, and
        the trade-off between unified architecture simplicity and per-task optimality.
    consensus:
    - Editable parametric representations (command sequences, code, STEP) are the
      central target, not static meshes or point clouds.
    - LLMs and VLMs are becoming the backbone for both generation and reconstruction,
      replacing earlier geometry-only networks.
    - Geometric fidelity is measured via volumetric IoU, Chamfer distance, and validity
      ratios; syntactic correctness is also a key metric.
    - Training data remains bottlenecked by the availability of paired geometry-code
      or geometry-text datasets.
    disagreements:
    - 'Representation: some work uses abstract command sequences, others use human-readable
      Python code, while yet others target the STEP standard with B-rep topology.'
    - 'Supervision: methods differ in using pure geometric loss versus reinforcement
      learning with geometric rewards or offline RL to capture sequential decision-making.'
    - 'Generation paradigm: one line of work uses evolution guided by VLMs, another
      uses fine-tuned generative models or LLMs with retrieval augmentation.'
    - 'Evaluation scope: some papers emphasize low-level geometry accuracy, while
      others highlight editability, generalization to new operations, or multi-task
      capability.'
    open_questions:
    - How well do these methods transfer to real-world photographs or hand-drawn sketches,
      where view ambiguity and occlusion are present?
    - Can the generated CAD sequences be directly consumed by downstream CAE/CAM pipelines
      without manual repair?
    - What is the right granularity of representation to balance editability, topological
      correctness, and model capacity?
    - How can we move beyond single-part generation to assemblies with constraints
      and functional relationships?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 视觉到参数化CAD重建
      解决的问题: 从网格、图像或点云恢复可编辑的CAD构建序列，支持后续编辑和参数化修改。
      尚未覆盖: 对真实世界图像、复杂拓扑和未见操作的鲁棒性；训练数据依赖特定CAD工具，跨工具迁移受限。
    - 路线: 语言/视觉驱动的CAD代码生成
      解决的问题: 从自然语言或图像直接生成可执行的CAD代码（Python、STEP），降低创建有效三维模型的专业门槛。
      尚未覆盖: B-rep模型的拓扑完整性、对未见代码语法和操作集的泛化，以及与约束驱动的设计意图集成。
    - 路线: 长序列参数化CAD生成建模
      解决的问题: 建模长序列参数化操作，生成具有更丰富构建历史的复杂CAD模型。
      尚未覆盖: 在工业级长度序列上的可扩展性，同时保持全局几何一致性并避免无效操作。
    - 路线: 统一多模态多任务CAD框架
      解决的问题: 在单一模型中处理跨多种输入模态的重建、生成和问答，减少对任务特定流水线的需求。
      尚未覆盖: 稀有或零样本模态组合下的性能，以及统一架构简洁性与单任务最优性之间的权衡。
    共识:
    - 可编辑的参数化表示（命令序列、代码、STEP）是核心目标，而非静态网格或点云。
    - 大语言模型和视觉语言模型正成为生成与重建的主干，逐步取代早期纯几何网络。
    - 几何保真度通过体积交并比、倒角距离和有效性比率衡量，同时语法正确性也是关键指标。
    - 训练数据受限于配对几何-代码或几何-文本数据集的可用性。
    分歧:
    - 表示方式：部分工作使用抽象命令序列，部分使用可读的Python代码，另一些则面向带B-rep拓扑的STEP标准。
    - 监督信号：方法在纯几何损失、强化学习几何奖励或离线强化学习之间选择不同，以捕捉序列决策。
    - 生成范式：一条路线采用视觉语言模型引导的演化，另一条使用微调生成模型或带检索增强的LLM。
    - 评测范围：一些论文强调低层几何精度，另一些强调可编辑性、对新操作的泛化或多任务能力。
    开放问题:
    - 这些方法在真实世界照片或手绘草图上（存在视角模糊和遮挡）的迁移效果如何？
    - 生成的CAD序列能否不经人工修复直接用于下游CAE/CAM流程？
    - 何种表示粒度能最佳平衡可编辑性、拓扑正确性和模型容量？
    - 如何从单零件生成扩展到带有约束和功能关系的装配体？

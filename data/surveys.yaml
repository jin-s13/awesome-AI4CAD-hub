  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD programs (mostly CadQuery
    or B-Rep sequences) from multimodal inputs (text, images, meshes, point clouds)
    using large language models, transformers, and state-space architectures, with
    a strong emphasis on benchmark-driven evaluation.'
  - 'Shared research pattern: Authors formulate CAD generation as a sequence-to-sequence
    or program synthesis problem, design a representation that balances reconstruction
    fidelity and editability, and validate on a curated benchmark using metrics like
    geometric fidelity, executability, and parametric validity.'
  - 'Key differences: Representations diverge between explicit B-Rep programs, parametric
    surface patches, and hybrid implicit-explicit forms; supervision ranges from annotated
    CAD sequences to point-level self-supervision; some methods add interactive planning
    agents while others assume a one-shot generation pipeline; evaluation goals vary
    from raw geometric accuracy to engineering manufacturability and robustness to
    ambiguity.'
  - 'Trend evolution: Research moved from specialized CAD reconstruction (earlier
    years) to LLM/VLM-based generation around 2024–2025, and by 2026 multiple unified
    benchmarks and multi-modal models appeared, indicating a rapid consolidation toward
    large-scale, standardized, and multi-task CAD intelligence.'
  - 'Open questions: No single representation dominates across all tasks and modalities;
    current benchmarks still decouple from real downstream engineering workflows;
    robustness under geometric complexity and modality shift remains brittle; lacking
    a shared understanding of what constitutes a valid, editable CAD model beyond
    executability scores.'
  related_work_outline_zh:
  - 主流方向：利用大语言模型、Transformer和状态空间架构，从多模态输入（文本、图像、网格、点云）生成可编辑的参数化CAD程序（多为CadQuery或B-Rep序列），并强烈依赖基准驱动的评估。
  - 研究共性：将CAD生成形式化为序列到序列或程序合成问题，设计一种平衡重建精度与可编辑性的表示，并在精心设计的基准上通过几何保真度、可执行性、参数有效性等指标进行验证。
  - 关键差异：表示方式上，有的采用显式B-Rep程序，有的用参数化曲面片，还有的采用混合隐式-显式形式；监督信号从带标注CAD序列到点级自监督不等；部分方法引入主动式交互规划智能体，其他则假设一次性生成；评估目标从原始几何精度到工程可制造性乃至对模糊输入的鲁棒性各不相同。
  - 趋势演进：研究从早期面向特定CAD重建的方法，在2024–2025年左右转向基于LLM/VLM的生成，到2026年出现了多个统一基准和多模态模型，表明该领域正快速向大规模、标准化和多任务CAD智能收敛。
  - 开放问题：尚无一种表示能在所有任务和模态中占优；现有基准与实际下游工程流程脱节；模型在几何复杂度和模态转换下的鲁棒性仍然脆弱；对于什么是可用的、可编辑的CAD模型，除可执行性分数外缺乏共识定义。
  literature_review:
    line_of_work_matrix:
    - line: Programmatic CAD generation with language models
      what_it_solves: Converting text, images, or 3D data into executable parametric
        CAD scripts (e.g., CadQuery) using large language models, thereby enabling
        intuitive editing and downstream reuse.
      what_remains_open: Generalization to unseen object categories and complex topologies;
        dependence on large curated datasets of CAD programs; the brittleness of LLM
        outputs to syntax errors and non‑executable code.
    - line: Differentiable parametric surface reconstruction
      what_it_solves: Learning to produce editable B‑Reps directly from unannotated
        point clouds or images via differentiable Bézier surface patches and tessellation,
        removing the need for CAD‑specific annotation.
      what_remains_open: Scalability to highly complex assemblies with many faces;
        handling of non‑parametric features like fillets or chamfers; the gap between
        point‑level supervision and engineering‑grade surface quality.
    - line: Hybrid optimization for mesh‑to‑CAD reconstruction
      what_it_solves: Recovering structured CAD construction sequences from meshes
        by iteratively fitting and validating parametric operations with geometric
        feedback, achieving high geometric accuracy and low invalid ratio.
      what_remains_open: Speed and scalability for large‑scale datasets; reliance
        on a predefined operation set that may not cover all real‑world feature types;
        limited exploration of multimodal inputs beyond clean meshes.
    - line: Unified multi‑modal and multi‑task CAD models
      what_it_solves: Building a single framework that processes text, images, sketches,
        and point clouds for reconstruction, generation, and QA, reducing the need
        for task‑specific pipelines.
      what_remains_open: How to balance specialization and generalization within a
        unified architecture; the risk of performance degradation on individual tasks
        compared to dedicated models; evaluation across heterogeneous tasks remains
        fragmented.
    - line: Interactive and proactive CAD generation agents
      what_it_solves: Improving robustness to ambiguous natural language prompts by
        introducing a clarification agent that asks targeted questions before code
        synthesis, lowering error rates and interaction overhead.
      what_remains_open: Optimal trade‑off between clarification frequency and user
        experience; applicability to non‑expert users; extension to multi‑turn, collaborative
        design scenarios.
    - line: Benchmarking and evaluation methodology for CAD generation
      what_it_solves: Providing standardized evaluation protocols with multiple modalities,
        metrics, and design‑intent rubrics, enabling fair comparison across methods
        and exposing failure modes.
      what_remains_open: Current benchmarks focus on geometric and executability metrics;
        they do not fully capture manufacturability, assembly constraints, or real‑world
        engineering fitness; VLM judges are still underexplored and may inherit biases.
    consensus:
    - The community converges on representing CAD as a parametric, editable artifact
      (either as a program or a set of parametric surfaces) rather than a static mesh.
    - Evaluation is shifting from a single geometric distance metric to multi‑faceted
      protocols that include executability, validity, and design‑intent alignment.
    - Large language models and vision‑language models are now the dominant backbone
      for CAD generation, replacing earlier specialized reconstruction networks.
    - There is broad agreement that current models fail on geometrically complex objects
      and under modality shift, and that existing benchmarks only partially capture
      real engineering requirements.
    disagreements:
    - 'Representation choice: some works advocate for explicit B‑Rep programs (CadQuery
      scripts) that are directly editable, while others favor parametric surface patches
      (Bézier surfaces) that can be trained with point‑level supervision and inherently
      support smooth surfaces.'
    - 'Supervision signal: methods differ in their reliance on ground‑truth CAD sequences
      versus self‑supervision from unannotated 3D data, leading to trade‑offs between
      data availability and reconstruction precision.'
    - 'Interaction mode: a few works introduce proactive clarification agents, whereas
      the majority assume a one‑shot generation pipeline without user feedback, implying
      different assumptions about deployment scenarios.'
    - 'Evaluation target: some benchmarks emphasize geometric fidelity (IoU, Chamfer
      distance), others target executability and validity, and a recent benchmark
      introduces design‑intent rubrics for manufacturability and functionality, reflecting
      no unified definition of success.'
    open_questions:
    - What representation naturally supports the full range of CAD operations (extrude,
      revolve, fillet, chamfer) while remaining learnable from raw sensor data?
    - How can we evaluate CAD models on downstream engineering criteria such as stress
      analysis, manufacturability, and assembly constraints?
    - To what extent do the gains of LLM‑based CAD generation transfer across different
      CAD scripting languages and real‑world design workflows?
    - Can interactive clarification be scaled to complex, multi‑part assemblies without
      burdening the user, and what is the minimal interaction budget needed for robust
      generation?
    - How do we isolate the contribution of the proposed representation from the effects
      of dataset scale, pre‑training, and evaluation protocol?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于语言模型的程序化CAD生成
      解决的问题: 利用大语言模型将文本、图像或3D数据转换为可执行的参数化CAD脚本（如CadQuery），实现直观编辑和下游复用。
      尚未覆盖: 对未见类别和复杂拓扑的泛化；依赖大型CAD程序数据集；LLM输出易出现语法错误和不可执行代码。
    - 路线: 可微分参数曲面重建
      解决的问题: 通过可微分的贝塞尔曲面片和曲面细分，直接从无标注点云或图像学习生成可编辑的B‑Rep，消除对CAD标注的依赖。
      尚未覆盖: 对多面复杂装配体的可扩展性；处理非参数特征（如倒角）的能力；点级监督与工程级曲面质量之间的差距。
    - 路线: 面向网格到CAD的混合优化重建
      解决的问题: 通过迭代拟合参数化操作并利用几何反馈验证，从网格恢复结构化CAD构建序列，实现高几何精度和低无效比。
      尚未覆盖: 大规模数据集上的速度和可扩展性；依赖预定义操作集可能无法覆盖所有真实特征类型；对噪声网格以外输入的探索有限。
    - 路线: 统一多模态多任务CAD模型
      解决的问题: 构建单一框架处理文本、图像、草图和点云，完成重建、生成和问答，减少对任务特定流水线的需求。
      尚未覆盖: 如何在统一架构中平衡专业化与泛化；在单项任务上相比专用模型可能的性能下降；异构任务的评估仍呈碎片化。
    - 路线: 交互式主动CAD生成智能体
      解决的问题: 通过引入在代码合成前提出针对性澄清问题的智能体，提升对模糊自然语言提示的鲁棒性，降低错误率和交互开销。
      尚未覆盖: 澄清频率与用户体验的最优平衡；对非专业用户的适用性；扩展到多轮协同设计场景。
    - 路线: CAD生成基准与评估方法论
      解决的问题: 提供包含多模态、多指标和设计意图评分标准的标准化评估协议，实现方法间的公平比较并揭示失败模式。
      尚未覆盖: 当前基准关注几何和可执行性指标，尚未充分捕捉可制造性、装配约束或真实工程适用性；VLM评判器仍待深入探索并可能引入偏见。
    共识:
    - 社区一致倾向于将CAD表示为可编辑的参数化工件（程序或参数曲面），而非静态网格。
    - 评估正从单一几何距离指标转向包含可执行性、有效性和设计意图对齐的多维度协议。
    - 大语言模型和视觉语言模型已成为CAD生成的主流骨干，取代了早期的专用重建网络。
    - 普遍认为现有模型在几何复杂对象和模态转换下表现不佳，且现有基准仅部分反映真实工程需求。
    分歧:
    - 表示选择：部分工作主张使用显式B‑Rep程序（CadQuery脚本）以便直接编辑，其他工作则偏好可使用点级监督训练且天然支持光滑曲面的参数曲面片（贝塞尔曲面）。
    - 监督信号：方法依赖真实CAD序列标注的程度不同，有的利用无标注3D数据自监督，导致数据可得性与重建精度之间的权衡。
    - 交互模式：少数工作引入主动澄清智能体，而大多数方法假设一次性生成流水线，无需用户反馈，反映出对部署场景的不同假设。
    - 评估目标：某些基准强调几何保真度（IoU、Chamfer距离），另一些关注可执行性和有效性，还有新基准引入用于可制造性和功能性的设计意图评分标准，表明尚缺乏统一的成功定义。
    开放问题:
    - 哪种表示能够自然支持拉伸、旋转、倒角、圆角等全部CAD操作，同时保持从原始传感器数据中可学习？
    - 如何评估CAD模型在应力分析、可制造性和装配约束等下游工程标准上的表现？
    - 基于LLM的CAD生成方法在多大程度上能迁移到不同的CAD脚本语言和真实设计工作流？
    - 在不过度增加用户负担的前提下，交互式澄清能否扩展到复杂的多部件装配体，且实现鲁棒生成所需的最小交互量是多少？
    - 如何将所提出表示方法的贡献与数据集规模、预训练和评估协议的影响隔离开？

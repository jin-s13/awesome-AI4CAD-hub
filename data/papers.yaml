- id: topology-first-b-rep-meshing-2026
  title: Topology-First B-Rep Meshing
  authors:
  - YunFan Zhou
  - Daniel Zint
  - Nafiseh Izadyar
  - Michael Tao
  - Daniele Panozzo
  - Teseo Schneider
  abstract: 'Parametric boundary representation models (B-Reps) are the de facto standard
    in CAD, graphics, and robotics, yet converting them into valid meshes remains
    fragile. The difficulty originates from the unavoidable approximation of high-order
    surface and curve intersections to low-order primitives: the resulting geometric
    realization often fails to respect the exact topology encoded in the B-Rep, producing
    meshes with incorrect or missing adjacencies. Existing meshing pipelines address
    these inconsistencies through heuristic feature-merging and repair strategies
    that offer no topological guarantees and frequently fail on complex models. We
    propose a fundamentally different approach: the B-Rep topology is treated as an
    invariant of the meshing process. Our algorithm enforces the exact B-Rep topology
    while allowing a single user-defined tolerance to control the deviation of the
    mesh from the underlying parametric surfaces. Consequently, for any admissible
    tolerance, the output mesh is topologically correct; only its geometric fidelity
    degrades as the tolerance increases. This decoupling eliminates the need for post-hoc
    repairs and yields robust meshes even when the underlying geometry is inconsistent
    or highly approximated. We evaluate our method on thousands of real-world CAD
    models from the ABC and Fusion 360 repositories, including instances that fail
    with standard meshing tools. The results demonstrate that topological guarantees
    at the algorithmic level enable reliable mesh generation suitable for downstream
    applications.'

    - 统一的评估流程和包含97个工程设计问题的精选基准，涵盖四个几何族
    - 对七个基础模型的实证比较，揭示紧凑的指令调优模型可以匹配更大的系统
    methodology: LLMForge将LLM用于文本到CAD生成，结合JSON-schema验证、分析特征评分和网格合成，在两种批评类型下进行迭代优化：IterTracer使用Phong着色光线追踪和分析指标，IterVision使用VLM（Qwen2.5-VL-72B）执行链式思维视觉推理。该框架在包含97个机械设计问题的基准上评估，涵盖板、盒、法兰圆柱和L形支架，使用了七个基础模型。
    key_results: 在IterTracer下，排名前四的模型实现了紧密的均值分数集群（0.885–0.890）和98.97%的网格成功率，表明紧凑模型可以媲美更大模型。IterVision在领先模型上实现了100%的水密网格生成，但暴露了旋转对称零件（如圆柱）的困难，其中视觉和语义评分差异最大。

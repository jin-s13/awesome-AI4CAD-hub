    - 提出了BenchCAD，一个统一的工业CAD推理基准，包含来自106个工业零件族的17,900个经过执行验证的CadQuery程序。
    - 多任务评估框架，涵盖视觉问答、代码问答、图像到代码生成和指令引导的代码编辑。

- id: foundation-models-for-automatic-cad-generation-2026
  title: Foundation Models for Automatic CAD Generation
  authors:
  - J de Curtò
  - Victoria Guillén
  - I. de Zarzà
  abstract: 'Recent advances in Large Language Models (LLMs) and Vision-Language Models
    (VLMs) enable the automatic generation of parametric 3D designs from natural-language
    specifications. This chapter presents an empirical study of foundation models
    for automatic Computer-Aided Design (CAD) generation of mechanical parts, using
    a unified evaluation pipeline and a curated benchmark of 97 engineering design
    problems. We introduce LLMForge, a multi-model text-to-CAD framework integrating
    JSON-schema validation, analytic feature scoring, mesh synthesis, and multi-round
    iterative refinement, studied under two critique regimes. IterTracer uses a Phong-shaded
    ray-trace renderer with analytic visual metrics (silhouette IoU, hole visibility,
    edge clearance, aspect-ratio conformance) for lightweight geometry-aware feedback
    across rounds. IterVision replaces the analytic scorer with a VLM semantic critic
    (Qwen2.5-VL-72B) that evaluates rendered views via chain-of-thought visual reasoning,
    assessing spatial coherence and design intent. On a benchmark spanning four canonical
    geometry families (plates with holes and bolt circles, multi-feature boxes, flanged
    cylinders, and L-brackets), we evaluate seven foundation models: DeepSeek-V3.2,
    Qwen3-235B-A22B, Llama-3.3-70B, Gemma-3-27B, GLM-4.5, MiniMax-M2.1, and INTELLECT.
    Under IterTracer, the four highest-ranked models form a tight cluster (overall
    mean in [0.885, 0.890]) with 98.97% mesh success, showing that compact instruction-tuned
    models can match substantially larger systems. VLM-based critique in IterVision
    yields 100% watertight mesh generation on the leading model while surfacing systematic
    difficulty on rotationally symmetric geometries such as cylinders, where visual
    and semantic scoring diverge most. We discuss benchmark design, failure modes,
    CAD-oriented prompting, and implications for industrial workflows and scalable
    automated mechanical design.'

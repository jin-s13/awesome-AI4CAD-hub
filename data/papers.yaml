  title_cn: CADSmith：基于程序化几何验证的多智能体CAD生成
  abstract_cn: 现有的文本到CAD生成方法要么在单次生成中缺乏几何验证，要么依赖有损的视觉反馈而无法解决尺寸误差。我们提出CADSmith，一个多智能体流水线，能够从自然语言生成CadQuery代码。随后通过两个嵌套的修正循环进行迭代优化：内循环解决执行错误，外循环基于程序化几何验证。外循环结合了来自OpenCASCADE内核的精确测量（边界框尺寸、体积、实体有效性）以及来自独立视觉语言模型Judge的整体视觉评估。这提供了收敛到正确几何所需的数值精度和高层形状感知能力。该系统采用基于API文档的检索增强生成而非微调，随着底层CAD库的演进维护一个最新的数据库。我们在一个包含100个提示的自定义基准上进行了评估，该基准分为三个难度等级（T1至T3），并设置了三种消融配置。与零样本基线相比，CADSmith实现了100%的执行率（从95%提升），中位数F1分数从0.9707提升至0.9846，中位数IoU从0.8085提升至0.9629，平均倒角距离从28.37降至0.74，表明带有程序化几何反馈的闭环优化显著提高了LLM生成的CAD模型的质量和可靠性。

  title_cn: 从意图到执行：面向精确CAD代码生成的多模态思维链强化学习
  abstract_cn: 计算机辅助设计（CAD）在工程和制造中发挥着至关重要的作用，但当前的CAD工作流程需要大量的领域专业知识和手动建模工作。近年来，大型语言模型（LLM）的进步使得从自然语言生成代码成为可能，为自动化参数化3D建模开辟了新的机遇。然而，由于需要逻辑推理、语法正确性和数值精度，直接将人类设计意图转化为可执行的CAD代码仍然极具挑战性。在这项工作中，我们提出了CAD-RL，一种多模态思维链（CoT）引导的强化学习后训练框架，用于CAD建模代码生成。我们的方法将基于CoT的冷启动与目标驱动的强化学习后训练相结合，使用三种任务特定奖励：可执行性奖励、几何精度奖励和外部评估奖励。为了在稀疏且高方差的奖励条件下确保稳定的策略学习，我们引入了三种针对性的优化策略：信任区域拉伸（Trust
    Region Stretch）以改进探索、精度令牌损失（Precision Token Loss）以增强维度参数准确性，以及过长过滤（Overlong Filtering）以减少噪声监督。为了支持训练和基准测试，我们发布了ExeCAD，一个新颖的数据集，包含16,540个真实世界CAD示例，配有自然语言和结构化设计语言描述、可执行的CADQuery脚本以及渲染的3D模型。实验表明，CAD-RL在推理质量、输出精度和代码可执行性方面相比现有视觉语言模型取得了显著提升。
  tldr_cn: 提出CAD-RL多模态思维链强化学习框架，从自然语言生成精确CAD代码，含新数据集ExeCAD。

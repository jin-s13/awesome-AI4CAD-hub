  title_cn: SketchGen：生成受约束的CAD草图
  abstract_cn: 计算机辅助设计（CAD）是技术设计中最广泛使用的建模方法。这些设计的典型起点是二维草图，随后可通过拉伸和组合获得复杂的三维装配体。此类草图通常由参数化图元（如点、直线和圆弧）组成，并附加连接图元的几何约束（如重合、平行或正交）。草图可表示为图，其中图元为节点，约束为边。训练模型自动生成CAD草图能够支持多种新颖工作流，但由于图的复杂性以及图元和约束的异构性而具有挑战性。特别是，每种图元和约束类型可能需要不同大小和参数类型的记录。我们提出SketchGen，一种基于Transformer架构的生成模型，通过精心设计图元和约束的序列语言来解决异构性问题，该语言能够区分不同的图元或约束类型及其参数，同时鼓励模型在相关参数间重用信息，编码共享结构。我们工作的一个亮点是能够生成通过约束关联的图元，从而使得最终输出可通过约束求解器进一步正则化。我们通过评估模型在给定图元集上的约束预测以及从头开始的完整草图生成任务，表明我们的方法显著优于CAD草图生成领域的最先进技术。

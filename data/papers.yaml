  title_cn: 'PR-CAD: 基于大型语言模型的渐进式精炼实现统一可控且忠实的文本到CAD生成'
  abstract_cn: CAD模型的构建传统上依赖于劳动密集型的手工操作和专业知识。近期大型语言模型（LLM）的进展激发了文本到CAD生成的研究。然而，现有方法通常将生成和编辑视为独立任务，限制了其实用性。我们提出PR-CAD，一种渐进式精炼框架，统一了生成与编辑，实现可控且忠实的文本到CAD建模。为此，我们构建了一个覆盖完整CAD生命周期的高保真交互数据集，包含多种CAD表示以及定性和定量描述。该数据集系统定义了编辑操作类型，并生成了高度类人的交互数据。基于为LLM定制的CAD表示，我们提出了一种强化学习增强的推理框架，将意图理解、参数估计和精确编辑定位集成到单一智能体中。这为设计创建和精炼提供了“一体化”解决方案。大量实验表明，生成与编辑任务之间以及定性与定量模态之间存在显著的相互增强。在公开基准上，PR-CAD在生成和精炼场景中均达到最先进的可控性和忠实性，同时证明其用户友好性并显著提升CAD建模效率。
  tldr_cn: PR-CAD通过渐进式精炼统一文本到CAD生成与编辑，实现最先进的可控性和忠实性
  analysis_cn:

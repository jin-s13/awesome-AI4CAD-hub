  abstract_cn: 构建计算机辅助设计（CAD）模型对于工程和制造至关重要，但劳动强度大。近期大语言模型（LLM）的进展通过将CAD表示为命令序列，激发了基于LLM的CAD生成。然而，这些方法在实际场景中面临挑战，因为命令序列表示不支持实体选择（例如面或边），限制了其支持倒角或圆角等复杂编辑操作的能力。此外，在草图和拉伸操作中对连续变量进行离散化可能导致拓扑错误。为解决这些限制，我们提出了Pointer-CAD，一种新颖的基于LLM的CAD生成框架，它利用基于指针的命令序列表示，将B-Rep模型的几何信息显式地融入序列建模中。具体而言，Pointer-CAD将CAD模型生成分解为多个步骤，每个后续步骤的生成条件依赖于文本描述和之前步骤生成的B-Rep。当操作需要选择特定几何实体时，LLM预测一个Pointer，从可用候选集中选择最具有特征一致性的候选。这种选择操作还减少了基于命令序列表示中的量化误差。为支持Pointer-CAD的训练，我们开发了一个数据标注流水线，生成专家级自然语言描述，并应用于构建包含约57.5万个CAD模型的数据集。大量实验结果表明，Pointer-CAD有效支持复杂几何结构的生成，并将分割误差降至极低水平，相较于先前的命令序列方法取得了显著改进，从而大幅缓解了量化误差引入的拓扑不准确性。

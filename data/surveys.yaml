    and bias of VLM-based evaluators.'
  related_work_outline_zh:
  - 主流方向：多模态统一基准，从几何保真度转向工程约束（可制造性、功能性、可装配性）和设计意图对齐的评估。
  - 研究共性：采用结构化程序式CAD表示（B-Rep、参数化序列），配合多阶段评估流程、大规模数据集和按复杂度分层采样。
  - 关键差异：评估目标（几何精度 vs. 下游工程有效性）、评估方法（VLM评判器 vs. 确定性指标）和数据集粒度（单零件 vs. 装配体）。
  - 趋势演进：从单模态、指标有限的基准转向含LLM/VLM评判器和整体设计准则的多模态多任务平台，集中在2026年前沿。
  - 开放问题：代理指标与真实设计意图的一致性；基准结论在不同实现和算力预算下的稳定性；基于VLM的评估器的可靠性与偏差。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design (e.g., CADBench, MUSE, UniCAD)
      what_it_solves: Creating shared tasks and multi-modal datasets that make CAD
        generation claims comparable across models and input modalities.
      what_remains_open: Whether the task distribution and dataset composition (e.g.,
        single parts vs. assemblies, synthetic vs. real-world prompts) cover the full
        range of engineering settings where CAD generation is expected to assist.
    - line: Metric and stress-test design (e.g., MUSE's design-intent rubrics, CADBench's
        multi-metric ranking, ProCAD's robustness to ambiguous prompts)
      what_it_solves: Probing prediction, controllability, robustness, and decision
        utility beyond aggregate geometric scores, including manufacturability, functionality,
        and assemblability.
      what_remains_open: Alignment between proxy metrics (Chamfer distance, validity
        ratio, VLM-judged rubrics) and the downstream engineering decisions users
        actually care about; sensitivity of metric rankings to subtle implementation
        choices.
    - line: Comparable baselines and reporting (e.g., large-scale model evaluation
        in CADBench, UniCAD-MLLM as a universal baseline)
      what_it_solves: Making results auditable through common baselines, unified evaluation
        protocols, and public artifacts that span multiple CAD tasks.
      what_remains_open: Stability of benchmark conclusions across different code
        implementations, random seeds, and compute budgets; whether the provided baselines
        can be fairly reproduced and extended.
    consensus:
    - Multi-modal input (text, image, point cloud, mesh) is necessary for realistic
      CAD generation benchmarks, and unified evaluation suites are preferred over
      task-specific silos.
    - Structured, editable CAD representations (B-Rep, parametric programs) are the
      primary target for evaluation, not just mesh or point cloud outputs.
    - Evaluation must move beyond geometric similarity to include program validity,
      design semantics, and engineering constraints; multi-stage protocols (code check,
      geometry check, design intent) are emerging as a standard.
    - Large-scale datasets with complexity stratification and diversity sampling are
      critical for controlled analysis and for uncovering failure modes such as degradation
      under geometric complexity or modality shift.
    disagreements:
    - 'Primary evaluation target: some benchmarks prioritize geometric fidelity (Chamfer
      distance, IoU), while others emphasize downstream engineering validity (manufacturability,
      functionality) or design-intent alignment via rubrics.'
    - 'Evaluation method: deterministic geometric metrics vs. VLM-based judges—the
      latter offers scalability and semantic nuance but introduces potential reliability,
      bias, and calibration concerns.'
    - 'Dataset focus: single-part CAD sequences vs. multi-part assemblies; the choice
      affects the complexity of evaluated tasks and the generalizability of findings
      to real-world engineering workflows.'
    - 'Supervision and annotation: some benchmarks require CAD-specific annotations
      or curated design specifications, while others exploit point-level supervision
      and unannotated 3D data, trading off annotation cost against evaluation fidelity.'
    open_questions:
    - How can we quantitatively validate that VLM-based evaluators align with experienced
      engineers' judgments on design intent, manufacturability, and assemblability?
    - To what extent do current benchmark rankings hold when models are re-implemented,
      retrained, or evaluated under different compute budgets and inference conditions?
    - Can existing benchmarks be extended to interactive, iterative design workflows
      where user clarification and incremental refinement (as in ProCAD) are the norm?
    - What is the minimum set of stress tests needed to guarantee that a CAD generation
      model is robust to input ambiguity, geometric complexity, and modality shift
      across diverse real-world applications?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计（如 CADBench、MUSE、UniCAD）
      解决的问题: 创建共享任务和多模态数据集，使 CAD 生成主张在不同模型和输入模态间具有可比性。
      尚未覆盖: 任务分布与数据集构成（如单零件 vs. 装配体、合成提示 vs. 真实提示）是否覆盖 CAD 生成预期辅助的全部工程场景。
    - 路线: 指标与压力测试设计（如 MUSE 的设计意图评分标准、CADBench 的多指标排名、ProCAD 对模糊提示的鲁棒性）
      解决的问题: 在聚合几何分数之外，检验预测、可控性、鲁棒性和决策效用，包括可制造性、功能性和可装配性。
      尚未覆盖: 代理指标（Chamfer 距离、有效性比率、VLM 评分标准）与用户真正关心的下游工程决策之间的一致性；指标排名对微小实现差异的敏感性。
    - 路线: 可比基线与报告规范（如 CADBench 的大规模模型评估、UniCAD-MLLM 作为通用基线）
      解决的问题: 通过覆盖多种 CAD 任务的统一基线、统一评估协议和公开工件，使结果可审计。
      尚未覆盖: 基准结论在不同代码实现、随机种子和算力预算下的稳定性；提供的基线能否被公平复现和扩展。
    共识:
    - 多模态输入（文本、图像、点云、网格）是真实 CAD 生成基准的必要条件，统一的评估套件优于任务特定孤岛。
    - 结构化、可编辑的 CAD 表示（B-Rep、参数化程序）是评估的主要目标，而非仅输出网格或点云。
    - 评估必须超越几何相似性，纳入程序有效性、设计语义和工程约束；多阶段协议（代码检查、几何检查、设计意图）正在成为标准。
    - 具备复杂度分层和多样性采样的大规模数据集对于受控分析以及揭示几何复杂度退化和模态转变等失败模式至关重要。
    分歧:
    - 主要评估目标：部分基准优先考虑几何保真度（Chamfer 距离、IoU），另一些则强调下游工程有效性（可制造性、功能性）或基于评分标准的设计意图对齐。
    - 评估方法：确定性几何指标 vs. 基于 VLM 的评判器——后者提供可扩展性和语义细微度，但带来可靠性、偏差和校准方面的担忧。
    - 数据集焦点：单零件 CAD 序列 vs. 多零件装配体；这一选择影响评估任务的复杂性和对真实工程工作流的泛化能力。
    - 监督与标注：部分基准需要 CAD 特定标注或精心设计的设计规范，另一些则利用点级监督和未标注的 3D 数据，在标注成本与评估保真度之间做出权衡。
    开放问题:
    - 如何定量验证基于 VLM 的评判器与经验丰富的工程师在设计意图、可制造性和可装配性上的判断一致？
    - 当模型被重新实现、重新训练或在不同算力预算和推理条件下评估时，当前基准排名在多大程度上仍然成立？
    - 现有基准能否扩展到交互式、迭代式设计工作流，其中用户澄清和增量细化（如 ProCAD）是常态？
    - 需要哪些最小压力测试集，才能保证 CAD 生成模型在多样真实应用中对输入模糊性、几何复杂度和模态转变具有鲁棒性？

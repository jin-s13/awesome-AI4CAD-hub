  abstract_cn: 三维形状学习是计算机视觉中的重要研究课题，其中数据集起着关键作用。然而，现有的大多数三维数据集使用体素、点云、网格和边界表示（B-rep），这些数据集既不是参数化的也不是基于特征的，因此无法支持生成具有复杂形状特征的真实工程计算机辅助设计（CAD）模型。此外，它们基于三维几何结果，缺乏人机交互（HCI）历史。本工作首次提供了一个完整的参数化与基于特征的CAD数据集，并带有选择机制以支持三维学习中的HCI。首先，与主要由简单特征（典型草图和拉伸）组成的现有数据集不同，我们设计了复杂的工程特征，如圆角、倒角、镜像、凹槽、沟槽和旋转。其次，不同于特征的单调组合，我们发明了一种选择机制来模拟人类如何关注并选择特定的拓扑实体。所提出的机制建立了复杂工程特征之间的关系，充分表达了人类CAD工程师的设计意图和设计知识。因此，它可以处理真实工程形状的高级三维特征。实验表明，所提出的数据集在重建和生成任务上均优于现有CAD数据集。在定量实验中，所提出的数据集比其他参数化数据集表现出更好的预测精度。此外，从所提出数据集生成的CAD模型符合人类CAD工程师的语义，并可通过主流工业CAD软件进行编辑和重新设计。

    conditional injection. Experiments on the DeepCAD dataset show that the proposed
    approach surpasses existing autoregressive and continuous diffusion models on
    unconditional generation metrics, while qualitative results validate effective
    controllability in conditional generation tasks. Source codes will be released.'

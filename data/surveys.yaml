  related_work_outline:
  - 'Mainstream direction: Building unified multi-modal, multi-task CAD benchmarks
    that evaluate both geometric fidelity and downstream engineering properties such
    as manufacturability and assemblability.'
  - 'Shared research pattern: All works construct or leverage datasets with paired
    inputs (text, image, mesh, point cloud) and parametric CAD programs, and evaluate
    using geometric metrics (Chamfer distance, IoU) plus validity/executability checks.'
  - 'Key differences: Benchmarks diverge in whether they target geometric reconstruction
    accuracy alone or also assess engineering intent (functionality, manufacturability);
    evaluation protocols range from single-stage metric computation to multi-stage
    pipelines with VLM judges; some works introduce interactive clarification stress
    tests while others assume clean inputs.'
  - 'Trend evolution: The frontier is moving from single-task geometric benchmarks
    toward multi-modal, multi-task suites that incorporate design-intent alignment
    and real-world engineering constraints, with a strong 2026 concentration.'
  - 'Open questions: Whether benchmark task distributions cover real CAD workflows,
    how well proxy metrics align with engineer decision-making, and the stability
    of conclusions across implementations and compute budgets remain unverified.'
  related_work_outline_zh:
  - 主流方向：构建统一的多模态、多任务CAD基准，同时评估几何保真度和可制造性、可装配性等下游工程属性。
  - 研究共性：所有工作都构建或利用包含文本、图像、网格、点云等输入与参数化CAD程序配对的数据集，并使用几何指标（Chamfer距离、IoU）和有效性/可执行性检查进行评估。
  - 关键差异：基准在仅评估几何重建精度还是同时评估工程意图（功能性、可制造性）上存在分歧；评估协议从单阶段指标计算到多阶段VLM评判流水线不等；部分工作引入交互式澄清压力测试，而其他工作假设干净输入。
  - 趋势演进：前沿正从单任务几何基准转向包含设计意图对齐和真实工程约束的多模态、多任务套件，2026年集中涌现。
  - 开放问题：基准任务分布是否覆盖真实CAD工作流，代理指标与工程师决策的一致性，以及结论在不同实现和算力预算下的稳定性尚未验证。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creates shared evaluation tasks and datasets that enable comparable
        assessment of CAD generation models across multiple input modalities and output
        formats.
      what_remains_open: Whether the task distribution and dataset diversity capture
        the full range of real-world CAD workflows, including complex assemblies and
        long parametric sequences, is not yet established.
    - line: Metric and stress-test design
      what_it_solves: Probes prediction quality, robustness to ambiguous inputs, and
        downstream engineering utility beyond aggregate geometric scores, using validity
        ratios, multi-stage rubrics, and VLM judges.
      what_remains_open: Alignment between these proxy metrics and the actual decision-making
        criteria of professional engineers remains unverified; the reliability of
        VLM judges across diverse design domains is still being validated.
    - line: Comparable baselines and reporting
      what_it_solves: Enables auditability by providing common baselines, unified
        evaluation protocols, and large-scale model comparisons under controlled conditions.
      what_remains_open: The stability of benchmark rankings across different implementations,
        compute budgets, and minor prompt variations has not been systematically tested.
    consensus:
    - Multi-modal evaluation covering text, image, mesh, and point cloud inputs is
      necessary for comprehensive CAD generation assessment.
    - Geometric fidelity metrics (Chamfer distance, volumetric IoU) and program validity
      checks are the current standard for quantifying reconstruction quality.
    - 'Existing models exhibit a failure cascade: executable code does not guarantee
      valid geometry, and valid geometry does not guarantee engineering-ready designs.'
    - Specialized mesh-to-CAD models outperform general-purpose vision-language models
      under idealized input conditions, but are brittle under modality shift.
    disagreements:
    - 'Evaluation target: some benchmarks focus solely on geometric reconstruction
      accuracy, while others incorporate engineering properties like manufacturability,
      functionality, and assemblability.'
    - 'Representation: works differ in whether they evaluate B-Rep assemblies, parametric
      CAD sequences, or mesh outputs, leading to incompatible metric spaces.'
    - 'Interaction mode: most benchmarks assume a single-shot generation from a clean
      prompt, whereas one line of work introduces proactive clarification agents to
      handle ambiguity, changing the evaluation setup.'
    - 'Supervision signal: some methods rely on point-level supervision without CAD-specific
      annotations, while others require curated text-to-CAD pairs or structured design
      specifications.'
    open_questions:
    - Do the task distributions in current benchmarks reflect the iterative, constraint-driven
      nature of real CAD design sessions?
    - How well do geometric and validity metrics predict whether a generated CAD model
      is usable in downstream engineering processes?
    - What is the impact of dataset scale, prompt phrasing, and inference compute
      on the reproducibility of benchmark conclusions?
    - Can VLM-based judges provide consistent and trustworthy assessments across diverse
      mechanical and architectural design domains?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 创建共享评估任务和数据集，使CAD生成模型在多种输入模态和输出格式下可比较。
      尚未覆盖: 任务分布和数据集多样性是否覆盖真实CAD工作流的全貌（包括复杂装配体和长参数序列）尚未确立。
    - 路线: 指标与压力测试设计
      解决的问题: 在总分之外检验预测质量、对模糊输入的鲁棒性以及下游工程效用，使用无效比率、多阶段评分标准和VLM评判器。
      尚未覆盖: 这些代理指标与专业工程师实际决策标准之间的一致性尚未验证；VLM评判器在不同设计领域的可靠性仍在检验中。
    - 路线: 可比基线与报告规范
      解决的问题: 通过提供统一基线、统一评估协议和受控条件下的大规模模型比较，使结果可审计。
      尚未覆盖: 基准排名在不同实现、算力预算和微小提示变化下的稳定性尚未经过系统测试。
    共识:
    - 涵盖文本、图像、网格和点云输入的多模态评估对于全面的CAD生成评估是必要的。
    - 几何保真度指标（Chamfer距离、体积IoU）和程序有效性检查是当前量化重建质量的标准。
    - 现有模型呈现失败级联：可执行代码不保证有效几何，有效几何不保证工程就绪设计。
    - 在理想化输入条件下，专用网格到CAD模型优于通用视觉语言模型，但在模态转换下表现脆弱。
    分歧:
    - 评测目标：部分基准仅关注几何重建精度，而其他基准同时纳入可制造性、功能性和可装配性等工程属性。
    - 表示方式：各工作评估B-Rep装配体、参数化CAD序列或网格输出，导致指标空间不兼容。
    - 交互模式：多数基准假设从干净提示单次生成，而一条工作线引入主动澄清智能体处理模糊性，改变了评估设置。
    - 监督信号：一些方法依赖点级监督而无CAD特定标注，另一些则需要精心策划的文本-CAD配对或结构化设计规范。

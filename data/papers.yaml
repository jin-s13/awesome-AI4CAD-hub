- id: leveraging-foundation-models-for-causal-generative-modeling-2026
  title: Leveraging Foundation Models for Causal Generative Modeling
  authors:
  - Aneesh Komanduri
  - Xintao Wu
  abstract: 'Causal generative modeling is essential for developing reliable and transparent
    AI systems capable of counterfactual reasoning. While existing approaches focus
    on integrating causal constraints during the training of generative models, they
    often lack a unified framework to leverage the zero-shot reasoning capabilities
    of pretrained foundation models. We introduce FM-CGM, a modular framework for
    end-to-end visual causal reasoning using pretrained foundation models. FM-CGM
    formalizes the causal pipeline through three core components: a concept extractor,
    a concept manipulator, and a counterfactual generator. By leveraging a large reasoning
    model for causal inference and a text-to-image diffusion model for generation,
    our approach enables zero-shot causal discovery, intervention, and counterfactual
    generation. We then develop Causal Semantic Guidance (CSG), a cross-attention-based
    mechanism that ensures semantic interventions propagate to descendant concepts
    while preserving invariant regions. We empirically show that our approach can
    identify plausible causal structures and is suitable for faithful counterfactual
    image generation.'

    - 将示例选择形式化为子模最大化，并通过贪心算法提供(1-1/e)近似保证。
    methodology: DST从CAD设计规范中提取多粒度设计组件，并选择示例以最大化查询组件被覆盖的比例（平铺比）。该选择被形式化为子模最大化，并通过多项式时间贪心算法求解。实验将DST与ICL中现有的示例选择策略在CAD代码生成上进行了比较。

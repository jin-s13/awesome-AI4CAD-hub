  related_work_outline_zh:
  - 主流方向：多模态统一的CAD程序生成与评估框架成为主流，重点是可编辑的B-Rep参数化模型。
  - 研究共性：大规模预训练模型（LLM、VLM）的采用和大规模基准数据集的构建，以推动模型能力和可衡量进展。
  - 关键差异：生成范式上，直接代码合成、可微分曲面重建与混合优化并存；评估目标上，几何保真度与工程可制造性、可装配性存在分歧。
  - 趋势演进：在2026年前沿，领域正从单任务、几何指标向多任务、工业级、多维基准快速整合，由统一数据集和模型驱动。
  - 开放问题：如何可靠泛化到未见零件族和复杂操作；如何将主动澄清集成到设计工作流；如何使评估指标与真实工程约束对齐。
  literature_review:
    line_of_work_matrix:
    - line: Multi-modal CAD program generation models and systems
      what_it_solves: Automatically producing editable, parametric CAD programs (B-Rep)
        from text, images, or point clouds, enabling fast design iteration.
      what_remains_open: Reliable handling of complex parametric features (sweeps,
        lofts, fillets) and generalization to unseen part families under real-world
        engineering constraints.
    - line: CAD benchmarks and comprehensive evaluation suites
      what_it_solves: Providing standardized, multi-task, multi-modal evaluation for
        CAD generation models, covering geometric fidelity, executability, and fine-grained
        design-intent alignment.
      what_remains_open: Integration of full manufacturing and assembly constraints
        into automated metrics, and consistent evaluation across diverse industrial
        domains.
    - line: Interactive and agent-based CAD code generation
      what_it_solves: Resolving ambiguity in text-to-CAD generation by proactively
        clarifying user intent before code synthesis, improving robustness and reducing
        invalid outputs.
      what_remains_open: Minimizing interaction overhead, scaling clarification strategies
        to multi-turn design dialogues, and deploying such agents in collaborative
        CAD environments.
    consensus:
    - CAD program generation is converging on a multimodal paradigm where models ingest
      text, images, and 3D data to output executable code or parametric representations.
    - Benchmarks are moving beyond simple chamfer distance to include executability,
      validity, and design-intent rubrics, often using VLM-based judges.
    - Large language models serve as a backbone for both generation and evaluation,
      with fine-tuning and reinforcement learning being common strategies to improve
      performance.
    disagreements:
    - 'Representation choices differ: some systems generate code directly (e.g., CadQuery),
      while others reconstruct parametric surfaces or use hybrid optimization over
      structured programs.'
    - 'Evaluation focus varies: some benchmarks prioritize geometric fidelity under
      ideal or noisy inputs, others emphasize manufacturability and assembly under
      realistic engineering specifications.'
    - 'Interaction modes diverge: most systems assume a single-shot generation from
      a prompt, whereas one line introduces proactive clarification to iteratively
      refine the specification before synthesis.'
    open_questions:
    - Current models often fail to recover complex parametric operations like sweeps
      and lofts, simplifying them to extrude-cut patterns; how can this capability
      gap be closed?
    - No benchmark fully verifies generated CAD models against real manufacturing
      constraints such as tolerance, material, and assembly; what evaluation protocol
      would align with engineering practice?
    - Proactive clarification has been demonstrated only on limited ambiguity types
      and its scalability to diverse, multi-turn design workflows is unknown.
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD程序生成模型与系统
      解决的问题: 从文本、图像或点云自动生成可编辑的参数化CAD程序（B-Rep），加速设计迭代。
      尚未覆盖: 对扫掠、放样、倒角等复杂参数化特征的可靠处理，以及在真实工程约束下对未见零件族的泛化能力。
    - 路线: CAD基准与综合评估框架
      解决的问题: 为CAD生成模型提供标准化、多任务、多模态的评估，涵盖几何保真度、可执行性和细粒度的设计意图对齐。
      尚未覆盖: 将完整的制造和装配约束集成到自动化指标中，并在不同工业领域实现一致的评估。
    - 路线: 交互式与基于智能体的CAD代码生成
      解决的问题: 在代码合成前主动澄清用户意图，解决文本到CAD生成中的歧义，提高鲁棒性并减少无效输出。
      尚未覆盖: 最小化交互开销，将澄清策略扩展到多轮设计对话，并在协作式CAD环境中部署此类智能体。
    共识:
    - CAD程序生成正朝着多模态范式汇聚，模型接收文本、图像和3D数据，输出可执行代码或参数化表示。
    - 基准正从简单的倒角距离扩展到包含可执行性、有效性和设计意图评分标准，常使用基于VLM的评判器。
    - 大语言模型成为生成和评估的骨干，微调和强化学习是提升性能的常见策略。
    分歧:
    - 表示选择不同：一些系统直接生成代码（如CadQuery），另一些则重建参数化曲面，或对结构化程序进行混合优化。
    - 评估重点各异：部分基准在理想化或噪声输入下优先考虑几何保真度，其他基准则强调真实工程规格下的可制造性和可装配性。
    - 交互模式不同：大多数系统假设从提示进行单次生成，而有一条路线引入了主动澄清，以在合成前迭代细化规格。
    开放问题:
    - 当前模型常无法恢复扫掠和放样等复杂参数化操作，将其简化为拉伸-切割模式；如何缩小这一能力差距？
    - 尚无基准对照真实制造约束（如公差、材料、装配）全面验证生成的CAD模型；何种评估协议能与工程实践对齐？
    - 主动澄清仅在有限的歧义类型上得到验证，其在多样化、多轮设计工作流中的可扩展性未知。

  related_work_outline_zh:
  - 主流方向：构建端到端的CAD程序生成系统与标准化基准，从文本、图像、网格或点云生成参数化CAD模型并进行评估。
  - 研究共性：利用大语言模型或专用神经网络生成可执行CAD脚本（如CadQuery），并通过几何保真度、可执行性和设计意图对齐来衡量成功。
  - 关键差异：方法分为基于LLM的代码生成、混合优化和可微分曲面表示；基准在是否仅评估几何还是同时评估可制造性、可装配性等工程标准上存在分歧。
  - 趋势演进：领域正从单模态网格到CAD重建转向多模态、基于智能体的系统，能够澄清模糊提示并评估工业级零件族，均处于2026年前沿。
  - 开放问题：这些系统对未见零件族的泛化能力、处理扫掠和放样等复杂操作的能力，以及如何在几何精度、可编辑性和工程就绪之间取得平衡。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end CAD program generation pipelines
      what_it_solves: Producing editable parametric CAD models (B-Rep or CadQuery
        scripts) directly from text, images, meshes, or point clouds without manual
        modeling.
      what_remains_open: Generalization to complex industrial parts with operations
        beyond sketch-and-extrude, robustness to ambiguous inputs, and independent
        reproduction across datasets and hardware.
    - line: Standardized CAD evaluation benchmarks
      what_it_solves: Providing unified datasets, metrics, and protocols to compare
        CAD generation methods across modalities and tasks, including executability,
        geometric fidelity, and design-intent alignment.
      what_remains_open: Coverage of engineering criteria (manufacturability, functionality,
        assemblability) remains limited; most benchmarks lack real-world deployment
        validation and cross-benchmark consistency.
    - line: Agent-based interactive CAD systems
      what_it_solves: Improving robustness of text-to-CAD by proactively clarifying
        ambiguous specifications before code synthesis, reducing invalid outputs and
        user effort.
      what_remains_open: Scalability to multi-turn design iteration, integration with
        downstream engineering workflows, and evaluation of clarification quality
        beyond single-turn metrics.
    consensus:
    - Parametric CAD program generation is the central task, with executability and
      geometric fidelity as core evaluation criteria.
    - Large language models and multi-modal architectures are the dominant backbone,
      but specialized models still outperform general VLMs on clean inputs.
    - There is a failure cascade from executable code to valid geometry to engineering-ready
      design, indicating that current systems are far from practical deployment.
    disagreements:
    - 'Representation choice: some methods generate CadQuery scripts, others produce
      B-Rep construction sequences or parametric surface patches, leading to different
      editability and precision trade-offs.'
    - 'Evaluation scope: benchmarks like MUSE assess manufacturability and assemblability
      via VLM judges, while CADBench and BenchCAD focus on geometric and executability
      metrics, creating no single standard for engineering readiness.'
    - 'Interaction mode: ProCAD introduces a proactive clarification agent, whereas
      most other systems assume a single-turn, unambiguous input, reflecting a split
      on whether user interaction is part of the generation system.'
    open_questions:
    - Can current CAD generation methods generalize to unseen industrial part families
      that require complex operations like sweeps, lofts, and fillets?
    - How should evaluation protocols balance geometric accuracy, parametric editability,
      and downstream engineering constraints such as manufacturability?
    - What is the minimal interaction overhead needed to resolve ambiguous design
      specifications without sacrificing user experience?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端CAD程序生成流水线
      解决的问题: 从文本、图像、网格或点云直接生成可编辑的参数化CAD模型（B-Rep或CadQuery脚本），无需人工建模。
      尚未覆盖: 对包含扫掠、放样等复杂操作的工业零件的泛化能力，对模糊输入的鲁棒性，以及跨数据集和硬件的独立复现。
    - 路线: 标准化CAD评估基准
      解决的问题: 提供统一的数据集、指标和协议，跨模态和任务比较CAD生成方法，涵盖可执行性、几何保真度和设计意图对齐。
      尚未覆盖: 对工程标准（可制造性、功能性、可装配性）的覆盖仍然有限；多数基准缺乏真实部署验证和跨基准一致性。
    - 路线: 基于智能体的交互式CAD系统
      解决的问题: 通过在代码合成前主动澄清模糊规格，提高文本到CAD的鲁棒性，减少无效输出和用户负担。
      尚未覆盖: 多轮设计迭代的可扩展性，与下游工程工作流的集成，以及超越单轮指标的澄清质量评估。
    共识:
    - 参数化CAD程序生成是核心任务，可执行性和几何保真度是基本评估标准。
    - 大语言模型和多模态架构是主流技术路线，但在干净输入上专用模型仍优于通用视觉语言模型。
    - 存在从可执行代码到有效几何再到工程就绪设计的失败级联，表明当前系统距离实际部署仍有很大差距。
    分歧:
    - 表示选择：部分方法生成CadQuery脚本，其他方法生成B-Rep构建序列或参数化曲面面片，导致可编辑性和精度的权衡不同。
    - 评估范围：MUSE等基准通过VLM评判器评估可制造性和可装配性，而CADBench和BenchCAD侧重几何和可执行性指标，缺乏统一的工程就绪标准。
    - 交互模式：ProCAD引入主动澄清智能体，而多数系统假设单轮、无歧义输入，反映出是否将用户交互纳入生成系统的分歧。
    开放问题:
    - 当前CAD生成方法能否泛化到需要扫掠、放样、倒角等复杂操作的未见工业零件族？
    - 评估协议应如何在几何精度、参数可编辑性和可制造性等下游工程约束之间取得平衡？
    - 在不牺牲用户体验的前提下，解决模糊设计规格所需的最小交互开销是多少？

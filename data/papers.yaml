  title_cn: 面向计算机辅助设计的工程草图生成
  abstract_cn: 工程草图构成了参数化计算机辅助设计（CAD）的二维基础，CAD是制造对象最重要的建模范式。在本文中，我们解决了基于学习的工程草图生成问题，作为合成和组合参数化CAD模型的第一步。我们提出了两个生成模型，CurveGen和TurtleGen，用于工程草图生成。这两个模型生成曲线基元，无需草图约束求解器，并显式考虑拓扑结构，以便在下游使用约束和3D
    CAD建模操作。我们通过人类受试者的感知评估发现，与当前最先进的工程草图生成方法相比，CurveGen和TurtleGen都能生成更真实的工程草图。

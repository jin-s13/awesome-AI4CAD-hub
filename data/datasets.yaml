    title_zh: FllumaOne：一个代码原生的多模态CAD数据集，包含可执行程序和内核验证的特征历史
  name_zh: Unnamed Dataset
  year: 2026
  preview: /assets/papers/fllumaone-a-code-native-multimodal-cad-dataset-with-executa-2026/teaser.png
  description_zh: 参数化计算机辅助设计不仅记录最终几何形状，还记录有序的构建历史，该历史决定了零件如何被编辑。用于可编辑CAD研究的数据集应同时暴露建模操作、参数和特征依赖关系以及经过验证的几何形状。我们介绍了FllumaOne，一个代码原生的多模态CAD数据集，其模型由基于Qt/C++
    OpenCASCADE的CAD系统Flluma中的可执行Python程序生成。每个样本将其程序与结构化特征树、面向训练的中间表示、STEP几何、表面点云、自然语言描述、元数据和八种标准可见边缘渲染图对齐。主要发布版本FllumaOne-100K包含100,000个通过四种模板级复杂度区间接受的样本。程序仅在通过内核几何、实体有效性和导出检查后执行并保留；发布报告还记录了模态完整性和分割级别重复测试。基于Qwen2.5-Coder-1.5B
    LoRA的基线模型在80,000个样本上训练，在保留的10,000样本测试集上实现了99.98%的Python语法有效性、99.97%的Flluma构建成功率和99.14%的STEP导出有效性。对于转换为表面点云的9,909个预测，平均归一化倒角距离为0.002124。该数据集支持条件化CAD重建、可执行程序合成、特征树预测、B-Rep分析、检索、设计补全和可编辑逆向工程。
  notes_zh: 派生自论文：FllumaOne：一个代码原生的多模态CAD数据集，包含可执行程序和内核验证的特征历史

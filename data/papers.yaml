  title_cn: UV-Net：从边界表示中学习
  abstract_cn: 我们提出了UV-Net，一种新颖的神经网络架构和表示方法，旨在直接处理来自3D CAD模型的边界表示（B-rep）数据。B-rep格式广泛应用于设计、仿真和制造行业，以实现复杂而精确的CAD建模操作。然而，由于数据结构的复杂性及其对连续非欧几里得几何实体和离散拓扑实体的支持，B-rep数据在使用现代机器学习时面临一些独特挑战。在本文中，我们提出了一种统一的B-rep数据表示方法，该方法利用曲线和曲面的U和V参数域来建模几何，并利用邻接图显式建模拓扑。这产生了一种独特且高效的网络架构UV-Net，它以计算和内存高效的方式耦合了图像卷积神经网络和图卷积神经网络。为了辅助未来研究，我们提供了一个合成标注的B-rep数据集SolidLetters，该数据集源自人工设计的字体，并在几何和拓扑上具有变化。最后，我们证明UV-Net能够在五个数据集上泛化到监督和无监督任务，同时优于点云、体素和网格等替代3D形状表示。

  abstract_cn: 情感分类中标注者分歧反映了情感概念固有的模糊性，对于主观NLP中预测质量评估至关重要。然而，先前尚无工作将软标签学习与贝叶斯深度学习相结合，以沿包括标注者分布保真度在内的轴评估不确定性。我们通过在冻结的RoBERTa上训练线性头，采用循环随机梯度马尔可夫链蒙特卡洛（cSG-MCMC），以软标签目标针对经验标注者分布进行优化，并在五轴评估下进行。在28情感GoEmotions基准上，所提方法在三个轴上同时优于蒙特卡洛Dropout和深度集成——标注者分布的Jensen-Shannon散度（JSD）、每情感偶然不确定性（aleatoric

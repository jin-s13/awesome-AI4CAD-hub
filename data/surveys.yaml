  related_work_outline:
  - 'Mainstream direction: 2026 CAD benchmarks converge on multi-modal (text, image,
    point cloud, mesh) and multi-task evaluation of parametric CAD generation, with
    a shift from pure geometric fidelity toward engineering-aware metrics such as
    executability, manufacturability, and assemblability.'
  - 'Shared research pattern: researchers propose a unified benchmark or dataset,
    define a set of task-agnostic or task-specific metrics, then conduct large-scale
    experiments across multiple baselines to expose failure modes and model rankings.'
  - 'Key differences: evaluation targets split between geometric reconstruction accuracy
    and downstream engineering validity; representation choices include CadQuery scripts,
    B-Rep patches, and parametric operation sequences; interaction modes range from
    single-step generation to proactive clarification loops.'
  - 'Trend evolution: the frontier within 2025–2026 shows rapid unification of previously
    fragmented CAD tasks into single multi-modal benchmarks, incorporation of VLM-based
    judges, and growing emphasis on robustness under modality shift and user intent
    ambiguity.'
  - 'Open questions: whether current benchmark distributions cover real-world design
    complexity and constraints; alignment between proxy metrics and actual manufacturing
    decisions; stability of benchmark conclusions across different implementations
    and compute budgets.'
  related_work_outline_zh:
  - 主流方向：2026年CAD基准汇聚于多模态（文本、图像、点云、网格）多任务参数化CAD生成评估，从纯几何保真度转向可执行性、可制造性、可装配性等工程感知指标。
  - 研究共性：提出统一基准或数据集，定义一组任务无关或任务特定的指标，然后对多个基线进行大规模实验，揭示失败模式和模型排序。
  - 关键差异：评估目标分为几何重建精度与下游工程有效性；表示选择包括CadQuery脚本、B-Rep面片和参数化操作序列；交互模式从单步生成到主动澄清循环。
  - 趋势演进：2025–2026年内，先前碎片化的CAD任务迅速统一到单一多模态基准中，引入基于VLM的评判器，并越来越重视模态转移和用户意图模糊下的鲁棒性。
  - 开放问题：当前基准分布是否覆盖真实世界设计复杂性和约束；代理指标与实际制造决策之间的一致性；基准结论在不同实现和计算预算下的稳定性。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: creating multi-modal, multi-task benchmarks that unify evaluation
        across text/image/point-to-CAD generation and question answering, enabling
        systematic comparison of diverse models on shared tasks.
      what_remains_open: whether the task distribution and dataset diversity capture
        the full range of real-world engineering complexity, dynamic assembly constraints,
        and iterative design workflows.
    - line: Metric and stress-test design
      what_it_solves: probing CAD generation quality through geometric fidelity (IoU,
        Chamfer), executability, program compactness, manufacturability, and assemblability,
        often using multi-stage evaluation and VLM judges to expose failure cascades.
      what_remains_open: alignment between proxy metrics (e.g., VLM scores) and the
        actual downstream manufacturing decisions engineers care about, as well as
        comprehensive stress-tests for modality shift and ambiguous user intent.
    - line: Comparable baselines and reporting
      what_it_solves: making results auditable by providing a single evaluation suite
        with common baselines (task-specific and multi-task models) and large-scale
        model comparisons, revealing instability in model rankings across metrics
        and modalities.
      what_remains_open: whether benchmark conclusions remain stable across independent
        implementations, varying compute budgets, and missing open-source artifacts.
    consensus:
    - Multi-modal input (text, image, point cloud, mesh) is the dominant paradigm
      for CAD generation benchmarks.
    - Evaluation is moving beyond single geometric scores to include validity, compactness,
      and engineering properties such as manufacturability and assemblability.
    - Unified benchmarks and large-scale standardized comparisons are essential for
      identifying failure modes and generalizable model capabilities.
    - B-Rep representations are preferred for their editability and compatibility
      with downstream engineering workflows.
    - Large-scale datasets and benchmarks are critical enablers for advancing CAD
      generation, with several papers introducing new datasets of tens of thousands
      of models.
    disagreements:
    - 'Evaluation focus: some works prioritize geometric reconstruction accuracy,
      while others emphasize functional engineering requirements like manufacturability
      and assemblability.'
    - 'Representation format: CadQuery scripts, B-Rep parametric patches, and parametric
      operation sequences lead to different generation and evaluation approaches.'
    - 'Supervision signal: point-level supervision without CAD annotations versus
      mesh-based or program-supervised training creates different data requirements
      and generalization assumptions.'
    - 'Interaction mode: single-step generation from a prompt versus proactive clarification
      loops that iteratively refine the specification before synthesis.'
    - 'Task scope: some benchmarks cover a single task (e.g., text-to-CAD), while
      others unify multiple tasks (reconstruction, generation, QA) within a single
      framework.'
    open_questions:
    - Do current benchmark distributions, which are largely sampled from existing
      CAD datasets, cover the complexity, constraints, and iterative nature of real-world
      design tasks?
    - How well do VLM-based judges and automated metrics align with human expert assessments
      of manufacturability and design intent, and what is the inter-rater reliability?
    - Can model rankings and failure patterns identified on these benchmarks be reproduced
      under different implementations, compute budgets, and open-source code availability?
    - What are the effective strategies to bridge the gap between geometric validity
      and engineering readiness, given the observed failure cascade from executable
      code to valid geometry to engineering-ready design?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 创建多模态、多任务统一基准，覆盖文本/图像/点云到CAD生成和问答，使不同模型在共享任务上可系统比较。
      尚未覆盖: 任务分布和数据集多样性是否涵盖真实工程复杂性、动态装配约束和迭代设计工作流。
    - 路线: 指标与压力测试设计
      解决的问题: 通过几何保真度、可执行性、程序紧凑性、可制造性、可装配性等多维度探测CAD生成质量，常使用多阶段评估和VLM评判器揭示失败级联。
      尚未覆盖: 代理指标（如VLM评分）与工程师实际关心的下游制造决策之间的对齐，以及针对模态转移和用户意图模糊的全面压力测试。
    - 路线: 可比基线与报告规范
      解决的问题: 通过提供统一评估套件、公共基线（任务特定和多任务模型）和大规模模型比较，使结果可审计，揭示模型排序在不同指标和模态间的不稳定性。
      尚未覆盖: 基准结论在独立实现、不同计算预算和开源工件缺失下是否保持稳定。
    共识:
    - 多模态输入（文本、图像、点云、网格）是CAD生成基准的主流范式。
    - 评估正从单一几何分数转向包括有效性、紧凑性和可制造性、可装配性等工程特性。
    - 统一基准和大规模标准化比较对于识别失败模式和泛化能力至关重要。
    - B-Rep表示因其可编辑性和与下游工程工作流的兼容性而受到青睐。
    - 大规模数据集和基准是推动CAD生成发展的关键因素，多篇论文推出了包含数万模型的新数据集。
    分歧:
    - 评估重点：部分工作强调几何重建精度，另一些则侧重可制造性、可装配性等功能性工程需求。
    - 表示形式：CadQuery脚本、B-Rep参数化面片和参数化操作序列导致不同的生成和评估方法。
    - 监督信号：无需CAD标注的点级监督与基于网格或程序的监督训练，在数据需求和泛化假设上存在差异。
    - 交互模式：从提示单步生成到合成前主动澄清迭代细化规格的循环。
    - 任务范围：一些基准覆盖单一任务（如文本到CAD），另一些在单一框架内统一多个任务（重建、生成、问答）。
    开放问题:
    - 当前基准分布主要采样自现有CAD数据集，是否覆盖真实设计任务的复杂性、约束和迭代特性？
    - 基于VLM的评判器和自动化指标在多大程度上与人类专家对可制造性和设计意图的评估一致，评判者间的可靠性如何？
    - 这些基准上发现的模型排序和失败模式能否在不同实现、计算预算和开源代码可用性下复现？
    - 鉴于观察到从可执行代码到有效几何再到工程就绪设计的失败级联，弥合几何有效性与工程就绪性之间差距的有效策略是什么？

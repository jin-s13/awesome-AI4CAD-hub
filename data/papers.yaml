    methodology: 该方法从大规模数据库中检索CAD模型，并通过RGB图像与渲染CAD模型之间的跨域关键点匹配将其与图像中的物体对齐。这些关键点匹配用于估计物体姿态，并自适应调整检索到的CAD模型的形状，弥合与观察形状之间的差距。在Pix3D数据集上进行评估。
    key_results: 所提出的几何形状预测在AP mesh指标上，对于见过的物体从33.2提升到37.8，对于未见过的物体从8.2提升到17.1；形状自适应在无需紧密匹配CAD模型的情况下实现了更准确的预测。

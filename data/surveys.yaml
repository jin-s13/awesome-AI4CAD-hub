  literature_review_zh:
    研究路线矩阵:
    - 路线: CAD生成基准与评估套件
      解决的问题: 跨模态、多任务和工程标准（可执行性、几何保真度、可制造性）的AI生成CAD程序标准化评估。
      尚未覆盖: 基准可能未完全反映工业工作流；模型排名随指标变化，即使微调后对未见零件族的泛化仍有限。
    - 路线: 文本、图像和点云到CAD的生成模型
      解决的问题: 从自然语言、图像或点云端到端合成可编辑的参数化CAD，常使用LLM或可微分曲面表示。
      尚未覆盖: 扫掠、放样等复杂操作常被简化为草图-拉伸；精细几何细节和设计参数经常缺失或被误解。
    - 路线: 基于优化的网格到CAD重建
      解决的问题: 通过逐步拟合和验证操作，从离散3D数据中恢复高体积精度的参数化CAD构建序列。
      尚未覆盖: 对噪声或不完整网格的鲁棒性以及更广泛操作的支持需进一步研究；本证据包中仅包含单一方法。
    - 路线: 交互式与基于智能体的CAD生成
      解决的问题: 在合成CAD代码前主动提出澄清问题，提高对模糊文本提示的鲁棒性，减少无效输出。
      尚未覆盖: 对多模态输入和复杂多零件装配的可扩展性，以及交互开销与输出质量之间的权衡尚未探索。
    共识:
    - 所有工作都面向可执行的CAD程序，确保输出可通过运行生成代码进行验证。
    - 普遍认识到当前模型在复杂几何、工程约束和细粒度设计参数方面存在困难。
    - B-Rep和CadQuery等参数化表示因其可编辑性和下游工程用途而受到青睐。
    - 2026年引入的多个新基准表明，领域正集体推动标准化、可复现的评估。
    分歧:
    - 评估重点：部分工作优先考虑几何保真度（Chamfer距离、IoU），而其他工作使用VLM评判器和设计特定评分标准评估可制造性、功能性和可装配性。
    - 生成方法：基于LLM的直接代码合成、基于优化的重建、以及使用点级监督的可微分曲面拟合。
    - 交互范式：多数系统为单轮生成，但有一个系统引入多轮澄清智能体以在生成前解决规格歧义。
    - 监督信号：未标注3D数据上的点级监督、程序执行反馈、监督微调和强化学习以不同组合使用。
    开放问题:
    - 如何确保生成的CAD程序在几何相似性之外满足真实世界的制造和装配约束？
    - 哪些策略可以改善对未见零件族的泛化，并忠实处理扫掠和放样等复杂操作？
    - 基准应如何平衡几何、程序化和工程指标，以避免模型排名冲突并指导实际进展？
    - 交互式澄清能否扩展到多模态和多零件设计场景，而不给用户带来过多负担？

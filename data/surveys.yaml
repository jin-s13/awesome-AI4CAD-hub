  - 关键差异：评测目标在纯几何精度与可制造性等下游工程标准之间分化；交互方式从单次生成到主动澄清不等；监督信号涵盖点级监督、执行反馈和强化学习。
  - 趋势演进：2026年前沿显示快速收敛到统一的多任务基准和模型，从孤立的重建任务转向工程感知的交互系统，但证据包中未提供更早年份的详细趋势。
  - 开放问题：对未见零件族的泛化、复杂操作（扫掠、放样）的忠实处理、与真实制造约束的对齐，以及可扩展的交互式澄清仍未解决。
  literature_review:
    line_of_work_matrix:
    - line: Benchmarks and evaluation suites for CAD generation
      what_it_solves: Standardized assessment of AI-generated CAD programs across
        multiple modalities, tasks, and engineering criteria such as executability,
        geometric fidelity, and manufacturability.
      what_remains_open: Benchmarks may not fully reflect industrial workflows; model
        rankings shift across metrics, and generalization to unseen part families
        remains limited even after fine-tuning.
    - line: Generative models for text, image, and point-to-CAD
      what_it_solves: End-to-end synthesis of editable parametric CAD from natural
        language, images, or point clouds, often using LLMs or differentiable surface
        representations.
      what_remains_open: Complex operations like sweeps and lofts are frequently simplified

  - 'Mainstream direction: Deep generative models and learning-based reconstruction
    dominate AI4CAD, shifting from traditional geometric pipelines to data-driven
    synthesis of CAD representations such as B-rep, mesh, and point clouds.'
  - 'Shared research pattern: Most works adopt a two-stage or factorized architecture,
    separating topology generation from geometry refinement, and rely on synthetic
    training data with limited real-world validation.'
  - 'Key differences: Representations vary widely (B-rep, mesh, point cloud, voxel),
    supervision ranges from reinforcement learning to autoregressive, and tasks span
    generation, reconstruction, alignment, and interaction learning.'
  - 'Trend evolution: From 2018 learning-based ICP to 2026 factorized B-rep synthesis,
    the field moves toward more structured, controllable, and topologically valid
    generation, with increasing emphasis on datasets and benchmarks.'
  - 'Open questions: Lack of standardized evaluation metrics across representations,
    limited real-world deployment evidence, and unresolved challenges in ensuring
    topological correctness and long-horizon interaction consistency.'
  related_work_outline_zh:
  - 主流方向：深度生成模型和基于学习的重建主导AI4CAD，从传统几何流程转向数据驱动的CAD表示合成，如B-rep、网格和点云。
  - 研究共性：多数工作采用两阶段或分解架构，将拓扑生成与几何细化分离，并依赖合成训练数据，真实场景验证有限。
  - 关键差异：表示方式多样（B-rep、网格、点云、体素），监督信号从强化学习到自回归不等，任务涵盖生成、重建、对齐和交互学习。
  - 趋势演进：从2018年基于学习的ICP到2026年分解式B-rep合成，领域朝着更结构化、可控和拓扑有效的生成发展，数据集和基准日益受到重视。
  - 开放问题：缺乏跨表示的标准化评估指标，真实部署证据有限，确保拓扑正确性和长程交互一致性仍是未解决的挑战。
  literature_review:
    line_of_work_matrix:
    - line: Taxonomy and roadmap synthesis
      what_it_solves: Organizes fragmented AI4CAD methods into coherent directions
        such as generation, reconstruction, and interaction, revealing research gaps
        and milestones.
      what_remains_open: Whether the taxonomy is backed by systematic evidence across
        all subfields or relies on a selective sample of recent papers; missing coverage
        of traditional CAD paradigms.
    - line: Comparative evaluation synthesis
      what_it_solves: Summarizes how different evaluation choices (e.g., geometric
        fidelity vs. topological validity) shape conclusions, as seen in BrepForge's
        comparison against baselines.
      what_remains_open: Results are often not comparable across representations or
        datasets; no unified benchmark exists for cross-task evaluation, and metric
        sensitivity to hyperparameters is underexplored.
    - line: Open problem and gap mapping
      what_it_solves: Identifies concrete next questions such as controllable generation,
        real-world sim-to-real transfer, and long-horizon CAD interaction learning
        from video.
      what_remains_open: Prioritization of which gaps (e.g., topological guarantees
        vs. dataset scale) matter most for practical CAD adoption remains unclear.
    consensus:
    - Deep learning is the primary tool for CAD-related tasks, replacing hand-crafted
      geometric algorithms.
    - Factorized or multi-stage pipelines are preferred to handle the complexity of
      CAD structures.
    - Synthetic data plays a crucial role in training due to the scarcity of annotated
      real CAD data.
    - Code and dataset release is becoming common practice, improving reproducibility.
    disagreements:
    - 'Choice of 3D representation: B-rep offers engineering precision but is harder
      to generate, while meshes and point clouds are easier but lack topological guarantees.'
    - 'Supervision paradigm: some methods use reinforcement learning for alignment,
      others use autoregressive or GAN-based generation, leading to different stability
      and quality trade-offs.'
    - 'Evaluation focus: geometric accuracy vs. topological validity vs. interaction
      success rate, with no consensus on a primary metric.'
    - 'Interaction modality: some works target automatic generation, others learn
      from human UI interactions, reflecting different deployment assumptions.'
    open_questions:
    - How can we design a unified evaluation protocol that fairly compares B-rep,
      mesh, and point cloud generation methods?
    - What is the minimal real-world supervision needed to bridge the sim-to-real
      gap in CAD model generation and reconstruction?
    - Can factorized generation approaches guarantee global topological consistency
      without sacrificing geometric detail?
    - How should long-horizon CAD interaction models be evaluated beyond imitation
      accuracy, e.g., on task completion or design intent preservation?

  abstract_cn: 从图像或3D观测中恢复可编辑的CAD程序是AI辅助设计的核心，但由于现有评估分散在不同的数据集、模态和指标上，进展难以衡量。我们提出CADBench，一个用于多模态CAD程序生成的统一基准。CADBench包含18,000个评估样本，涵盖六个基准家族（源自DeepCAD、Fusion
    360、ABC、MCB和Objaverse）；五种输入模态（干净网格、噪声网格、单视图渲染、逼真渲染和多视图渲染）；以及六项指标（几何保真度、可执行性和程序紧凑性）。基于STEP的家族按B-rep面数分层，所有家族均进行多样性采样，以支持跨复杂度和物体变化的受控分析。我们对11个CAD专用和通用视觉语言系统进行了基准测试，生成了超过140万个CAD程序。在理想化输入下，专用网格到CAD模型显著优于代码生成VLM，后者在CAD程序重建方面仍远未达到可靠水平。CADBench进一步揭示了三种重复出现的失败模式：重建质量随几何复杂度下降，CAD专用模型在模态转换下脆弱，以及模型排名随指标变化。这些结果共同将CADBench定位为衡量可编辑3D重建和多模态CAD理解进展的诊断测试平台。该基准公开于https://github.com/anniedoris/CADBench。

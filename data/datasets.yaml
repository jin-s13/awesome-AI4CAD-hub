  name_zh: SepicNet
  description_zh: 三维扫描作为一种将现实物体数字化并创建其三维模型的技术，广泛应用于众多领域。尽管三维扫描的质量取决于扫描仪的技术特性，但其常见缺陷在于对物体精细细节或边缘的平滑处理。我们提出了SepicNet，一种新颖的深度网络，用于检测三维形状中的尖锐边缘并将其参数化为基本曲线。为了实现网络的端到端训练，我们以可微分的方式制定了曲线拟合过程。我们开发了一种自适应点云采样技术，该技术比均匀采样能更好地捕捉尖锐特征。实验在一个新引入的大规模数据集（包含5万个三维扫描）上进行，其中尖锐边缘标注是从其参数化CAD模型中提取的，结果表明该方法相较于现有最先进技术有显著提升。

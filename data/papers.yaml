  - T. Robinson
  - Declan C. Nolan
  - Yang Hua
  - Weijuan Cao
  abstract: Deep learning approaches have been shown to be capable of recognizing
    shape features (e.g. machining features) in Computer-Aided Design (CAD) models
    in certain circumstances, yet still have issues when the features intersect, and
    in exploiting the geometric and topological information which comprises the boundary
    representation (B-Rep) of the typical CAD model. This paper presents a novel hierarchical
    B-Rep graph shape representation which encodes information about the surface geometry
    and face topology of the B-Rep. To learn from this new shape representation, a
    novel hierarchical graph convolutional network called Hierarchical CADNet has
    been created, which has been shown to outperform other state-of-the-art neural
    architectures on feature identification, including machining features that intersect,
    with improvements in accuracy for some more complex CAD models. © 2022TheAuthors.PublishedbyElsevierLtd.ThisisanopenaccessarticleundertheCCBYlicense

  title_cn: 'DiffCAD: 基于RGB图像的弱监督概率性CAD模型检索与对齐'
  abstract_cn: 基于CAD模型基元从RGB图像感知3D结构，可以实现有效且高效的基于对象的3D场景表示。然而，当前方法依赖于与真实图像关联的CAD模型的昂贵且不完美的标注监督，并且由于任务固有的歧义性——包括单目感知中的深度-尺度歧义以及CAD数据库模型与真实观测的不完全匹配——而面临挑战。因此，我们提出了DiffCAD，这是首个用于从RGB图像进行CAD检索与对齐的弱监督概率方法。我们通过扩散学习概率模型，对图像中CAD对象的形状、姿态和尺度的可能分布进行建模。这使得能够生成多个合理的CAD重建假设，仅需少量假设即可表征深度/尺度歧义和不完全形状匹配。我们的方法仅使用合成数据训练，利用单目深度和掩膜估计实现向各种真实目标域的鲁棒零样本适应。尽管仅使用合成数据训练，我们的多假设方法在Scan2CAD数据集上以8个假设即可超越监督式最先进方法5.9%。

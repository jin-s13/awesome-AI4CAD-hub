- id: brepforge-factorized-b-rep-synthesis-via-wireframe-composit-2026
  title: 'BrepForge: Factorized B-rep Synthesis via Wireframe Composition and Boundary-Conditioned
    Surface Instantiation'
  authors:
  - Jing Li
  - Yihang Fu
  - Falai Chen
  abstract: 'Boundary representation (B-rep) is the de facto standard for modern CAD,
    yet learning-based B-rep synthesis remains challenging due to the tight coupling
    between discrete topology and continuous geometry. We observe a fundamental asymmetry
    in B-reps: while wireframe composition involves high-entropy structural decisions,
    the interior surface geometry is largely constrained by its boundary loops. Motivated
    by this observation, we propose BrepForge, a generative framework that factorizes
    B-rep synthesis into two stages: wireframe composition and boundary-conditioned
    surface instantiation. In the first stage, a face-aware autoregressive model serializes
    the wireframe into structured sequences that explicitly encode hierarchical Vertex-Edge-Face
    (V-E-F) connectivity, yielding a topologically complete scaffold. In the second
    stage, precise surface geometries are instantiated by incorporating learning-free
    geometric priors derived from boundaries, transforming the complex synthesis task
    into a structured refinement process. This factorized approach ensures both topological
    integrity and geometric precision, effectively addressing the inherent complexities
    of B-rep modeling. Extensive experiments demonstrate that BrepForge outperforms
    existing baselines with superior geometric complexity and topological validity.'

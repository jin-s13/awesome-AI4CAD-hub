  title_cn: MUSE：面向可制造、功能性和可装配性的文本到CAD生成的基准测试
  abstract_cn: 大型语言模型（LLM）近期推动了文本驱动的3D生成，但文本到CAD（Text-to-CAD）仍远未支持工业产品设计。现有基准主要关注生成单零件CAD模型，并使用几何相似性指标进行评估，这些指标无法捕捉功能性、可制造性和可装配性。为填补这一空白，我们提出MUSE，一个专注于复杂、可编辑的边界表示（B-Rep）装配体的Text-to-CAD基准。MUSE将实际设计实例与结构化设计规范配对，并通过三阶段协议评估生成的模型：代码检查、几何检查和设计意图对齐。最后阶段使用设计特定评分标准评估功能性、可制造性和可装配性，超越了形状匹配，转向实际设计质量。为实现可扩展评估，我们采用基于评分标准的视觉语言模型（VLM）评判器，并通过人工标注验证其可靠性。在闭源和开源LLM上的实验揭示了从可执行代码到有效几何再到工程就绪设计的明确失败级联，即使最强的模型在细粒度工程标准上也仅取得有限成功。综上，MUSE为将Text-to-CAD从几何生成推进到真正的工程设计提供了现实的基准和评估框架。我们的项目网站（包括排行榜、数据集和代码）位于https://dong7313.github.io/muse-benchmark/。

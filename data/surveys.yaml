  related_work_outline_zh:
  - 主流方向：构建从多模态输入（文本、图像、网格）到可编辑参数化CAD程序的端到端生成与评估系统。
  - 研究共性：利用大语言模型或多模态模型生成可执行CAD脚本（如CadQuery），并以几何验证和基准评测作为核心质量关卡。
  - 关键差异：评测目标从几何保真度到可制造性与可装配性不等；交互方式分为单次生成与主动澄清；表示形式分为直接B-Rep曲面与参数化操作序列。
  - 趋势演进：从网格到CAD重建走向多模态生成，近期转向基于智能体的交互和工业级基准，2026年聚焦鲁棒性与工程就绪度。
  - 开放问题：对未见零件族和复杂操作的泛化，从有效几何到符合工程意图设计的鸿沟，以及标准化、可复现的基准生态建设。
  literature_review:
    line_of_work_matrix:
    - line: Runnable CAD generation pipelines
      what_it_solves: Transforming multimodal inputs into executable, editable parametric
        CAD programs and providing end-to-end evaluation workflows.
      what_remains_open: Robustness under distribution shift to unseen part families
        and complex operations; independent reproducibility across teams and infrastructure.
    - line: Interactive and agent-assisted CAD generation
      what_it_solves: Improving text-to-CAD robustness by proactively clarifying ambiguous
        specifications before code synthesis, reducing invalid outputs.
      what_remains_open: Scaling to multi-turn, real-time collaborative design; generalization
        of clarification strategies beyond curated scenarios.
    - line: CAD benchmarking and evaluation frameworks
      what_it_solves: Providing standardized test suites and metrics for geometric
        fidelity, executability, and engineering feasibility of generated CAD programs.
      what_remains_open: Cross-benchmark consistency, alignment of metrics with downstream
        engineering success, and long-term community adoption and maintenance.
    consensus:
    - Multimodal large language models can generate executable CAD programs, but suffer
      a failure cascade from executable code to valid geometry to engineering-ready
      design.
    - Specialized mesh-to-CAD models substantially outperform general-purpose vision-language
      models under idealized input conditions.
    - Execution verification and geometric feedback are critical mechanisms for improving
      output validity and reducing invalid program ratios.
    disagreements:
    - 'Evaluation targets differ: some works prioritize geometric similarity (e.g.,
      Chamfer distance, IoU), while others emphasize manufacturability, functionality,
      and assemblability via design-specific rubrics.'
    - 'Representation choices vary: direct B-Rep surface generation (e.g., Bézier
      patches) versus parametric operation sequence generation (e.g., sketch-and-extrude,
      fillet, chamfer).'
    - 'Interaction paradigms diverge: one-shot generation from a single prompt versus
      proactive agent-based clarification that resolves ambiguity before synthesis.'
    - 'Training supervision differs: point-level supervision on unannotated 3D data
      versus supervised fine-tuning on curated text-to-CAD program pairs.'
    open_questions:
    - How can models generalize to industrial part families and complex operations
      (sweeps, lofts) not seen during training?
    - What evaluation protocols can reliably bridge the gap between geometric validity
      and true engineering intent alignment?
    - Can proactive clarification scale to highly ambiguous, real-world design tasks
      while maintaining low interaction overhead?
    - How can benchmark metrics be standardized to reflect downstream manufacturing
      and assembly success, and how can independent reproduction be ensured across
      diverse compute environments?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 可运行CAD生成流水线
      解决的问题: 将多模态输入转化为可执行、可编辑的参数化CAD程序，并提供端到端评估工作流。
      尚未覆盖: 在分布外未见零件族和复杂操作下的鲁棒性；跨团队和基础设施的独立可复现性。
    - 路线: 交互式与智能体辅助CAD生成
      解决的问题: 通过在代码合成前主动澄清模糊规格，提高文本到CAD的鲁棒性，减少无效输出。
      尚未覆盖: 扩展到多轮实时协作设计；澄清策略在策划场景之外的泛化能力。
    - 路线: CAD基准与评估框架
      解决的问题: 为生成CAD程序的几何保真度、可执行性和工程可行性提供标准化测试集和指标。
      尚未覆盖: 跨基准一致性，指标与下游工程成功之间的对应关系，以及长期社区采纳与维护。
    共识:
    - 多模态大语言模型能够生成可执行的CAD程序，但面临从可执行代码到有效几何再到工程就绪设计的失败级联。
    - 在理想化输入条件下，专用网格到CAD模型显著优于通用视觉语言模型。
    - 执行验证和几何反馈是提高输出有效性、降低无效程序比率的关键机制。
    分歧:
    - 评测目标不同：部分工作侧重几何相似度（如Chamfer距离、IoU），另一些则通过设计特定评分标准强调可制造性、功能性和可装配性。
    - 表示选择不同：直接B-Rep曲面生成（如贝塞尔面片）与参数化操作序列生成（如草图-拉伸、倒角）。
    - 交互范式不同：基于单一提示的一次性生成与基于主动智能体的先澄清再合成。
    - 训练监督信号不同：在未标注3D数据上的点级监督与在策划的文本-CAD程序对上的监督微调。
    开放问题:
    - 模型如何泛化到训练中未见的工业零件族和复杂操作（扫掠、放样）？
    - 何种评估协议能可靠地弥合几何有效性与真实工程意图对齐之间的鸿沟？
    - 主动澄清能否在保持低交互开销的同时，扩展到高度模糊的真实设计任务？
    - 如何标准化基准指标以反映下游制造和装配成功，并确保在不同计算环境下的独立复现？

- id: text-to-cad-retrieval-a-strong-baseline-2026
  title: 'Text-to-CAD Retrieval: a Strong Baseline'
  authors:
  - Honghu Pan
  - Zibo Du
  - Daxiang Liu
  - Chengliang Liu
  - Xiaoling Luo
  abstract: Text-based retrieval of Computer-Aided Design (CAD) models is a critical
    yet underexplored task for the reuse of legacy industrial designs. Existing CAD
    repositories are typically searched using filenames or directories, which limits
    the efficiency, scalability, and accuracy of design retrieval. In this paper,
    we formally introduce text-to-CAD retrieval as a new cross-modal retrieval task,
    aiming to retrieve semantically relevant CAD models from large-scale databases
    given natural language queries. Leveraging paired text-CAD annotations from the
    Text2CAD dataset, we establish a practical benchmark for this task. To achieve
    text-based retrieval, we propose a unified framework that learns multi-modal CAD
    embeddings from both procedural sequences and geometric point clouds. Specifically,
    a sequence encoder captures the construction logic of CAD models, while a point
    encoder extracts explicit geometric features. A text encoder is used to learn
    semantic representations of textual queries. During training, we introduce a novel
    feature decoder that reconstructs masked sequence features via cross-attention
    with text and point features, encouraging implicit multi-modal alignment. At inference
    time, we remove this auxiliary decoder to enable efficient retrieval using concatenated
    sequence-point features. Our framework serves as a strong baseline for text-to-CAD
    retrieval and lays the foundation for downstream CAD generation paradigms, such
    as retrieval-augmented generation. The source code will be released.

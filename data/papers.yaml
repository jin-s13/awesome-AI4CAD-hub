    methodology: CADFit通过逐步拟合参数化操作（拉伸、旋转、倒圆角、倒角）并利用几何反馈进行验证，从网格重建CAD构建序列。重建被形式化为结构化CAD程序上的IoU驱动优化。多模态扩展将基于图像的几何重建与CADFit结合，实现端到端的图像到CAD重建。

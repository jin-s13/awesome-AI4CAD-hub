  title_cn: 利用几何信息从单张RGB图像进行形状估计
  abstract_cn: 从单张RGB图像预测静态物体的3D形状和姿态是现代计算机视觉中的一个重要研究领域，其应用涵盖增强现实、机器人技术和数字内容创作。通常，该任务通过直接的物体形状和姿态预测来完成，但这种方法不够精确。一个有前景的研究方向是从大规模数据库中检索CAD模型并将其与图像中观察到的物体对齐，从而确保有意义的形状预测。然而，现有工作未考虑物体几何信息，导致物体姿态预测不准确，尤其是对于未见过的物体。本文展示了如何利用从RGB图像到渲染CAD模型的跨域关键点匹配，实现比直接预测更精确的物体姿态估计。我们进一步证明，关键点匹配不仅可用于估计物体姿态，还可用于修改物体本身的形状。这一点至关重要，因为仅靠物体检索所能达到的精度本质上受限于可用的CAD模型。允许形状自适应可以弥合检索到的CAD模型与观察到的形状之间的差距。我们在具有挑战性的Pix3D数据集上展示了我们的方法。所提出的几何形状预测在AP
    mesh指标上，对于见过的物体从33.2提升到37.8，对于未见过的物体从8.2提升到17.1。此外，我们证明，在采用所提出的形状自适应后，即使没有紧密匹配的CAD模型，也能实现更准确的形状预测。代码已公开于https://github.com/florianlanger/leveraging_geometry_for_shape_estimation。
  tldr_cn: 利用几何关键点匹配检索并调整CAD模型，提升单张RGB图像的3D形状和姿态估计。

  title_cn: BenchCAD：面向程序化CAD的全面、行业标准基准测试
  abstract_cn: 工业计算机辅助设计（CAD）代码生成要求模型能够从视觉或文本输入生成可执行的参数化程序。除了识别零件的外形，该任务还涉及理解其三维结构、推断工程参数以及选择反映零件设计和制造方式的CAD操作。尽管多模态大语言模型（MLLMs）在此任务上展现出潜力，但很少有研究在真实的工业CAD场景中评估这些能力是否同时成立。我们提出了BenchCAD，一个用于工业CAD推理的统一基准。BenchCAD包含来自106个工业零件族的17,900个经过执行验证的CadQuery程序，包括锥齿轮、压缩弹簧、麻花钻和其他可重复使用的工程设计。它通过视觉问答、代码问答、图像到代码生成以及指令引导的代码编辑来评估模型，从而实现对感知、参数抽象和可执行程序合成的细粒度分析。在10多个前沿模型上的测试表明，当前系统通常能恢复粗略的外部几何形状，但无法生成忠实的参数化CAD程序。常见失败包括缺失精细的三维结构、误解工业设计参数，以及将扫掠、放样和扭转拉伸等关键操作替换为更简单的草图-拉伸模式。微调和强化学习能提升分布内性能，但对未见零件族的泛化能力仍然有限。这些结果使BenchCAD成为衡量和提升多模态CAD自动化工业就绪度的基准。
  tldr_cn: BenchCAD包含17900个CadQuery程序，覆盖106个工业零件族，用于评估多模态LLM的程序化CAD能力。
  analysis_cn:

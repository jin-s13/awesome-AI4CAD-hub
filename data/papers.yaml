  abstract_cn: 从图像生成可执行的CAD程序需要视觉几何与符号程序表示之间的对齐，当前方法在设计复杂度增加时无法可靠地学习这种能力。现有的微调方法要么依赖有限的监督数据集，要么依赖昂贵的后训练流程，导致系统脆弱，限制了生成式CAD设计的进展。我们认为主要瓶颈不在于模型或算法能力，而在于缺乏多样化的训练示例来对齐视觉几何与程序语法。这一限制尤为严重，因为收集多样化且经过验证的工程数据集既昂贵又难以扩展，制约了鲁棒生成式CAD模型的发展。我们提出几何推理反馈微调（GIFT），一种数据增强框架，利用几何反馈将测试时计算转化为自举的高质量训练样本集。GIFT结合两种机制：软拒绝采样（GIFT-REJECT），保留超出精确真值匹配的多样化高保真程序；以及失败驱动增强（GIFT-FAIL），将接近正确的预测转化为合成训练示例，提高在复杂几何上的鲁棒性。通过将推理时搜索摊销到模型参数中，GIFT获得了测试时缩放的好处，同时将推理计算减少80%。它在强监督基线上将平均IoU提高了12%，并且与更复杂的多模态系统保持竞争力，无需额外的人工标注或专用架构。

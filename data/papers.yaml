    - 大规模多模态CAD数据集mmABC，包含超过130万个B-Rep模型及多模态标注（点云、文本、多视角图像）
    methodology: 本文提出CMT，一种用于基于B-Rep的CAD生成的级联掩码自编码器（MAR）与拓扑预测器。级联MAR捕获边-面-体先验，而拓扑预测器从紧凑令牌中估计拓扑。引入了一个新的多模态数据集mmABC，包含130万B-Rep模型及标注（点云、文本、多视角图像）用于训练。

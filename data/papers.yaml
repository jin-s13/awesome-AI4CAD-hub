  title_cn: 基于有限元分析反馈的自改进CAD生成智能体
  abstract_cn: 计算机辅助设计（CAD）是现代工业设计的基石，然而现有的CAD生成模型仍无法满足实际工程流程的需求：它们既不能像工程师那样迭代，也无法评估工程所需的条件。先前的工作将CAD生成视为两个独立的步骤——部件合成与装配，其中前者通过接近黄金参考标准来评分，而后者（即使被处理）也被简化为一个独立的约束求解步骤。在本工作中，我们引入了一种更贴近工业实际的任务形式，要求模型根据自由形式的工程需求生成完全装配的多部件STEP文件，并通过有限元分析（FEA）进行验证。FEA验证显示，Codex
    (GPT-5.5) 和 Claude Code (Opus-4.7) 智能体在首次尝试的全面扫描中未能产生任何严格通过的工件，最佳配置平均仅满足约20%的类型化需求。此外，我们引入了两种额外的监督信号——一种新颖的纯文本蓝图模式和一个21视图图像渲染器（辅助智能体的视觉检查），使生成循环更符合工程师实际迭代的方式。在S2O和Fusion360数据集上，相同的反馈工具改善了几何重建效果：GPT-5.5/xhigh在S2O上的Box-IoU从0.444提升至0.592，在Fusion360上从0.397提升至0.505。这些信号共同推动CAD程序生成不仅视觉上合理，而且经过物理和结构要求检验的工件。
  tldr_cn: 提出自改进CAD智能体，利用有限元分析反馈从工程需求生成多部件STEP文件，提升几何重建质量。
  analysis_cn:
    innovations:
    - 引入了一种更贴近工业实际的任务形式，要求从自由形式工程需求生成完全装配的多部件STEP文件，并通过有限元分析（FEA）验证。
    - 将FEA作为反馈信号集成到自改进CAD生成智能体中，超越了仅依赖几何接近度的度量。
    - 两种新颖的监督信号：纯文本蓝图模式和21视图图像渲染器用于视觉检查，使生成循环与工程迭代实践对齐。
    methodology: 本文提出一种任务，智能体（Codex GPT-5.5, Claude Opus-4.7）根据工程需求生成多部件STEP文件，然后使用FEA验证输出。引入了两种额外的反馈工具——文本蓝图模式和21视图图像渲染器——以指导迭代优化。在S2O和Fusion360数据集上使用Box-IoU和需求满足度指标进行评估。

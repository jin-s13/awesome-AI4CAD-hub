    - All works target executable CAD programs, ensuring outputs can be validated
      by running the generated code.
    - There is a shared recognition that current models struggle with complex geometries,
      engineering constraints, and fine-grained design parameters.
    - Parametric representations such as B-Rep and CadQuery are preferred for editability
      and downstream engineering use.
    - Multiple new benchmarks introduced in 2026 indicate a collective push toward
      standardized, reproducible evaluation.
    disagreements:

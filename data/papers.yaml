- id: how-can-large-language-models-help-humans-in-design-and-manu-2023
  title: How Can Large Language Models Help Humans in Design and Manufacturing?
  authors:
  - L. Makatura
  - Michael Foshey
  - Bohan Wang
  - Felix Hahnlein
  - Pingchuan Ma
  - Bolei Deng
  - Megan Tjandrasuwita

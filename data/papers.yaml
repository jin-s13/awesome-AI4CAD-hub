  title_cn: HG-CAD：面向计算机辅助设计的层级图学习用于材料预测与推荐
  abstract_cn: 为了实现智能化的CAD设计工具，我们提出了一种机器学习架构HG-CAD，该架构通过层级图表示联合学习零件和装配级别的特征，支持装配体的自动化材料预测与推荐。具体而言，我们将材料预测与推荐过程建模为CAD模型新型层级图表示上的节点级分类任务：低层图捕捉零件几何形状，高层图表示装配拓扑结构，而批次级掩码随机化则实现上下文感知。这使得我们的网络能够从零件和装配两个层面聚合几何与拓扑特征，从而获得优越性能。在Fusion
    360 Gallery Assembly数据集上对所提架构进行的定性和定量评估证明了该方法的可行性，其性能优于计算机视觉基线和人类基线，并在应用场景中展现出潜力。所提出的HG-CAD架构统一了多模态CAD特征的处理、编码和联合学习，可扩展至大型存储库，并将设计师的知识融入学习过程。这些能力使该架构能够作为设计自动化的推荐系统以及未来工作的基线。

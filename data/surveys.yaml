  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD models (command sequences,
    code, B-Rep) from multimodal inputs (images, text, meshes, point clouds) using
    large language/vision models and optimization techniques.'
  - 'Shared research pattern: All works adopt structured CAD representations for editability,
    employ deep generative models (LLMs, VLMs, Mamba, GANs), and evaluate geometric
    fidelity via metrics like IoU, Chamfer Distance, and validity rates.'
  - 'Key differences: Input modalities vary (image, text, mesh, point cloud), output
    formats differ (CadQuery code, STEP, pointer-based sequences), and training paradigms
    diverge (supervised fine-tuning, RL, evolutionary optimization, hybrid optimization),
    leading to trade-offs in data efficiency, precision, and generalization.'
  - 'Trend evolution: The topic has shifted from early parametric modeling foundations
    to a 2025–2026 frontier dominated by LLM/VLM-based code generation, multi-task
    unification, and reinforcement learning for geometric accuracy, with growing emphasis
    on real-world applicability and large-scale datasets.'
  - 'Open questions: Robustness to real-world noise and unseen operations, integration
    with manufacturing constraints, handling of assemblies and constraints, cross-CAD-system
    generalization, and standardized evaluation beyond geometric similarity.'
  related_work_outline_zh:
  - 主流方向：利用大语言/视觉模型和优化技术，从多模态输入（图像、文本、网格、点云）生成可编辑的参数化CAD模型（命令序列、代码、B-Rep）。
  - 研究共性：均采用结构化CAD表示以保证可编辑性，使用深度生成模型（LLM、VLM、Mamba、GAN），并通过IoU、Chamfer距离和有效率等指标评估几何保真度。
  - 关键差异：输入模态（图像、文本、网格、点云）和输出格式（CadQuery代码、STEP、基于指针的序列）不同，训练范式（监督微调、强化学习、进化优化、混合优化）各异，导致在数据效率、精度和泛化能力上的权衡。
  - 趋势演进：从早期参数化建模基础，发展到2025–2026年以LLM/VLM代码生成、多任务统一和强化学习优化几何精度为前沿，越来越强调真实世界适用性和大规模数据集。
  - 开放问题：对真实世界噪声和未见操作的鲁棒性、与制造约束的集成、装配体和约束的处理、跨CAD系统泛化，以及超越几何相似度的标准化评估。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD reconstruction from visual geometry (mesh, image, point
        cloud)
      what_it_solves: Recovering editable CAD construction sequences or code from
        unstructured 3D/2D data, enabling downstream editing and manufacturing.
      what_remains_open: Robustness to real-world sensor noise, complex topologies,
        and partial observations; generalization across different CAD kernels and
        software.
    - line: Text-to-CAD generation via large language models
      what_it_solves: Translating natural language design intent into executable CAD
        scripts or STEP models, lowering the barrier for non-expert users.
      what_remains_open: Handling ambiguous or underspecified descriptions, ensuring
        manufacturability and adherence to engineering constraints, and scaling to
        multi-part assemblies.
    - line: Generative modeling and dataset augmentation for CAD sequences
      what_it_solves: Creating diverse, realistic parametric CAD models to train downstream
        generation systems, addressing data scarcity and sequence length limitations.
      what_remains_open: Guaranteeing the validity and physical plausibility of generated
        models, and measuring diversity without sacrificing precision.
    - line: Unified multi-modal multi-task CAD frameworks
      what_it_solves: Building a single model that handles heterogeneous CAD tasks
        (reconstruction, generation, QA) across multiple input modalities, reducing
        system complexity.
      what_remains_open: Whether a unified model can match task-specific experts on
        all metrics, and how to extend to additional CAD operations like simulation
        or assembly.
    consensus:
    - Editable parametric representations (command sequences, code, B-Rep) are preferred
      over static meshes for CAD workflows.
    - Deep generative models, especially LLMs and VLMs, are the dominant backbone
      for CAD generation.
    - Geometric fidelity metrics (IoU, Chamfer Distance) and validity rates are standard
      evaluation criteria.
    - Large-scale paired datasets of CAD models and multimodal descriptions are critical
      for training and benchmarking.
    disagreements:
    - 'Output representation: CadQuery Python code vs. STEP files vs. pointer-augmented
      command sequences, each with different editability and compatibility trade-offs.'
    - 'Training paradigm: supervised fine-tuning on static datasets vs. reinforcement
      learning with geometric rewards vs. evolutionary optimization, leading to different
      data efficiency and exploration capabilities.'
    - 'Input modality focus: some works specialize in image-to-CAD, others in text-to-CAD
      or mesh-to-CAD, with no clear winner for cross-modal generalization.'
    - 'Evaluation benchmarks: methods are tested on different suites (DeepCAD, Fusion360,
      MCB, UniCAD, ExeCAD), making direct comparison difficult.'
    open_questions:
    - How can generated CAD models be validated against real-world manufacturing constraints
      such as tolerances, material properties, and assembly requirements?
    - What is the best way to integrate these generative models into existing professional
      CAD workflows without disrupting established practices?
    - Can current approaches scale to complex assemblies with multiple inter-part
      constraints and kinematic relationships?
    - How do we ensure the robustness and safety of AI-generated CAD models in safety-critical
      engineering applications?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 从视觉几何（网格、图像、点云）重建参数化CAD
      解决的问题: 从非结构化2D/3D数据恢复可编辑的CAD构建序列或代码，支持下游编辑与制造。
      尚未覆盖: 对真实传感器噪声、复杂拓扑和部分观测的鲁棒性；跨不同CAD内核和软件的泛化能力。
    - 路线: 基于大语言模型的文本到CAD生成
      解决的问题: 将自然语言设计意图转化为可执行的CAD脚本或STEP模型，降低非专业用户的使用门槛。
      尚未覆盖: 处理模糊或欠约束的描述，确保可制造性和工程约束符合性，以及扩展到多零件装配体。
    - 路线: CAD序列的生成式建模与数据集增强
      解决的问题: 创建多样化、逼真的参数化CAD模型以训练下游生成系统，缓解数据稀缺和序列长度限制。
      尚未覆盖: 保证生成模型的有效性和物理合理性，以及在不牺牲精度的情况下衡量多样性。
    - 路线: 统一多模态多任务CAD框架
      解决的问题: 构建单一模型处理多种输入模态下的异构CAD任务（重建、生成、问答），降低系统复杂度。
      尚未覆盖: 统一模型能否在所有指标上匹敌专用模型，以及如何扩展到仿真或装配等额外CAD操作。
    共识:
    - 可编辑的参数化表示（命令序列、代码、B-Rep）优于静态网格，更适合CAD工作流。
    - 深度生成模型，尤其是LLM和VLM，是CAD生成的主流技术骨干。
    - 几何保真度指标（IoU、Chamfer距离）和有效率是标准的评估准则。
    - 大规模CAD模型与多模态描述配对数据集对训练和基准测试至关重要。
    分歧:
    - 输出表示：CadQuery Python代码、STEP文件与基于指针的命令序列，在可编辑性和兼容性上各有取舍。
    - 训练范式：静态数据集上的监督微调、基于几何奖励的强化学习与进化优化，导致数据效率和探索能力不同。
    - 输入模态侧重：部分工作专攻图像到CAD，另一些聚焦文本到CAD或网格到CAD，跨模态泛化尚无明确胜者。
    - 评估基准：方法在不同测试套件（DeepCAD、Fusion360、MCB、UniCAD、ExeCAD）上评测，难以直接比较。
    开放问题:
    - 如何根据真实制造约束（如公差、材料属性、装配要求）验证生成的CAD模型？
    - 如何将这些生成模型无缝集成到现有专业CAD工作流中而不破坏既有实践？
    - 当前方法能否扩展到包含多个零件间约束和运动关系的复杂装配体？
    - 在安全关键的工程应用中，如何确保AI生成CAD模型的鲁棒性和安全性？

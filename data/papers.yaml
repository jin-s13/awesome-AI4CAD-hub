  abstract_cn: 在这项工作中，我们旨在开发有效的数据合成技术，自主合成多模态训练数据，以增强多模态大语言模型（MLLMs）解决复杂现实任务的能力。为此，我们提出了集体对抗数据合成（CADS），这是一种新颖且通用的方法，用于为MLLMs合成高质量、多样且具有挑战性的多模态数据。CADS的核心思想是利用集体智能确保高质量和多样化的生成，同时探索对抗学习以合成具有挑战性的样本，从而有效推动模型改进。具体而言，CADS包含两个循环阶段：集体对抗数据生成（CAD-Generate）和集体对抗数据判断（CAD-Judge）。CAD-Generate利用集体知识共同生成新的多样化多模态数据，而CAD-Judge则协作评估合成数据的质量。此外，CADS引入了对抗上下文优化机制，以优化生成上下文，鼓励生成具有挑战性和高价值的数据。通过CADS，我们构建了MMSynthetic-20K数据集并训练了我们的模型R1-SyntheticVL，该模型在多个基准测试中展现出优越性能。

  literature_review:
    line_of_work_matrix:
    - line: Multimodal CAD generation benchmarks
      what_it_solves: Unifies evaluation of CAD program generation across diverse
        input modalities (image, mesh, point cloud) and metrics, enabling controlled
        analysis of model robustness to geometric complexity and modality shift.
      what_remains_open: Benchmarks still lack comprehensive coverage of real-world
        engineering constraints such as manufacturability, assemblability, and physical
        simulation compliance; generalization to unseen part families remains poor
        even after fine-tuning.
    - line: LLM-based text-to-CAD program synthesis
      what_it_solves: Translates natural language descriptions into executable CAD
        scripts (CadQuery) using large language models, often augmented with supervised
        fine-tuning or reinforcement learning to improve code correctness and geometric
        fidelity.
      what_remains_open: Models fail to capture fine 3D structure, misinterpret design
        parameters, and simplify complex operations (sweeps, lofts) into basic extrude
        patterns; strict engineering-requirement satisfaction is rarely achieved.
    - line: Self-supervised sequence modeling for CAD
      what_it_solves: Generates long parametric CAD sequences by learning latent representations
        via reconstruction and adversarial training, addressing the challenge of modeling
        extended design histories.
      what_remains_open: Integration with downstream physical validation or design-intent
        feedback is missing; evaluation remains limited to sequence validity and basic
        geometric metrics.
    - line: Feedback-driven CAD generation agents
      what_it_solves: Incorporates external feedback signals—proactive user clarification,
        finite element analysis, or multi-view rendering—to iteratively refine generated
        CAD models, moving beyond one-shot synthesis.
      what_remains_open: Even with feedback, strict FEA passing remains elusive; best
        configurations meet only a fraction of typed requirements, and the approach
        has been tested on only two datasets with proprietary models.
    consensus:
    - Parametric CAD representations (B-Rep, CadQuery scripts) are the preferred output
      format because they enable editability and downstream engineering use.
    - 'Current models exhibit a failure cascade: they can produce syntactically correct
      code but often generate invalid geometry or fail to meet design intent and engineering
      constraints.'
    - Evaluation must go beyond geometric similarity (e.g., Chamfer distance) to include
      executability, design-intent alignment, and physical validity.
    - Generalization to unseen part families and complex geometric operations remains
      a major weakness across all approaches.
    disagreements:
    - 'Evaluation focus: some works prioritize geometric fidelity and executability,
      while others emphasize manufacturability, functionality, and assemblability
      via rubric-based VLM judges.'
    - 'Interaction mode: one-shot generation vs. proactive clarification agents that
      query the user before synthesis vs. self-improving loops that use FEA or rendering
      feedback without human intervention.'
    - 'Input modality coverage: dedicated mesh-to-CAD models assume idealized single-modal
      input, whereas multimodal frameworks aim to handle text, image, and point cloud
      within a unified architecture.'
    - 'Model architecture choice: specialized state-space models for long sequences
      vs. general-purpose LLMs/VLMs fine-tuned for CAD code generation, with trade-offs
      in sequence length handling and cross-modal flexibility.'
    open_questions:
    - What evaluation protocols and metrics can reliably predict real-world engineering
      usefulness beyond geometric proxies?
    - How can models learn to compose complex operations (sweeps, lofts, fillets)
      instead of defaulting to simple sketch-and-extrude patterns?
    - Under what conditions does feedback (clarification, FEA, visual inspection)
      lead to strict constraint satisfaction rather than incremental geometric improvement?
    - What training paradigms or architectures can close the generalization gap to
      unseen part families without catastrophic forgetting or brittleness under modality
      shift?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD生成基准
      解决的问题: 统一评估跨多种输入模态（图像、网格、点云）和指标的CAD程序生成，实现对几何复杂度和模态转换鲁棒性的受控分析。
      尚未覆盖: 基准仍缺乏对真实工程约束（如可制造性、可装配性、物理仿真合规性）的全面覆盖；即使经过微调，对未见零件族的泛化能力仍然很差。
    - 路线: 基于LLM的文本到CAD程序合成
      解决的问题: 利用大语言模型将自然语言描述转换为可执行的CAD脚本（CadQuery），通常通过监督微调或强化学习提高代码正确性和几何保真度。
      尚未覆盖: 模型无法捕捉精细三维结构、误解设计参数，并将复杂操作（扫掠、放样）简化为基本拉伸模式；严格的工程需求满足很少实现。
    - 路线: 自监督序列建模用于CAD
      解决的问题: 通过重建和对抗训练学习潜在表示来生成长参数化CAD序列，解决建模扩展设计历史的挑战。
      尚未覆盖: 缺少与下游物理验证或设计意图反馈的集成；评估仍限于序列有效性和基本几何度量。
    - 路线: 反馈驱动的CAD生成智能体
      解决的问题: 引入外部反馈信号——主动用户澄清、有限元分析或多视图渲染——以迭代优化生成的CAD模型，超越一次性合成。
      尚未覆盖: 即使有反馈，严格的FEA通过仍然难以实现；最佳配置仅满足一小部分类型化需求，且方法仅在两个数据集上用专有模型测试过。
    共识:
    - 参数化CAD表示（B-Rep、CadQuery脚本）是首选输出格式，因为它们支持可编辑性和下游工程使用。
    - 当前模型表现出失败级联：它们可以生成语法正确的代码，但经常产生无效几何或无法满足设计意图和工程约束。
    - 评估必须超越几何相似度（如Chamfer距离），纳入可执行性、设计意图对齐和物理有效性。
    - 对未见零件族和复杂几何操作的泛化仍然是所有方法的主要弱点。
    分歧:
    - 评估重点：一些工作优先考虑几何保真度和可执行性，而另一些则通过基于评分标准的VLM评判器强调可制造性、功能性和可装配性。
    - 交互模式：一次性生成 vs. 在合成前询问用户的主动澄清智能体 vs. 使用FEA或渲染反馈而无人工干预的自改进循环。
    - 输入模态覆盖：专用网格到CAD模型假设理想化的单模态输入，而多模态框架旨在统一架构中处理文本、图像和点云。
    - 模型架构选择：用于长序列的专用状态空间模型 vs. 为CAD代码生成微调的通用LLM/VLM，在序列长度处理和跨模态灵活性方面存在权衡。
    开放问题:
    - 哪些评估协议和指标能够可靠地预测超越几何代理的真实工程实用性？
    - 模型如何学习组合复杂操作（扫掠、放样、圆角），而不是默认使用简单的草图-拉伸模式？
    - 在什么条件下，反馈（澄清、FEA、视觉检查）能导致严格的约束满足，而不仅仅是增量几何改进？
    - 哪些训练范式或架构能够缩小对未见零件族的泛化差距，同时避免灾难性遗忘或模态转换下的脆弱性？

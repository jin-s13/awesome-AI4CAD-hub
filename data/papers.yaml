  title_cn: NerVE：用于从点云中提取参数曲线的神经体积边缘
  abstract_cn: 从点云中提取参数化边缘曲线是3D视觉和几何处理中的一个基本问题。现有方法主要依赖于关键点检测，这一过程具有挑战性，且往往产生噪声输出，使得后续的边缘提取容易出错。为了解决这一问题，我们提出直接检测结构化边缘，以规避先前逐点方法的局限性。我们通过提出NerVE来实现这一目标，这是一种新颖的神经体积边缘表示，可以通过体积学习框架轻松学习。NerVE可以无缝转换为通用的分段线性（PWL）曲线表示，从而为学习所有类型的自由曲线提供统一策略。此外，由于NerVE编码了丰富的结构信息，我们表明基于NerVE的边缘提取可以简化为一个简单的图搜索问题。在将NerVE转换为PWL表示后，可以通过现成的样条拟合算法获得参数曲线。我们在具有挑战性的ABC数据集[19]上评估了我们的方法。我们表明，基于NerVE的简单网络已经可以大幅超越先前的最先进方法。

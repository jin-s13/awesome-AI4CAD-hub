  abstract_cn: CAD模型是多模态数据，其中构建序列和形状中包含的信息与知识相互补充，表示学习方法应同时考虑两者。以往学习单模态表示的方法忽略了这一特性。为了利用两种模态的信息，我们开发了一种多模态对比学习策略，其中不同模态的特征通过对比学习范式进行交互，并由一种新颖的多模态对比损失驱动。在几何和序列领域设计了两个前置任务，并结合两阶段训练策略，使表示专注于编码几何细节并将表示解码为构建序列，从而更适用于多模态检索和CAD序列重建等下游任务。实验结果表明，我们的多模态表示学习方案的性能显著超越了基线方法和单模态方法。

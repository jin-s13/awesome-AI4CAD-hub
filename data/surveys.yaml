  related_work_outline:
  - 'Mainstream direction: Building large-scale, domain-specific CAD datasets with
    associated benchmark tasks, spanning 3D printing, architecture, mechanical design,
    and UI interaction.'
  - 'Shared research pattern: Releasing a dataset together with one or more baseline
    models and defining evaluation metrics for a specific CAD-related task.'
  - 'Key differences: Data modality (video, parametric history, multimodal), task
    type (generation, detection, commenting, UI interaction), and domain (architectural,
    mechanical, 3D printing).'
  - 'Trend evolution: From early programmatic CAD construction datasets (2021) toward
    multimodal, long-horizon, and geometrically constrained parametric datasets (2024–2026),
    with increasing emphasis on real-world interaction and annotation scale.'
  - 'Open questions: Whether benchmark task distributions match real design workflows,
    how well proxy metrics align with downstream design quality, and whether conclusions
    remain stable across implementations.'
  related_work_outline_zh:
  - 主流方向：构建大规模、面向特定领域的CAD数据集及配套基准任务，覆盖3D打印、建筑、机械设计和UI交互。
  - 研究共性：发布数据集的同时提供一个或多个基线模型，并为特定CAD任务定义评估指标。
  - 关键差异：数据模态（视频、参数历史、多模态）、任务类型（生成、检测、注释、UI交互）和领域（建筑、机械、3D打印）。
  - 趋势演进：从早期的程序化CAD构建数据集（2021年）发展到多模态、长序列和几何约束的参数化数据集（2024–2026年），越来越强调真实世界交互和标注规模。
  - 开放问题：基准任务分布是否匹配真实设计流程，代理指标与下游设计质量是否一致，以及基准结论在不同实现下是否稳定。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal CAD datasets for perception and reconstruction
      what_it_solves: Provides aligned RGB, depth, or video data with CAD annotations
        to train and evaluate models for 3D understanding from real-world captures.
      what_remains_open: Coverage of diverse manufacturing processes and long-tail
        geometries; verification that learned representations transfer to downstream
        design or simulation tasks.
    - line: Parametric and history-based CAD sequence datasets
      what_it_solves: Captures human design intent through construction sequences
        and geometric constraints, enabling benchmarking of generative and auto-completion
        models.
      what_remains_open: Whether sequence-based metrics correlate with final part
        quality; limited diversity in design styles and constraint types across datasets.
    - line: CAD interaction and semantic annotation benchmarks
      what_it_solves: Defines tasks such as UI interaction prediction and semantic
        commenting of CAD programs, moving beyond geometry to design rationale.
      what_remains_open: Scalability of annotation to complex assemblies; alignment
        between automated commenting and professional design documentation standards.
    consensus:
    - All works release a new dataset to address a gap in CAD-related machine learning
      tasks.
    - Each dataset is accompanied by at least one baseline model or algorithm to establish
      initial performance.
    - Evaluation is task-specific and uses metrics defined by the dataset creators,
      with no cross-dataset standardization yet.
    disagreements:
    - 'Data representation varies: some use RGB video, others use parametric CAD sequences
      or multimodal sensor data.'
    - 'Task focus differs: generation of CAD programs, detection of symbols in floorplans,
      commenting of CAD code, and prediction of UI interactions.'
    - Domain scope ranges from architectural floorplans to mechanical 3D printing
      to general CAD modeling, with no unified cross-domain benchmark.
    open_questions:
    - How well do current benchmark metrics predict real-world design quality or user
      satisfaction?
    - Can models trained on one CAD dataset generalize to other domains or CAD software
      without retraining?
    - What is the minimum dataset scale and annotation density needed to saturate
      performance on these tasks?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 面向感知与重建的多模态CAD数据集
      解决的问题: 提供对齐的RGB、深度或视频数据与CAD标注，用于训练和评估从真实世界捕获中进行3D理解的模型。
      尚未覆盖: 对不同制造工艺和长尾几何形状的覆盖；所学表示能否迁移到下游设计或仿真任务尚未验证。
    - 路线: 基于参数和历史的CAD序列数据集
      解决的问题: 通过构建序列和几何约束捕捉人类设计意图，为生成和自动补全模型提供基准。
      尚未覆盖: 基于序列的指标是否与最终零件质量相关；数据集在设计风格和约束类型上的多样性有限。
    - 路线: CAD交互与语义注释基准
      解决的问题: 定义UI交互预测和CAD程序语义注释等任务，将关注点从几何扩展到设计意图。
      尚未覆盖: 注释在复杂装配体上的可扩展性；自动注释与专业设计文档标准之间的一致性。
    共识:
    - 所有工作都发布新数据集以填补CAD相关机器学习任务的空白。
    - 每个数据集都至少附带一个基线模型或算法以建立初始性能。
    - 评估是任务特定的，使用数据集创建者定义的指标，尚未形成跨数据集的标准。
    分歧:
    - 数据表示不同：有的使用RGB视频，有的使用参数化CAD序列或多模态传感器数据。
    - 任务焦点不同：包括CAD程序生成、平面图符号检测、CAD代码注释和UI交互预测。
    - 领域范围从建筑平面图到机械3D打印再到通用CAD建模，缺乏统一的跨领域基准。
    开放问题:
    - 当前基准指标在多大程度上能预测真实世界的设计质量或用户满意度？
    - 在一个CAD数据集上训练的模型能否在不重新训练的情况下泛化到其他领域或CAD软件？
    - 在这些任务上达到性能饱和所需的最小数据集规模和标注密度是多少？

  analysis:
    innovations:
    - Unified multimodal benchmark CADBench with 18,000 samples from six dataset families,
      five input modalities, and six metrics for CAD program generation.
    - Stratification by B-rep face count and diversity sampling to enable controlled
      analysis across geometric complexity and object variation.
    - Large-scale evaluation of 11 CAD-specialized and general-purpose VLMs, generating
      1.4M CAD programs and identifying three recurring failure modes.
    methodology: CADBench aggregates 18,000 evaluation samples from six benchmark
      families (DeepCAD, Fusion 360, ABC, MCB, Objaverse) across five input modalities
      (clean/noisy meshes, single-view, photorealistic, multi-view renders) and six
      metrics (geometric fidelity, executability, program compactness). STEP-based
      families are stratified by B-rep face count and all families are diversity-sampled.
      Eleven models are benchmarked by generating over 1.4 million CAD programs.
    key_results: 'Specialized mesh-to-CAD models substantially outperform code-generating
      VLMs under idealized inputs; three failure modes emerge: reconstruction quality
      degrades with geometric complexity, CAD-specialized models are brittle under
      modality shift, and model rankings change across metrics.'

- id: patch2cad-patchwise-embedding-learning-for-in-the-wild-shap-2021
  title: 'Patch2CAD: Patchwise Embedding Learning for In-the-Wild Shape Retrieval
    from a Single Image'
  authors:
  - Weicheng Kuo
  - A. Angelova
  - Tsung-Yi Lin
  - Angela Dai
  abstract: 3D perception of object shapes from RGB image input is fundamental towards
    semantic scene understanding, grounding image-based perception in our spatially
    3dimensional real-world environments. To achieve a mapping between image views
    of objects and 3D shapes, we leverage CAD model priors from existing large-scale
    databases, and propose a novel approach towards constructing a joint embedding

  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD models (programs or
    B-Reps) from multimodal inputs using large language models, differentiable geometry,
    or hybrid optimization, with a parallel push toward standardized benchmarks that
    assess geometric and engineering fidelity.'
  - 'Shared research pattern: Framing CAD generation as a mapping from raw inputs
    to structured CAD representations, training on synthetic or procedural data, and
    evaluating with geometry-aware metrics supplemented by engineering criteria such
    as executability, manufacturability, and assemblability.'
  - 'Key differences: Representations vary from code-generating LLMs and differentiable
    parametric surfaces to state-space models and hybrid optimization; supervision
    signals differ (meshes, point clouds, text); interaction is either one-shot or
    agentic clarification; evaluation targets range from geometric fidelity to downstream
    engineering properties.'
  - 'Trend evolution: The 2025–2026 frontier shifts from single-task reconstructions
    toward multi-modal unified models and benchmarks that emphasize manufacturability,
    assembly, and agentic interaction, reflecting a broader concern with engineering
    readiness beyond geometric accuracy.'
  - 'Open questions: How to close the gap between benchmark metrics and real design
    intent, whether the choice of CAD representation systematically limits generalization
    under complex geometry and modality shift, and how agentic clarification scales
    to diverse users without excessive interaction cost.'
  related_work_outline_zh:
  - 主流方向：利用大语言模型、可微分几何或混合优化从多模态输入生成可编辑的参数化CAD模型（程序或边界表示），同时建立标准化基准来评估几何与工程保真度。
  - 研究共性：将CAD生成表述为从原始输入到结构化CAD表示的映射，在合成或程序化数据上训练，并采用几何感知指标辅以可执行性、可制造性、可装配性等工程标准。
  - 关键差异：表示方式包括代码生成LLM、可微分参数曲面、状态空间模型和混合优化；监督信号涉及网格、点云、文本；交互模式分为一次性生成和主动澄清；评测目标从几何保真度延伸到下游工程特性。
  - 趋势演进：2025-2026年前沿正从单任务重建转向多模态统一模型和强调可制造性、装配性与智能体交互的基准，表明对超越几何精度的工程就绪度的关注在增加。
  - 开放问题：如何缩小基准指标与真实设计意图的差距，CAD表示的选择是否在复杂几何和模态偏移下系统性地限制泛化，以及智能体澄清如何在不增加过高交互成本的前提下扩展到多样化的用户群体。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD generation via representation and architecture design
      what_it_solves: Mapping text, images, or 3D data to editable parametric CAD
        programs or B-Reps using LLMs, state-space models, differentiable surfaces,
        or hybrid optimization, thereby enabling automatic creation of high-fidelity
        CAD models.
      what_remains_open: How the choice of representation (code, Bézier surfaces,
        Mamba sequences) affects quality under complex geometries, long sequences,
        and engineering constraints, and whether recipes transfer across input modalities
        and real-world design workflows.
    - line: Interactive and agentic CAD generation
      what_it_solves: Reducing ambiguity in text-to-CAD generation by proactively
        clarifying user intent before program synthesis, thus improving robustness
        to underspecified prompts.
      what_remains_open: Whether automated clarification strategies generalize to
        unseen prompt distributions and diverse user populations, and what the acceptable
        trade-off between interaction cost and generation accuracy is in practice.
    - line: Benchmarks and evaluation protocols for AI-assisted CAD
      what_it_solves: Providing unified multimodal, multi-task, and engineering-focused
        benchmarks that quantify model performance on geometric fidelity, executability,
        manufacturability, and assemblability, and revealing failure cascades from
        code generation to engineering-ready design.
      what_remains_open: Whether current metrics and VLM judges align with professional
        CAD engineers' intent, and whether benchmarks can isolate the contribution
        of the generative method from input preprocessing, metric choice, and system-level
        confounds.
    consensus:
    - All lines of work target generation of editable, parametric CAD models rather
      than static meshes or point clouds.
    - Evaluation goes beyond geometric error to include executability, validity, and,
      increasingly, downstream engineering criteria.
    - Models exhibit fragility under geometric complexity, modality shift, and ambiguous
      specifications, and the community recognizes a failure cascade from valid code
      to engineering-ready design.
    - Training and evaluation rely heavily on synthetic or procedurally rendered data,
      and a gap remains between benchmark performance and real-world design practice.
    disagreements:
    - 'Representation: some approaches generate code (e.g., CadQuery scripts) via
      LLMs, while others directly predict parametric surfaces or use state-space models
      for sequences, leading to different trade-offs in editability and reconstruction
      accuracy.'
    - 'Supervision: methods differ in whether they use point-level supervision, mesh
      reconstructions, or text-only training, which influences data requirements and
      the ability to learn from unannotated 3D data.'
    - 'Interaction mode: most systems are one-shot generators, while one line of work
      advocates for agentic clarification before synthesis, creating a split on the
      role of user interaction in the generation pipeline.'
    - 'Evaluation target: benchmarks emphasize geometric metrics, executability, or
      manufacturability/assembly to varying degrees, and there is no agreement on
      how to weight these criteria for comparing methods.'
    open_questions:
    - Can manufacturability and assembly feedback be integrated directly into the
      generative objective, rather than being used only for post-hoc evaluation?
    - Under what conditions do unified multi-task models outperform specialized pipelines,
      and what are the failure boundaries when input modalities are mixed?
    - What is the minimal set of metrics that predicts real-world CAD engineer satisfaction,
      and how can benchmarks evolve to cover the long tail of design constraints?
    - How does the choice of CAD representation influence the scalability of generation
      to complex assemblies with hundreds of features, and what verification gaps
      remain when evaluation is limited to existing benchmarks?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于表示与架构设计的参数化CAD生成
      解决的问题: 通过LLM、状态空间模型、可微分曲面或混合优化，将文本、图像或3D数据映射为可编辑的参数化CAD程序或B-Rep，实现高保真CAD模型的自动创建。
      尚未覆盖: 表示选择（代码、贝塞尔曲面、Mamba序列）如何影响复杂几何、长序列和工程约束下的生成质量，以及这些方法能否跨输入模态和真实设计流程迁移。
    - 路线: 交互式与智能体式CAD生成
      解决的问题: 在程序合成前主动澄清用户意图，减少文本到CAD生成中的模糊性，提升对欠规范提示的鲁棒性。
      尚未覆盖: 自动澄清策略能否泛化到未见过的提示分布和多样化用户群体，以及实际应用中交互成本与生成精度之间的可接受平衡点。
    - 路线: AI辅助CAD的基准与评估协议
      解决的问题: 提供统一的多模态、多任务和面向工程的基准，量化模型在几何保真度、可执行性、可制造性和可装配性上的表现，并揭示从代码生成到工程就绪设计的失败级联。
      尚未覆盖: 现有指标和VLM评判器是否与专业CAD工程师的意图一致，以及基准能否将生成方法的贡献与输入预处理、指标选择和系统级混淆因素隔离开。
    共识:
    - 所有路线均致力于生成可编辑的参数化CAD模型，而非静态网格或点云。
    - 评估不仅限于几何误差，还扩展到可执行性、有效性，以及越来越多的下游工程标准。
    - 模型在几何复杂度、模态偏移和模糊规范下表现出脆弱性，社区认识到从有效代码到工程就绪设计存在失败级联。
    - 训练和评估严重依赖合成或程序化渲染数据，基准性能与真实设计实践之间仍存在差距。
    分歧:
    - 表示方式：部分方法通过LLM生成代码（如CadQuery脚本），另一些直接预测参数曲面或使用状态空间模型处理序列，导致可编辑性和重建精度上不同的权衡。
    - 监督信号：方法分别在点级监督、网格重建或纯文本训练下运作，影响数据需求以及从无标注3D数据中学习的能力。
    - 交互模式：多数系统为一次性生成器，而一条路线主张在合成前进行智能体澄清，形成在生成流程中用户交互角色上的分歧。
    - 评估目标：基准在不同程度上强调几何指标、可执行性或可制造性/装配性，如何加权这些标准以比较方法尚未达成共识。
    开放问题:
    - 可制造性和装配性反馈能否直接融入生成目标，而不仅仅用于事后评估？
    - 在什么条件下统一多任务模型能超越专用流水线，且当输入模态混合时，其失效边界在哪里？
    - 能够预测真实CAD工程师满意度的最小指标集是什么，基准如何演进以覆盖设计约束的长尾？
    - CAD表示的选择如何影响生成扩展到包含数百个特征的复杂装配体的能力，在仅依赖现有基准进行评估时，还存在哪些验证缺口？

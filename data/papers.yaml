- id: mesh2brep-b-rep-reconstruction-via-robust-primitive-fitting-2025
  title: 'Mesh2Brep: B-Rep Reconstruction via Robust Primitive Fitting and Intersection-Aware
    Constraints'
  authors:
  - Zeyu Shen
  - Mingyang Zhao
  - Dong-ming Yan
  - Wencheng Wang
  abstract: In boundary representation (B-rep) reconstruction for computer aided design
    (CAD) applications, it is still challenging with existing methods to distinguish
    primitives in the smoothly blended regions reasonably. Thus, intensive manual
    post-processing is always required for correcting the primitives and their neighboring
    relationships to obtain a valid B-rep solid, seriously preventing the efficiency.
    In this paper, we address these challenges by presenting two novel techniques.
    The first is to robustly extract primitives by iteratively estimating the probability
    distribution of the noise to eliminate outliers. The second is to present intersection-aware
    constraints, like tangency and collinearity constraints, to correctly obtain intersections
    between primitives, which have not been explored in existing methods to our knowledge.
    Therefore, we can effectively extract primitives, especially those blended smoothly,
    and obtain high-quality relationships between them. As a result, a valid B-rep
    model can be constructed without a lot of manual post-processing on topology correction,
    while not with existing methods. As a benefit, with our constructed B-rep models,
    their corresponding meshes can be intuitively and conveniently edited, which is
    quite useful in CAD applications. Experimental results show that our proposed
    B-rep construction method outperforms both classical and recent learning-based
    methods in terms of reconstruction efficiency and accuracy.

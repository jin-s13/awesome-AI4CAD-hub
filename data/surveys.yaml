  related_work_outline:
  - 'Mainstream direction: Building unified, multi-modal CAD benchmarks that evaluate
    generation across diverse input modalities (text, image, mesh, point cloud) and
    multiple metrics, moving beyond geometric fidelity to include executability, program
    compactness, and engineering constraints.'
  - 'Shared research pattern: Benchmarks are constructed by aggregating existing CAD
    datasets, stratifying by geometric complexity, and applying multi-stage evaluation
    protocols that combine automatic metrics with learned judges or rubric-based assessments.'
  - 'Key differences: Benchmarks differ in their evaluation targets—some focus on
    reconstruction accuracy from ideal inputs, others on robustness to ambiguous prompts
    or modality shifts, and a newer line assesses downstream manufacturability, functionality,
    and assemblability using VLM judges.'
  - 'Trend evolution: The evidence is concentrated in 2026, showing a rapid shift
    from single-task, single-modality evaluation to large-scale, multi-modal, multi-task
    suites that integrate LLMs and VLMs both as generators and as evaluators, with
    growing emphasis on real-world engineering validity.'
  - 'Open questions: Whether benchmark rankings remain stable across different implementations
    and compute budgets; how well proxy metrics align with the downstream decisions
    engineers actually care about; and whether task distributions cover the full range
    of settings where CAD models are expected to help.'
  related_work_outline_zh:
  - 主流方向：构建统一的多模态CAD基准，跨文本、图像、网格、点云等多种输入模态评估生成质量，并从几何保真度扩展到可执行性、程序紧凑性和工程约束等多维度指标。
  - 研究共性：基准通过聚合现有CAD数据集、按几何复杂度分层，并采用多阶段评估协议（自动指标结合学习型评判器或评分标准）来构建。
  - 关键差异：基准的评估目标不同——有的关注理想输入下的重建精度，有的关注对模糊提示或模态转换的鲁棒性，新路线则利用VLM评判器评估可制造性、功能性和可装配性。
  - 趋势演进：证据集中在2026年，显示从单任务、单模态评估快速转向大规模、多模态、多任务套件，LLM和VLM同时作为生成器和评估器被集成，且越来越强调真实工程有效性。
  - 开放问题：基准排名在不同实现和算力预算下是否稳定；代理指标与工程师真正关心的下游决策之间是否一致；任务分布是否覆盖CAD模型预期发挥作用的全部真实场景。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating shared, multi-modal evaluation suites that make CAD
        generation claims comparable across input types and model families, with stratification
        by geometric complexity to enable controlled analysis.
      what_remains_open: Whether the aggregated task distribution covers the full
        range of real-world CAD workflows, including assembly-level constraints and
        iterative design refinement.
    - line: Metric and stress-test design
      what_it_solves: Probing prediction quality beyond aggregate geometric scores
        by introducing executability, program compactness, and engineering-specific
        rubrics (manufacturability, functionality, assemblability) assessed via VLM
        judges.
      what_remains_open: Alignment between these proxy metrics and the actual downstream
        decisions made by engineers; the reliability and bias of VLM judges compared
        to human expert evaluation.
    - line: Comparable baselines and reporting
      what_it_solves: Making results auditable through large-scale evaluation of multiple
        models (specialized and general-purpose) under identical protocols, revealing
        failure modes like brittleness under modality shift and metric-dependent ranking
        changes.
      what_remains_open: Whether benchmark conclusions remain stable across different
        implementations, compute budgets, and dataset versions; the reproducibility
        of results when code and artifacts are partially available.
    consensus:
    - Evaluating CAD generation requires multiple metrics because model rankings change
      depending on whether geometric fidelity, executability, or program compactness
      is prioritized.
    - Specialized mesh-to-CAD models substantially outperform general-purpose vision-language
      models under idealized input conditions, but their performance degrades with
      geometric complexity and modality shifts.
    - There is a failure cascade from generating executable code to producing valid
      geometry to meeting engineering-ready design criteria, indicating that current
      benchmarks need multi-stage evaluation.
    - Large-scale, multi-modal benchmarks are necessary to reveal systematic failure
      modes such as brittleness under input distribution changes and the trade-off
      between reconstruction quality and program validity.
    disagreements:
    - 'Representation: Some benchmarks evaluate B-Rep assemblies directly, while others
      operate on parametric CAD construction sequences or mesh-based representations,
      leading to different notions of editability and validity.'
    - 'Supervision signal: Benchmarks differ in whether they require CAD-specific
      annotations (e.g., construction sequences) or can leverage point-level supervision
      from unannotated 3D data, affecting scalability and applicability.'
    - 'Evaluation target: One line focuses on geometric reconstruction accuracy from
      clean inputs, another on robustness to ambiguous natural language prompts, and
      a third on downstream engineering criteria like manufacturability and assemblability.'
    - 'Interaction mode: Some frameworks assume a single-turn generation setting,
      while others introduce proactive clarification agents that interact with the
      user before synthesis, changing the evaluation of success.'
    - 'Deployment setting: Benchmarks vary between single-task evaluation (e.g., only
      mesh-to-CAD) and unified multi-task suites that cover reconstruction, generation,
      and question answering, making cross-benchmark comparisons difficult.'
    open_questions:
    - How well do current benchmark metrics (e.g., Chamfer distance, IoU, executability)
      correlate with the practical utility of generated CAD models in real engineering
      workflows?
    - Can VLM-based judges provide reliable and unbiased assessments of manufacturability
      and functionality, and how do they compare to human expert evaluations?
    - What is the impact of dataset stratification and diversity sampling on the generalizability
      of benchmark conclusions, especially for models trained on different data distributions?
    - How stable are model rankings when benchmarks are re-implemented with different
      codebases, compute budgets, or dataset versions, given that many top papers
      have only partial artifact availability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 创建共享的多模态评估套件，使CAD生成主张在不同输入类型和模型家族间可比，并通过几何复杂度分层实现受控分析。
      尚未覆盖: 聚合的任务分布是否覆盖真实CAD工作流的全部范围，包括装配级约束和迭代设计细化。
    - 路线: 指标与压力测试设计
      解决的问题: 在几何总分之外，通过引入可执行性、程序紧凑性以及由VLM评判器评估的工程特定评分标准（可制造性、功能性、可装配性）来检验预测质量。
      尚未覆盖: 这些代理指标与工程师实际下游决策之间的一致性；VLM评判器与人类专家评估相比的可靠性和偏差。
    - 路线: 可比基线与报告规范
      解决的问题: 通过在相同协议下对多个模型（专用和通用）进行大规模评估，使结果可审计，揭示模态转换下的脆弱性和指标依赖的排名变化等失败模式。
      尚未覆盖: 基准结论在不同实现、算力预算和数据集版本下是否稳定；在代码和工件部分可用时结果的可复现性。
    共识:
    - 评估CAD生成需要多个指标，因为模型排名会因优先考虑几何保真度、可执行性还是程序紧凑性而改变。
    - 在理想化输入条件下，专用网格到CAD模型显著优于通用视觉语言模型，但其性能随几何复杂度和模态转换而下降。
    - 存在从生成可执行代码到产生有效几何再到满足工程就绪设计标准的失败级联，表明当前基准需要多阶段评估。
    - 大规模多模态基准对于揭示系统性失败模式（如输入分布变化下的脆弱性以及重建质量与程序有效性之间的权衡）是必要的。
    分歧:
    - 表示方式：一些基准直接评估B-Rep装配体，另一些则基于参数化CAD构建序列或网格表示，导致对可编辑性和有效性的定义不同。
    - 监督信号：基准在是否需要CAD特定标注（如构建序列）或可利用未标注3D数据的点级监督方面存在差异，影响可扩展性和适用性。
    - 评估目标：一条路线关注干净输入下的几何重建精度，另一条关注对模糊自然语言提示的鲁棒性，第三条则关注可制造性和可装配性等下游工程标准。
    - 交互模式：一些框架假设单轮生成设置，而另一些引入主动澄清智能体在合成前与用户交互，改变了成功的评估方式。
    - 部署场景：基准在单任务评估（如仅网格到CAD）与覆盖重建、生成和问答的统一多任务套件之间有所不同，使得跨基准比较困难。
    开放问题:
    - 当前基准指标（如Chamfer距离、IoU、可执行性）与生成的CAD模型在实际工程工作流中的实际效用之间的相关性如何？
    - 基于VLM的评判器能否对可制造性和功能性提供可靠且无偏的评估，与人类专家评估相比如何？
    - 数据集分层和多样性采样对基准结论的泛化性有何影响，尤其是对在不同数据分布上训练的模型？
    - 鉴于许多顶级论文仅提供部分工件，当基准使用不同代码库、算力预算或数据集版本重新实现时，模型排名有多稳定？

  related_work_outline:
  - 'Mainstream direction: Building unified multi-modal benchmarks that evaluate CAD
    program generation across diverse input modalities and task types, moving beyond
    geometric similarity to engineering feasibility.'
  - 'Shared research pattern: Aggregating multiple existing CAD datasets into a single
    evaluation framework, defining new metrics for executability, design-intent alignment,
    and manufacturability, and comparing specialized CAD models against general-purpose
    vision-language models.'
  - 'Key differences: Representation choice (B-Rep vs. parametric sequences), supervision
    signal (point-level vs. program-level), evaluation target (geometric fidelity
    vs. functional/assembly requirements), interaction mode (single-pass generation
    vs. proactive clarification), and model architecture (task-specific vs. universal
    multi-modal LLMs).'
  - 'Trend evolution: From early single-task datasets to 2026''s large-scale multi-modal
    benchmarks that incorporate VLM judges and fine-grained engineering rubrics; the
    frontier is shifting toward benchmarks that stress-test robustness under modality
    shift and geometric complexity.'
  - 'Open questions: Whether proxy metrics align with downstream engineering decisions,
    how benchmark conclusions vary across implementations and compute budgets, and
    how to cover real-world manufacturing constraints in evaluation tasks.'
  related_work_outline_zh:
  - 主流方向：构建统一多模态基准，评估跨多种输入模态和任务类型的CAD程序生成，从几何相似性扩展到工程可行性。
  - 研究共性：将多个现有CAD数据集聚合到单一评估框架，定义可执行性、设计意图对齐和可制造性等新指标，并比较专用CAD模型与通用视觉语言模型。
  - 关键差异：表示选择（B-Rep与参数化序列）、监督信号（点级与程序级）、评测目标（几何保真度与功能/装配要求）、交互模式（单次生成与主动澄清）以及模型架构（任务特定与通用多模态LLM）。
  - 趋势演进：从早期单任务数据集到2026年大规模多模态基准，引入VLM评判器和细粒度工程评分标准；前沿正转向在模态转换和几何复杂度下进行压力测试的基准。
  - 开放问题：代理指标是否与下游工程决策一致，基准结论在不同实现和算力预算下如何变化，以及如何在评估任务中覆盖真实制造约束。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating unified multi-modal, multi-task benchmarks that aggregate
        existing CAD datasets and define shared evaluation protocols, enabling comparable
        assessment of CAD generation methods across reconstruction, generation, and
        question-answering tasks.
      what_remains_open: Whether the task distribution adequately covers real-world
        engineering constraints such as manufacturability, assemblability, and long-tail
        design scenarios, and how to keep benchmarks updated with evolving CAD representations.
    - line: Metric and stress-test design
      what_it_solves: Designing evaluation metrics beyond geometric fidelity, including
        executability, program compactness, design-intent alignment, and using VLM
        judges for scalable assessment of functional and manufacturing requirements.
      what_remains_open: Alignment between these proxy metrics and the actual downstream
        decisions engineers care about remains unvalidated; sensitivity of metrics
        to geometric complexity and modality shift is not fully characterized.
    - line: Comparable baselines and reporting
      what_it_solves: Establishing common baselines (specialized CAD models vs. general
        VLMs) and standardized reporting to reveal failure modes under different input
        modalities and complexity levels, making results auditable.
      what_remains_open: Stability of benchmark conclusions across different implementations,
        compute budgets, and dataset versions is unknown; standardized protocols for
        interactive paradigms like clarification are missing.
    consensus:
    - Unified multi-modal benchmarks are essential for advancing CAD generation research
      and enabling fair comparisons.
    - Evaluation must extend beyond geometric similarity to include engineering feasibility,
      such as executability and design-intent alignment.
    - Programmatic CAD representations (e.g., CadQuery, B-Rep) serve as the primary
      evaluation substrate for both generation and assessment.
    - Large language and vision-language models are being systematically evaluated
      as both generators and judges in CAD tasks.
    disagreements:
    - 'Representation: direct B-Rep generation versus parametric sequence generation
      from sketches or primitives.'
    - 'Supervision signal: training with point-level supervision on unannotated 3D
      data versus requiring curated program-level annotations.'
    - 'Evaluation target: prioritizing geometric fidelity metrics versus functional,
      manufacturability, and assemblability criteria.'
    - 'Interaction mode: single-pass text-to-CAD generation versus proactive clarification
      loops that resolve ambiguity before synthesis.'
    - 'Model architecture: task-specific CAD models versus universal multi-modal large
      language models that handle heterogeneous tasks.'
    open_questions:
    - How can benchmarks incorporate real manufacturing constraints and assembly requirements
      without making evaluation prohibitively expensive?
    - To what extent do VLM-based judges agree with human expert assessments on fine-grained
      engineering criteria?
    - Are current metrics for long-sequence CAD generation reliable indicators of
      practical utility, or do they mask failure modes in complex designs?
    - How stable are benchmark rankings when models are retrained or evaluated under
      different compute budgets and implementation details?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 创建统一的多模态、多任务基准，聚合现有CAD数据集并定义共享评估协议，使CAD生成方法在重建、生成和问答等任务上可比较。
      尚未覆盖: 任务分布是否充分覆盖真实工程约束（如可制造性、可装配性）和长尾设计场景，以及如何随CAD表示演进更新基准。
    - 路线: 指标与压力测试设计
      解决的问题: 设计超越几何保真度的评估指标，包括可执行性、程序紧凑性、设计意图对齐，并使用VLM评判器对功能性和制造要求进行可扩展评估。
      尚未覆盖: 这些代理指标与工程师实际关心的下游决策之间的一致性尚未验证；指标对几何复杂度和模态转换的敏感性未完全表征。
    - 路线: 可比基线与报告规范
      解决的问题: 建立统一基线（专用CAD模型与通用VLM）和标准化报告，揭示不同输入模态和复杂度下的失败模式，使结果可审计。
      尚未覆盖: 基准结论在不同实现、算力预算和数据集版本下的稳定性未知；缺乏针对澄清等交互范式的标准化评估协议。
    共识:
    - 统一多模态基准对于推进CAD生成研究和实现公平比较至关重要。
    - 评估必须从几何相似性扩展到工程可行性，包括可执行性和设计意图对齐。
    - 程序化CAD表示（如CadQuery、B-Rep）是生成和评估的主要载体。
    - 大语言模型和视觉语言模型正被系统性地评估为CAD任务中的生成器和评判器。
    分歧:
    - 表示方式：直接B-Rep生成与基于草图或基元的参数化序列生成。
    - 监督信号：在未标注3D数据上使用点级监督训练与需要精心策划的程序级标注。
    - 评测目标：优先考虑几何保真度指标与功能性、可制造性和可装配性标准。
    - 交互模式：单次文本到CAD生成与在合成前解决歧义的主动澄清循环。
    - 模型架构：任务特定的CAD模型与处理异构任务的通用多模态大语言模型。
    开放问题:
    - 基准如何在不使评估成本过高的情况下纳入真实制造约束和装配要求？
    - 基于VLM的评判器在细粒度工程标准上与人类专家评估的一致性程度如何？
    - 当前长序列CAD生成的指标是否是实用效用的可靠指标，还是掩盖了复杂设计中的失败模式？
    - 当模型在不同算力预算和实现细节下重新训练或评估时，基准排名有多稳定？

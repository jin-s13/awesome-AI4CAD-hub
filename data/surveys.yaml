  - 开放问题：对未见零件族和复杂操作（扫掠、放样）的泛化，弥合有效几何与可制造设计之间的差距，以及将生成集成到交互式CAD工作流中。
  literature_review:
    line_of_work_matrix:
    - line: Unified multi-modal CAD generation benchmarks
      what_it_solves: Standardized evaluation of CAD program generation across diverse
        input modalities (text, image, mesh, point cloud) and metrics, revealing systematic
        failure modes like brittleness under modality shift and ranking changes across
        metrics.
      what_remains_open: Generalization to unseen industrial part families, alignment
        of geometric metrics with downstream engineering requirements, and coverage
        of complex operations beyond sketch-and-extrude.
    - line: LLM-based CAD program synthesis
      what_it_solves: End-to-end generation of executable CadQuery or B-Rep scripts
        from natural language or multi-modal inputs, leveraging large language models
        fine-tuned on curated CAD datasets.
      what_remains_open: Faithful reproduction of fine 3D structure and complex parametric
        operations; models often substitute sweeps/lofts with simpler patterns and
        misinterpret design parameters.
    - line: Optimization and differentiable CAD reconstruction
      what_it_solves: Recovery of editable parametric CAD construction sequences from
        raw geometry (meshes, point clouds) using hybrid optimization or differentiable
        surface representations, achieving high geometric fidelity without CAD-specific
        annotations.
      what_remains_open: Scaling to diverse CAD operation sets, handling assemblies,
        and integrating with engineering constraints beyond geometric accuracy.
    - line: Agentic and interactive CAD generation
      what_it_solves: Improving robustness to ambiguous text prompts by introducing
        a proactive clarification agent that audits specifications before code synthesis,
        reducing invalid outputs and geometric error.
      what_remains_open: Balancing interaction overhead with generation quality, extending
        to multi-turn design refinement, and grounding clarification in engineering
        intent.
    consensus:
    - Executable parametric CAD programs (CadQuery, B-Rep) are the preferred representation
      for editability and downstream use.
    - Geometric fidelity (Chamfer distance, IoU) and executability are core evaluation
      metrics, but they are insufficient to guarantee engineering readiness.
    - A gap exists between producing valid geometry and meeting functional, manufacturability,
      and assemblability requirements.
    - Current models, whether LLM-based or optimization-based, struggle with complex
      operations and unseen part families, indicating limited generalization.
    disagreements:
    - 'Input modality scope: some works focus exclusively on text-to-CAD, while others
      unify text, image, mesh, and point cloud in a single framework.'
    - 'Generation approach: LLM-based direct code synthesis vs. optimization-driven
      fitting of parametric operations vs. differentiable surface representations
      trained on unannotated 3D data.'
    - 'Evaluation target: geometric accuracy alone vs. design-intent alignment including
      functionality, manufacturability, and assemblability judged by VLMs or rubrics.'
    - 'Interaction mode: single-shot generation vs. agentic pipelines that proactively
      clarify ambiguous specifications before synthesis.'
    open_questions:
    - How can CAD generation models generalize to unseen part families and complex
      operations like sweeps and lofts, given current failures to go beyond sketch-and-extrude?
    - What evaluation protocols can bridge the gap between geometric metrics and real-world
      engineering requirements such as manufacturability and assembly?
    - How should interactive clarification be integrated into CAD workflows without
      excessive user burden, and can it be grounded in engineering constraints rather
      than surface-level geometry?
    - To what extent do current benchmarks reflect the diversity of industrial CAD
      practice, and how can we ensure models remain robust under modality shift and
      noisy inputs?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 统一多模态CAD生成基准
      解决的问题: 跨多种输入模态（文本、图像、网格、点云）和指标标准化评估CAD程序生成，揭示系统性失败模式，如模态转换下的脆弱性和指标间排名变化。
      尚未覆盖: 对未见工业零件族的泛化，几何指标与下游工程需求的对齐，以及覆盖草图-拉伸之外的复杂操作。
    - 路线: 基于LLM的CAD程序合成
      解决的问题: 利用在精选CAD数据集上微调的大语言模型，从自然语言或多模态输入端到端生成可执行的CadQuery或B-Rep脚本。
      尚未覆盖: 精细三维结构和复杂参数化操作的忠实复现；模型常将扫掠/放样替换为更简单的模式，并误解设计参数。
    - 路线: 优化与可微CAD重建
      解决的问题: 使用混合优化或可微曲面表示从原始几何（网格、点云）恢复可编辑的参数化CAD构建序列，无需CAD特定标注即可达到高几何保真度。
      尚未覆盖: 扩展到多样化的CAD操作集，处理装配体，以及集成几何精度之外的工程约束。
    - 路线: 智能体与交互式CAD生成
      解决的问题: 通过引入主动澄清智能体，在代码合成前审核规格，提高对模糊文本提示的鲁棒性，减少无效输出和几何误差。
      尚未覆盖: 平衡交互开销与生成质量，扩展到多轮设计细化，并将澄清过程扎根于工程意图。
    共识:
    - 可执行的参数化CAD程序（CadQuery、B-Rep）是实现可编辑性和下游使用的首选表示。
    - 几何保真度（Chamfer距离、IoU）和可执行性是核心评估指标，但不足以保证工程就绪。
    - 在生成有效几何与满足功能、可制造性和可装配性要求之间存在差距。
    - 当前模型，无论是基于LLM还是基于优化，都难以处理复杂操作和未见零件族，表明泛化能力有限。
    分歧:
    - 输入模态范围：部分工作专注于文本到CAD，而另一些则在单一框架中统一文本、图像、网格和点云。
    - 生成方法：基于LLM的直接代码合成 vs. 优化驱动的参数化操作拟合 vs. 在未标注3D数据上训练的可微曲面表示。
    - 评估目标：仅几何精度 vs. 包括功能性、可制造性和可装配性的设计意图对齐，由VLM或评分标准评判。
    - 交互模式：单次生成 vs. 在合成前主动澄清模糊规格的智能体流水线。
    开放问题:
    - CAD生成模型如何泛化到未见零件族和扫掠、放样等复杂操作，鉴于当前无法超越草图-拉伸模式？
    - 何种评估协议能弥合几何指标与可制造性、装配等真实工程需求之间的差距？
    - 如何将交互式澄清集成到CAD工作流中而不增加过多用户负担，并且能否将其扎根于工程约束而非表面几何？
    - 当前基准在多大程度上反映了工业CAD实践的多样性，如何确保模型在模态转换和噪声输入下保持鲁棒？

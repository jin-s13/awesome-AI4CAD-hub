  abstract_cn: 尽管大型语言模型（LLM）在各种跨模态生成任务中表现出色，但由于缺乏合适的数据集，它们从文本生成三维计算机辅助设计（CAD）模型的能力仍未得到充分探索。此外，目前缺乏包含重建参数和文本描述的多模态CAD数据集，而这对于定量评估多模态LLM的CAD生成能力至关重要。为解决这些挑战，我们构建了一个包含齿轮、轴和弹簧等代表性机械部件的CAD模型、草图及图像数据的数据集，并通过Amazon
    Mechanical Turk收集了自然语言描述。利用CAD程序作为桥梁，我们将LLM的文本输出转化为精确的三维CAD设计。为了增强GPT模型的文本到CAD生成能力并展示我们数据集的实用性，我们开发了一个为GPT-3.5生成微调训练数据的流水线。我们基于CAD程序长度采用不同的数据采样策略，微调了四个GPT-3.5模型。我们使用解析率和交并比（IoU）指标评估这些模型，并将其性能与未微调的GPT-4进行比较。对四个不同微调模型的比较研究获得的新知识，为我们选择采样策略以构建文本到CAD生成微调实践中的训练数据集提供了指导，同时考虑了零件复杂度、模型性能和成本之间的权衡。

- id: 3d-future-3d-furniture-shape-with-texture-2020
  title: '3D-FUTURE: 3D Furniture Shape with TextURE'
  authors:
  - Huan Fu
  - Rongfei Jia
  - Lin Gao
  - Mingming Gong
  - Binqiang Zhao
  - S. Maybank
  - D. Tao
  abstract: 'The 3D CAD shapes in current 3D benchmarks are mostly collected from
    online model repositories. Thus, they typically have insufficient geometric details
    and less informative textures, making them less attractive for comprehensive and
    subtle research in areas such as high-quality 3D mesh and texture recovery. This
    paper presents 3D Furniture shape with TextURE (3D-FUTURE): a richly-annotated
    and large-scale repository of 3D furniture shapes in the household scenario. At
    the time of this technical report, 3D-FUTURE contains 9992 modern 3D furniture
    shapes with high-resolution textures and detailed attributes. To support the studies
    of 3D modeling from images, we couple the CAD models with 20,240 scene images.
    The room scenes are designed by professional designers or generated by an industrial
    scene creating system. Given the well-organized 3D-FUTURE and its characteristics,
    we provide a package of baseline experiments, such as joint 2D instance segmentation
    and 3D object pose estimation, image-based 3D shape retrieval, 3D object reconstruction
    from a single image, texture recovery for 3D shapes, and furniture composition,
    to facilitate related future researches on our database.'

  title_cn: 逆向CSG
  abstract_cn: 虽然计算机辅助设计是现代许多制造流程的重要组成部分，但通常生成的设计文件仅描述原始几何形状。这种表示丢失了生成这些设计的过程。本文提出了一种方法，以构造实体几何（CSG）语言逆向工程3D模型可能生成的过程。观察到CSG是一种形式文法，我们将逆向CSG问题表述为程序合成问题。我们的解决方案是一种将几何处理与最先进的程序合成技术相结合的算法。在该方案中，几何处理用于将CSG树的混合离散和连续域转换为纯离散域，而现代程序合成器在此域中表现出色。我们在多个示例上展示了算法的效率和可扩展性，包括包含超过100个基本部件的示例。我们表明，该算法能够找到接近真实情况的简单程序，并展示了该方法在网格重新编辑中的适用性。最后，我们将我们的方法与先前的最先进技术进行了比较。我们证明，在生成的CSG紧凑性和运行时间方面，我们的算法优于先前方法，并且能够处理比任何先前方法复杂得多的输入网格。

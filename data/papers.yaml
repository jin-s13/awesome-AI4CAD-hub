  title_cn: Text2CAD：从初学者到专家级文本提示生成顺序CAD模型
  abstract_cn: 在现代软件中设计复杂的计算机辅助设计（CAD）原型非常耗时，这是由于缺乏能够快速生成较简单中间部件的智能系统。我们提出Text2CAD，这是首个利用面向所有技能水平的设计师友好型指令生成文本到参数化CAD模型的人工智能框架。此外，我们引入了一个数据标注流程，基于自然语言指令为DeepCAD数据集生成文本提示，使用了Mistral和LLaVA-NeXT。该数据集包含约17万个模型和约66万条文本注释，涵盖从抽象CAD描述（例如，生成两个同心圆柱体）到详细规格（例如，绘制两个圆心在(x,y)、半径分别为r1和r2的圆，并沿法线方向拉伸d...）。在Text2CAD框架内，我们提出了一种端到端的基于Transformer的自回归网络，用于从输入文本生成参数化CAD模型。我们通过一系列指标评估模型性能，包括视觉质量、参数精度和几何准确性。我们提出的框架在人工智能辅助设计应用中显示出巨大潜力。我们的源代码和注释将公开发布。

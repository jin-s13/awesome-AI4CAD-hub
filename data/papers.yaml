- id: text-to-cadquery-a-new-paradigm-for-cad-generation-with-sca-2025
  title: 'Text-to-CadQuery: A New Paradigm for CAD Generation with Scalable Large
    Model Capabilities'
  authors:
  - Haoyang Xie
  - Feng Ju
  abstract: 'Computer-aided design (CAD) is fundamental to modern engineering and
    manufacturing, but creating CAD models still requires expert knowledge and specialized
    software. Recent advances in large language models (LLMs) open up the possibility
    of generative CAD, where natural language is directly translated into parametric
    3D models. However, most existing methods generate task-specific command sequences
    that pretrained models cannot directly handle. These sequences must be converted
    into CAD representations such as CAD vectors before a 3D model can be produced,
    which requires training models from scratch and adds unnecessary complexity. To
    tackle this issue, we propose generating CadQuery code directly from text, leveraging
    the strengths of pretrained LLMs to produce 3D models without intermediate representations,
    using this Python-based scripting language. Since LLMs already excel at Python
    generation and spatial reasoning, fine-tuning them on Text-to-CadQuery data proves
    highly effective. Given that these capabilities typically improve with scale,
    we hypothesize that larger models will perform better after fine-tuning. To enable
    this, we augment the Text2CAD dataset with 170,000 CadQuery annotations. We fine-tune
    six open-source LLMs of varying sizes and observe consistent improvements. Our
    best model achieves a top-1 exact match of 69.3%, up from 58.8%, and reduces Chamfer
    Distance by 48.6%. Project page: https://github.com/Text-to-CadQuery/Text-to-CadQuery.'

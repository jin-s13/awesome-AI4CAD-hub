- id: pointer-cad-v2-plan-then-construct-cad-generation-with-dime-2026
  title: 'Pointer-CAD v2: Plan-Then-Construct CAD Generation with Dimension-Aware
    Parametric Precision'
  authors:
  - Dacheng Qi
  - Chenyu Wang
  - Jingwei Xu
  - Yi Ma
  - Shenghua Gao
  abstract: Computer-aided design (CAD) plays a fundamental role in modern manufacturing
    by providing the high precision required for industrial production. Recent large
    language model based approaches formulate CAD generation as a sequence prediction
    problem and have achieved promising results. However, existing methods and evaluation
    protocols primarily emphasize visual similarity, while overlooking precise geometric
    parameters and correct metric scale. Small numerical deviations that are negligible
    at the shape-level may still violate industrial tolerance requirements, a problem
    further compounded by current autoregressive paradigms that utilize command sequence
    representations, aggressively quantize numerical parameters to ease LLM prediction.
    In this work, we present Pointer-CAD v2. Compared with v1 (arXiv:2603.04337),
    this version directly predicts continuous values, bypassing the need for quantized
    numerical parameters and thereby eliminating quantization errors. Specifically,
    we propose a unified framework that decouples parameter reasoning from geometric
    construction through a Plan-Then-Construct paradigm. Our method first produces
    a structured design plan with explicit metric scale parameters. These parameters
    are organized into a dictionary and directly referenced during sequence generation
    via a pointer mechanism, eliminating discretization errors and ensuring dimensionally
    consistent execution. In addition, we construct a new large-scale dataset with
    plan-level annotation and introduce three hierarchical geometry accuracy metrics
    to evaluate parametric fidelity at the vertex, edge, and face levels. Extensive
    experiments demonstrate that Pointer-CAD v2 consistently outperforms existing
    baselines and achieves substantial improvements in geometric accuracy, enabling
    reliable CAD generation for precision-critical engineering applications.

  related_work_outline:
  - 'Mainstream direction: Building comprehensive benchmarks and generative models
    for CAD program synthesis, shifting from geometric reconstruction to engineering-validated,
    multi-modal, and interactive design.'
  - 'Shared research pattern: All works propose or evaluate methods that produce editable
    parametric CAD representations (B-Rep, CadQuery scripts, STEP) from high-level
    inputs, and they emphasize metrics beyond visual similarity such as executability,
    manufacturability, and design-intent alignment.'
  - 'Key differences: Evaluation targets diverge—some focus on geometric fidelity
    under ideal inputs, others on robustness to ambiguous prompts, and still others
    on downstream engineering criteria like FEA pass rates or assemblability. Output
    modalities and supervision signals also vary (point clouds, text, images; self-supervised,
    fine-tuned, RL-tuned).'
  - 'Trend evolution: Within the 2026 frontier, the field is moving from single-modality
    mesh-to-CAD reconstruction toward multi-modal, agentic, and feedback-driven generation
    that incorporates physical simulation and proactive clarification, with benchmarks
    growing in industrial realism.'
  - 'Open questions: How to unify geometric, syntactic, and engineering-quality metrics
    without overfitting to specific benchmarks; whether feedback loops (FEA, VLM judges)
    reliably predict real-world manufacturability; and how to generalize across unseen
    part families and complex assemblies.'
  related_work_outline_zh:
  - 主流方向：构建面向CAD程序合成的全面基准与生成模型，从几何重建转向工程验证、多模态和交互式设计。
  - 研究共性：所有工作均提出或评估从高层输入生成可编辑参数化CAD表示（B-Rep、CadQuery脚本、STEP）的方法，并强调超越视觉相似性的指标，如可执行性、可制造性和设计意图对齐。
  - 关键差异：评测目标分化——有的侧重理想输入下的几何保真度，有的侧重模糊提示的鲁棒性，还有的侧重下游工程标准（如FEA通过率或可装配性）。输出模态和监督信号也各不相同（点云、文本、图像；自监督、微调、强化学习调优）。
  - 趋势演进：在2026年这一前沿窗口内，领域正从单模态网格到CAD重建转向多模态、智能体驱动和反馈驱动的生成，融入物理仿真和主动澄清，基准测试的工业真实性日益增强。
  - 开放问题：如何在不陷入特定基准过拟合的前提下统一几何、语法和工程质量指标；反馈回路（FEA、VLM评判器）能否可靠预测真实可制造性；以及如何泛化到未见零件族和复杂装配体。
  literature_review:
    line_of_work_matrix:
    - line: Multi-modal CAD generation benchmarks and evaluation frameworks
      what_it_solves: Provides standardized testbeds to assess CAD generation models
        across input modalities (text, image, mesh, point cloud) and engineering constraints
        (executability, manufacturability, assemblability).
      what_remains_open: Generalization to unseen part families, alignment of proxy
        metrics with real-world engineering sign-off, and coverage of complex multi-part
        assemblies with physical validity.
    - line: Language-model-driven CAD program synthesis
      what_it_solves: Enables direct generation of executable CAD scripts (CadQuery,
        STEP) from natural language descriptions, lowering the barrier for design
        authoring and supporting iterative code editing.
      what_remains_open: Robustness to ambiguous or underspecified prompts, faithful
        reproduction of complex operations (sweeps, lofts) beyond simple extrude patterns,
        and compliance with industrial drafting standards.
    - line: Differentiable representations and self-supervised learning for CAD generation
      what_it_solves: Trains editable B-Rep generators from unannotated 3D data (point
        clouds) by using differentiable parametric surfaces, reducing dependence on
        costly CAD-specific annotations.
      what_remains_open: Support for complex topologies and multi-body assemblies,
        controllability of the generated parametric structure, and verification that
        the learned representations preserve design intent.
    - line: Interactive and feedback-driven CAD generation
      what_it_solves: Improves generation quality and engineering validity by incorporating
        proactive clarification dialogues or physics-based simulation feedback (FEA)
        into the generation loop.
      what_remains_open: Reliability and coverage of feedback signals (e.g., FEA pass
        rates remain near zero in first attempts), trade-off between interaction overhead
        and generation efficiency, and scalability to diverse engineering domains.
    consensus:
    - CAD generation must be evaluated beyond geometric similarity; executability,
      parametric editability, and engineering constraint satisfaction are essential.
    - Benchmarks play a critical role in driving progress, and recent efforts converge
      on multi-task, multi-modal, and industry-inspired evaluation protocols.
    - Large language models and deep generative models show promise for CAD synthesis,
      but current systems still exhibit significant failure modes on complex geometry
      and fine-grained engineering requirements.
    - Moving from mesh or point-cloud reconstruction to native CAD formats (B-Rep,
      feature trees, scripts) is a shared goal across methods.
    disagreements:
    - 'Evaluation emphasis: some works prioritize geometric fidelity under clean inputs,
      while others stress robustness to ambiguous prompts or downstream criteria like
      FEA validation and assemblability.'
    - 'Output representation: methods diverge between generating explicit B-Rep surfaces,
      parametric CAD command sequences, or executable code in a specific scripting
      language (CadQuery vs. STEP).'
    - 'Supervision and feedback: approaches range from self-supervised pretraining
      on unlabeled 3D data, to supervised fine-tuning on curated CAD-text pairs, to
      reinforcement learning with simulation-based rewards or VLM judges.'
    - 'Interaction paradigm: one line advocates proactive clarification before generation,
      while others assume a single-shot generation setting or iterative refinement
      guided by external tools.'
    open_questions:
    - Can a unified evaluation framework simultaneously capture geometric accuracy,
      code correctness, and engineering validity without overfitting to specific benchmark
      families?
    - How can models generalize to unseen part families and complex assemblies, given
      that even fine-tuned models show limited out-of-distribution performance?
    - What is the most effective way to integrate physical simulation feedback (e.g.,
      FEA) into the generation loop so that it reliably improves pass rates and design
      compliance?
    - How should the trade-off between proactive user interaction and autonomous generation
      be balanced for real-world design workflows?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD生成基准与评估框架
      解决的问题: 提供标准化测试平台，评估CAD生成模型在不同输入模态（文本、图像、网格、点云）和工程约束（可执行性、可制造性、可装配性）下的表现。
      尚未覆盖: 对未见零件族的泛化、代理指标与真实工程验收的对齐，以及包含物理有效性的复杂多部件装配体覆盖。
    - 路线: 基于语言模型的CAD程序合成
      解决的问题: 从自然语言描述直接生成可执行CAD脚本（CadQuery、STEP），降低设计创作门槛，并支持迭代式代码编辑。
      尚未覆盖: 对模糊或欠指定提示的鲁棒性，对扫掠、放样等复杂操作的忠实复现（超越简单拉伸），以及与工业制图标准的合规性。
    - 路线: 可微分表示与自监督学习用于CAD生成
      解决的问题: 利用可微分参数曲面从无标注3D数据（点云）训练可编辑B-Rep生成器，减少对昂贵CAD特定标注的依赖。
      尚未覆盖: 对复杂拓扑和多体装配体的支持，生成参数化结构的可控性，以及所学表示是否保留设计意图的验证。
    - 路线: 交互式与反馈驱动的CAD生成
      解决的问题: 通过在生成循环中引入主动澄清对话或基于物理的仿真反馈（FEA），提高生成质量和工程有效性。
      尚未覆盖: 反馈信号的可靠性与覆盖范围（如首次FEA通过率接近零），交互开销与生成效率的权衡，以及向多样化工程领域的可扩展性。
    共识:
    - CAD生成必须超越几何相似度进行评估；可执行性、参数化可编辑性和工程约束满足至关重要。
    - 基准测试在推动进展中起关键作用，近期工作趋向于多任务、多模态和受工业启发的评估协议。
    - 大语言模型和深度生成模型在CAD合成中展现出潜力，但当前系统在复杂几何和细粒度工程需求上仍存在显著失败模式。
    - 从网格或点云重建转向原生CAD格式（B-Rep、特征树、脚本）是各方法的共同目标。
    分歧:
    - 评估侧重点：部分工作优先考虑干净输入下的几何保真度，而其他工作强调对模糊提示的鲁棒性或下游标准（如FEA验证和可装配性）。
    - 输出表示：方法在生成显式B-Rep曲面、参数化CAD命令序列或特定脚本语言（CadQuery vs. STEP）的可执行代码之间存在分歧。
    - 监督与反馈：方法涵盖在无标签3D数据上的自监督预训练、在精选CAD-文本对上的监督微调，以及使用基于仿真的奖励或VLM评判器的强化学习。
    - 交互范式：一条路线主张生成前主动澄清，而其他路线假设单次生成设置或由外部工具引导的迭代优化。
    开放问题:
    - 能否设计一个统一的评估框架，同时捕捉几何精度、代码正确性和工程有效性，而不对特定基准家族过拟合？
    - 鉴于即使微调后的模型在分布外性能也有限，模型如何泛化到未见零件族和复杂装配体？
    - 将物理仿真反馈（如FEA）集成到生成循环中最有效的方式是什么，以可靠提高通过率和设计合规性？
    - 在实际设计工作流中，应如何平衡主动用户交互与自主生成之间的权衡？

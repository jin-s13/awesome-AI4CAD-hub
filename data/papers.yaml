    - 涵盖大多数CAD操作的数据集，用于评估CAD模型生成
    methodology: Query2CAD使用大型语言模型（GPT-4 Turbo）从自然语言查询生成可执行CAD宏。该框架包含自我精炼循环，其中LLM根据BLIP2模型的反馈精炼其输出，并通过人在回路干预解决假阴性问题。评估在一个新开发的CAD操作数据集上进行，测量首次尝试和迭代精炼后的成功率。
    key_results: 使用GPT-4 Turbo时，框架首次尝试成功率为53.6%，经过精炼后提高了23.1%；最大提升出现在第一次精炼迭代，后续迭代的改进可忽略不计。
    limitations:

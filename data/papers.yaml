  title_cn: 稀疏多物体渲染与比较
  abstract_cn: 从单张图像重建静态物体的3D形状和姿态是机器人、增强现实和数字内容创作等多个行业的基本任务。这可以通过直接预测各种表示形式的3D形状，或从数据库中检索CAD模型并预测其对齐来实现。直接预测3D形状通常会产生不真实、过度平滑或网格化的形状。检索CAD模型可确保形状真实，但需要稳健且精确的对齐。从图像特征直接学习预测CAD模型姿态具有挑战性且不准确。诸如ROCA之类的方法通过预测归一化物体坐标来计算姿态，这可以更精确，但容易发生系统性失败。SPARC证明了采用“渲染与比较”方法（网络迭代改进自身预测）可以实现精确对齐。然而，它对图像中检测到的每个物体单独进行CAD对齐。当应用于多个物体时，这种方法速度较慢，因为时间复杂度随物体数量线性增加，并且无法学习物体间关系。我们引入了一种新的网络架构Multi-SPARC，学习对多个检测到的物体联合执行CAD模型对齐。与其他单视图方法相比，我们在具有挑战性的真实世界数据集ScanNet上实现了最先进的性能。通过将实例对齐精度从31.8%提高到40.3%，我们的表现与最先进的多视图方法相当。

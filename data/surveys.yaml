        missed or misinterpreted.
    - line: Mesh-to-CAD reconstruction via optimization
      what_it_solves: Recovering parametric CAD construction sequences from discrete
        3D data with high volumetric accuracy by incrementally fitting and validating
        operations.
      what_remains_open: Robustness to noisy or incomplete meshes and support for

      generate multi-part STEP files from engineering briefs, then validate outputs
      using FEA. Two additional feedback tools—a text blueprint schema and a 21-view
      image renderer—are introduced to guide iterative refinement. Evaluation is performed
      on S2O and Fusion360 datasets using Box-IoU and requirement satisfaction metrics.

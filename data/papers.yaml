  title_cn: 基于学习型ICP的场景重组
  abstract_cn: 通过移动深度传感器在房间内扫描，我们计算环境的3D CAD模型，捕捉房间形状及椅子、桌子、沙发、桌子等物体。不同于重建几何，我们将场景中的每个物体与数千个CAD模型进行匹配、放置和对齐。除了全自动系统外，关键技术贡献是一种基于深度强化学习的CAD模型与3D扫描对齐新方法，称为基于学习的ICP（LICP）。该方法通过学习最佳匹配点并基于物体视角进行条件化，优于文献中先前的ICP方法。LICP仅使用合成数据进行训练，无需真实场景扫描中的物体姿态或关键点对匹配的真实标注。尽管LICP在合成数据上训练且无3D真实场景标注，但在真实场景中优于学习型局部深度特征匹配和基于几何的对齐方法。该方法在SceneNN和ScanNet的真实场景数据集以及SUNCG的合成场景上进行了评估，在多种真实世界场景中展示了高质量结果，对杂乱、视角和遮挡具有鲁棒性。

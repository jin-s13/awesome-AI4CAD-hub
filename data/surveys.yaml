  related_work_outline_zh:
  - 主流方向：构建端到端的AI驱动CAD流水线，从多模态输入生成可编辑的程序化CAD表示（如B-Rep脚本、CadQuery），并借助统一基准进行一致评估。
  - 研究共性：所有系统将原始感知输入（文本、图像、网格、点云）转换为参数化CAD命令或序列，并通过几何保真度、可执行性及日益工程化的指标进行评估。
  - 关键差异：表示方式不同（CadQuery脚本 vs. B-Rep基元 vs. 参数曲面）；交互模式分为单次生成与基于主动智能体的澄清；评测目标从纯几何精度扩展到可制造性与设计意图对齐。
  - 趋势演进：前沿正围绕统一多模态模型和全面基准整合，从孤立的任务特定模型走向交互式、多任务系统，处理真实世界的模糊性和工程约束。
  - 开放问题：这些系统在真实工程工作流中的泛化能力如何？在输入噪声和模态转换下能否保持鲁棒性？如何超越几何相似性真正对齐用户设计意图？交互式澄清如何扩展而不增加过多用户负担？
  literature_review:
    line_of_work_matrix:
    - line: Unified multimodal benchmarks and evaluation platforms
      what_it_solves: Providing consistent, multi-faceted evaluation of CAD generation
        systems across geometric fidelity, executability, and downstream engineering
        criteria such as manufacturability and assemblability.
      what_remains_open: Generalization to real-world engineering workflows, sensitivity
        to domain shift and modality variations, and alignment of proxy metrics with
        actual design utility and user satisfaction.
    - line: End-to-end generative pipelines for editable CAD programs
      what_it_solves: Transforming heterogeneous inputs (text, images, meshes, point
        clouds, sketches) into editable parametric CAD sequences or B-Rep programs,
        enabling reuse, editing, and downstream engineering tasks.
      what_remains_open: Robustness to ambiguous or noisy inputs, handling of complex
        assemblies and inter-part constraints, fidelity-speed trade-offs in deployment,
        and dependence on curated training datasets.
    - line: Interactive agent-based CAD synthesis
      what_it_solves: Resolving specification ambiguity and improving generation quality
        through proactive clarification and multi-step agent workflows, reducing failure
        rates from vague user prompts.
      what_remains_open: Scalability of interaction, cognitive load on users, integration
        with standard CAD interfaces and version control, and verification that clarification
        improves real engineering outcomes.
    consensus:
    - All systems target editable CAD representations (programmatic sequences or B-Reps)
      rather than fixed meshes, prioritizing parametric editability and reuse.
    - Geometric fidelity metrics (Chamfer distance, IoU) and program validity (executability,
      invalid ratio) are universally adopted as primary evaluation criteria.
    - Recent work emphasizes standardized benchmarks with multiple input modalities
      and tasks to enable fair comparison and highlight complementary strengths.
    - End-to-end pipelines are favored over isolated components, integrating encoding,
      generation, and sometimes validation or post-processing steps.
    disagreements:
    - 'Representation format: some systems output CadQuery scripts, others use B-Rep
      primitive sequences or parametric Bézier surfaces, affecting editability and
      downstream compatibility.'
    - 'Supervision signal: approaches range from supervised fine-tuning on paired
      text/script or image/sequence datasets, to reinforcement learning from geometric
      rewards, to point-level supervision without CAD annotations.'
    - 'Interaction mode: most systems are single-pass generators, while one line introduces
      proactive agent-based clarification before generation, trading off latency for
      robustness.'
    - 'Evaluation targets: while geometric accuracy is common, some benchmarks extend
      to manufacturability, functionality, and assemblability, while others remain
      focused on reconstruction fidelity and compactness.'
    open_questions:
    - Can generated CAD programs be reliably executed and edited in real CAD software,
      and how should verification be integrated into the pipeline?
    - How do current systems perform under real-world input noise, partial observations,
      and domain shifts that are common in practical engineering environments?
    - What metrics or evaluation protocols can capture design intent alignment beyond
      geometric similarity, and are VLMs reliable judges for engineering criteria?
    - How can interactive clarification be made efficient enough for production use,
      and what is the optimal balance between automation and user involvement?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 统一多模态基准与评估平台
      解决的问题: 为CAD生成系统提供一致、多方面的评估，涵盖几何保真度、可执行性以及可制造性、可装配性等下游工程标准。
      尚未覆盖: 向真实工程工作流的泛化能力，对领域偏移和模态变化的敏感性，以及代理指标与实际设计效用和用户满意度的一致性。
    - 路线: 可编辑CAD程序的端到端生成流水线
      解决的问题: 将异构输入（文本、图像、网格、点云、草图）转换为可编辑的参数化CAD序列或B-Rep程序，支持重用、编辑和下游工程任务。
      尚未覆盖: 对模糊或噪声输入的鲁棒性，复杂装配体和零件间约束的处理，部署中的保真度-速度权衡，以及对精心策划训练数据集的依赖。
    - 路线: 基于交互式智能体的CAD合成
      解决的问题: 通过主动澄清和多步智能体工作流解决规格模糊性，提高生成质量，降低因模糊用户提示导致的失败率。
      尚未覆盖: 交互的可扩展性，用户的认知负荷，与标准CAD界面和版本控制的集成，以及澄清是否真正改善实际工程结果的验证。
    共识:
    - 所有系统都面向可编辑的CAD表示（程序化序列或B-Rep），而非固定网格，优先考虑参数化可编辑性和重用性。
    - 几何保真度指标（Chamfer距离、IoU）和程序有效性（可执行性、无效比率）被普遍采用作为主要评估标准。
    - 近期工作强调具有多种输入模态和任务的标准基准，以实现公平比较并突出互补优势。
    - 端到端流水线优于孤立组件，集成编码、生成，有时还包括验证或后处理步骤。
    分歧:
    - 表示格式：有些系统输出CadQuery脚本，有些使用B-Rep基元序列或参数化贝塞尔曲面，影响可编辑性和下游兼容性。
    - 监督信号：方法从基于配对文本/脚本或图像/序列数据集的监督微调，到基于几何奖励的强化学习，再到无CAD标注的点级监督。
    - 交互模式：大多数系统是单次生成器，而一条路线引入生成前的主动智能体澄清，以延迟换取鲁棒性。
    - 评测目标：虽然几何精度是共同的，但一些基准扩展到可制造性、功能性和可装配性，而其他基准仍专注于重建保真度和紧凑性。
    开放问题:
    - 生成的CAD程序能否在真实CAD软件中可靠执行和编辑，应如何将验证集成到流水线中？
    - 当前系统在实际工程环境中常见的真实噪声、部分观测和领域偏移下表现如何？
    - 哪些指标或评估协议能捕捉超越几何相似性的设计意图对齐，视觉语言模型是否是工程标准的可靠评判员？
    - 如何使交互式澄清足够高效以用于生产，以及自动化与用户参与之间的最佳平衡是什么？

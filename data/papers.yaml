  title_cn: 从设计流程学习生成CAD程序用于数据增强
  abstract_cn: 大型语言模型（LLMs）在广泛的代码生成任务中展现了令人印象深刻的能力。然而，为某些领域生成代码仍然具有挑战性。计算机辅助设计（CAD）程序就是这样一个领域，其目标是生成定义对象几何形状的脚本化参数化模型，用于精确设计和制造应用。基于LLM的CAD程序生成面临的一个关键挑战是，生成的形状几何复杂度有限，远不及实际工业设计中的形状。这一不足部分源于可用CAD程序训练数据的多样性缺乏。为解决这一问题，我们提出了一种新颖的数据增强范式，该范式提示LLM基于参考曲面程序和建模流程生成CAD程序——这一想法受工业设计实践的启发。通过使用一组有机形状变化参考曲面，我们的方法丰富了生成CAD模型的几何分布。特别是，它引入了由基于样条的曲率定义的边和面，这些在现有的开源CAD程序数据集中通常缺失或代表性不足。实验表明，我们的方法生成的CAD样本具有显著更高的几何多样性，并且在有机形状基元的比例上更接近工业级CAD设计。这一增强使得我们的CAD数据增强方法成为训练LLM及其他深度学习模型进行CAD生成的有用工具。
  tldr_cn: 提出利用LLM基于参考曲面和建模流程生成CAD程序的数据增强方法，提升几何多样性。

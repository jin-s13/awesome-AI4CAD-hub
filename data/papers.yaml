  title_cn: STEP-LLM：利用大型语言模型从自然语言生成CAD STEP模型
  abstract_cn: 计算机辅助设计（CAD）对现代制造业至关重要，但模型创建仍然劳动密集且需要专业知识。为使非专家能够将直观的设计意图转化为可制造的工件，近期基于大型语言模型的文本到CAD工作主要关注命令序列或基于脚本的格式（如CadQuery）。然而，这些格式依赖于内核，缺乏制造领域的通用性。相比之下，产品数据交换标准（STEP，ISO
    10303）文件是一种广泛采用的、中性的边界表示（B-rep）格式，可直接兼容制造，但其图结构、交叉引用的特性给自回归语言模型带来了独特挑战。为解决这一问题，我们整理了一个包含约4万个STEP-描述对的数据集，并针对STEP的图结构格式引入了新颖的预处理方法，包括基于深度优先搜索的重新序列化，在保持局部性的同时线性化交叉引用，以及链式思维（CoT）风格的结构化注释以引导全局一致性。我们集成了检索增强生成，将预测基于相关示例进行监督微调，并通过强化学习结合基于倒角距离的几何奖励来优化生成质量。实验表明，我们的STEP-LLM在几何保真度上相较于Text2CAD基线持续提升，这些改进源于我们框架的多个阶段：RAG模块显著增强了完整性和可渲染性，基于DFS的重新序列化提高了整体准确性，而强化学习进一步减少了几何差异。指标和视觉比较均证实STEP-LLM生成的形状比Text2CAD具有更高的保真度。这些结果展示了从自然语言驱动STEP模型生成的可行性，显示了其在制造领域民主化CAD设计的潜力。

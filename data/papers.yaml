    - 联合识别目标CAD操作并对输入草图进行分割的深度神经网络
    - 通过将CAD操作序列渲染为线条图来生成合成训练数据
    - 基于优化的参数估计方法，从分割后的草图笔画中估计操作参数以完成CAD操作
    methodology: 该系统接收用户的草图以及先前步骤中的部分CAD模型，将其输入深度神经网络，该网络预测CAD操作并对草图笔画进行分割，随后通过优化估计最匹配分割笔画的操作参数。训练依赖于渲染为线条图的合成CAD操作序列。
    key_results: 在用户研究中，参与者使用概念验证系统快速建模了大量多样化的物体，证明了Sketch2CAD作为CAD建模的一种可行替代交互方法。
    limitations:
    - 概念验证仅支持四种CAD操作

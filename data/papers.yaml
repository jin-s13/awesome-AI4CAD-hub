  title: Graph Representation of 3D CAD Models for Machining Feature Recognition With
    Deep Learning
  authors:
  - Weijuan Cao
  - T. Robinson
  - Yang Hua
  - F. Boussuge
  - Andrew R. Colligan
  - Wanbin Pan
  abstract: "\n In this paper, the application of deep learning methods to the task\
    \ of machining feature recognition in CAD models is studied. Four contributions\
    \ are made:\n 1. An automatic method to generate large datasets of 3D CAD models\
    \ is proposed, where each model contains multiple machining features with face\
    \ labels.\n 2. A concise and informative graph representation for 3D CAD models\
    \ is presented. This is shown to be applicable to graph neural networks.\n 3.\
    \ The graph representation is compared with voxels on their performance of training\
    \ deep neural networks to segment 3D CAD models.\n 4. Experiments are also conducted\
    \ to evaluate the effectiveness of graph-based deep learning for interacting feature\
    \ recognition.\n Results show that the proposed graph representation is a more\
    \ efficient representation of 3D CAD models than voxels for deep learning. It\
    \ is also shown that graph neural networks can be used to recognize individual\
    \ features on the model and also identify complex interacting features."

  related_work_outline:
  - 'Mainstream direction: Reconstructing structured CAD models (buildings, roofs,
    mechanical parts) from raw 3D data such as point clouds or RGB-D scans, with a
    growing emphasis on generating editable parametric representations rather than
    just meshes.'
  - 'Shared research pattern: Learning a mapping from unstructured 3D observations
    to a structured, often parametric, CAD representation using deep neural networks,
    evaluated on geometric accuracy and editability.'
  - 'Key differences: Target representation varies widely—polyhedra, extrusion cylinders,
    implicit fields, roof graphs, or G-code—leading to different inductive biases
    and output usability for downstream CAD tasks.'
  - 'Trend evolution: Early work (2020–2021) focused on specific subproblems like
    roof geometry or object alignment; recent work (2024–2026) tackles end-to-end
    reconstruction of complex buildings and direct generation of CAD code or manufacturing
    instructions.'
  - 'Open questions: Whether learned reconstructions meet professional CAD tolerances,
    how to handle incomplete or noisy real-world scans, and the lack of standardized
    benchmarks across different CAD domains.'
  related_work_outline_zh:
  - 主流方向：从点云或RGB-D扫描等原始三维数据重建结构化CAD模型（建筑、屋顶、机械零件），并越来越强调生成可编辑的参数化表示而非仅网格。
  - 研究共性：利用深度神经网络学习从非结构化三维观测到结构化（常为参数化）CAD表示的映射，并以几何精度和可编辑性作为评测指标。
  - 关键差异：目标表示形式多样——多面体、拉伸柱体、隐式场、屋顶图或G代码——导致不同的归纳偏置和下游CAD任务的可用性差异。
  - 趋势演进：早期工作（2020–2021）聚焦于屋顶几何或物体对齐等特定子问题；近期工作（2024–2026）处理复杂建筑的端到端重建以及直接生成CAD代码或制造指令。
  - 开放问题：学习重建能否满足专业CAD公差、如何处理不完整或含噪的真实扫描，以及不同CAD领域缺乏标准化基准。
  literature_review:
    line_of_work_matrix:
    - line: Point cloud to parametric CAD reconstruction
      what_it_solves: Recovering editable CAD models (polyhedra, extrusion cylinders,
        CAD code) from unstructured point clouds, enabling downstream editing and
        manufacturing.
      what_remains_open: Robustness to real-world scanning noise and occlusions; generalization
        across object categories without per-category priors; verification that reconstructed
        models meet engineering tolerances.
    - line: Building and roof structure modeling from 3D scans
      what_it_solves: Reconstructing compact, semantically meaningful building models
        and roof geometries from point clouds or images, often using deep implicit
        fields or graph-based generative models.
      what_remains_open: Handling highly irregular architectural styles; integrating
        interior structure; evaluation beyond geometric error to include structural
        validity and code compliance.
    - line: Generative CAD and manufacturing data synthesis
      what_it_solves: Generating realistic CAD geometry (e.g., roofs) or manufacturing
        datasets (e.g., 3D printing slices) to augment training data or automate design
        exploration.
      what_remains_open: Ensuring generated designs are physically manufacturable;
        bridging the gap between synthetic training data and real-world fabrication
        outcomes; limited diversity in existing datasets.
    consensus:
    - Deep learning can effectively map raw 3D data to structured CAD representations,
      outperforming classical geometric fitting when sufficient training data is available.
    - Parametric or graph-based representations are preferred over dense meshes because
      they preserve editability and compactness for downstream CAD workflows.
    - Supervised learning dominates, requiring paired datasets of point clouds/scans
      and ground-truth CAD models, which are expensive to create and domain-specific.
    disagreements:
    - 'Choice of output representation: some works predict polyhedral meshes, others
      use implicit fields, extrusion primitives, or directly generate CAD scripting
      code, each trading off generality against editability.'
    - 'Evaluation protocols differ: geometric Chamfer distance vs. parametric accuracy
      vs. visual plausibility, with no agreed-upon metric that captures CAD usability.'
    - 'Scope of application: some focus on single object reverse engineering, others
      on full building-scale reconstruction, making direct comparison difficult.'
    open_questions:
    - Can current methods generalize to real-world, noisy, incomplete scans without
      extensive per-scene tuning?
    - How should we benchmark CAD reconstruction quality beyond geometric error—e.g.,
      by measuring downstream task success in CAM or CAE?
    - What level of supervision is necessary, and can self-supervised or synthetic
      data reduce the reliance on expensive paired CAD datasets?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 点云到参数化CAD重建
      解决的问题: 从非结构化点云中恢复可编辑的CAD模型（多面体、拉伸柱体、CAD代码），支持下游编辑与制造。
      尚未覆盖: 对真实扫描噪声和遮挡的鲁棒性；跨物体类别的泛化而不依赖类别先验；验证重建模型是否满足工程公差。
    - 路线: 从三维扫描进行建筑与屋顶结构建模
      解决的问题: 从点云或图像重建紧凑且语义有意义的建筑模型和屋顶几何，常使用深度隐式场或基于图的生成模型。
      尚未覆盖: 处理高度不规则的建筑风格；整合内部结构；超越几何误差的评估，包括结构有效性和规范合规性。
    - 路线: 生成式CAD与制造数据合成
      解决的问题: 生成逼真的CAD几何（如屋顶）或制造数据集（如3D打印切片），以扩充训练数据或自动化设计探索。
      尚未覆盖: 确保生成的设计可物理制造；弥合合成训练数据与真实制造结果之间的差距；现有数据集的多样性有限。
    共识:
    - 深度学习能有效将原始三维数据映射到结构化CAD表示，在有足够训练数据时优于经典几何拟合方法。
    - 参数化或基于图的表示优于稠密网格，因为它们为下游CAD工作流保留了可编辑性和紧凑性。
    - 监督学习占主导地位，需要成对的点云/扫描与真实CAD模型数据集，这类数据集创建成本高且领域特定。
    分歧:
    - 输出表示的选择：有的工作预测多面体网格，有的使用隐式场、拉伸基元或直接生成CAD脚本代码，在通用性与可编辑性之间各有取舍。
    - 评测协议不同：几何Chamfer距离、参数精度、视觉合理性等，缺乏公认的能捕捉CAD可用性的指标。
    - 应用范围：有的聚焦单物体逆向工程，有的处理全建筑规模重建，难以直接比较。
    开放问题:
    - 当前方法能否在无需大量逐场景调优的情况下泛化到真实、含噪、不完整的扫描？
    - 如何超越几何误差来基准化CAD重建质量——例如通过测量CAM或CAE中的下游任务成功率？
    - 需要何种程度的监督？自监督或合成数据能否减少对昂贵成对CAD数据集的依赖？

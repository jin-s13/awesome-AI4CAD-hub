  abstract_cn: 尽管近期取得了进展，但从几何输入（如网格或点云）恢复参数化CAD构建序列仍是设计和制造领域的关键挑战，因为现有的CAD重建与生成方法大多局限于难以编辑的格式（如网格或B-rep）或可编辑的简单草图-拉伸流水线及低复杂度数据集。我们提出CADFit，一种基于混合优化的CAD重建框架，通过利用几何反馈逐步拟合和验证参数化操作，从网格中恢复复杂、可编辑的CAD构建序列。该方法的特点是将重建问题形式化为结构化CAD程序上的IoU驱动优化，并支持丰富的操作集，包括拉伸、旋转、倒圆角和倒角。在多个CAD基准上的实验表明，CADFit在体积交并比和倒角距离上优于最先进的网格到CAD方法，同时显著降低了重建CAD程序的无效比率，尤其对于复杂设计。我们还提出了一种多模态流水线，通过将基于图像的几何重建与CADFit结合，实现从图像到CAD构建序列的端到端重建。通过实现高复杂度CAD模型的精确重建，CADFit为生成更丰富的数据集和推进未来基于学习的CAD逆向工程方法提供了实用基础。代码地址：https://github.com/ghadinehme/CADFit。

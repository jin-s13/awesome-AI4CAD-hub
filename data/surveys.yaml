    consensus:
    - The main body of work is organized around Method representation and objective
      design, Method evidence and ablation protocol, Planning and action-interface
      methods, with a shared goal to turn world-model ideas into concrete architectures,
      objectives, planners, and training recipes.
    - A common pattern is to propose a modeling choice, isolate it with ablations
      or baselines, and test whether it changes downstream behavior, rather than treating
      paper titles or tags as the unit of comparison.
    disagreements:
    - The substantive split is between representation/objective choices, planning
      interfaces, and evidence protocols; those choices change the input-output contract,
      evidence standard, and failure modes.
    - The unresolved boundary is which algorithmic choices transfer beyond the reported
      task family and objective design; another recurring gap is whether evidence
      isolates the proposed method rather than surrounding system choices.
    open_questions:
    - Which representation choices remain useful when the downstream task, controller,
      or data distribution changes?
    - Do current evaluation protocols measure decision utility directly, or mostly
      proxy quality signals?
    trend_evolution: Across 2003-2026, the topic moves from isolated modeling claims
      toward work that ties turn world-model ideas into concrete architectures, objectives,
      planners, and training recipes to stronger evidence and clearer boundaries.

- id: brepclip-contrastive-multimodal-pretraining-on-brep-primiti-2026
  title: 'BRepCLIP: Contrastive Multimodal Pretraining on BRep Primitives for CAD
    Understanding'
  authors:
  - Muhammad Usama
  - Didier Stricker
  - Mohammad Sadil Khan
  - Muhammad Zeshan Afzal
  abstract: Learning representations of CAD models is a largely open problem. While
    3D representation learning has flourished around point clouds and meshes, the
    native format of CAD - boundary representations BReps, which encodes exact parametric
    surfaces, curves, and their topology, has received little attention as a representation
    learning substrate. We introduce BRepCLIP, the first framework to align BRep geometry
    with language and image embeddings through contrastive pretraining. We model each
    CAD object as a sequence of face and edge tokens with separate discrete vocabularies
    for surface and curve geometry, augmented with spatial and semantic descriptors
    that capture surface types (e.g., cylindrical, torus, NURBS) and curve primitives
    (e.g., line, arc, B-spline). A transformer encoder aggregates these tokens into
    a global BRep embedding, aligned with CLIP's text and image encoders via a joint
    contrastive objective. BRepCLIP generates more discriminative and semantically
    grounded embeddings than existing point-based alternatives, improving Top-1 retrieval
    over OpenShape by 40.4%, 22.0%, and 23.9% on ABC, CADParser, and Automate, respectively,
    and improving zero-shot classification on FabWave by 15% in Top-1 score. We further
    demonstrate its utility as a CAD-aware similarity metric for evaluating text and
    image-conditioned CAD generation, establishing the importance of structure-aware
    pretraining for multimodal CAD understanding. Project page is available at https://muhammadusama100.github.io/BrepClip2026/

    title_zh: Masked BRep Autoencoder via Hierarchical Graph Transformer
  year: 2026
  preview: /assets/papers/masked-brep-autoencoder-via-hierarchical-graph-transformer-2026/teaser.png
  description_zh: 我们提出了一种新颖的自监督学习框架，能够自动从输入的计算机辅助设计（CAD）模型中学习表示，用于下游任务，包括零件分类、建模分割和加工特征识别。为了训练我们的网络，我们构建了一个大规模、无标注的边界表示（BRep）模型数据集。我们算法的成功依赖于两个关键组件。第一个是掩码图自编码器，它通过重建BRep中随机掩码的几何和属性来进行表示学习，从而增强泛化能力。第二个是层次化图Transformer架构，通过跨尺度互注意力块优雅地融合全局和局部学习，以建模长程几何依赖关系，并通过图神经网络块聚合局部拓扑信息。在训练自编码器后，我们将其解码器替换为在少量标注数据上训练的任务特定网络，用于下游任务。我们在各种任务上进行了实验，即使使用少量标注数据也取得了高性能，证明了我们模型的实用性和泛化能力。与其他方法相比，我们的模型在相同训练数据量下，尤其是在训练数据非常有限时，在下游任务上表现显著更好。
  notes_zh: 派生自论文：Masked BRep Autoencoder via Hierarchical Graph Transformer
  name_zh: Masked BRep Autoencoder via Hierarchical Graph Transformer

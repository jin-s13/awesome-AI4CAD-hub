  - 开放问题：如何用统一指标评估拓扑有效性和几何复杂性；分解式流水线能否扩展到包含数千个零件的工业装配体；如何将生成模型集成到交互式CAD工作流中而不破坏设计意图。
  literature_review:
    line_of_work_matrix:
    - line: Structured CAD representation generation
      what_it_solves: Producing editable, manufacturing-ready CAD models (B-rep, mesh,
        CSG) from latent codes or conditions, addressing the gap between unstructured
        3D data and parametric CAD.
      what_remains_open: Scalability to complex topologies with many faces and high
        genus; integration of assembly constraints; and verification that generated
        models are watertight and machinable.
    - line: Hierarchical and factorized generation pipelines
      what_it_solves: Breaking CAD synthesis into stages (e.g., wireframe then surface,
        part decomposition then assembly) to improve topological validity and geometric
        detail.
      what_remains_open: Whether the factorization order biases the output distribution;
        how to handle inter-part dependencies in assemblies; and the lack of standardized
        benchmarks for multi-stage CAD generation.
    - line: Multimodal datasets and benchmarks for CAD learning
      what_it_solves: Providing paired data (video-CAD, G-code and 3D models, RGB
        and part hierarchies) to train models that understand design intent and manufacturing
        constraints.
      what_remains_open: Coverage of diverse CAD operations and failure modes; alignment
        of evaluation metrics with downstream engineering tasks; and long-term maintenance
        of dataset artifacts.
    - line: Reconstruction and parsing from raw sensor data
      what_it_solves: Converting point clouds or single images into structured CAD
        representations, enabling reverse engineering and as-built modeling.
      what_remains_open: Robustness to noise, occlusions, and varying scan densities;
        handling of non-planar and freeform surfaces; and the gap between reconstructed
        geometry and editable CAD features.
    consensus:
    - Factorizing generation into topology and geometry stages improves validity over
      end-to-end black-box approaches.
    - Learning-free geometric priors (e.g., boundary loops, extrusion constraints)
      are effective regularizers when combined with learned components.
    - Public datasets and code releases are critical for reproducibility, yet many
      methods still lack complete evaluation pipelines.
    - 'Evaluation metrics remain fragmented: papers report different measures (topological
      validity, geometric error, visual quality) without a unified protocol.'
    disagreements:
    - 'Representation: Some works target B-rep as the final output, others prefer
      mesh or CSG, leading to incompatible evaluation and downstream use cases.'
    - 'Supervision: Unsupervised part decomposition (e.g., from single RGB) vs. fully
      supervised reconstruction from point clouds; the former offers generality but
      lower accuracy, the latter requires expensive annotations.'
    - 'Interaction mode: VideoCAD learns from recorded UI interactions, while most
      generative models operate on static geometry; the role of human-in-the-loop
      design remains underexplored.'
    - 'Deployment setting: Methods designed for synthetic primitives (CSGNet) may
      not transfer to real-world CAD models with freeform surfaces and engineering
      constraints.'
    open_questions:
    - What benchmark can simultaneously measure topological correctness, geometric
      fidelity, and editability for generated CAD models?
    - How can factorized pipelines incorporate assembly-level constraints and inter-part
      relationships beyond single parts?
    - To what extent do current datasets (Slice-100K, VideoCAD) capture the long-tail
      of CAD operations and failure cases encountered in professional practice?
    - Can generative models be integrated into parametric CAD history trees rather
      than outputting static geometry, preserving design intent?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 结构化CAD表示生成
      解决的问题: 从潜码或条件生成可编辑、可制造的CAD模型（B-rep、网格、CSG），弥合非结构化3D数据与参数化CAD之间的鸿沟。
      尚未覆盖: 对具有多面和复杂亏格的拓扑的可扩展性；装配约束的集成；以及生成模型是否水密且可加工的验证。
    - 路线: 层次化与分解式生成流水线
      解决的问题: 将CAD合成分解为多个阶段（如先线框后曲面、先部件分解后装配），以提高拓扑有效性和几何细节。
      尚未覆盖: 分解顺序是否会使输出分布产生偏差；如何处理装配体中部件间的依赖关系；以及缺乏多阶段CAD生成的标准化基准。
    - 路线: 用于CAD学习的多模态数据集与基准
      解决的问题: 提供配对数据（视频-CAD、G代码与3D模型、RGB与部件层次结构），以训练理解设计意图和制造约束的模型。
      尚未覆盖: 多样化CAD操作和失败模式的覆盖范围；评估指标与下游工程任务的对齐；以及数据集工件的长期维护。
    - 路线: 从原始传感器数据重建与解析
      解决的问题: 将点云或单张图像转换为结构化CAD表示，实现逆向工程和竣工建模。
      尚未覆盖: 对噪声、遮挡和不同扫描密度的鲁棒性；非平面和自由曲面的处理；以及重建几何与可编辑CAD特征之间的差距。
    共识:
    - 将生成分解为拓扑和几何阶段比端到端黑盒方法更能提高有效性。
    - 无学习的几何先验（如边界环、拉伸约束）与学习组件结合时是有效的正则化手段。
    - 公开数据集和代码发布对可复现性至关重要，但许多方法仍缺乏完整的评估流水线。
    - 评估指标仍然碎片化：论文报告不同的度量（拓扑有效性、几何误差、视觉质量），缺乏统一协议。
    分歧:
    - 表示方式：一些工作以B-rep为最终输出，另一些偏好网格或CSG，导致评估和下游用例不兼容。
    - 监督信号：无监督部件分解（如从单张RGB）与从点云的全监督重建；前者通用性更强但精度较低，后者需要昂贵的标注。
    - 交互模式：VideoCAD从录制的UI交互中学习，而大多数生成模型在静态几何上操作；人在回路设计的作用仍未被充分探索。
    - 部署场景：为合成基元设计的方法（CSGNet）可能无法迁移到具有自由曲面和工程约束的真实CAD模型。
    开放问题:
    - 什么样的基准能同时衡量生成CAD模型的拓扑正确性、几何保真度和可编辑性？
    - 分解式流水线如何纳入装配级约束和部件间关系，而不仅限于单个零件？
    - 当前数据集（Slice-100K、VideoCAD）在多大程度上覆盖了专业实践中遇到的CAD操作长尾分布和失败案例？
    - 生成模型能否集成到参数化CAD历史树中，而非输出静态几何，从而保留设计意图？

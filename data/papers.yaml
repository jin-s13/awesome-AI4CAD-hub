    methodology: 本研究使用GPT-4和GPT-4V从文本或多模态输入（文本+图像）生成CAD程序。数据合成流水线创建机械部件（齿轮、弹簧）的CAD模型、草图和图像，并通过Amazon
      Mechanical Turk收集带尺寸信息的自然语言描述。性能通过语法正确性（Cap1）和交并比（IoU）测量的三维形状精度（Cap2）进行评估。
    key_results: GPT-4V在仅文本输入下平均在语法正确性和形状精度上均优于多模态输入，但在复杂几何形状（如弹簧和齿轮）的语法正确性上，多模态输入显示出更大的优势。
    limitations:
    - 多模态输入并非普遍提升性能；其优势取决于目标CAD几何的复杂度

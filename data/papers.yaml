    innovations:
    - 用于CAD代码生成的多模态思维链引导的强化学习后训练框架
    - 三种任务特定奖励：可执行性奖励、几何精度奖励和外部评估奖励
    - 三种稳定策略学习的优化策略：信任区域拉伸、精度令牌损失和过长过滤
    - ExeCAD数据集：包含16,540个真实世界CAD示例，配有自然语言、结构化描述、可执行CADQuery脚本和渲染3D模型
    methodology: CAD-RL结合了思维链冷启动与目标驱动的强化学习后训练，使用三种奖励（可执行性、几何精度、外部评估）。为处理稀疏和高方差奖励，引入了信任区域拉伸、精度令牌损失和过长过滤。ExeCAD数据集支持训练和基准测试。
    key_results: CAD-RL在推理质量、输出精度和代码可执行性方面相比现有视觉语言模型取得了显著提升。

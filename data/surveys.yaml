  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD programs from multimodal
    inputs (text, images, point clouds, meshes) using large language models, vision-language
    models, or specialized sequence models, with a strong emphasis on executability
    and geometric validity.'
  - 'Shared research pattern: Most works frame CAD generation as a sequence prediction
    or program synthesis problem, train on curated CAD datasets, and evaluate using
    geometric fidelity metrics (IoU, Chamfer distance) and program validity rates.'
  - 'Key differences: Methods diverge in the choice of intermediate representation
    (command sequences, B-Rep pointers, CadQuery scripts), the generation paradigm
    (autoregressive, GAN-based, evolutionary, RL post-training), and the primary input
    modality (mesh, image, text, or multimodal).'
  - 'Trend evolution: The topic has shifted from early parametric sequence modeling
    (2012–2020) to recent frontier models (2025–2026) that unify multiple tasks, incorporate
    execution feedback, and scale to industrial complexity, with a growing focus on
    evaluation benchmarks.'
  - 'Open questions: Whether improvements in program validity and geometric accuracy
    translate to real-world CAD workflows; how to handle complex editing operations
    and long-range dependencies without quantization errors; and the lack of standardized,
    executable test-based evaluation across diverse CAD domains.'
  related_work_outline_zh:
  - 主流方向：利用大语言模型、视觉语言模型或专用序列模型，从多模态输入（文本、图像、点云、网格）生成可编辑的参数化CAD程序，重点关注可执行性和几何有效性。
  - 研究共性：多数工作将CAD生成形式化为序列预测或程序合成问题，在精心整理的CAD数据集上训练，并使用几何保真度指标（IoU、倒角距离）和程序有效率进行评估。
  - 关键差异：方法在中间表示（命令序列、B-Rep指针、CadQuery脚本）、生成范式（自回归、GAN、演化、强化学习后训练）和主要输入模态（网格、图像、文本或多模态）上存在分歧。
  - 趋势演进：该主题从早期的参数化序列建模（2012–2020）转向近期的前沿模型（2025–2026），这些模型统一了多个任务，融合执行反馈，并扩展到工业级复杂度，同时越来越重视评估基准。
  - 开放问题：程序有效性和几何精度的提升能否迁移到真实CAD工作流；如何在不引入量化误差的情况下处理复杂编辑操作和长程依赖；以及缺乏跨不同CAD领域的标准化、可执行测试驱动的评估。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD program generation from 3D or 2D inputs
      what_it_solves: Recovering editable CAD construction sequences from meshes,
        point clouds, or images, enabling downstream editing and parametric variation.
      what_remains_open: Generalization to complex industrial parts with rich feature
        sets (fillets, chamfers, revolutions) and robustness to noisy or incomplete
        input geometry; most methods are evaluated on limited benchmarks without real-world
        deployment evidence.
    - line: Unified multimodal and multi-task CAD models
      what_it_solves: Handling heterogeneous CAD tasks (reconstruction, generation,
        question answering) across multiple input modalities within a single framework,
        reducing the need for task-specific architectures.
      what_remains_open: Scalability to very long sequences and diverse CAD formats;
        the unified benchmarks are new and lack community-wide adoption, making cross-model
        comparisons difficult.
    - line: Sequence modeling advances for long CAD programs
      what_it_solves: Generating longer, more complex parametric CAD sequences by
        leveraging state space models or pointer mechanisms to mitigate error accumulation
        and quantization issues.
      what_remains_open: Whether these architectural improvements consistently outperform
        autoregressive transformers across different datasets and CAD systems; evaluation
        is often limited to synthetic or simplified datasets.
    - line: Evolutionary and reinforcement learning approaches for CAD synthesis
      what_it_solves: Creating complex, realistic CAD programs by iteratively refining
        simple primitives through VLM-guided edits or RL-based post-training, improving
        executability and geometric accuracy.
      what_remains_open: High computational cost and reliance on reward design; the
        transferability of learned policies to unseen CAD primitives or entirely new
        design domains is not demonstrated.
    - line: Evaluation benchmarks and test-based metrics for CAD generation
      what_it_solves: Providing executable software tests to verify geometric and
        topological constraints of generated CAD models, moving beyond surface-level
        similarity metrics.
      what_remains_open: Coverage of the test suites is limited to specific constraint
        types; the benchmarks have not yet been adopted by the broader community,
        and their correlation with human judgment or engineering utility is unknown.
    consensus:
    - Editable parametric CAD programs are the preferred output format over static
      meshes or point clouds, as they preserve design intent and enable downstream
      modifications.
    - Geometric validity and executability are critical evaluation dimensions, with
      most works reporting program validity rates or invalid ratio reductions.
    - Large language models and vision-language models, when fine-tuned on CAD-specific
      data, can serve as effective backbones for CAD generation tasks.
    - Data curation and augmentation (e.g., script-geometry pairing, normalization)
      are essential for training reliable models, and several works release new datasets
      to address data scarcity.
    disagreements:
    - 'Representation: Some methods use pure command sequences, while others incorporate
      B-Rep pointers or CadQuery scripts to handle entity selection and editing operations.'
    - 'Supervision signal: Approaches differ in whether they rely on supervised reconstruction,
      GAN-based adversarial training, VLM-guided evolution, or RL with execution-based
      rewards.'
    - 'Evaluation target: While most works optimize for geometric similarity (IoU,
      Chamfer), a new line advocates for executable test-based evaluation that checks
      constraint satisfaction, leading to different conclusions about model ranking.'
    - 'Interaction mode: Some models are designed for single-step generation from
      a complete input, whereas others support step-wise, iterative refinement conditioned
      on partial geometry and text.'
    open_questions:
    - How well do current methods handle real-world CAD workflows that involve complex
      assemblies, constraints, and user interactions beyond single-part generation?
    - Can the gains in program validity and geometric accuracy demonstrated on curated
      benchmarks be replicated on noisy, incomplete, or multi-source engineering data?
    - What is the trade-off between model scalability (e.g., 4B parameters vs. frontier
      LLMs) and generation quality, and how does it affect practical deployment in
      resource-constrained CAD environments?
    - To what extent do executable test-based metrics align with engineers' qualitative
      assessments of design usability and manufacturability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 从三维或二维输入生成参数化CAD程序
      解决的问题: 从网格、点云或图像中恢复可编辑的CAD构建序列，支持后续编辑和参数化变体。
      尚未覆盖: 对具有丰富特征集（倒圆角、倒角、旋转）的复杂工业零件的泛化能力，以及对噪声或不完整输入几何的鲁棒性；多数方法仅在有限基准上评估，缺乏真实部署证据。
    - 路线: 统一多模态多任务CAD模型
      解决的问题: 在单一框架内处理跨多种输入模态的异构CAD任务（重建、生成、问答），减少对任务特定架构的需求。
      尚未覆盖: 对极长序列和多样化CAD格式的可扩展性；统一基准较新，缺乏社区广泛采用，跨模型比较困难。
    - 路线: 面向长CAD程序的序列建模进展
      解决的问题: 通过利用状态空间模型或指针机制生成更长、更复杂的参数化CAD序列，以减轻误差累积和量化问题。
      尚未覆盖: 这些架构改进是否在不同数据集和CAD系统上持续优于自回归Transformer；评估通常局限于合成或简化数据集。
    - 路线: 基于演化和强化学习的CAD合成方法
      解决的问题: 通过VLM引导的迭代编辑或基于RL的后训练，从简单基元逐步生成复杂、真实的CAD程序，提高可执行性和几何精度。
      尚未覆盖: 计算成本高，依赖奖励设计；学习策略向未见过的CAD基元或全新设计领域的可迁移性尚未得到证明。
    - 路线: 面向CAD生成的评估基准和基于测试的指标
      解决的问题: 提供可执行软件测试来验证生成CAD模型的几何和拓扑约束，超越表面相似度指标。
      尚未覆盖: 测试套件的覆盖范围仅限于特定约束类型；基准尚未被更广泛的社区采用，其与人类判断或工程实用性的相关性未知。
    共识:
    - 可编辑的参数化CAD程序优于静态网格或点云，因为它们保留了设计意图并支持下游修改。
    - 几何有效性和可执行性是关键的评估维度，大多数工作报告程序有效率或无效比率降低。
    - 在CAD特定数据上微调后，大语言模型和视觉语言模型可以作为CAD生成任务的有效骨干。
    - 数据整理和增强（例如脚本-几何配对、规范化）对于训练可靠模型至关重要，多项工作发布了新数据集以解决数据稀缺问题。
    分歧:
    - 表示方式：一些方法使用纯命令序列，而另一些则融入B-Rep指针或CadQuery脚本来处理实体选择和编辑操作。
    - 监督信号：方法在依赖监督重建、基于GAN的对抗训练、VLM引导的演化或基于执行奖励的RL上存在差异。
    - 评测目标：大多数工作优化几何相似度（IoU、倒角距离），而新路线倡导基于可执行测试的评估，检查约束满足情况，导致模型排名结论不同。
    - 交互模式：一些模型设计为从完整输入单步生成，而另一些支持基于部分几何和文本的逐步迭代细化。
    开放问题:
    - 当前方法如何处理涉及复杂装配、约束和用户交互的真实CAD工作流，而不仅仅是单零件生成？
    - 在精心整理的基准上展示的程序有效性和几何精度提升能否在噪声、不完整或多源工程数据上复现？
    - 模型可扩展性（例如40亿参数 vs. 前沿LLM）与生成质量之间的权衡如何，以及它如何影响资源受限CAD环境中的实际部署？
    - 基于可执行测试的指标在多大程度上与工程师对设计可用性和可制造性的定性评估一致？

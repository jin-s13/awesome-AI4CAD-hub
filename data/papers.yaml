  title_cn: OpenECAD：一种用于可编辑3D-CAD设计的高效视觉语言模型
  abstract_cn: 计算机辅助设计（CAD）工具广泛应用于制造业，用于从杯子到航天器的各类建模。这些程序操作复杂，通常需要多年的培训与经验才能掌握。结构良好且约束充分的二维草图与三维构造是CAD建模的关键组成部分。一个设计良好的CAD模型能够无缝集成到制造流程中，从而提升生产效率。三维形状的深度生成模型与三维物体重建模型已引起广泛研究兴趣。然而，大多数此类模型生成的是不可编辑的三维物体离散形式。此外，少数基于CAD操作的模型往往存在显著的输入限制。在本工作中，我们通过微调预训练模型，创建了OpenECAD模型（0.55B、0.89B、2.4B和3.1B），充分利用了视觉语言模型的视觉、逻辑、编码及通用能力。OpenECAD模型能够以三维设计图像作为输入，生成高度结构化的二维草图与三维构造命令，确保设计具有可编辑性。这些输出可直接通过现有CAD工具的API生成项目文件。为训练网络，我们构建了一系列OpenECAD数据集。这些数据集源自现有公开CAD数据集，并根据视觉语言模型（VLM）训练的特殊需求进行了调整与增强。此外，我们引入了一种利用依赖关系定义与生成草图的方法，进一步丰富了数据集的内容与功能。

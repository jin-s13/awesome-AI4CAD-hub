  description_zh: 计算机辅助设计（CAD）通过提供工业生产所需的高精度，在现代制造业中发挥着基础性作用。近期基于大语言模型的方法将CAD生成建模为序列预测问题，并取得了令人瞩目的成果。然而，现有方法与评估协议主要强调视觉相似性，而忽略了精确的几何参数与正确的度量尺度。在形状层面可忽略的微小数值偏差仍可能违反工业公差要求，而当前采用命令序列表示的自回归范式为了简化大语言模型的预测，对数值参数进行了激进量化，进一步加剧了这一问题。在本工作中，我们提出了Pointer-CAD
    v2。与v1版本（arXiv:2603.04337）相比，本版本直接预测连续值，无需量化数值参数，从而消除了量化误差。具体而言，我们提出了一种统一框架，通过“先规划后构建”范式将参数推理与几何构建解耦。我们的方法首先生成一个包含显式度量尺度参数的结构化设计规划。这些参数被组织成字典，并通过指针机制在序列生成过程中直接引用，从而消除了离散化误差并确保了维度一致的执行。此外，我们构建了一个带有规划级标注的大规模新数据集，并引入了三个层次化的几何精度度量指标，以在顶点、边和面层级评估参数保真度。大量实验表明，Pointer-CAD
    v2持续优于现有基线，并在几何精度上取得了显著提升，从而为精度关键的工程应用提供了可靠的CAD生成。
  notes_zh: 派生自论文：Pointer-CAD：通过基于指针的边和面选择统一B-Rep与命令序列
  name_zh: Pointer-CAD v2
- id: paper-step-llm-generating-cad-step-models-from-natural-language-w-2026
  name: STEP-LLM
  description: Computer-aided design (CAD) is vital to modern manufacturing, yet model
    creation remains labor-intensive and expertise-heavy. To enable non-experts to
    translate intuitive design intent into manufacturable artifacts, recent large
    language mo...

  abstract_cn: 大型语言模型（LLMs）越来越多地被应用于计算机辅助设计（CAD），以根据文本指令生成设计工件。在工程实践中，这不仅仅需要创建新的几何形状，模型还必须理解现有场景，正确编辑它们，并保留语义和关系。然而，许多CAD基准测试侧重于创建新模型而非编辑现有模型，并且主要评估几何正确性。我们提出了BIM-Edit，一个用于评估LLMs对以工业基础类（IFC）格式表示的建筑信息模型（BIM）进行自然语言编辑的基准测试。BIM提供了一个具有挑战性的测试平台，因为建筑模型将几何形状与语义和关系结构编码在一起。BIM-Edit包含324个编辑任务，涵盖11个真实建筑模型和36个合成场景。任务使用三种指令类别——直接、空间和拓扑——来表达，涵盖显式编辑和基于场景的编辑。我们从三个维度评估输出：几何准确性、语义有效性和拓扑一致性。在评估的LLMs中，表现最好的模型在三个指标上的平均得分仅为49.5%，且没有模型能完全解决超过3.4%的任务。这些结果表明，当前LLM的能力与结构化工程设计工作流程的要求之间存在显著差距。

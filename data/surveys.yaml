  related_work_outline:
  - 'Mainstream direction: Geometric modeling theory centered on formalizing shape
    representations and symmetry detection, with recent interest in learning-friendly
    representations and optimal algorithms.'
  - 'Shared research pattern: Proposing formal definitions, constraints, or algorithms
    for geometric structures (CSG trees, point coordinates, loops, symmetries) and
    analyzing their theoretical properties.'
  - 'Key differences: Some works design representations for interpretability or CAD
    language, while others derive optimal algorithms for symmetry detection; they
    target different geometric primitives and dimensions.'
  - 'Trend evolution: From early intrinsic symmetry analysis (2008) through Lie-algebra
    voting (2016) to learning-friendly CSG representations (2021) and recent optimal
    algorithms and constraint formalizations (2026), showing a shift toward guarantees
    and learning compatibility.'
  - 'Open questions: Empirical validation of theoretical guarantees on real-world
    shapes, integration of formal constraints with data-driven methods, and scalability
    to complex 3D scenes remain unaddressed in the available evidence.'
  related_work_outline_zh:
  - 主流方向：以形状表示形式化和对称性检测为核心的几何建模理论，近期关注学习友好的表示与最优算法。
  - 研究共性：为几何结构（CSG树、点坐标、环路、对称性）提出形式化定义、约束或算法，并分析其理论性质。
  - 关键差异：部分工作设计面向可解释性或CAD语言的表示，另一些推导对称性检测的最优算法；它们针对不同的几何基元与维度。
  - 趋势演进：从早期内蕴对称性分析（2008）经李代数投票（2016）到学习友好的CSG表示（2021）及近期最优算法与约束形式化（2026），呈现向理论保证和学习兼容性发展的趋势。
  - 开放问题：理论保证在真实形状上的经验验证、形式化约束与数据驱动方法的结合、对复杂三维场景的可扩展性，在现有证据中均未涉及。
  literature_review:
    line_of_work_matrix:
    - line: Representation formalization and constraints
      what_it_solves: Defines geometric primitives (points, loops, CSG trees) and
        their compositional rules to enable interpretable or language-like shape descriptions.
      what_remains_open: Whether these formal representations can be learned from
        data and how they handle noise, incompleteness, or real-world shape variability
        is not shown.
    - line: Symmetry detection theory and algorithms
      what_it_solves: Provides optimal or voting-based algorithms for detecting global
        intrinsic symmetries and orbits in 2D/3D shapes, with theoretical guarantees
        on detection quality.
      what_remains_open: Empirical performance on large-scale benchmarks, robustness
        to partial scans, and integration with learning pipelines are not evidenced.
    - line: Conceptual frameworks for CAD
      what_it_solves: Reframes computer-aided design as a language, suggesting a unified
        abstraction for geometric modeling tasks.
      what_remains_open: The framework's impact on downstream model design or evaluation
        is not demonstrated; it remains a conceptual proposal without empirical backing.
    consensus:
    - All works adopt a formal, theory-driven approach to geometric modeling, aiming
      to define or detect structure rather than purely learn from data.
    - They share an emphasis on explicit geometric properties (symmetry, compositionality,
      coordinate systems) as foundational for shape understanding.
    disagreements:
    - 'The target geometric entity varies: some focus on low-level coordinates and
      loops, others on high-level CSG trees or symmetry groups.'
    - 'The role of learning differs: one line proposes learning-friendly representations,
      while symmetry detection works remain purely algorithmic without learned components.'
    - Evaluation settings are absent from the evidence, so it is unclear whether the
      methods are validated on synthetic data, real scans, or CAD models.
    open_questions:
    - Can the formal constraints defined for loops and points be integrated into neural
      architectures without sacrificing guarantees?
    - How do optimal symmetry detection algorithms compare to learning-based detectors
      on noisy, real-world 3D data?
    - Does treating CAD as a language lead to measurable improvements in generative
      or parsing tasks, or is it only a metaphor?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 表示形式化与约束
      解决的问题: 定义几何基元（点、环路、CSG树）及其组合规则，以实现可解释或类语言的形状描述。
      尚未覆盖: 这些形式化表示能否从数据中学习，以及如何处理噪声、缺失或真实形状的多样性，尚未得到验证。
    - 路线: 对称性检测理论与算法
      解决的问题: 提供最优或基于投票的算法，检测二维/三维形状的全局内蕴对称性与轨道，并给出检测质量的理论保证。
      尚未覆盖: 在大规模基准上的经验性能、对部分扫描的鲁棒性以及与学习管线的结合均缺乏证据。
    - 路线: CAD概念框架
      解决的问题: 将计算机辅助设计重新定义为一种语言，为几何建模任务提供统一的抽象。
      尚未覆盖: 该框架对下游模型设计或评测的影响未被展示；目前仅停留在概念层面，缺少经验支撑。
    共识:
    - 所有工作均采用形式化、理论驱动的方法进行几何建模，旨在定义或检测结构，而非纯粹从数据中学习。
    - 它们共同强调显式的几何属性（对称性、组合性、坐标系）作为形状理解的基础。
    分歧:
    - 关注的几何实体不同：有的聚焦于底层坐标和环路，有的聚焦于高层CSG树或对称群。
    - 学习的角色不同：一条路线提出学习友好的表示，而对称性检测工作保持纯算法，不含学习组件。
    - 现有证据中缺少评测设置，无法判断方法是在合成数据、真实扫描还是CAD模型上验证的。
    开放问题:

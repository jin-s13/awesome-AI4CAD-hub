  tldr: ArtisanCAD is an industrial CAD agent that uses expert knowledge distillation
    and a procedural CAD-IR representation to generate production-ready B-Rep models
    from ambiguous text prompts.
  reasoning: The paper introduces a novel CAD-IR representation and expert-grounded
    knowledge distillation, addressing ambiguity in text-to-CAD for industrial components.
    Strengths include a clear methodology and use of real-world CATIA workflows; weaknesses
    are limited evaluation details (only benchmark name mentioned) and no comparison
    to prior methods in the abstract.
  has_real_world: true
  analysis:
    innovations:
    - CAD intermediate representation (CAD-IR) that encodes parameters, ordered operations,
      MCP tool bindings, dependencies, generated entities, and verification rules,
      serving as a carrier for distilling expert CAD procedures into reusable skills
      and as a procedural scaffold for ambiguous prompts.
    - Skill-guided industrial CAD agent (ArtisanCAD) that retrieves expert-derived
      skills, instantiates and revises CAD-IR, executes via CATIA-MCP backend, and
      refines using multi-view visual feedback.
    methodology: ArtisanCAD distills expert CAD procedures (e.g., CATIA operation
      recordings, macro logs) into reusable parameterized skills encoded in CAD-IR.
      At inference, it retrieves skills, instantiates and revises CAD-IR to turn vague
      prompts into executable operations, executes them through a dedicated CATIA-MCP
      backend, and applies iterative refinement using multi-view visual feedback.
    key_results: On the Text2CAD benchmark, CAD-IR reduces mean Chamfer Distance from
      14.83 to 9.88 for intermediate prompts. On four complex automotive components,
      expert recordings are distilled into reusable skills, allowing the generation
      of editable CATIA-native B-Rep models for new variant requests.
    limitations: []
  title_cn: ArtisanCAD：一种基于专家知识蒸馏的工业级CAD智能体
  abstract_cn: 工业部件的计算机辅助设计（CAD）需要长程过程建模、稳健的特征依赖、可编辑的参数化几何以及生产级B-Rep执行。现有的文本到CAD方法在从自然语言描述生成CAD程序方面取得了有希望的进展，但当用户提示模糊、不明确或仅描述高层次设计意图时，它们仍然面临困难。它们也很少利用工业工作流中自然可用的专家过程知识，例如CATIA操作记录、宏日志、绘图注释和工程描述。我们提出了ArtisanCAD，一种基于专家知识蒸馏的技能引导型工业CAD智能体。ArtisanCAD的核心是CAD中间表示（CAD-IR），一种可执行的过程表示，编码参数、有序操作、MCP工具绑定、依赖关系、生成的实体和验证规则。CAD-IR扮演两个关键角色：首先，它作为将专家CAD过程蒸馏为可重用参数化技能的载体；其次，它提供了一个过程支架，将模糊或中等层次的提示转化为完整的可执行CAD操作。ArtisanCAD检索专家派生的技能，实例化和修订CAD-IR，通过专用的CATIA-MCP后端执行生成的过程，并使用多视图视觉反馈进行迭代细化，最终生成生产就绪的B-Rep模型。在Text2CAD基准测试中，CAD-IR通过将中间提示的平均Chamfer距离从14.83降低到9.88，展示了其弥合模糊文本意图与可执行CAD构建之间差距的能力。在四个复杂汽车部件上，CAD-IR使专家CATIA记录能够被蒸馏为可重用技能，从而使ArtisanCAD能够为新的变体请求生成可编辑的CATIA原生B-Rep模型。
  tldr_cn: ArtisanCAD是一种工业级CAD智能体，利用专家知识蒸馏和过程式CAD-IR表示，从模糊文本提示生成可生产的B-Rep模型。
  analysis_cn:
    innovations:
    - CAD中间表示（CAD-IR），编码参数、有序操作、MCP工具绑定、依赖关系、生成的实体和验证规则，既作为将专家CAD过程蒸馏为可重用技能的载体，又作为处理模糊提示的过程支架。
    - 技能引导的工业CAD智能体（ArtisanCAD），检索专家派生的技能，实例化和修订CAD-IR，通过CATIA-MCP后端执行，并使用多视图视觉反馈进行迭代细化。
    methodology: ArtisanCAD将专家CAD过程（例如CATIA操作记录、宏日志）蒸馏为编码在CAD-IR中的可重用参数化技能。在推理时，它检索技能，实例化和修订CAD-IR，将模糊提示转化为可执行操作，通过专用的CATIA-MCP后端执行，并应用多视图视觉反馈进行迭代细化。
    key_results: 在Text2CAD基准测试中，CAD-IR将中间提示的平均Chamfer距离从14.83降低到9.88。在四个复杂汽车部件上，专家记录被蒸馏为可重用技能，从而能够为新的变体请求生成可编辑的CATIA原生B-Rep模型。

  related_work_outline:
  - 'Mainstream direction: Building unified, multi-modal benchmarks and generative
    models that produce editable parametric CAD (B-Rep or program sequences) from
    diverse inputs such as text, images, meshes, and point clouds.'
  - 'Shared research pattern: Framing CAD generation as a sequence or structure prediction
    problem, then applying large language models, state-space models, differentiable
    representations, or hybrid optimization to recover editable CAD programs or surfaces.'
  - 'Key differences: Representation choices (program scripts vs. parametric patches
    vs. latent codes), supervision signals (point-level, program-level, or self-supervised),
    evaluation targets (geometric fidelity, executability, manufacturability), and
    interaction modes (one-shot vs. proactive clarification).'
  - 'Trend evolution: The field has moved from early representation learning toward
    LLM-driven program synthesis and multi-modal unification, with 2026 papers emphasizing
    benchmarks that assess engineering constraints and interactive robustness.'
  - 'Open questions: How to align evaluation metrics with real-world engineering requirements;
    how to generalize across complex topologies and ambiguous specifications; how
    to balance editability, fidelity, and computational cost in a single framework.'
  related_work_outline_zh:
  - 主流方向：构建统一的多模态基准和生成模型，从文本、图像、网格、点云等输入生成可编辑的参数化CAD（B-Rep或程序序列）。
  - 研究共性：将CAD生成形式化为序列或结构预测问题，应用大语言模型、状态空间模型、可微表示或混合优化来恢复可编辑的CAD程序或曲面。
  - 关键差异：表示选择（程序脚本 vs. 参数化面片 vs. 潜在编码）、监督信号（点级、程序级或自监督）、评估目标（几何保真度、可执行性、可制造性）以及交互模式（一次性生成
    vs. 主动澄清）。
  - 趋势演进：领域从早期表示学习转向LLM驱动的程序合成和多模态统一，2026年论文强调评估工程约束和交互鲁棒性的基准。
  - 开放问题：如何使评估指标与真实工程需求对齐；如何在复杂拓扑和模糊规格下泛化；如何在单一框架中平衡可编辑性、保真度和计算成本。
  literature_review:
    line_of_work_matrix:
    - line: Multi-modal benchmarks and evaluation protocols
      what_it_solves: Standardized assessment of CAD generation methods across input
        modalities (text, image, mesh, point cloud) and engineering criteria (executability,
        manufacturability, assemblability).
      what_remains_open: Alignment between different benchmarks, coverage of real
        manufacturing constraints, and correlation of metrics with downstream engineering
        usability.
    - line: Program-synthesis-based generative models
      what_it_solves: Direct generation of executable CAD scripts (e.g., CadQuery)
        from high-level specifications using large language models or hybrid optimization,
        ensuring editability and parametric control.
      what_remains_open: Generalization to complex topologies, robustness to ambiguous
        or underspecified prompts, and computational efficiency of iterative optimization.
    - line: Geometry-representation-learning models
      what_it_solves: Learning latent representations or differentiable parametric
        surfaces (e.g., Bézier patches) to model long CAD sequences or generate editable
        B-Reps without CAD-specific annotations.
      what_remains_open: Controllability of generated geometry, compatibility with
        standard parametric CAD pipelines, and scalability to very long sequences.
    - line: Interactive and clarification-driven generation
      what_it_solves: Improving user intent alignment and robustness by proactively
        asking clarification questions before synthesizing CAD programs.
      what_remains_open: Efficiency of multi-turn interaction, user experience design,
        and generalization of clarification strategies beyond curated scenarios.
    consensus:
    - Editable parametric CAD (B-Rep or program sequences) is the preferred output
      representation for downstream engineering use.
    - Multi-modal inputs (text, images, meshes, point clouds) are necessary to accommodate
      diverse design workflows.
    - Evaluation must go beyond geometric similarity to include executability, validity,
      and engineering constraints.
    - Large language models and differentiable optimization are becoming central tools
      for CAD generation.
    disagreements:
    - 'Representation: some methods output explicit program scripts, while others
      generate parametric surfaces or latent codes that are decoded to B-Rep.'
    - 'Supervision: approaches range from point-level supervision on unannotated 3D
      data to fine-tuning on curated text-to-CAD datasets with program-level labels.'
    - 'Evaluation target: benchmarks emphasize different aspects—geometric fidelity,
      manufacturability, multi-task capability—leading to inconsistent model rankings.'
    - 'Interaction mode: most methods assume one-shot generation, whereas one line
      of work introduces proactive clarification agents, trading off autonomy for
      robustness.'
    open_questions:
    - How can evaluation protocols be unified to reflect both geometric accuracy and
      real-world engineering feasibility without overfitting to specific metrics?
    - What representations and training strategies enable generalization to complex,
      multi-step CAD constructions beyond the distributions seen in current benchmarks?
    - Can interactive clarification be scaled to handle the full ambiguity spectrum
      in natural language design specifications without excessive user burden?
    - How should generative models balance the trade-off between producing editable
      parametric output and achieving high geometric fidelity under weak supervision?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态基准与评估协议
      解决的问题: 标准化评估CAD生成方法，覆盖多种输入模态（文本、图像、网格、点云）和工程标准（可执行性、可制造性、可装配性）。
      尚未覆盖: 不同基准之间的对齐、真实制造约束的覆盖范围，以及指标与下游工程可用性的相关性。
    - 路线: 基于程序合成的生成模型
      解决的问题: 使用大语言模型或混合优化从高层规格直接生成可执行CAD脚本（如CadQuery），确保可编辑性和参数化控制。
      尚未覆盖: 对复杂拓扑的泛化、对模糊或欠指定提示的鲁棒性，以及迭代优化的计算效率。
    - 路线: 基于几何表示学习的模型
      解决的问题: 学习潜在表示或可微参数曲面（如贝塞尔面片）以建模长CAD序列，或在无CAD标注的情况下生成可编辑B-Rep。
      尚未覆盖: 生成几何的可控性、与标准参数化CAD管线的兼容性，以及对极长序列的可扩展性。
    - 路线: 交互式与澄清驱动的生成
      解决的问题: 通过在合成CAD程序前主动提出澄清问题，提高用户意图对齐度和鲁棒性。
      尚未覆盖: 多轮交互的效率、用户体验设计，以及澄清策略在策划场景之外的泛化能力。
    共识:
    - 可编辑的参数化CAD（B-Rep或程序序列）是下游工程应用的首选输出表示。
    - 多模态输入（文本、图像、网格、点云）对于适应多样化的设计工作流是必要的。
    - 评估必须超越几何相似性，涵盖可执行性、有效性和工程约束。
    - 大语言模型和可微优化正成为CAD生成的核心工具。
    分歧:
    - 表示方式：一些方法输出显式程序脚本，而另一些生成参数化曲面或潜在编码再解码为B-Rep。
    - 监督信号：方法从在无标注3D数据上的点级监督，到在策划的文本到CAD数据集上使用程序级标签进行微调，各不相同。
    - 评估目标：基准强调不同方面——几何保真度、可制造性、多任务能力——导致模型排名不一致。
    - 交互模式：多数方法假设一次性生成，而一条研究路线引入主动澄清智能体，以自主性换取鲁棒性。
    开放问题:
    - 如何统一评估协议，以同时反映几何精度和真实工程可行性，而不对特定指标过拟合？
    - 哪些表示和训练策略能使模型泛化到当前基准分布之外的复杂多步CAD构造？
    - 主动澄清能否扩展以处理自然语言设计规格中的全部模糊性，而不给用户带来过多负担？
    - 生成模型应如何在产生可编辑参数化输出与在弱监督下实现高几何保真度之间取得平衡？

  related_work_outline:
  - 'Mainstream direction: Building large-scale multimodal CAD benchmarks that cover
    text, image, point cloud, and mesh inputs, and evaluate geometric fidelity, program
    executability, and engineering properties such as manufacturability and assemblability.'
  - 'Shared research pattern: Benchmark design increasingly adopts stratified evaluation
    and stress testing to expose model failures under geometric complexity, modality
    shift, and ambiguous prompts.'
  - 'Key differences: Evaluation targets diverge from geometric similarity toward
    functional engineering criteria; representations include B-Rep programs, parametric
    surfaces, and CAD sequences; interaction modes range from one-shot generation
    to proactive clarification.'
  - 'Trend evolution: The frontier in 2026 shows a shift from early geometry-focused
    benchmarks to multi-task, multi-modal benchmarks that incorporate LLM/VLM judges
    and emphasize downstream engineering utility.'
  - 'Open questions: Whether benchmark tasks cover real iterative design workflows;
    alignment between proxy metrics and engineer satisfaction; stability of benchmark
    conclusions across implementations and compute budgets.'
  related_work_outline_zh:
  - 主流方向：构建大规模多模态CAD基准，覆盖文本、图像、点云和网格输入，评估几何保真度、程序可执行性以及可制造性、可装配性等工程属性。
  - 研究共性：基准设计普遍采用分层评估和压力测试，以揭示模型在几何复杂度、模态转换和模糊提示下的失败模式。
  - 关键差异：评估目标从几何相似度扩展到功能性工程标准；表示方式包括B-Rep程序、参数曲面和CAD序列；交互模式从一次性生成到主动澄清。
  - 趋势演进：2026年前沿显示从早期几何基准转向多任务、多模态基准，并引入LLM/VLM评判器，强调下游工程效用。
  - 开放问题：基准任务是否覆盖真实迭代设计工作流；代理指标与工程师满意度的一致性；基准结论在不同实现和算力预算下的稳定性。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Provides shared tasks and datasets that enable comparable evaluation
        of CAD generation models across modalities and tasks.
      what_remains_open: Whether existing benchmarks cover real engineering workflows
        including iterative editing, assembly constraints, and design intent remains
        unclear.
    - line: Metric and stress-test design
      what_it_solves: Probes model robustness and practical utility beyond aggregate
        scores through stratified evaluation, modality stress tests, and engineering-aware
        metrics.
      what_remains_open: Alignment between proxy metrics (e.g., Chamfer distance,
        VLM judge scores) and engineer-perceived CAD quality lacks systematic validation.
    - line: Comparable baselines and reporting
      what_it_solves: Improves auditability and reproducibility by providing unified
        baselines, public code, and datasets.
      what_remains_open: Stability of benchmark conclusions across different implementations
        and compute budgets is unstudied; reproducibility reporting is inconsistent.
    consensus:
    - Multimodal inputs are essential for CAD generation evaluation, and benchmarks
      should support text, image, point cloud, and mesh modalities.
    - Evaluation must go beyond geometric similarity to include program validity,
      compactness, and engineering properties like manufacturability.
    - Large-scale datasets and the use of LLMs/VLMs as generators or judges are driving
      benchmark evolution.
    - Stratified and stress-testing protocols are necessary to reveal failure modes
      that aggregate metrics hide.
    disagreements:
    - 'Evaluation focus varies: some benchmarks prioritize geometric fidelity, while
      others emphasize downstream engineering criteria such as functionality and assemblability.'
    - Choice of CAD representation (B-Rep programs, parametric surfaces, CAD construction
      sequences) leads to incompatible evaluation protocols and metrics.
    - Supervision signals differ across benchmarks, including point clouds, meshes,
      and text, resulting in distinct task coverage and difficulty.
    - 'Interaction assumptions diverge: one-shot generation versus interactive clarification,
      affecting how robustness to ambiguous inputs is measured.'
    open_questions:
    - How can benchmarks assess the editability and downstream usability of generated
      CAD models, not just static geometric accuracy?
    - To what extent do current geometric and VLM-based metrics correlate with engineer
      satisfaction in real design tasks?
    - Are benchmark rankings stable under varying model implementations, random seeds,
      and compute budgets?
    - How can multimodal benchmarks balance broad task coverage with deep, engineering-meaningful
      evaluation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 提供共享任务和数据集，使CAD生成模型在多模态、多任务下可比较。
      尚未覆盖: 现有基准是否覆盖真实工程工作流中的迭代编辑、装配约束和设计意图仍不明确。
    - 路线: 指标与压力测试设计
      解决的问题: 通过分层评估、模态压力测试和工程感知指标，在聚合分数之外检验模型鲁棒性和实用性。
      尚未覆盖: 代理指标（如Chamfer距离、VLM评判分数）与工程师对CAD质量感知的一致性缺乏系统验证。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一基线、公开代码和数据集提高结果的可审计性和可复现性。
      尚未覆盖: 基准结论在不同实现和算力预算下的稳定性未被研究；可复现性报告不一致。
    共识:
    - 多模态输入对CAD生成评估至关重要，基准应支持文本、图像、点云和网格等模态。
    - 评估需超越几何相似度，涵盖程序有效性、紧凑性和可制造性等工程属性。
    - 大规模数据集以及LLM/VLM作为生成器或评判器的使用正在推动基准演进。
    - 分层和压力测试协议对于揭示聚合指标隐藏的失败模式是必要的。
    分歧:
    - 评估重点不同：部分基准侧重几何保真度，另一些强调功能性和可装配性等下游工程标准。
    - CAD表示方式的选择（B-Rep程序、参数曲面、CAD构建序列）导致评估协议和指标不兼容。
    - 监督信号各异，包括点云、网格和文本，造成任务覆盖范围和难度不同。
    - 交互假设分歧：一次性生成与交互式澄清，影响对模糊输入鲁棒性的测量方式。
    开放问题:
    - 如何设计基准以评估生成CAD模型的可编辑性和下游可用性，而非仅静态几何精度？
    - 当前几何指标和基于VLM的指标与工程师在实际设计任务中的满意度有多大相关性？
    - 基准排名在不同模型实现、随机种子和算力预算下是否稳定？
    - 多模态基准如何在广泛任务覆盖与深度工程有意义评估之间取得平衡？

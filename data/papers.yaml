  title_cn: 'ASSEMCAD: 从自然语言生成生产就绪的CAD装配体'
  abstract_cn: 近年来，大语言模型和程序化CAD的进展显著提升了针对单个零件的文本到CAD生成能力。然而，生产就绪的机械装配体生成仍然是一个未解决的问题。与单个零件建模不同，装配体需要对多个组件、功能接口、装配关系、工程原理和物理一致性进行协调推理。因此，直接生成可执行的CAD代码不足以构建机械有效且可复用的装配体。我们提出AssemCAD，一个基于公理的框架，用于从自然语言生成生产就绪的CAD装配体。AssemCAD不将装配体表示为单一的CAD代码，而是首先构建一个公理化的装配规范，包含类型化零件、几何支持的端口、可执行配合和工程公理。每个装配关系都明确基于一个或多个工程原理，使得生成的规范可解释、可复用且可验证。为实现这一规范，AssemCAD引入了一个基于端口和配合的CAD装配库，通过确定性配合变换执行符号装配关系，并使用具体的B-Rep几何证据验证声明的接口。基于这一表示和库，AssemCAD进一步支持按需合成可复用的参数化组件工厂，适用于标准几何和开放世界几何。在AssemBench上的实验表明，AssemCAD在装配保持和物理有效性方面显著优于以代码为中心的CAD生成基线，并且能够泛化到不同的基础模型骨干。通过将基于公理的装配推理与确定性几何执行相结合，AssemCAD将文本到CAD从孤立零件生成扩展到生产就绪的机械装配设计。

  title_cn: 'KDH-CAD: 数据稀缺下的知识-数据混合CAD学习'
  abstract_cn: 深度学习在计算机辅助设计（CAD）中仍然受到数据稀缺挑战的根本制约：真实的CAD数据难以大规模收集，而合成数据可能无法忠实反映实际设计实践。本文并未追求更大的CAD数据集，而是将CAD学习视为一个知识补全与校准问题。我们提出了KDH-CAD，一个知识-数据混合框架，该框架整合了预训练基础模型中的知识、来自教科书/教程的结构化领域知识以及极少量标注的CAD数据。领域知识用于引出和补全预训练基础模型中表达较弱或代表性不足的CAD相关概念，而标注的CAD数据则在潜在空间中校准这些概念，以考虑任务特定的几何变异性，而无需微调基础模型。在真实机械零件分类实验上，KDH-CAD在低数据场景下表现出色，仅用250个训练样本即可达到92.6%的准确率，用1000个样本达到95.8%，并且随着数据增加持续提升。这匹配或超越了通常需要多一个数量级数据的现有最优性能。这些结果表明，将预训练基础模型与结构化领域知识相结合可以大幅减少对大规模CAD数据集的依赖，为数据高效的CAD学习提供了一条有原则且实用的方向。

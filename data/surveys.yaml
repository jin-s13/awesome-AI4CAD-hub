    unresolved.'
  related_work_outline_zh:
  - 主流方向：CAD表示的生成建模，尤其是B-rep和网格，在排名靠前的论文中占主导地位，重点是通过分解或结构化方法提高拓扑有效性和几何复杂性。
  - 研究共性：大多数工作提出一个神经网络，编码结构化CAD表示（线框、多面体、CSG树、层次部件），并解码为三维形状，常采用自回归或图神经网络架构。
  - 关键差异：论文在目标CAD表示（B-rep、网格、CSG、点云）、监督级别（全监督与无监督部件分解）以及任务（生成、重建或交互学习）上存在差异。
  - 趋势演进：证据覆盖2017至2026年，早期CSG解析（2017）演变为更复杂的B-rep和网格生成（2023–2026），近期出现多模态数据集和基于交互的学习（2024–2025）。
  - 开放问题：如何跨不同CAD表示系统评估拓扑有效性；分解式生成是否泛化到真实工程约束；如何将交互数据与几何生成相结合仍待解决。
  literature_review:
    line_of_work_matrix:
    - line: Generative modeling of CAD structures
      what_it_solves: Automatically creating valid 3D CAD models from scratch or from
        partial specifications, reducing manual design effort.
      what_remains_open: Most methods are evaluated on synthetic or simplified datasets;
        generalization to industrial-grade CAD with complex constraints and the ability
        to handle user edits are not demonstrated.
    - line: 3D reconstruction from point clouds
      what_it_solves: Converting raw sensor data into structured CAD models, bridging
        the gap between scanning and editable design.
      what_remains_open: Only one paper in the evidence addresses this, and its methodology
        details are missing; robustness to noise, occlusions, and scalability to large
        scenes are unverified.
    - line: Part decomposition and understanding
      what_it_solves: Breaking a 3D object into meaningful parts without manual labeling,
        enabling part-based editing and analysis.
      what_remains_open: The unsupervised approach from a single RGB image is ambitious,
        but the evidence lacks results on accuracy, consistency across views, and
        applicability to non-organic shapes.
    - line: Datasets and benchmarks for CAD learning
      what_it_solves: Providing standardized multimodal data (G-code, images, UI videos)
        to train and evaluate CAD-related models.
      what_remains_open: Dataset papers lack reported baseline performance and metric
        definitions; their impact on downstream task improvement is not yet shown.
    - line: Learning from CAD interactions
      what_it_solves: Capturing expert design sequences from UI videos to learn long-horizon
        CAD operations, potentially automating repetitive tasks.
      what_remains_open: The model's ability to generalize to unseen CAD software
        or user styles is not evaluated; the evidence only mentions a dataset and
        model without results.
    consensus:
    - Structured representations (wireframe, polyhedron, CSG tree) are preferred over
      raw point clouds or voxels for CAD generation because they preserve editability
      and topological information.
    - Autoregressive or graph-based neural architectures are commonly used to handle
      the variable-size and relational nature of CAD structures.
    - There is a shared assumption that factorizing the generation process (e.g.,
      topology then geometry) improves output validity.
    disagreements:
    - 'The choice of target CAD representation varies: B-rep offers engineering precision
      but is harder to generate, while mesh is more flexible but less standardized
      for manufacturing.'
    - 'Supervision paradigms differ: some works rely on full CAD annotations, while
      others explore unsupervised part decomposition, leading to different evaluation
      criteria (reconstruction accuracy vs. part coherence).'
    - 'The role of interaction data is contested: one line treats CAD as a static
      geometry problem, another as a sequential UI process, with no unified framework
      to combine both.'
    open_questions:
    - How can topological validity be rigorously measured and compared across B-rep,
      mesh, and CSG outputs?
    - What benchmarks and metrics are needed to move from synthetic shape generation
      to real-world CAD engineering tasks?
    - Can interaction-based learning and geometric generation be integrated to create
      assistive CAD agents that both understand design intent and produce valid models?
  literature_review_zh:
    研究路线矩阵:
    - 路线: CAD结构生成建模
      解决的问题: 从零或部分规格自动创建有效的三维CAD模型，减少手动设计工作。
      尚未覆盖: 多数方法在合成或简化数据集上评估；对具有复杂约束的工业级CAD的泛化能力及处理用户编辑的能力尚未展示。
    - 路线: 从点云进行三维重建
      解决的问题: 将原始传感器数据转换为结构化CAD模型，弥合扫描与可编辑设计之间的差距。
      尚未覆盖: 证据中仅有一篇论文涉及此方向，且方法细节缺失；对噪声、遮挡的鲁棒性及大规模场景的可扩展性未经验证。
    - 路线: 部件分解与理解
      解决的问题: 无需人工标注即可将三维物体分解为有意义的部分，支持基于部件的编辑和分析。
      尚未覆盖: 从单张RGB图像进行无监督分解的方法雄心勃勃，但证据缺乏准确性、跨视角一致性及对非有机形状适用性的结果。
    - 路线: CAD学习的数据集与基准
      解决的问题: 提供标准化的多模态数据（G代码、图像、UI视频）以训练和评估CAD相关模型。
      尚未覆盖: 数据集论文缺少基线性能和指标定义；其对下游任务改进的影响尚未显现。
    - 路线: 从CAD交互中学习
      解决的问题: 从UI视频中捕获专家设计序列，学习长程CAD操作，可能自动化重复性任务。
      尚未覆盖: 模型对未见过的CAD软件或用户风格的泛化能力未评估；证据仅提及数据集和模型，无结果。
    共识:
    - 结构化表示（线框、多面体、CSG树）优于原始点云或体素用于CAD生成，因为它们保留了可编辑性和拓扑信息。
    - 自回归或基于图的神经架构常被用于处理CAD结构的可变大小和关系特性。
    - 普遍假设分解生成过程（例如先拓扑后几何）能提高输出有效性。
    分歧:
    - 目标CAD表示的选择不同：B-rep提供工程精度但更难生成，而网格更灵活但制造标准化程度较低。
    - 监督范式不同：一些工作依赖完整CAD标注，另一些探索无监督部件分解，导致评估标准不同（重建精度 vs. 部件连贯性）。
    - 交互数据的角色存在争议：一条路线将CAD视为静态几何问题，另一条视为顺序UI过程，尚无统一框架结合两者。
    开放问题:
    - 如何严格衡量和比较B-rep、网格和CSG输出的拓扑有效性？
    - 需要哪些基准和指标才能从合成形状生成转向真实CAD工程任务？
    - 能否将基于交互的学习与几何生成相结合，创建既能理解设计意图又能生成有效模型的辅助CAD智能体？

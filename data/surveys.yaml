  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD programs (command sequences,
    code) from text, images, or 3D observations using large multimodal models and
    hybrid optimization.'
  - 'Shared research pattern: All works prioritize geometric validity and executability
    of generated CAD, moving beyond static mesh output to structured, history-based
    representations.'
  - 'Key differences: Generation paradigm (autoregressive LLM, GAN, evolution, RL
    post-training), input modality (text, image, sketch, point cloud, mesh), and evaluation
    target (IoU, executability, test-based constraints).'
  - 'Trend evolution: Rapid shift from single-task reconstruction to unified multi-modal
    multi-task frameworks, with growing emphasis on test-driven evaluation and reinforcement
    learning for code-level precision.'
  - 'Open questions: Generalization to real-world manufacturing constraints, multi-part
    assemblies, and long-horizon design intent; lack of standardized benchmarks capturing
    editability and engineering feasibility.'
  related_work_outline_zh:
  - 主流方向：利用大型多模态模型和混合优化，从文本、图像或三维观测生成可编辑的参数化CAD程序（命令序列、代码）。
  - 研究共性：所有工作都优先考虑生成CAD的几何有效性和可执行性，从静态网格输出转向结构化的、基于历史的表示。
  - 关键差异：生成范式（自回归LLM、GAN、演化、强化学习后训练）、输入模态（文本、图像、草图、点云、网格）和评估目标（IoU、可执行性、基于测试的约束）。
  - 趋势演进：从单任务重建快速转向统一的多模态多任务框架，越来越强调测试驱动的评估和强化学习以实现代码级精度。
  - 开放问题：向真实制造约束、多部件装配和长程设计意图的泛化；缺乏捕捉可编辑性和工程可行性的标准化基准。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD program generation from text or images
      what_it_solves: Directly mapping natural language or images to executable, editable
        CAD construction sequences (e.g., CadQuery scripts, command sequences) without
        intermediate mesh representations.
      what_remains_open: Handling complex assemblies, engineering constraints (tolerances,
        material), and verifying real-world manufacturability beyond geometric validity.
    - line: Mesh/point cloud to CAD reconstruction
      what_it_solves: Recovering parametric CAD history and operations from 3D scans
        or meshes, enabling editing of reverse-engineered parts.
      what_remains_open: Robustness to noisy, incomplete, or real-world scan data;
        scaling to large scenes with multiple parts; preserving design intent rather
        than just geometry.
    - line: Long-sequence CAD generative modeling
      what_it_solves: Generating complex CAD models with many parametric steps using
        architectures (e.g., state space models) that handle longer sequences than
        standard transformers.
      what_remains_open: Integration with physical simulation and downstream CAE/CAM
        workflows; evaluation beyond sequence validity to functional performance.
    - line: Unified representation and multi-task CAD models
      what_it_solves: Bridging different CAD representations (B-Rep, command sequences)
        and tasks (reconstruction, generation, QA) within a single model to reduce
        error accumulation and improve interoperability.
      what_remains_open: Cross-software and cross-industry generalization; whether
        a single model can match task-specific experts on all fronts without trade-offs.
    - line: Test-driven evaluation and generation for CAD
      what_it_solves: Replacing heuristic geometric metrics with executable software
        tests that verify topological and geometric constraints, and using these tests
        to guide generation.
      what_remains_open: Coverage of test suites for diverse design requirements;
        alignment with human designer judgment and real-world functional tests.
    consensus:
    - Editable parametric CAD (command sequences, code) is the preferred output over
      static meshes or point clouds.
    - Geometric validity and executability are essential, enforced through rendering,
      simulation, or test-based feedback.
    - Large language and multimodal models are the dominant backbone, often fine-tuned
      or post-trained with domain-specific rewards.
    - New large-scale datasets of CAD programs paired with geometry or language are
      critical enablers for recent advances.
    disagreements:
    - 'Generation paradigm: autoregressive next-token prediction vs. evolutionary
      program synthesis vs. reinforcement learning post-training.'
    - 'Representation granularity: pure command sequences with quantized parameters
      vs. pointer-based entity selection that references B-Rep topology.'
    - 'Evaluation philosophy: volumetric IoU and Chamfer distance vs. executability
      and software test pass rates vs. human preference.'
    - 'Scope: task-specific models optimized for one modality vs. unified multi-task
      multi-modal models that trade off specialization for breadth.'
    open_questions:
    - How well do current text/image-to-CAD methods generalize to industrial parts
      with strict tolerance, material, and assembly constraints?
    - Can parametric CAD generation be extended to multi-part assemblies and kinematic
      mechanisms, not just single rigid bodies?
    - What evaluation protocol captures the editability, reusability, and design intent
      preservation of generated CAD programs?
    - Do improvements on synthetic benchmarks (DeepCAD, Fusion360) transfer to real-world
      CAD workflows in mechanical engineering and manufacturing?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 从文本或图像生成参数化CAD程序
      解决的问题: 直接将自然语言或图像映射为可执行、可编辑的CAD构建序列（如CadQuery脚本、命令序列），无需中间网格表示。
      尚未覆盖: 处理复杂装配体、工程约束（公差、材料），以及验证几何有效性之外的真实可制造性。
    - 路线: 网格/点云到CAD重建
      解决的问题: 从三维扫描或网格中恢复参数化CAD历史和操作，使逆向工程零件可编辑。
      尚未覆盖: 对噪声、不完整或真实扫描数据的鲁棒性；扩展到包含多个零件的大场景；保留设计意图而不仅仅是几何形状。
    - 路线: 长序列CAD生成建模
      解决的问题: 使用能处理比标准Transformer更长序列的架构（如状态空间模型）生成具有许多参数化步骤的复杂CAD模型。
      尚未覆盖: 与物理仿真和下游CAE/CAM工作流的集成；超越序列有效性评估功能性能。
    - 路线: 统一表示与多任务CAD模型
      解决的问题: 在单一模型中桥接不同CAD表示（B-Rep、命令序列）和任务（重建、生成、问答），减少误差累积并提高互操作性。
      尚未覆盖: 跨软件和跨行业的泛化能力；单一模型能否在所有方面匹配任务专用专家而无权衡。
    - 路线: 测试驱动的CAD评估与生成
      解决的问题: 用可执行软件测试替代启发式几何指标，验证拓扑和几何约束，并利用这些测试指导生成。
      尚未覆盖: 测试套件对多样化设计需求的覆盖范围；与人类设计师判断和真实功能测试的一致性。
    共识:
    - 可编辑的参数化CAD（命令序列、代码）优于静态网格或点云输出。
    - 几何有效性和可执行性至关重要，通过渲染、仿真或基于测试的反馈来强制执行。
    - 大型语言和多模态模型是主要骨干，通常通过领域特定奖励进行微调或后训练。
    - 新的大规模CAD程序与几何或语言配对数据集是近期进展的关键推动因素。
    分歧:
    - 生成范式：自回归下一个令牌预测 vs. 演化程序合成 vs. 强化学习后训练。
    - 表示粒度：带量化参数的纯命令序列 vs. 引用B-Rep拓扑的基于指针的实体选择。
    - 评估理念：体积IoU和倒角距离 vs. 可执行性和软件测试通过率 vs. 人类偏好。
    - 范围：针对单一模态优化的任务特定模型 vs. 以专业化为代价换取广度的统一多任务多模态模型。
    开放问题:
    - 当前的文本/图像到CAD方法在具有严格公差、材料和装配约束的工业零件上泛化能力如何？
    - 参数化CAD生成能否扩展到多部件装配体和运动机构，而不仅仅是单个刚体？
    - 什么样的评估协议能捕捉生成CAD程序的可编辑性、可重用性和设计意图保留？
    - 在合成基准（DeepCAD、Fusion360）上的改进能否迁移到机械工程和制造中的真实CAD工作流？

  title_cn: Mesh2Brep：基于鲁棒基元拟合和交感知约束的B-Rep重建
  abstract_cn: 在计算机辅助设计（CAD）应用的边界表示（B-Rep）重建中，现有方法仍难以合理区分平滑混合区域中的基元。因此，通常需要大量手动后处理来修正基元及其邻接关系以获得有效的B-Rep实体，严重影响了效率。本文通过提出两种新技术来解决这些挑战。第一种是通过迭代估计噪声的概率分布以消除异常值，从而鲁棒地提取基元。第二种是提出交感知约束（如相切和共线约束），以正确获取基元之间的交线，据我们所知，现有方法尚未探索这一点。因此，我们可以有效提取基元，尤其是那些平滑混合的基元，并获得它们之间的高质量关系。结果，无需像现有方法那样进行大量拓扑修正的手动后处理，即可构建有效的B-Rep模型。得益于此，使用我们构建的B-Rep模型，其对应的网格可以直观便捷地进行编辑，这在CAD应用中非常有用。实验结果表明，我们提出的B-Rep构建方法在重建效率和精度上均优于经典方法和近期基于学习的方法。

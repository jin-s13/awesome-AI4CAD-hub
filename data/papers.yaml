    - 使用一组有机形状作为参考曲面，引入基于样条的曲率边和面，丰富几何多样性并解决现有数据集中的代表性不足问题。
    methodology: 该方法提示大型语言模型输入参考曲面程序和建模流程，生成CAD程序。通过使用一组有机形状变化参考曲面，生成包含基于样条的曲率特征的多样化CAD模型。实验评估几何多样性和与工业级设计的相似度。

  title_cn: Sketch2CAD
  abstract_cn: 我们提出了一种基于草图的CAD建模系统，用户通过逐步绘制所需形状编辑的草图来增量创建物体，系统自动将这些草图转换为CAD操作。我们的方法受到工业设计师绘制3D形状的步骤与CAD建模系统提供类似形状操作之间高度相似性的启发。为了克服2D草图解析的强歧义性，我们观察到在草图序列中，每一步都有其意义，并且可以在先前绘制内容的上下文中进行解释。在我们的系统中，该上下文对应于先前步骤中推断出的部分CAD模型，我们将其与输入草图一起输入深度神经网络，该网络负责解释草图应如何修改模型。我们的深度网络架构随后识别目标CAD操作并相应地对草图进行分割，使得后续优化能够估计最匹配分割草图笔画的操作参数。由于不存在配对的草图和CAD建模序列数据集，我们通过生成CAD操作序列的合成数据并将其渲染为线条图来训练系统。我们展示了支持四种常用CAD操作的概念验证实现。使用我们的系统，参与者能够快速建模大量多样化的物体，证明了Sketch2CAD是当前CAD建模系统的一种替代交互方式。
  tldr_cn: 一个基于深度学习的草图CAD系统，通过合成数据训练将连续草图解释为CAD操作。

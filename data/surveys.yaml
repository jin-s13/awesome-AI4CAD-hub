  related_work_outline:
  - 'Mainstream direction: Multi-modal generation and reconstruction of editable parametric
    CAD models (program sequences or B-Reps) from text, images, point clouds, or meshes,
    with a strong emphasis on benchmark-driven evaluation.'
  - 'Shared research pattern: All works adopt deep generative models (LLMs, state-space
    models, GANs, or hybrid optimization) to produce structured CAD representations,
    and evaluate via geometric fidelity, executability, and increasingly engineering-aware
    metrics.'
  - 'Key differences: Representation choices diverge into procedural CAD scripts versus
    direct differentiable B-Rep surfaces; supervision ranges from point-level to text
    prompts; interaction varies from one-shot generation to proactive clarification;
    evaluation targets span geometric similarity, program validity, and downstream
    manufacturability.'
  - 'Trend evolution: The 2026 frontier concentrates on unifying modalities and tasks,
    scaling with LLMs, introducing differentiable B-Rep representations, and shifting
    evaluation from pure geometry toward functional and assembly constraints.'
  - 'Open questions: How to jointly guarantee geometric accuracy, editability, and
    engineering constraints; how to achieve robustness under ambiguous real-world
    inputs without excessive user interaction; and how to design benchmarks that capture
    the full CAD workflow from concept to manufacture.'
  related_work_outline_zh:
  - 主流方向：从文本、图像、点云或网格等多模态输入生成和重建可编辑的参数化CAD模型（程序序列或B-Rep），并高度依赖基准驱动的评估。
  - 研究共性：所有工作均采用深度生成模型（LLM、状态空间模型、GAN或混合优化）产生结构化CAD表示，并通过几何保真度、可执行性以及越来越多的工程感知指标进行评估。
  - 关键差异：表示选择分为过程式CAD脚本与直接可微分B-Rep曲面；监督信号从点级到文本提示不等；交互模式从一次性生成到主动澄清；评估目标涵盖几何相似性、程序有效性和下游可制造性。
  - 趋势演进：2026年的前沿集中在统一模态与任务、利用LLM扩展、引入可微分B-Rep表示，并将评估从纯几何转向功能与装配约束。
  - 开放问题：如何同时保证几何精度、可编辑性和工程约束；如何在模糊的真实世界输入下实现鲁棒性而无需过多用户交互；如何设计能捕捉从概念到制造完整CAD工作流的基准。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD program generation from multi-modal inputs
      what_it_solves: Translates text, images, or point clouds into executable CAD
        construction sequences (e.g., CadQuery scripts) that are editable by design.
      what_remains_open: Robustness to ambiguous prompts, generalization to complex
        geometries, and integration of engineering constraints beyond geometric validity.
    - line: Direct B-Rep generation with differentiable representations
      what_it_solves: Produces boundary representations (B-Reps) directly from raw
        3D or 2D supervision using differentiable parametric surfaces, enabling end-to-end
        training without CAD-specific annotations.
      what_remains_open: Preserving full parametric editability and history tree;
        scaling to assemblies and functional features; bridging the gap to procedural
        CAD workflows.
    - line: Unified multi-modal multi-task CAD models
      what_it_solves: Handles heterogeneous CAD tasks (reconstruction, generation,
        question answering) within a single framework, reducing the need for task-specific
        architectures.
      what_remains_open: Whether a single model can match specialized models on each
        task; how to incorporate interactive or iterative refinement; evaluation on
        real-world engineering design loops.
    - line: Benchmarks and evaluation protocols for CAD generation
      what_it_solves: Provides standardized datasets, metrics, and evaluation stages
        (code check, geometric check, design-intent alignment) to systematically compare
        models and reveal failure modes.
      what_remains_open: Coverage of manufacturing, assembly, and functional constraints;
        scalability of human/VLM judging; alignment with professional CAD user workflows.
    - line: Interactive and agent-based CAD generation
      what_it_solves: Improves output quality by proactively clarifying ambiguous
        specifications before synthesis, reducing invalid programs and geometric errors.
      what_remains_open: Optimal interaction granularity; user burden vs. automation
        trade-off; generalization to multi-turn design iterations and collaborative
        CAD scenarios.
    consensus:
    - Editable parametric CAD (programs or B-Reps) is the preferred output format
      over static meshes.
    - Multi-modality (text, image, point cloud, mesh) is essential for flexible CAD
      creation.
    - 'Current models suffer from a failure cascade: executable code does not guarantee
      valid geometry, and valid geometry does not guarantee engineering-ready designs.'
    - Evaluation must go beyond geometric similarity to include executability, compactness,
      and design-intent alignment.
    - Large language models and state-space models are emerging as backbones for CAD
      generation, but specialized models still outperform generalist VLMs on clean
      inputs.
    disagreements:
    - 'Representation: procedural CAD scripts (e.g., CadQuery) versus direct differentiable
      B-Rep surfaces (e.g., Bézier patches) — the former preserves editability and
      history, the latter enables end-to-end training on unannotated data.'
    - 'Supervision: some methods rely on curated CAD datasets with program annotations,
      while others use only point-level or image-level supervision without CAD-specific
      labels.'
    - 'Interaction: one-shot generation versus proactive clarification agents — a
      trade-off between automation and robustness to ambiguity.'
    - 'Evaluation target: geometric fidelity metrics (IoU, Chamfer) versus engineering-aware
      criteria (manufacturability, functionality, assemblability) — different benchmarks
      prioritize different aspects.'
    - 'Model architecture: task-specific models (Mamba-CAD, CADFit) versus unified
      multi-modal LLMs (UniCAD, FutureCAD) — the former may excel on specific tasks,
      the latter offer versatility.'
    open_questions:
    - How can we integrate engineering constraints (manufacturability, assembly, material)
      directly into the generation objective without sacrificing geometric accuracy?
    - What is the minimal supervision required to train a CAD generator that generalizes
      across diverse object categories and input modalities?
    - Can interactive clarification be made efficient enough for real-time design
      workflows, and how should the system decide when to ask for clarification?
    - How do we design benchmarks that capture the iterative, collaborative nature
      of professional CAD design rather than single-shot generation?
    - To what extent do improvements in geometric metrics translate to practical CAD
      usability, and how can we measure that reliably?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态输入到参数化CAD程序生成
      解决的问题: 将文本、图像或点云转换为可执行的CAD构建序列（如CadQuery脚本），天然具备可编辑性。
      尚未覆盖: 对模糊提示的鲁棒性、对复杂几何的泛化、以及超越几何有效性的工程约束集成。
    - 路线: 基于可微分表示的直接B-Rep生成
      解决的问题: 利用可微分参数曲面直接从原始3D或2D监督生成边界表示（B-Rep），无需CAD特定标注即可端到端训练。
      尚未覆盖: 保留完整的参数化可编辑性和历史树；扩展到装配体和功能特征；弥合与过程式CAD工作流的差距。
    - 路线: 统一多模态多任务CAD模型
      解决的问题: 在单一框架内处理异构CAD任务（重建、生成、问答），减少对任务特定架构的需求。
      尚未覆盖: 单一模型能否在每个任务上匹敌专用模型；如何融入交互式或迭代优化；在真实工程设计循环中的评估。
    - 路线: CAD生成的基准与评估协议
      解决的问题: 提供标准化数据集、指标和评估阶段（代码检查、几何检查、设计意图对齐），以系统比较模型并揭示失败模式。
      尚未覆盖: 制造、装配和功能约束的覆盖；人工/VLM评判的可扩展性；与专业CAD用户工作流的一致性。
    - 路线: 交互式与基于智能体的CAD生成
      解决的问题: 通过在合成前主动澄清模糊规格来提高输出质量，减少无效程序和几何错误。
      尚未覆盖: 最佳交互粒度；用户负担与自动化的权衡；泛化到多轮设计迭代和协作CAD场景。
    共识:
    - 可编辑的参数化CAD（程序或B-Rep）优于静态网格，是首选的输出格式。
    - 多模态（文本、图像、点云、网格）对于灵活的CAD创建至关重要。
    - 当前模型存在失败级联：可执行代码不保证有效几何，有效几何不保证工程就绪设计。
    - 评估必须超越几何相似性，纳入可执行性、紧凑性和设计意图对齐。
    - 大语言模型和状态空间模型正成为CAD生成的骨干，但在干净输入上专用模型仍优于通用视觉语言模型。
    分歧:
    - 表示方式：过程式CAD脚本（如CadQuery）与直接可微分B-Rep曲面（如贝塞尔面片）——前者保留可编辑性和历史，后者允许在无标注数据上端到端训练。
    - 监督信号：部分方法依赖带程序标注的精选CAD数据集，其他方法仅使用点级或图像级监督，无需CAD特定标签。
    - 交互模式：一次性生成与主动澄清智能体——在自动化与对模糊性的鲁棒性之间权衡。
    - 评估目标：几何保真度指标（IoU、Chamfer）与工程感知标准（可制造性、功能性、可装配性）——不同基准侧重不同方面。
    - 模型架构：任务特定模型（Mamba-CAD、CADFit）与统一多模态LLM（UniCAD、FutureCAD）——前者可能在特定任务上表现更优，后者提供通用性。
    开放问题:
    - 如何在不牺牲几何精度的前提下，将工程约束（可制造性、装配、材料）直接集成到生成目标中？
    - 训练一个能跨不同物体类别和输入模态泛化的CAD生成器所需的最小监督是什么？
    - 交互式澄清能否高效到足以用于实时设计工作流，系统应如何决定何时请求澄清？
    - 如何设计能捕捉专业CAD设计迭代、协作本质的基准，而非仅评估单次生成？
    - 几何指标的改进在多大程度上转化为实际的CAD可用性，我们如何可靠地衡量这一点？

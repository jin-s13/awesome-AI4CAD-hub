  related_work_outline:
  - 'Mainstream direction: Neural generation of editable CAD programs (CadQuery, STEP)
    from multimodal inputs (text, image, point cloud), with growing emphasis on engineering-aware
    benchmarks that assess manufacturability, assemblability, and design-intent alignment
    beyond geometric similarity.'
  - 'Shared research pattern: Representing CAD as executable code or parametric surfaces,
    training deep generative models on large-scale datasets, and evaluating via multi-metric
    benchmarks that reveal a failure cascade from syntax to geometry to engineering
    compliance.'
  - 'Key differences: Representations split between code-based B-Rep (CadQuery/STEP)
    and differentiable parametric patches; supervision ranges from point clouds and
    images to finite element analysis; evaluation targets diverge into geometric fidelity,
    executability, and functional performance.'
  - 'Trend evolution: Within the 2026 frontier, the field is shifting from pure geometric
    reconstruction toward interactive, feedback-driven pipelines (clarification agents,
    FEA self-improvement) and toward benchmarks that encode industrial part families
    and design specifications.'
  - 'Open questions: Whether scaling data or representations can close the generalization
    gap to unseen part families; how to align automated metrics with true engineering
    validity; and how to integrate formal constraints (FEA, tolerancing) directly
    into the generative objective.'
  related_work_outline_zh:
  - 主流方向：从多模态输入（文本、图像、点云）神经生成可编辑的CAD程序（CadQuery、STEP），并日益重视超越几何相似度的工程感知基准，评估可制造性、可装配性和设计意图对齐。
  - 研究共性：将CAD表示为可执行代码或参数化曲面，在大规模数据集上训练深度生成模型，并通过多指标基准评估，揭示从语法到几何再到工程合规的失败级联。
  - 关键差异：表示方式分为基于代码的B-Rep（CadQuery/STEP）和可微分参数面片；监督信号从点云、图像到有限元分析不等；评测目标分化为几何保真度、可执行性和功能性能。
  - 趋势演进：在2026年前沿中，领域正从纯几何重建转向交互式、反馈驱动的流水线（澄清智能体、FEA自改进），并转向编码工业零件族和设计规范的基准。
  - 开放问题：扩展数据或表示能否弥合对未见零件族的泛化差距；如何使自动指标与真实工程有效性对齐；如何将形式化约束（FEA、公差）直接集成到生成目标中。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal CAD program generation
      what_it_solves: Automatically producing editable, executable CAD scripts (CadQuery,
        STEP) from text, images, or point clouds, reducing manual modeling effort.
      what_remains_open: Faithful reconstruction of fine 3D structure and complex
        operations (sweeps, lofts); generalization to unseen industrial part families;
        satisfaction of engineering constraints beyond geometric appearance.
    - line: CAD generation benchmarks and evaluation protocols
      what_it_solves: Providing unified, multi-metric testbeds (CADBench, MUSE, BenchCAD)
        that expose failure modes across geometric fidelity, executability, manufacturability,
        and design-intent alignment.
      what_remains_open: Closing the gap between automated metrics and real-world
        engineering sign-off; ensuring benchmarks cover diverse complexity levels
        and modality shifts without overfitting to specific representations.
    - line: Geometry representation and generative architectures
      what_it_solves: Enabling high-quality CAD generation through representations
        like parametric Bézier patches or state-space models, and training paradigms
        such as differentiable tessellation or self-supervised pretraining.
      what_remains_open: Direct evidence that chosen representations improve downstream
        editability, simulation readiness, or training efficiency on unannotated data;
        handling very long parametric sequences without degradation.
    - line: Interactive and feedback-driven CAD generation
      what_it_solves: Improving robustness to ambiguous specifications via proactive
        clarification, and aligning outputs with engineering performance through finite
        element analysis feedback loops.
      what_remains_open: Achieving strict FEA pass on first attempts; scaling feedback
        mechanisms to real design workflows without prohibitive computation; verifying
        that clarification questions match designer intent.
    consensus:
    - Executable CAD programs and parametric surfaces are preferred representations
      because they preserve editability and enable direct geometric evaluation.
    - 'Current models exhibit a consistent failure cascade: from syntactically correct
      code to valid geometry to engineering-ready designs, with performance degrading
      sharply as geometric complexity increases.'
    - No single metric suffices; evaluation must combine geometric similarity, executability,
      and task-specific engineering criteria such as manufacturability or FEA compliance.
    - Specialized mesh-to-CAD models outperform general-purpose vision-language models
      under idealized inputs, but both are brittle under modality shift and distribution
      shift.
    disagreements:
    - 'Representation choice: some works generate CadQuery scripts, others output
      STEP assemblies, and others reconstruct B-Reps as parametric surface patches,
      each with different editability and supervision trade-offs.'
    - 'Supervision signal: approaches range from point-level supervision on unannotated
      3D data, to text prompts, to multi-view renders, to finite element analysis
      feedback, leading to different training requirements and output characteristics.'
    - 'Evaluation target: benchmarks prioritize different aspects—geometric Chamfer
      distance, program executability, design-intent alignment via VLM judges, or
      engineering simulation pass/fail—making cross-comparison difficult.'
    - 'Interaction paradigm: one line assumes single-shot generation from a complete
      specification, while another introduces multi-turn clarification or iterative
      refinement with external tools, trading off autonomy for robustness.'
    open_questions:
    - Can the generalization gap to unseen part families be closed by scaling data
      and model size, or does it require fundamentally new representations that encode
      design intent?
    - How can finite element analysis and other engineering simulations be integrated
      as differentiable or efficient feedback signals directly into the training loop?
    - What evaluation protocol can simultaneously automate assessment and reliably
      reflect human design intent, manufacturability, and assemblability without relying
      on proprietary VLM judges?
    - Under what conditions do proactive clarification or iterative feedback loops
      yield diminishing returns, and how can models decide when to ask for clarification
      versus commit to a plausible design?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD程序生成
      解决的问题: 从文本、图像或点云自动生成可编辑、可执行的CAD脚本（CadQuery、STEP），减少手工建模工作量。
      尚未覆盖: 精细三维结构和复杂操作（扫掠、放样）的忠实重建；对未见工业零件族的泛化；满足超越几何外观的工程约束。
    - 路线: CAD生成基准与评估协议
      解决的问题: 提供统一的多指标测试平台（CADBench、MUSE、BenchCAD），揭示几何保真度、可执行性、可制造性和设计意图对齐方面的失败模式。
      尚未覆盖: 弥合自动指标与真实工程验收之间的差距；确保基准覆盖不同复杂度级别和模态转换，而不对特定表示过拟合。
    - 路线: 几何表示与生成架构
      解决的问题: 通过参数化贝塞尔曲面或状态空间模型等表示，以及可微分曲面细分或自监督预训练等训练范式，实现高质量CAD生成。
      尚未覆盖: 所选表示能改善下游可编辑性、仿真就绪度或在无标注数据上的训练效率的直接证据；处理极长参数化序列而不退化。
    - 路线: 交互式与反馈驱动的CAD生成
      解决的问题: 通过主动澄清提高对模糊规范的鲁棒性，并通过有限元分析反馈循环使输出与工程性能对齐。
      尚未覆盖: 首次尝试即实现严格的FEA通过；将反馈机制扩展到真实设计工作流而不产生过高计算成本；验证澄清问题是否与设计者意图一致。
    共识:
    - 可执行CAD程序和参数化曲面是首选表示，因为它们保留可编辑性并支持直接几何评估。
    - 当前模型呈现一致的失败级联：从语法正确的代码到有效几何再到工程就绪设计，性能随几何复杂度增加而急剧下降。
    - 单一指标不够；评估必须结合几何相似度、可执行性和特定任务的工程标准，如可制造性或FEA合规性。
    - 在理想化输入下，专用网格到CAD模型优于通用视觉语言模型，但两者在模态转换和分布偏移下都表现脆弱。
    分歧:
    - 表示选择：一些工作生成CadQuery脚本，另一些输出STEP装配体，还有一些将B-Rep重建为参数化曲面面片，各自在可编辑性和监督信号方面有不同的权衡。
    - 监督信号：方法从无标注三维数据的点级监督，到文本提示、多视图渲染，再到有限元分析反馈，导致不同的训练需求和输出特性。
    - 评测目标：基准侧重不同方面——几何Chamfer距离、程序可执行性、通过VLM评判器的设计意图对齐，或工程仿真通过/失败——使得交叉比较困难。
    - 交互范式：一类假设从完整规范单次生成，另一类引入多轮澄清或借助外部工具迭代优化，在自主性和鲁棒性之间做出权衡。
    开放问题:
    - 通过扩展数据和模型规模能否弥合对未见零件族的泛化差距，还是需要能编码设计意图的全新表示？
    - 如何将有限元分析和其他工程仿真作为可微分或高效的反馈信号直接集成到训练循环中？
    - 什么样的评估协议既能自动化评估，又能可靠反映人类设计意图、可制造性和可装配性，而不依赖专有的VLM评判器？
    - 在什么条件下主动澄清或迭代反馈循环的收益会递减，模型如何决定何时请求澄清而非直接生成一个合理的设计？

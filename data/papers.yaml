- id: toolcad-exploring-tool-using-large-language-models-in-text-2026
  title: 'TOOLCAD: Exploring Tool-Using Large Language Models in Text-to-CAD Generation
    with Reinforcement Learning'
  authors:
  - Yifei Gong
  - Xing Wu
  - Wenda Liu
  - Kang Tu
  abstract: Computer-Aided Design (CAD) is an expert-level task that relies on long-horizon
    reasoning and coherent modeling actions. Large Language Models (LLMs) have shown
    remarkable advancements in enabling language agents to tackle real-world tasks.
    Notably, there has been no investigation into how tool-using LLMs optimally interact
    with CAD engines, hindering the emergence of LLM-based agentic text-to-CAD modeling
    systems. We propose ToolCAD, a novel agentic CAD framework deploying LLMs as tool-using
    agents for text-to-CAD generation. Furthermore, we introduce an interactive CAD
    modeling gym to rollout reasoning and tool-augmented interaction trajectories
    with the CAD engine, incorporating hybrid feedback and human supervision. Meanwhile,
    an end-to-end post-training strategy is presented to enable the LLM agent to elicit
    refined CAD Modeling Chain of Thought (CAD-CoT) and evolve into proficient CAD
    tool-using agents via online curriculum reinforcement learning. Our findings demonstrate
    ToolCAD fills the gap in adopting and training open-source LLMs for CAD tool-using
    agents, enabling them to perform comparably to proprietary models, paving the
    way for more accessible and robust autonomous text-to-CAD modeling systems.

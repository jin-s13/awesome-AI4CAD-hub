  - 研究共性：所有工作都采用将高层规范映射到可执行CAD表示的流水线，并通过几何度量、可执行性或设计意图对齐进行评估，揭示出从语法到几何再到工程合规的常见失败级联。
  - 关键差异：输入模态范围（单模态文本 vs. 多模态）、评估标准（Chamfer距离、Box-IoU、可制造性评分标准）、交互范式（一次性生成 vs. 主动澄清

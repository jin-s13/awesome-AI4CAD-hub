  title_cn: 拓扑优先的B-Rep网格生成
  abstract_cn: 参数化边界表示模型（B-Rep）是CAD、图形学和机器人领域的事实标准，但将其转换为有效网格仍然脆弱。困难源于高阶曲面和曲线相交到低阶基元的不可避免近似：由此产生的几何实现往往无法尊重B-Rep中编码的精确拓扑，生成具有不正确或缺失邻接关系的网格。现有的网格生成流程通过启发式特征合并和修复策略来解决这些不一致性，但这些策略不提供拓扑保证，并且经常在复杂模型上失败。我们提出了一种根本不同的方法：将B-Rep拓扑视为网格生成过程的不变量。我们的算法强制执行精确的B-Rep拓扑，同时允许单个用户定义的容差来控制网格与底层参数曲面的偏差。因此，对于任何可接受的容差，输出网格在拓扑上是正确的；只有几何保真度随着容差增加而降低。这种解耦消除了事后修复的需要，即使在底层几何不一致或高度近似的情况下也能生成鲁棒的网格。我们在来自ABC和Fusion
    360数据集的数千个真实世界CAD模型上评估了我们的方法，包括标准网格工具失败的实例。结果表明，算法层面的拓扑保证能够生成适用于下游应用的可靠网格。

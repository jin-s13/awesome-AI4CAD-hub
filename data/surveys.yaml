  related_work_outline_zh:
  - 主流方向：方法方向中围绕CV、AI、LG、GR的研究正在收敛到统一多模态基准CADBench，包含来自六个数据集家族的18,000个样本、五种输入模态和六项指标，用于CAD程序生成。、基于LLM生成可执行的CadQuery脚本用于CAD建模、基于混合优化的CAD重建，利用几何反馈逐步拟合和验证参数化操作。
  - 研究共性：高分论文通常把CADBench汇集了来自六个基准家族（DeepCAD、Fusion 360、ABC、MCB、Objaverse）的18,000个评估样本，涵盖五种输入模态（干净/噪声网格、单视图、逼真渲染、多视图渲染）和六…、FutureCAD使用大语言模型从文本提示生成CadQuery脚本，并使用B-Rep接地变压器将自然语言查询映射到几何基元。LLM首先在新的真实世界CAD数据集上进行监督微调，然后通过强化学习进一步优化。、CADFit通过逐步拟合参数化操作（拉伸、旋转、倒圆角、倒角）并利用几何反馈进行验证，从网格重建CAD构建序列。重建被形式化为结构化CAD程序上的IoU驱动优化。多模态扩展将基于图像的几何重建与CADFit结…与在理想化输入下，专用网格到CAD模型显著优于代码生成VLM；出现三种失败模式：重建质量随几何复杂度下降，CAD专用模型在模态转换下脆弱，模型排名随指标变化。、FutureCAD在CAD生成任务上达到了最先进的性能。、CADFit在体积交并比和倒角距离上优于最先进的网格到CAD方法，并显著降低了重建CAD程序的无效比率，尤其对于复杂设计。结合起来，而不是只停留在概念声明。
  - 关键差异：论文之间的差异主要体现在CV、AI、LG、GR、CL，因此更值得比较表示方式、监督信号和决策时接口。
  - 趋势演进：从 2003 到 2026，研究重心正在从单点模型主张转向可交互系统、标准化基准和可横向比较的证据。
  - 开放问题：反复出现的缺口包括数据覆盖、基线强度、可复现性，以及模型是否能改善闭环行为，这些应成为后续文献综述的主线。

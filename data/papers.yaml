  abstract_cn: 高分辨率图像到视频（I2V）生成旨在合成逼真的时间动态，同时保留输入图像的精细外观细节。在2K分辨率下，这一任务极具挑战性，现有解决方案存在各种缺陷：1）端到端模型在内存和延迟方面往往成本过高；2）将低分辨率生成与通用视频超分辨率级联，由于超分辨率阶段未明确以输入图像为条件，容易产生幻觉细节并偏离输入特定的局部结构。为此，我们提出SwiftI2V，一个专为高分辨率I2V设计的高效框架。遵循广泛使用的两阶段设计，它通过首先生成低分辨率运动参考以减少令牌成本并减轻建模负担，然后执行由运动引导的强图像条件2K合成，以在可控开销下恢复输入保真细节，从而解决了效率-保真度困境。具体而言，为使生成更具可扩展性，SwiftI2V引入了条件分段生成（CSG），以有界每步令牌预算逐段合成视频，并在每个分段内采用双向上下文交互以改善跨段连贯性和输入保真度。在2K分辨率下的VBench-I2V上，SwiftI2V实现了与端到端基线相当的性能，同时将总GPU时间减少了202倍。特别是，它使得在单个数据中心GPU（如H800）或消费级GPU（如RTX

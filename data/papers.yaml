  abstract_cn: CAD模型的表示学习在很大程度上是一个未解决的问题。尽管3D表示学习在点云和网格方面蓬勃发展，但CAD的原生格式——边界表示（BReps），它编码了精确的参数化曲面、曲线及其拓扑结构，作为表示学习的基础却很少受到关注。我们提出了BRepCLIP，这是第一个通过对比预训练将BRep几何与语言和图像嵌入对齐的框架。我们将每个CAD对象建模为面令牌和边令牌的序列，分别使用独立的离散词汇表来表示曲面和曲线几何，并辅以捕获曲面类型（例如，圆柱面、环面、NURBS）和曲线基元（例如，直线、圆弧、B样条）的空间和语义描述符。一个Transformer编码器将这些令牌聚合成全局BRep嵌入，通过联合对比目标与CLIP的文本和图像编码器对齐。BRepCLIP生成的嵌入比现有的基于点云的替代方案更具判别性和语义基础，在ABC、CADParser和Automate数据集上，Top-1检索比OpenShape分别提高了40.4%、22.0%和23.9%，在FabWave上的零样本分类Top-1提高了15%。我们进一步展示了其作为CAD感知相似度度量的实用性，用于评估文本和图像条件下的CAD生成，确立了结构感知预训练对于多模态CAD理解的重要性。项目页面：https://muhammadusama100.github.io/BrepClip2026/

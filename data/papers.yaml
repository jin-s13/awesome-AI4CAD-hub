- id: llm4cad-multi-modal-large-language-models-for-3d-computer-a-2024
  title: 'LLM4CAD: Multi-Modal Large Language Models for 3D Computer-Aided Design
    Generation'
  authors:
  - Xingang Li
  - Yuewan Sun
  - Z. Sha
  abstract: "\n The evolution of multimodal large language models (LLMs) capable of\
    \ processing diverse input modalities (e.g., text and images) holds new prospects\
    \ for their application in engineering design, such as the generation of 3D computer-aided\
    \ design (CAD) models. However, little is known about the ability of multimodal\
    \ LLMs to generate 3D design objects, and there is a lack of quantitative assessment.\
    \ In this study, we develop an approach to enable two LLMs, GPT-4 and GPT-4V,\
    \ to generate 3D CAD models (i.e., LLM4CAD) and perform experiments to evaluate\
    \ their efficacy. To address the challenge of data scarcity for multimodal LLM\
    \ studies, we created a data synthesis pipeline to generate CAD models, sketches,\
    \ and image data of typical mechanical components (e.g., gears and springs) and\
    \ collect their natural-language descriptions with dimensional information using\
    \ Amazon Mechanical Turk. We positioned the CAD program (programming script for\
    \ CAD design) as a bridge, facilitating the conversion of LLMs’ textual output\
    \ into tangible CAD design objects. We focus on two critical capabilities: the\
    \ generation of syntactically correct CAD programs (Cap1) and the accuracy of\
    \ the parsed 3D shapes (Cap2) quantified by intersection over union. The results\
    \ show that both GPT-4 and GPT-4V demonstrate potential in 3D CAD generation.\
    \ Specifically, on average, GPT-4V outperforms when processing only text-based\
    \ input, exceeding the results obtained using multimodal inputs, such as text\
    \ with image, for Cap 1 and Cap 2. However, when examining category-specific results\
    \ of mechanical components, while the same trend still holds for Cap 2, the prominence\
    \ of multimodal inputs is increasingly evident for more complex geometries (e.g.,\
    \ springs and gears) in Cap 1. The potential of multimodal LLMs in enhancing 3D\
    \ CAD generation is clear, but their application must be carefully calibrated\
    \ to the complexity of the target CAD models to be generated."

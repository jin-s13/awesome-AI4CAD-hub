  - 'Key differences: Representation choice (B-Rep primitives vs. differentiable parametric
    surfaces), input modality (text, mesh, image), evaluation scope (geometry-only
    vs. manufacturability and functionality), and interaction strategy (one-shot,
    agentic clarification, or iterative FEA feedback).'
  - 'Trend evolution: The field is moving from unimodal mesh-to-CAD scoring toward
    multi-modal, engineering-aware evaluation with industrial part families, agentic
    self-improvement, and design-intent alignment beyond geometric similarity.'
  - 'Open questions: Whether models can generalize to unseen part families; how to
    reliably satisfy strict engineering constraints; and how to balance geometric
    accuracy, program executability, and functional design intent.'
  related_work_outline_zh:
  - 主流方向：建立全面的基准并利用LLM从多模态输入进行程序化CAD生成，重点关注几何保真度和可执行代码。
  - 研究共性：提出一个基准或模型，从文本、图像或3D数据生成CAD程序（CadQuery、STEP），并使用Chamfer距离、可执行性、设计合规性等指标进行评估。
  - 关键差异：表示选择（B-Rep基元 vs. 可微参数曲面）、输入模态（文本、网格、图像）、评估范围（仅几何 vs. 可制造性与功能性）、交互策略（一次性生成、智能体澄清或迭代FEA反馈）。
  - 趋势演进：该领域正从单模态网格到CAD的评分，转向包含工业零件族、智能体自改进和超越几何相似性的设计意图对齐的多模态、工程感知评估。
  - 开放问题：模型能否泛化到未见过的零件族；如何可靠地满足严格的工程约束；如何平衡几何精度、程序可执行性和功能性设计意图。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal CAD generation benchmarks
      what_it_solves: Provides standardized evaluation of CAD program generation from
        images, meshes, text, or point clouds, covering geometric and sometimes engineering
        metrics.
      what_remains_open: Generalization to unseen part families remains limited; current
        metrics may not fully capture manufacturability or functional design intent.
    - line: Text-to-CAD generation with LLMs and B-Rep grounding
      what_it_solves: Generates editable CAD programs from natural language by mapping
        text to B-Rep primitives or parametric surfaces, using fine-tuned or reinforced
        LLMs.
      what_remains_open: Handling ambiguous prompts, ensuring high fidelity across
        diverse designs, and producing executable CAD that matches engineering specifications.
    - line: CAD sequence modeling with alternative architectures
      what_it_solves: Models long parametric CAD sequences as self-supervised generative
        tasks using state space models, aiming to handle complex designs.
      what_remains_open: Scalability to even longer sequences and integration with
        multi-modal inputs or engineering constraints.
    - line: Agent-based CAD generation with iterative feedback
      what_it_solves: Enables CAD models to refine outputs through clarification dialogues
        or physical simulation feedback (FEA), improving geometric and functional
        compliance.
      what_remains_open: Strict constraint satisfaction is rarely achieved; the gap
        between iterative improvement and fully valid, engineering-ready designs persists.
    consensus:
    - Current models struggle to produce CAD programs that are both geometrically
      accurate and fully executable.
    - B-Rep and parametric representations are essential for editability and downstream
      engineering use.
    - Multi-modal inputs (text, image, mesh) are necessary for practical CAD generation
      workflows.
    - Benchmarks are critical for measuring progress, but no single metric captures
      all aspects of CAD quality.
    disagreements:
    - Whether evaluation should prioritize geometric fidelity and executability alone,
      or also include manufacturability, functionality, and assemblability.
    - Whether to use a one-shot generation approach, an agent that proactively clarifies
      prompts, or an iterative refinement loop guided by simulation feedback.
    - Whether the CAD representation should be based on B-Rep primitives with explicit
      grounding or on differentiable parametric surfaces trained from point clouds.
    - Whether benchmarks should be built from existing academic datasets or from synthetic
      industrial part families to better reflect real-world challenges.
    open_questions:
    - How can models generalize to part families not seen during training or fine-tuning?
    - What is the most effective feedback mechanism to move from geometric similarity
      to strict engineering constraint satisfaction?
    - Can interactive clarification or iterative refinement fully bridge the gap between
      ambiguous natural language and precise CAD code?
    - How should benchmarks balance coverage of geometric complexity and diversity
      of input modalities with the need for scalable, automated evaluation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD生成基准
      解决的问题: 为从图像、网格、文本或点云生成CAD程序提供标准化评估，涵盖几何指标，有时也包括工程指标。
      尚未覆盖: 对未见零件族的泛化能力有限；当前指标可能无法完全捕捉可制造性或功能性设计意图。
    - 路线: 基于LLM和B-Rep接地的文本到CAD生成
      解决的问题: 通过将文本映射到B-Rep基元或参数曲面，从自然语言生成可编辑的CAD程序，使用微调或强化学习训练的LLM。
      尚未覆盖: 处理模糊提示，确保跨不同设计的高保真度，并生成符合工程规格的可执行CAD。
    - 路线: 基于替代架构的CAD序列建模
      解决的问题: 使用状态空间模型将长参数化CAD序列作为自监督生成任务进行建模，旨在处理复杂设计。
      尚未覆盖: 向更长序列的扩展性，以及与多模态输入或工程约束的集成。
    - 路线: 基于迭代反馈的智能体CAD生成
      解决的问题: 通过澄清对话或物理仿真反馈（FEA）使CAD模型能够细化输出，提高几何和功能合规性。
      尚未覆盖: 严格约束满足很少实现；迭代改进与完全有效、工程就绪的设计之间的差距仍然存在。
    共识:
    - 当前的模型难以生成既几何准确又完全可执行的CAD程序。
    - B-Rep和参数化表示对于可编辑性和下游工程使用至关重要。
    - 多模态输入（文本、图像、网格）是实际CAD生成工作流所必需的。
    - 基准对于衡量进展至关重要，但没有任何单一指标能捕捉CAD质量的所有方面。
    分歧:
    - 评估应优先考虑几何保真度和可执行性，还是还应包括可制造性、功能性和可装配性。
    - 应采用一次性生成方法，还是由智能体主动澄清提示，或通过仿真反馈引导的迭代优化循环。
    - CAD表示应基于带有显式接地的B-Rep基元，还是基于从点云训练的可微参数曲面。
    - 基准应基于现有学术数据集，还是基于合成工业零件族，以更好地反映现实世界挑战。
    开放问题:
    - 模型如何泛化到训练或微调过程中未见过的零件族？
    - 从几何相似性走向严格工程约束满足的最有效反馈机制是什么？
    - 交互式澄清或迭代细化能否完全弥合模糊自然语言与精确CAD代码之间的差距？
    - 基准应如何在几何复杂性和输入模态多样性的覆盖与可扩展、自动化评估的需求之间取得平衡？

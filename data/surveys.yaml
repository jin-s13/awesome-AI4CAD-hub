    consensus:
    - Deep learning is the primary tool for CAD-related tasks, replacing hand-crafted
      geometric algorithms.
    - Factorized or multi-stage pipelines are preferred to handle the complexity of
      CAD structures.
    - Synthetic data plays a crucial role in training due to the scarcity of annotated
      real CAD data.
    - Code and dataset release is becoming common practice, improving reproducibility.
    disagreements:
    - 'Choice of 3D representation: B-rep offers engineering precision but is harder
      to generate, while meshes and point clouds are easier but lack topological guarantees.'
    - 'Supervision paradigm: some methods use reinforcement learning for alignment,
      others use autoregressive or GAN-based generation, leading to different stability
      and quality trade-offs.'
    - 'Evaluation focus: geometric accuracy vs. topological validity vs. interaction
      success rate, with no consensus on a primary metric.'
    - 'Interaction modality: some works target automatic generation, others learn
      from human UI interactions, reflecting different deployment assumptions.'
    open_questions:
    - How can we design a unified evaluation protocol that fairly compares B-rep,
      mesh, and point cloud generation methods?
    - What is the minimal real-world supervision needed to bridge the sim-to-real
      gap in CAD model generation and reconstruction?
    - Can factorized generation approaches guarantee global topological consistency
      without sacrificing geometric detail?
    - How should long-horizon CAD interaction models be evaluated beyond imitation
      accuracy, e.g., on task completion or design intent preservation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 分类体系与路线图综合
      解决的问题: 将碎片化的AI4CAD方法整理为生成、重建、交互等方向，揭示研究缺口和里程碑。
      尚未覆盖: 分类是否基于全子领域的系统证据，还是仅依赖近期论文的选择性样本；传统CAD范式覆盖不足。
    - 路线: 对比评测综合
      解决的问题: 总结不同评测选择（如几何保真度与拓扑有效性）如何影响结论，例如BrepForge与基线的比较。
      尚未覆盖: 结果在不同表示或数据集间通常不可比；缺乏跨任务统一基准，指标对超参数的敏感性未充分探索。
    - 路线: 开放问题与缺口映射
      解决的问题: 识别具体下一步问题，如可控生成、真实场景的仿真到现实迁移、从视频学习长程CAD交互。
      尚未覆盖: 哪些缺口（如拓扑保证与数据集规模）对实际CAD应用最重要，优先级仍不明确。
    共识:
    - 深度学习是CAD相关任务的主要工具，取代手工几何算法。
    - 分解式或多阶段流水线被广泛采用以处理CAD结构的复杂性。
    - 由于标注真实CAD数据稀缺，合成数据在训练中起关键作用。
    - 代码和数据集发布逐渐成为惯例，提高了可复现性。
    分歧:
    - 3D表示选择：B-rep提供工程精度但更难生成，网格和点云更易处理但缺乏拓扑保证。
    - 监督范式：部分方法用强化学习做对齐，其他用自回归或GAN生成，导致稳定性和质量权衡不同。
    - 评测重点：几何精度 vs. 拓扑有效性 vs. 交互成功率，缺乏主要指标共识。
    - 交互模态：一些工作面向自动生成，另一些从人类UI交互学习，反映不同的部署假设。
    开放问题:
    - 如何设计统一评测协议，公平比较B-rep、网格和点云生成方法？
    - 弥合CAD模型生成与重建中仿真到现实差距所需的最小真实监督是什么？
    - 分解式生成方法能否在不牺牲几何细节的前提下保证全局拓扑一致性？
    - 长程CAD交互模型应如何超越模仿精度进行评估，例如基于任务完成度或设计意图保持？

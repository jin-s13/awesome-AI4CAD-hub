  related_work_outline_zh:
  - 主流方向：当前工作集中于使用大语言模型或专用生成架构，从多模态输入生成可编辑的CAD程序（B-Rep、STEP、CadQuery），并通过新提出的基准进行评估。
  - 研究共性：所有工作均采用程序化CAD表示，并评估几何保真度与可执行性，普遍揭示出从代码有效性到几何精度再到工程合规性的失败级联。
  - 关键差异：方法在监督信号（点云、文本、工程需求）、交互模式（一次性生成、主动澄清、迭代FEA反馈）和评估标准（Chamfer距离、Box-IoU、设计意图评分）上存在分歧。
  - 趋势演进：证据集中于2026年，表明当前前沿正转向LLM驱动的生成、智能体反馈循环，以及评估下游可制造性和可装配性而不仅是几何相似性的基准。
  - 开放问题：如何泛化到未见零件族、将物理约束（如FEA）集成到训练中，以及建立统一的度量标准以同时捕获几何和功能需求，这些问题仍未解决。
  literature_review:
    line_of_work_matrix:
    - line: Multimodal CAD generation benchmarks
      what_it_solves: Provides standardized evaluation protocols and datasets to measure
        progress in CAD program generation from images, text, or 3D data, covering
        geometric fidelity, executability, and design-intent alignment.
      what_remains_open: Existing benchmarks focus on geometric and syntactic correctness
        but lack consistent coverage of physical validity (e.g., FEA) and real-world
        manufacturability constraints; generalization to unseen industrial part families
        remains poor.
    - line: LLM-based CAD program synthesis with feedback
      what_it_solves: Enables text-to-CAD generation using large language models,
        often augmented with clarification dialogues or engineering feedback (FEA,
        blueprint schemas) to iteratively refine outputs and improve geometric reconstruction.
      what_remains_open: Even with feedback, models fail to produce strictly valid
        engineering artifacts in first attempts and meet only a fraction of typed
        requirements; the reliance on proprietary LLMs limits reproducibility and
        systematic analysis of failure modes.
    - line: Specialized generative architectures for parametric CAD
      what_it_solves: Develops dedicated models (state space models, differentiable
        parametric surfaces) that learn latent representations of CAD sequences or
        B-Rep patches, enabling generation from point-level or multimodal supervision
        without CAD-specific annotations.
      what_remains_open: These models are often evaluated on geometric metrics alone
        and have not been integrated with engineering validation loops; their scalability
        to complex assemblies and robustness under input modality shifts are underexplored.
    consensus:
    - Programmatic CAD representations (CadQuery, STEP, B-Rep) are the de facto output
      format, as they enable editability and downstream engineering use.
    - Geometric fidelity and executability are necessary but insufficient; a gap exists
      between generating valid geometry and meeting functional engineering requirements.
    - Current models, whether LLM-based or specialized, exhibit brittleness under
      distribution shift, particularly for complex geometries and unseen part families.
    - Evaluation must move beyond single-modality and single-metric setups to capture
      the multi-faceted nature of CAD quality.
    disagreements:
    - 'Supervision paradigm: some methods rely on text prompts and LLM fine-tuning,
      while others use point-level or image-based supervision with differentiable
      rendering, leading to different data requirements and generalization profiles.'
    - 'Interaction model: one-shot generation is contrasted with agentic frameworks
      that incorporate proactive clarification or iterative FEA feedback, trading
      off autonomy for robustness.'
    - 'Evaluation targets: benchmarks emphasize different aspects—geometric similarity
      (Chamfer distance), code executability, design-intent rubrics, or physical validity—making
      cross-paper comparison difficult.'
    - 'Architecture choice: the field is split between adapting general-purpose LLMs
      and designing CAD-specific generative models, with no clear winner on combined
      geometric and engineering metrics.'
    open_questions:
    - Can feedback signals like FEA be incorporated directly into training objectives
      rather than only during inference-time refinement?
    - What benchmark design would simultaneously assess geometric accuracy, parametric
      faithfulness, and physical validity without conflating metric-specific failures?
    - How can models learn to generalize across industrial part families given the
      limited diversity of existing CAD datasets?
    - Is the failure cascade (code → geometry → engineering) a fundamental limitation
      of current autoregressive or patch-based generation paradigms, or can it be
      resolved with scale?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多模态CAD生成基准
      解决的问题: 提供标准化的评估协议和数据集，衡量从图像、文本或3D数据生成CAD程序的进展，涵盖几何保真度、可执行性和设计意图对齐。
      尚未覆盖: 现有基准侧重于几何和语法正确性，但缺乏对物理有效性（如FEA）和真实可制造性约束的一致覆盖；对未见工业零件族的泛化能力仍然较差。
    - 路线: 基于LLM的CAD程序合成与反馈
      解决的问题: 利用大语言模型实现文本到CAD生成，通常辅以澄清对话或工程反馈（FEA、蓝图模式）来迭代优化输出并改善几何重建。
      尚未覆盖: 即使有反馈，模型在首次尝试中仍无法生成严格有效的工程工件，且仅满足一小部分类型化需求；对专有LLM的依赖限制了可复现性和对失败模式的系统分析。
    - 路线: 面向参数化CAD的专用生成架构
      解决的问题: 开发专用模型（状态空间模型、可微分参数曲面），学习CAD序列或B-Rep面片的潜在表示，能够从点级或多模态监督生成，无需CAD特定标注。
      尚未覆盖: 这些模型通常仅在几何指标上评估，未与工程验证循环集成；其对复杂装配体的可扩展性和在输入模态变化下的鲁棒性尚未充分探索。
    共识:
    - 程序化CAD表示（CadQuery、STEP、B-Rep）是事实上的输出格式，因为它们支持可编辑性和下游工程使用。
    - 几何保真度和可执行性是必要但不充分的；生成有效几何与满足功能性工程需求之间存在差距。
    - 当前模型，无论是基于LLM还是专用模型，在分布变化下表现出脆弱性，尤其是对于复杂几何和未见零件族。
    - 评估必须超越单一模态和单一指标设置，以捕捉CAD质量的多面性。
    分歧:
    - 监督范式：一些方法依赖文本提示和LLM微调，而另一些则使用点级或基于图像的可微分渲染监督，导致不同的数据需求和泛化特性。
    - 交互模型：一次性生成与包含主动澄清或迭代FEA反馈的智能体框架形成对比，在自主性与鲁棒性之间进行权衡。
    - 评估目标：基准强调不同方面——几何相似性（Chamfer距离）、代码可执行性、设计意图评分或物理有效性——使得跨论文比较困难。
    - 架构选择：领域在适配通用LLM与设计CAD专用生成模型之间存在分歧，在几何和工程综合指标上尚无明确胜者。
    开放问题:
    - 能否将FEA等反馈信号直接纳入训练目标，而不仅仅在推理时优化中使用？
    - 什么样的基准设计能够同时评估几何精度、参数忠实度和物理有效性，而不混淆特定指标的失败？
    - 鉴于现有CAD数据集的有限多样性，模型如何学会跨工业零件族泛化？
    - 失败级联（代码→几何→工程）是当前自回归或基于面片生成范式的根本限制，还是可以通过规模解决？

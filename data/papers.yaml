  title_cn: 无界基元的构造实体几何中的点包含算法
  abstract_cn: 我们提出了几种用于评估具有无界基元的构造实体几何（CSG）树中点包含的算法。基于CSG二叉表达式树的后缀、前缀和中缀表示法，给出了三种算法。我们证明，前缀和中缀表示法能够实现短路逻辑，从而减少点包含检查过程中必须检查的基元数量。为了评估算法的性能，每种算法均在OpenMC蒙特卡洛粒子输运代码中实现，该代码依赖CSG来表示亚原子粒子穿过的实体。进行了两组测试。首先，测量了生成ITER托卡马克详细CSG模型二维切片的高分辨率光栅化图像的执行时间。使用前缀和中缀表示法相比传统粒子输运代码中使用的后缀表示法均实现了显著加速，其中中缀表示法相对于后缀表示法将执行时间减少了6倍。然后，我们使用每种算法测量了同一ITER模型的中子输运模拟的执行时间。结果和性能改进显示出与光栅化测试相同的趋势，相对于OpenMC中原始的后缀表示法，使用中缀表示法实现了4.59倍的整体加速。

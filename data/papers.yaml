  abstract: With the proliferation of artificial intelligence, Computer-Aided Design
    (CAD) is being transformed into Computer-Automated Design (CAutoD). In this paper,
    the advent of Large Language Models (LLMs) introduces new opportunities for CAutoD.
    This study develops AutoForma, an LLM-based multi-agent system, for automatic
    conversion from natural language descriptions to 3D models. By harnessing the
    comprehension capabilities of LLMs, AutoForma streamlines the CAutoD workflow
    by efficiently translating design intents into precise models in CAD. Through
    a comprehensive set of evaluations, AutoForma is seen to offer automation performance
    across various design tasks, particularly in generating non-standard parts that
    meet specific requirements, with higher efficiency and accuracy than using just
    an LLM like GPT-4.

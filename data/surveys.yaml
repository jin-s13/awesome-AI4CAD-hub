  related_work_outline:
  - 'Mainstream direction: Building unified multi-modal benchmarks (CADBench, UniCAD,
    MUSE) that evaluate CAD generation across text, image, and 3D inputs with metrics
    beyond geometric fidelity, such as executability, manufacturability, and design-intent
    alignment.'
  - 'Shared research pattern: Proposing a new dataset or benchmark alongside a generation
    method, then using the benchmark to reveal failure modes like brittleness under
    modality shift, degradation with geometric complexity, and metric-dependent ranking
    changes.'
  - 'Key differences: Evaluation targets diverge—some focus on geometric accuracy
    (CADFit, DreamCAD), others on engineering validity (MUSE) or multi-task unification
    (UniCAD); interaction modes range from single-pass generation to proactive clarification
    (ProCAD); supervision varies from CAD sequence annotations to point-level signals.'
  - 'Trend evolution: The field has moved from early single-task CAD datasets (2005–2018)
    to large-scale multi-modal benchmarks (2024–2026) that stress-test LLMs and specialized
    models, with a recent shift toward agentic clarification and differentiable representations
    to improve robustness.'
  - 'Open questions: Whether benchmark metrics align with real engineering decisions,
    how well models generalize to unseen geometric complexity and manufacturing constraints,
    and the scalability of interactive clarification in professional CAD workflows.'
  related_work_outline_zh:
  - 主流方向：构建统一多模态基准（如CADBench、UniCAD、MUSE），在文本、图像和三维输入下评估CAD生成，指标超越几何保真度，涵盖可执行性、可制造性和设计意图对齐。
  - 研究共性：提出新数据集或基准的同时给出生成方法，并利用基准揭示失败模式，如模态转换下的脆弱性、几何复杂度增加时质量下降，以及指标变化导致模型排名改变。
  - 关键差异：评测目标分化——有的侧重几何精度（CADFit、DreamCAD），有的侧重工程有效性（MUSE）或多任务统一（UniCAD）；交互模式从单次生成到主动澄清（ProCAD）；监督信号从CAD序列标注到点级信号不等。
  - 趋势演进：领域从早期单任务CAD数据集（2005–2018）发展到大规模多模态基准（2024–2026），对LLM和专用模型进行压力测试，近期转向智能体澄清和可微分表示以提升鲁棒性。
  - 开放问题：基准指标是否与真实工程决策对齐，模型对未知几何复杂度和制造约束的泛化能力，以及交互式澄清在专业CAD工作流中的可扩展性。
  literature_review:
    line_of_work_matrix:
    - line: Unified multi-modal CAD benchmarks
      what_it_solves: Provides a shared evaluation protocol across text, image, and
        3D inputs, enabling comparable assessment of CAD generation models on geometric
        fidelity, executability, and program compactness.
      what_remains_open: Whether the benchmark task distribution covers real-world
        engineering constraints such as manufacturing tolerances, assembly relations,
        and design intent beyond geometric reconstruction.
    - line: Engineering-oriented evaluation metrics and protocols
      what_it_solves: Extends evaluation beyond geometric similarity to manufacturability,
        functionality, and assemblability through staged rubrics and VLM judges, capturing
        design-intent alignment.
      what_remains_open: Alignment between these proxy metrics and the downstream
        decisions professional engineers actually make; the reliability of VLM judges
        across diverse CAD domains remains unverified.
    - line: Parametric CAD generation with LLMs and optimization
      what_it_solves: Generates editable CAD construction sequences from text, images,
        or point clouds using code-generating LLMs, hybrid optimization, or differentiable
        surface representations.
      what_remains_open: Robustness to ambiguous specifications, geometric complexity,
        and modality shift; the generated programs often fail to meet engineering-grade
        validity despite high geometric scores.
    - line: Interactive and clarification-driven generation
      what_it_solves: Improves robustness to vague text prompts by proactively asking
        clarification questions before code synthesis, reducing invalid outputs and
        geometric errors.
      what_remains_open: Scalability of multi-turn clarification in time-sensitive
        design workflows, and whether the clarification policy generalizes to diverse
        user populations and CAD scripting languages.
    consensus:
    - Parametric CAD sequences (B-Rep or script-based) are the preferred representation
      because they enable editability and downstream engineering use.
    - No single metric suffices; evaluation must combine geometric fidelity, executability,
      and design-intent alignment to expose model weaknesses.
    - Current models, including LLMs, exhibit a failure cascade from code validity
      to geometric accuracy to engineering readiness, with performance dropping sharply
      under distribution shift.
    - Large-scale, multi-modal datasets are essential for training and benchmarking,
      and their construction requires careful stratification by geometric complexity
      and object diversity.
    disagreements:
    - 'Evaluation focus: some works prioritize geometric reconstruction accuracy (e.g.,
      IoU, Chamfer distance), while others emphasize engineering attributes like manufacturability
      and assemblability, leading to different model rankings.'
    - 'Generation paradigm: end-to-end LLM code generation vs. hybrid optimization
      with geometric feedback vs. differentiable surface fitting—each trades off flexibility,
      accuracy, and editability differently.'
    - 'Interaction mode: single-pass generation assumes a complete specification,
      whereas proactive clarification introduces a dialogue loop, raising questions
      about overhead and user acceptance.'
    - 'Supervision signal: methods relying on CAD sequence annotations require curated
      datasets, while point-level supervision enables training on unannotated 3D data
      but may sacrifice parametric structure fidelity.'
    open_questions:
    - How can benchmarks incorporate real-world manufacturing and assembly constraints
      without making evaluation prohibitively expensive?
    - What is the relationship between benchmark metric improvements and actual productivity
      gains in professional CAD workflows?
    - Can clarification-based agents scale to complex assemblies with dozens of interdependent
      parts while keeping interaction overhead low?
    - How do we design stress tests that expose model brittleness to geometric complexity
      and modality shift before deployment in safety-critical design tasks?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 统一多模态CAD基准
      解决的问题: 提供跨文本、图像和三维输入的共享评估协议，使CAD生成模型在几何保真度、可执行性和程序紧凑性上可比较。
      尚未覆盖: 基准任务分布是否覆盖真实工程约束，如制造公差、装配关系和超越几何重建的设计意图。
    - 路线: 面向工程的评估指标与协议
      解决的问题: 通过分阶段评分标准和VLM评判器，将评估从几何相似性扩展到可制造性、功能性和可装配性，捕捉设计意图对齐。
      尚未覆盖: 这些代理指标与专业工程师实际下游决策之间的一致性；VLM评判器在不同CAD领域的可靠性尚未验证。
    - 路线: 基于LLM与优化的参数化CAD生成
      解决的问题: 利用代码生成LLM、混合优化或可微分曲面表示，从文本、图像或点云生成可编辑的CAD构建序列。
      尚未覆盖: 对模糊规范、几何复杂度和模态转换的鲁棒性；生成的程序即使几何得分高，也常达不到工程级有效性。
    - 路线: 交互式与澄清驱动的生成
      解决的问题: 在代码合成前主动提出澄清问题，提高对模糊文本提示的鲁棒性，减少无效输出和几何误差。
      尚未覆盖: 多轮澄清在时间敏感的设计工作流中的可扩展性，以及澄清策略是否泛化到不同用户群体和CAD脚本语言。
    共识:
    - 参数化CAD序列（B-Rep或脚本）是首选表示，因为它支持可编辑性和下游工程应用。
    - 单一指标不足；评估必须结合几何保真度、可执行性和设计意图对齐，才能暴露模型弱点。
    - 当前模型（包括LLM）存在从代码有效性到几何精度再到工程就绪的失败级联，分布偏移下性能急剧下降。
    - 大规模多模态数据集对训练和基准测试至关重要，其构建需按几何复杂度和物体多样性仔细分层。
    分歧:
    - 评估重点：部分工作侧重几何重建精度（如IoU、Chamfer距离），另一些强调可制造性和可装配性等工程属性，导致模型排名不同。
    - 生成范式：端到端LLM代码生成 vs. 带几何反馈的混合优化 vs. 可微分曲面拟合——在灵活性、精度和可编辑性之间各有取舍。
    - 交互模式：单次生成假设规范完整，而主动澄清引入对话循环，引发对开销和用户接受度的疑问。
    - 监督信号：依赖CAD序列标注的方法需要精心构建的数据集，而点级监督允许在未标注三维数据上训练，但可能牺牲参数结构保真度。
    开放问题:
    - 基准如何纳入真实制造和装配约束，同时避免评估成本过高？
    - 基准指标提升与专业CAD工作流中实际生产力增益之间的关系是什么？
    - 基于澄清的智能体能否扩展到包含数十个相互依赖零件的复杂装配体，同时保持低交互开销？
    - 如何设计压力测试，在安全关键设计任务部署前暴露模型对几何复杂度和模态转换的脆弱性？
  synthesis_status: llm

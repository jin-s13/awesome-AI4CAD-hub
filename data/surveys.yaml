    assemblability) and design-intent alignment.'
  - 'Shared research pattern: Structured programmatic CAD representations (B-Rep,
    parametric sequences) paired with multi-stage evaluation pipelines, large-scale
    datasets, and systematic stratification by complexity.'
  - 'Key differences: Evaluation target (geometric accuracy vs. downstream engineering

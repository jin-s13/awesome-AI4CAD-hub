  title_cn: CAD-Coder：用于计算机辅助设计代码生成的开源视觉语言模型
  abstract_cn: 在工程设计中，高效创建精确且可编辑的三维CAD模型至关重要，直接影响产品创新的成本与上市时间。当前手动工作流程仍极为耗时，且需要用户具备丰富的专业知识。尽管近期基于AI的CAD生成技术展现出潜力，但现有模型受限于CAD操作表示不完整、无法泛化到真实世界图像以及输出精度低等问题。本文提出CAD-Coder，一个开源视觉语言模型（VLM），专门通过微调直接从视觉输入生成可编辑的CAD代码（CadQuery
    Python）。利用我们创建的新数据集GenCAD-Code（包含超过16.3万个CAD模型图像与代码对），CAD-Coder在性能上超越了GPT-4.5和Qwen2.5-VL-72B等最先进的VLM基线，实现了100%的语法正确率以及最高的三维实体相似度。值得注意的是，我们的VLM展现出一定的泛化能力，能够从真实世界图像生成CAD代码，并执行微调中未见过的CAD操作。CAD-Coder的性能与适应性凸显了基于代码微调的VLM在简化工程师和设计师CAD工作流程方面的潜力。CAD-Coder已公开访问：https://github.com/anniedoris/CAD-Coder。

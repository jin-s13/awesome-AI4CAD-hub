  related_work_outline:
  - 'Mainstream direction: Generating editable parametric CAD (B-Rep or script) from
    multimodal inputs (text, image, mesh, point cloud) using LLMs, optimization, or
    generative models, with growing emphasis on benchmarks that assess geometric fidelity,
    executability, and engineering constraints.'
  - 'Shared research pattern: All works target structured CAD representations (programs,
    parametric patches) and evaluate via geometric metrics (Chamfer distance, IoU,
    validity ratio), while acknowledging a failure cascade from executable code to
    valid geometry to engineering-ready design.'
  - 'Key differences: Generation paradigms diverge—LLM-based code synthesis (FutureCAD,
    ProCAD), hybrid optimization (CADFit), state-space generative models (Mamba-CAD),
    and differentiable surface fitting (DreamCAD). Benchmarks vary in evaluation scope:
    geometric accuracy (CADBench), manufacturability (MUSE), or multi-task unification
    (UniCAD).'
  - 'Trend evolution: The 2026 frontier shifts from single-modality mesh-to-CAD toward
    multimodal, LLM-driven, and agent-based systems with proactive clarification,
    alongside a surge of standardized benchmarks that expose brittleness under modality
    shift and geometric complexity.'
  - 'Open questions: How to ensure generated CAD meets real-world manufacturability
    and assembly constraints; how to robustly handle ambiguous or underspecified user
    prompts; and how to design metrics that align with engineering intent rather than
    purely geometric similarity.'
  related_work_outline_zh:
  - 主流方向：从多模态输入（文本、图像、网格、点云）生成可编辑的参数化CAD（B-Rep或脚本），方法涵盖LLM、优化和生成模型，并日益重视评估几何保真度、可执行性和工程约束的基准。
  - 研究共性：所有工作都面向结构化CAD表示（程序、参数化面片），并通过几何指标（Chamfer距离、IoU、有效率）评估，同时承认从可执行代码到有效几何再到工程就绪设计的失败级联。
  - 关键差异：生成范式不同——基于LLM的代码合成（FutureCAD、ProCAD）、混合优化（CADFit）、状态空间生成模型（Mamba-CAD）和可微曲面拟合（DreamCAD）。基准的评估范围各异：几何精度（CADBench）、可制造性（MUSE）或多任务统一（UniCAD）。
  - 趋势演进：2026年前沿从单模态网格到CAD转向多模态、LLM驱动和具有主动澄清的智能体系统，同时涌现一批标准化基准，揭示了模型在模态转换和几何复杂性下的脆弱性。
  - 开放问题：如何确保生成的CAD满足真实可制造性和装配约束；如何鲁棒处理模糊或欠指定的用户提示；如何设计符合工程意图而非纯几何相似性的指标。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD generation via learned representations and objectives
      what_it_solves: Producing editable CAD programs or B-Reps from diverse inputs
        by designing architectures (LLMs, Mamba, differentiable patches) and training
        objectives (reconstruction, GAN, RL) that capture structured geometry.
      what_remains_open: Generalization to complex, multi-feature parts; robustness
        to input modality shift; and integration of engineering constraints beyond
        geometric fidelity.
    - line: Benchmarks and evaluation protocols for CAD generation
      what_it_solves: Standardizing assessment of CAD generation methods across modalities,
        metrics, and complexity levels, and identifying systematic failure modes such
        as degradation with face count or metric-rank inconsistency.
      what_remains_open: Alignment of automated metrics with human engineering judgment;
        coverage of interactive, iterative design workflows; and validation on real-world
        manufacturing requirements.
    consensus:
    - Editable parametric CAD (B-Rep or script) is the preferred output representation
      over static meshes.
    - Geometric fidelity metrics (Chamfer distance, IoU) and program validity are
      necessary but insufficient for engineering utility.
    - 'Current models exhibit a failure cascade: code may execute but produce invalid
      geometry, and valid geometry may still fail design-intent checks.'
    - Multimodal inputs (text, image, mesh, point cloud) are increasingly supported,
      but performance degrades under distribution shift.
    disagreements:
    - 'Generation approach: end-to-end LLM code synthesis vs. optimization-based fitting
      vs. latent generative models vs. differentiable surface parameterization.'
    - 'Supervision signal: some methods require only point-level or mesh supervision,
      while others rely on curated text-CAD pairs or program traces.'
    - 'Evaluation target: geometric accuracy alone vs. manufacturability and assemblability
      vs. multi-task unification across reconstruction, generation, and QA.'
    - 'Interaction mode: one-shot generation from a prompt vs. agent-based proactive
      clarification to resolve ambiguity.'
    open_questions:
    - How can we incorporate manufacturing constraints (tolerances, material, assembly)
      directly into the generation objective or evaluation?
    - What benchmarks and metrics can capture iterative, human-in-the-loop CAD design
      rather than single-step generation?
    - To what extent do gains come from model architecture versus large-scale pretraining
      data or task-specific fine-tuning?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于学习表示与目标的参数化CAD生成
      解决的问题: 通过设计架构（LLM、Mamba、可微面片）和训练目标（重建、GAN、RL）从多种输入生成可编辑的CAD程序或B-Rep，捕捉结构化几何。
      尚未覆盖: 对复杂多特征零件的泛化；对输入模态转换的鲁棒性；以及超越几何保真度的工程约束集成。
    - 路线: CAD生成的基准与评估协议
      解决的问题: 标准化跨模态、指标和复杂度水平的CAD生成方法评估，并识别系统性失败模式，如面数增加导致性能下降或指标排名不一致。
      尚未覆盖: 自动指标与人类工程判断的一致性；对交互式迭代设计工作流的覆盖；以及在真实制造需求上的验证。
    共识:
    - 可编辑的参数化CAD（B-Rep或脚本）是优于静态网格的首选输出表示。
    - 几何保真度指标（Chamfer距离、IoU）和程序有效性是必要的，但对工程实用性而言还不够。
    - 当前模型存在失败级联：代码可能执行但产生无效几何，有效几何仍可能无法通过设计意图检查。
    - 多模态输入（文本、图像、网格、点云）日益被支持，但在分布偏移下性能下降。
    分歧:
    - 生成方法：端到端LLM代码合成 vs. 基于优化的拟合 vs. 潜在生成模型 vs. 可微曲面参数化。
    - 监督信号：部分方法仅需点级或网格监督，其他则依赖精心整理的文本-CAD对或程序轨迹。
    - 评估目标：仅几何精度 vs. 可制造性和可装配性 vs. 跨重建、生成和问答的多任务统一。
    - 交互模式：从提示一次性生成 vs. 基于智能体的主动澄清以解决歧义。
    开放问题:
    - 如何将制造约束（公差、材料、装配）直接纳入生成目标或评估？
    - 哪些基准和指标能捕捉迭代式、人在环中的CAD设计，而非单步生成？
    - 性能提升在多大程度上来自模型架构，而非大规模预训练数据或任务特定微调？

    y)、半径为r1、r2的圆，并沿法线方向拉伸d...”）的多种内容。在Text2CAD框架内，我们提出了一种端到端的基于Transformer的自回归网络，用于从输入文本生成参数化CAD模型。我们通过视觉质量、参数精度和几何准确性等混合指标评估模型性能。所提出的框架在AI辅助设计应用中显示出巨大潜力。项目页面：https://sadilkhan.github.io/text2cad-project/。

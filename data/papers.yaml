  title_cn: 使用区域图推断CAD建模序列
  abstract_cn: 在计算机辅助设计（CAD）中，“逆向工程”用于创建三维形状的建模步骤的能力是一个长期追求的目标。该过程可分解为两个子问题：将输入网格或点云转换为边界表示（B-rep），然后推断构建该B-rep的建模操作。在本文中，我们提出了一种解决第二个子问题的新系统。我们方法的核心是一种新的几何表示：区域图。区域是由所有B-rep面延伸并用它们划分空间所形成的实体区域集合；区域图以这些区域为节点，边表示它们之间的几何邻接关系。与先前使用带参数基元的CSG的工作不同，区域图使我们能够以可处理的方式处理行业标准的CAD操作。我们专注于由草图+拉伸+布尔运算组成的CAD程序，这在CAD实践中很常见。我们将问题表述为在区域图允许的此类拉伸空间中进行搜索，并训练一个图神经网络来对潜在的拉伸进行评分，以加速搜索。我们表明，我们的方法在几何重建精度和重建时间方面优于现有的CSG推断基线，同时还能创建更合理的建模序列。

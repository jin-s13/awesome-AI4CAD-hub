- id: large-language-models-for-computer-aided-design-llm4cad-fi-2025
  title: 'Large Language Models for Computer-Aided Design (LLM4CAD) Fine-Tuned: Dataset
    and Experiments'
  authors:
  - Yuewan Sun
  - Xingang Li
  - Z. Sha
  abstract: "\n Despite the power of large language models (LLMs) in various cross-modal\
    \ generation tasks, their ability to generate 3D computer-aided design (CAD) models\
    \ from text remains underexplored due to the scarcity of suitable datasets. Additionally,\
    \ there is a lack of multimodal CAD datasets that include both reconstruction\
    \ parameters and text descriptions, which are essential for the quantitative evaluation\
    \ of the CAD generation capabilities of multimodal LLMs. To address these challenges,\
    \ we developed a dataset of CAD models, sketches, and image data for representative\
    \ mechanical components such as gears, shafts, and springs, along with natural-language\
    \ descriptions collected via Amazon Mechanical Turk. Using CAD programs as a bridge,\
    \ we facilitate the conversion of textual output from LLMs into precise 3D CAD\
    \ designs. To enhance the text-to-CAD generation capabilities of GPT models and\
    \ demonstrate the utility of our dataset, we developed a pipeline to generate\
    \ fine-tuning training data for GPT-3.5. We fine-tuned four GPT-3.5 models with\
    \ various data sampling strategies based on the length of a CAD program. We evaluated\
    \ these models using parsing rate and Intersection over Union (IoU) metrics, comparing\
    \ their performance to that of GPT-4 without fine-tuning. The new knowledge gained\
    \ from the comparative study on the four different fine-tuned models provided\
    \ us with guidance on the selection of sampling strategies to build training datasets\
    \ in fine-tuning practices of LLMs for text-to-CAD generation, considering the\
    \ trade-off between part complexity, model performance, and cost."

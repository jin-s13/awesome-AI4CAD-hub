  title_cn: U-RED：面向部分点云的无监督三维形状检索与变形
  abstract_cn: 本文提出U-RED，一种无监督形状检索与变形流水线，以任意物体观测（通常由RGB图像或扫描获取）作为输入，从预先建立的数据库中联合检索并变形几何相似的CAD模型，以紧密匹配目标。考虑到现有方法通常无法处理带噪声的部分观测，U-RED从两个方面解决这一问题。首先，由于一个部分形状可能对应多个潜在完整形状，检索方法必须允许这种模糊的一对多关系。因此，U-RED学习将部分目标的所有可能完整形状投影到单位球面上。在推理时，球面上的每次采样将产生一个可行的检索结果。其次，由于真实世界的部分观测通常包含显著噪声，需要一个可靠的学习度量来衡量形状之间的相似性，以实现稳定的检索。在U-RED中，我们设计了一种新颖的逐点残差引导度量，允许噪声鲁棒的比较。在合成数据集PartNet、ComplementMe以及真实世界数据集Scan2CAD上的大量实验表明，在Chamfer距离下，U-RED分别超越现有最先进方法47.3%、16.7%和31.6%。

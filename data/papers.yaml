  title_cn: 弱监督端到端CAD模型检索到扫描对象
  abstract_cn: 将CAD模型检索到真实场景观测中，已展现出作为物体3D感知和基于轻量级网格的干净场景表示基础的强大潜力；然而，当前将CAD模型检索到查询扫描的方法依赖于昂贵的1:1
    CAD-扫描对象关联的人工标注，而这些对象通常存在较强的底层几何差异。因此，我们提出了一种新的弱监督方法，用于检索与查询3D扫描场景在语义和结构上相似的CAD模型，无需任何CAD-扫描关联，仅需定向边界框形式的物体检测信息。我们的方法利用了一个完全可微的top-k检索层，使得能够通过顶部检索到的CAD模型与扫描查询之间的几何和感知相似性来指导端到端训练。我们证明，在具有挑战性的真实世界ScanNet扫描上，我们的弱监督方法可以超越全监督检索方法，并且对未见类别保持鲁棒性，在零样本CAD检索中实现了显著优于全监督最先进方法的性能。

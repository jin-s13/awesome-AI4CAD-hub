  related_work_outline:
  - 'Mainstream direction: The dominant trend is generating editable parametric CAD
    programs (e.g., command sequences, Python code, STEP models) from diverse inputs
    such as images, meshes, point clouds, and natural language, using large language
    or vision-language models (LLMs/VLMs) often combined with optimization techniques
    like reinforcement learning or evolutionary algorithms to improve geometric accuracy
    and executability.'
  - 'Shared research pattern: All works automate the conversion of non-CAD modalities
    into structured, editable CAD representations; they rely on newly created large-scale
    datasets with paired inputs and outputs, and evaluate using geometric similarity
    metrics (IoU, Chamfer distance) and program validity measures.'
  - 'Key differences: Output representations vary (command sequences with pointers,
    CadQuery code, STEP files), leading to different editability and compatibility.
    Training strategies diverge between supervised fine-tuning, reinforcement learning
    with geometric rewards, and evolutionary optimization. Input modalities also differ,
    from single (images, text) to multi-modal unification.'
  - 'Trend evolution: Based on the available evidence (mostly 2025-2026 papers), the
    field is rapidly shifting from single-task, single-modal generation toward unified
    multi-modal multi-task frameworks, and from standard supervised learning toward
    optimization-centric methods (RL, evolution) that push geometric fidelity and
    complexity. Earlier foundation work is cited but not detailed in the top-ranked
    packet.'
  - 'Open questions: Generalization to real-world photographs, freehand sketches,
    and complex assemblies remains largely unverified; engineering constraint satisfaction
    (tolerances, manufacturability) is not addressed; evaluation metrics are not standardized,
    making cross-method comparison challenging; and the efficiency of training and
    inference for optimization-based methods is underexplored.'
  related_work_outline_zh:
  - 主流方向：当前主流是利用大型语言模型或视觉语言模型，结合强化学习或进化算法等优化技术，从图像、网格、点云、自然语言等多种输入生成可编辑的参数化CAD程序（如命令序列、Python代码、STEP模型），追求几何精度与可执行性。
  - 研究共性：所有工作都致力于将非CAD模态转换为结构化、可编辑的CAD表示；均依赖新构建的大规模配对数据集，并使用几何相似度指标（IoU、Chamfer距离）和程序有效性指标进行评估。
  - 关键差异：输出表示形式不同（带指针的命令序列、CadQuery代码、STEP文件），影响可编辑性与兼容性；训练策略分为监督微调、基于几何奖励的强化学习、进化优化；输入模态从单一（图像、文本）到多模态统一，覆盖范围各异。
  - 趋势演进：从现有证据（主要为2025-2026年论文）看，领域正从单任务、单模态生成快速转向统一多模态多任务框架，并从标准监督学习转向以优化为中心的方法（RL、进化）以提升几何保真度和复杂度。早期基础工作虽被引用，但在排名靠前的证据包中未详细展开。
  - 开放问题：对真实照片、手绘草图及复杂装配体的泛化能力尚未得到充分验证；未考虑工程约束（公差、可制造性）；评估指标不统一，跨方法比较困难；基于优化的方法的训练与推理效率有待深入研究。
  literature_review:
    line_of_work_matrix:
    - line: Visual-to-CAD program generation
      what_it_solves: Recovering editable parametric CAD construction sequences from
        raw geometry inputs such as meshes, images, or point clouds.
      what_remains_open: Robustness to real-world photographs, cluttered scenes, and
        unseen CAD operations; handling of multi-part assemblies.
    - line: Text-guided CAD modeling with large language models
      what_it_solves: Generating CAD models (STEP, CadQuery code) from natural language
        descriptions, enabling design intent capture and intuitive editing.
      what_remains_open: Geometric consistency and completeness for complex descriptions;
        alignment of free-text semantics with precise engineering constraints.
    - line: Unified multi-modal multi-task CAD frameworks
      what_it_solves: A single model performing multiple CAD tasks (reconstruction,
        generation, question answering) across different input modalities (text, image,
        sketch, point cloud).
      what_remains_open: Whether joint training compromises task-specific performance;
        scalability to additional tasks and modalities; and the comprehensiveness
        of the unified benchmark.
    - line: Optimization-enhanced generation and refinement
      what_it_solves: Improving the geometric fidelity, executability, and complexity
        of generated CAD programs through reinforcement learning with geometric rewards,
        evolutionary algorithms, or hybrid optimization.
      what_remains_open: Stability and sample efficiency of the optimization process;
        reward design for intricate geometric objectives; transferability to new CAD
        systems or representations.
    consensus:
    - The field is moving from manual CAD authoring to automated generation of parametric,
      editable programs.
    - Deep generative models, particularly LLMs and VLMs, are the predominant backbone
      for mapping non-CAD inputs to structured CAD outputs.
    - New datasets and benchmarks are being created to support training and evaluation,
      with geometric similarity (IoU, Chamfer distance) and program validity as common
      metrics.
    - All works emphasize the importance of editability and geometric validity as
      core requirements for practical CAD workflows.
    disagreements:
    - 'Output representation: some generate command sequences with explicit entity
      pointers, others produce Python code (CadQuery) or STEP files, leading to different
      trade-offs in expressiveness, editability, and compatibility with downstream
      tools.'
    - 'Training paradigm: works are split between supervised fine-tuning on paired
      data, reinforcement learning with geometric rewards, and evolutionary optimization;
      each makes different assumptions about data availability and training stability.'
    - 'Input modalities: methods differ in whether they target a single modality (images,
      text, meshes) or attempt to unify several modalities in one model, resulting
      in varied applicability and complexity.'
    - 'Evaluation: metrics range from volumetric IoU and Chamfer distance to syntax
      validity and renderability, without a standardized benchmark except for the
      recent UniCAD attempt, making fair comparisons difficult.'
    open_questions:
    - How can these models generalize to real-world inputs such as photographs with
      noise, occlusions, or freehand sketches, beyond the curated datasets?
    - What is needed to ensure generated CAD models satisfy engineering constraints
      such as tolerances, manufacturability, and assembly compatibility?
    - Can the current single-part generation methods be extended to multi-part assemblies
      and hierarchical design structures?
    - How can we establish a unified, consensus-driven evaluation protocol that balances
      geometric accuracy, program validity, and editability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 视觉到CAD程序生成
      解决的问题: 从网格、图像或点云等原始几何输入中恢复可编辑的参数化CAD构建序列。
      尚未覆盖: 对真实世界照片、杂乱场景和未见CAD操作的鲁棒性；多零件装配体的处理。
    - 路线: 基于大语言模型的文本引导CAD建模
      解决的问题: 从自然语言描述生成CAD模型（STEP、CadQuery代码），实现设计意图捕捉与直观编辑。
      尚未覆盖: 复杂描述的几何一致性与完整性；自由文本语义与精确工程约束的对齐。
    - 路线: 统一多模态多任务CAD框架
      解决的问题: 单一模型跨不同输入模态（文本、图像、草图、点云）执行多种CAD任务（重建、生成、问答）。
      尚未覆盖: 联合训练是否会损害特定任务性能；对更多任务和模态的可扩展性；统一基准的全面性。
    - 路线: 优化增强的生成与精炼
      解决的问题: 通过基于几何奖励的强化学习、进化算法或混合优化，提升生成CAD程序的几何保真度、可执行性和复杂度。
      尚未覆盖: 优化过程的稳定性和样本效率；面向复杂几何目标的奖励设计；向新CAD系统或表示的可迁移性。
    共识:
    - 领域正从手动CAD设计转向参数化可编辑程序的自动化生成。
    - 深度生成模型，尤其是大语言模型和视觉语言模型，是将非CAD输入映射到结构化CAD输出的主要骨干。
    - 为支持训练和评估，正在创建新的数据集和基准，常用的指标包括几何相似度（IoU、Chamfer距离）和程序有效性。
    - 所有工作都强调可编辑性和几何有效性是实际CAD工作流的核心要求。
    分歧:
    - 输出表示：一些方法生成带有显式实体指针的命令序列，另一些生成Python代码（CadQuery）或STEP文件，在表达性、可编辑性和与下游工具的兼容性上存在不同权衡。
    - 训练范式：工作分为在配对数据上的监督微调、基于几何奖励的强化学习以及进化优化，各自对数据可用性和训练稳定性做出了不同假设。
    - 输入模态：方法在专注单一模态（图像、文本、网格）还是尝试在一个模型中统一多种模态上存在差异，导致适用性和复杂度的不同。
    - 评估：指标从体积IoU和Chamfer距离到语法有效性和可渲染性不等，除了近期UniCAD的尝试外，缺乏标准化基准，使得公平比较困难。
    开放问题:
    - 这些模型如何泛化到真实世界输入，如带有噪声、遮挡的照片或手绘草图，而不仅仅局限于精心构建的数据集？
    - 需要什么来确保生成的CAD模型满足公差、可制造性和装配兼容性等工程约束？
    - 当前的单零件生成方法能否扩展到多零件装配体和层次化设计结构？
    - 如何建立统一的、共识驱动的评估协议，以平衡几何精度、程序有效性和可编辑性？

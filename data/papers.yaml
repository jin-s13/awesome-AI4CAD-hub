  abstract_cn: 因果生成建模对于开发能够进行反事实推理的可靠且透明的AI系统至关重要。现有方法侧重于在生成模型训练过程中整合因果约束，但往往缺乏一个统一的框架来利用预训练基础模型的零样本推理能力。我们提出了FM-CGM，一个利用预训练基础模型进行端到端视觉因果推理的模块化框架。FM-CGM通过三个核心组件形式化因果流程：概念提取器、概念操作器和反事实生成器。通过利用大型推理模型进行因果推断，以及文本到图像扩散模型进行生成，我们的方法实现了零样本因果发现、干预和反事实生成。我们随后开发了因果语义引导（CSG），一种基于交叉注意力的机制，确保语义干预传播到后代概念，同时保留不变区域。我们通过实验表明，我们的方法能够识别合理的因果结构，并适用于忠实的反事实图像生成。

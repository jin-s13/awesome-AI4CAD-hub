    innovations:
    - End-to-end trainable autoregressive architecture for CAD design history recovery
      from point clouds
    - Layer-wise cross-attention between point cloud and CAD language embedding
    - Sketch Instance Guided Attention (SGA) module for fine-grained sketch detail
      reconstruction
    - Generation of multiple plausible design choices enabling interactive reverse
      engineering
    methodology: CAD-SIGNet is an autoregressive model that recovers a sequence of
      sketch-and-extrusion operations from an input point cloud. It employs layer-wise
      cross-attention between point cloud features and CAD language embeddings, with
      a Sketch Instance Guided Attention module to reconstruct fine sketch details.
      The model is trained end-to-end on public CAD datasets and evaluated on full
      design history recovery and conditional auto-completion tasks.
    key_results: CAD-SIGNet outperforms existing baselines on full design history
      recovery and conditional auto-completion from point clouds, as shown by extensive
      experiments on publicly available CAD datasets.

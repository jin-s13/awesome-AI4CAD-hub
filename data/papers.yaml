  title_cn: 基于级联离散扩散模型的计算机辅助设计生成
  abstract_cn: 最近的深度学习方法试图通过将模型表示为离散命令和参数的序列，然后使用自回归模型或在欧几里得嵌入空间中运行的连续扩散来生成它们，从而实现CAD创建的自动化。然而，连续扩散在连续的欧几里得域中扰动表示，这未能反映CAD令牌固有的离散和异质性，常常产生映射到语义无效符号的扰动表示。为了克服这一限制，我们提出了一种用于CAD生成的级联离散扩散框架，该框架包括用于生成CAD命令的命令扩散和以CAD命令为条件的参数扩散。与各向同性高斯扰动不同，我们方法的前向过程直接使用精细的转移矩阵在分类令牌分布上操作。对于命令，我们采用吸收态转移矩阵，逐步将令牌破坏为指定符号；对于参数，我们引入了针对异质性属性定制的特定转移矩阵：用于坐标连续性的高斯核、用于维度值的尺度不变核以及用于布尔属性的先验保持核。反向过程通过两个去噪网络实现：一个基于Transformer的编码器用于命令恢复，以及一个参数网络，该网络具有额外的局部自注意力用于命令级交互和交叉注意力用于条件注入。在DeepCAD数据集上的实验表明，所提出的方法在无条件生成指标上超越了现有的自回归和连续扩散模型，而定性结果验证了在条件生成任务中的有效可控性。源代码将发布。
  tldr_cn: 提出一种级联离散扩散模型，利用定制转移矩阵生成CAD命令和参数。
  analysis_cn:
    innovations:
    - 级联离散扩散框架，首先生成CAD命令，然后生成以命令为条件的参数
    - 使用定制转移矩阵的离散前向过程：命令采用吸收态转移矩阵，坐标连续性采用高斯核，维度值采用尺度不变核，布尔属性采用先验保持核
    - 去噪网络：基于Transformer编码器恢复命令，参数网络结合局部自注意力和交叉注意力实现命令级交互和条件注入
    methodology: 该方法将CAD模型表示为离散命令和参数的序列，然后应用级联离散扩散过程。前向扩散使用针对每种属性类型的专用转移矩阵破坏令牌，反向过程采用基于Transformer的命令去噪器和参数去噪器，其中参数去噪器包含局部自注意力和以命令为条件的交叉注意力。在DeepCAD数据集上进行了无条件生成和条件生成的评估。
    key_results: 所提出的方法在无条件生成指标上超越了现有的自回归模型和连续扩散模型，并在条件生成任务中展示了有效的可控性。

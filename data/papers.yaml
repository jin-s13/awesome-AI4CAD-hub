  title_cn: 'ArtiCAD: 基于多智能体代码生成的铰接式CAD装配设计'
  abstract_cn: 参数化计算机辅助设计（CAD）中的铰接式装配体对于产品开发至关重要，然而从高层描述生成这些多部件、可移动模型的研究尚属空白。为解决这一问题，我们提出了ArtiCAD，这是首个无需训练的多智能体系统，能够直接从文本或图像生成可编辑的铰接式CAD装配体。我们的系统将这一复杂任务分配给四个专门智能体：设计、生成、装配和审查。我们的关键洞察之一是在初始设计阶段而非装配阶段预测装配关系。通过利用一个显式定义附着点和关节参数的连接器（Connector），ArtiCAD在几何生成之前确定这些关系，从而有效绕过了当前大语言模型（LLMs）和视觉语言模型（VLMs）有限的空间推理能力。为了进一步确保高质量输出，我们在生成和装配阶段引入了验证步骤，并配以跨阶段回滚机制，能够准确隔离并纠正设计和代码层面的错误。此外，一个自进化的经验库会积累设计知识，以持续提升未来任务的性能。在三个数据集（ArtiCAD-Bench、CADPrompt和ACD）上的广泛评估验证了我们方法的有效性。我们进一步展示了ArtiCAD在需求驱动概念设计、物理原型制作以及通过URDF导出生成具身AI训练资产方面的适用性。

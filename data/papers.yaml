- id: itercad-an-iterative-multimodal-agent-for-visually-grounded-2026
  title: 'IterCAD: An Iterative Multimodal Agent for Visually-Grounded CAD Generation
    and Editing'
  authors:
  - Tao Hu
  - Jiaxin Ai
  - Licheng Wen
  - Xueheng Li
  - Shu Zou
  - Siqi Li
  - Nianchen Deng
  - Xinyu Cai
  - Hongbin Zhou
  - Pinlong Cai
  - Daocheng Fu
  - Yu Yang
  - Hairong Zhang
  - Botian Shi
  - Xuemeng Yang
  abstract: 'Computer-Aided Design is pivotal in modern manufacturing, yet existing
    automated methods predominantly rely on open-loop, one-shot generation, creating
    a mismatch with iterative real-world practices. In this paper, we present IterCAD,
    a unified multimodal agent framework for closed-loop, interactive CAD generation
    and editing. We formulate the task as a multi-turn interaction between a multimodal
    agent and an executable CAD sandbox, covering three tasks: Drawing-to-Code, Text-to-Code,
    and Interactive Editing. To support this, we develop a data synthesis pipeline
    incorporating advanced industrial manufacturing features to generate standard-compliant
    multi-view engineering drawings, complex code-editing tasks, and high-fidelity
    interaction trajectories. We optimize the agent via progressive SFT followed by
    geometry-aware reinforcement learning with viable-prefix masking to enhance code
    executability and geometric fidelity. Finally, we introduce the IterCAD-Bench
    evaluation suite and propose the Chamfer Distance Tolerance-Recall (CD-TR) curve
    alongside its AUC-TR metric, establishing a survivor-bias-free standard that unifies
    code validity and geometric precision. Extensive experiments demonstrate that
    IterCAD achieves highly competitive performance across multiple benchmarks, significantly
    outperforming existing approaches in both code executability and geometric precision,
    while exhibiting superior capabilities in closed-loop iterative refinement.'

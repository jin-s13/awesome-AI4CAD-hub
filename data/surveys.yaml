  related_work_outline:
  - 'Mainstream direction: End-to-end generation of editable parametric CAD models
    (B-Rep or program) from multimodal inputs (text, images, meshes, point clouds)
    using large language models, differentiable surface representations, and state-space
    architectures.'
  - 'Shared research pattern: Researchers adopt supervised or self-supervised learning
    to represent CAD as sequences or surfaces, train on large-scale synthetic or unannotated
    3D data, and increasingly rely on standardized benchmarks to evaluate geometric
    fidelity and executability.'
  - 'Key differences: Methods diverge in representation choice (programmatic code
    generation vs. direct B-Rep surface prediction), evaluation targets (geometric
    metrics vs. manufacturability and functionality), and use of LLMs versus specialized
    architectures.'
  - 'Trend evolution: Within the 2026 frontier, the trend shows rapid convergence
    toward multimodal, unified frameworks and engineering-aware evaluation, driven
    by advances in differentiable computing and foundation models.'
  - 'Open questions: Whether generated CAD achieves sufficient geometric fidelity
    on complex designs, whether evaluation metrics capture design intent and manufacturability,
    and which representation generalizes best to downstream editing tasks.'
  related_work_outline_zh:
  - 主流方向：利用大语言模型、可微分曲面表示和状态空间架构，从多模态输入（文本、图像、网格、点云）端到端生成可编辑的参数化CAD模型（B-Rep或程序）。
  - 研究共性：采用监督或自监督学习将CAD表示为序列或曲面，在大规模合成或未标注3D数据上训练，且日益依赖标准化基准评估几何保真度和可执行性。
  - 关键差异：方法在表示选择（程序化代码生成 vs. 直接B-Rep曲面预测）、评估目标（几何指标 vs. 可制造性与功能性）以及是否依赖LLM还是专用架构上存在分歧。
  - 趋势演进：在2026前沿论文中，趋势显示向多模态、统一框架和工程意识评估的快速收敛，受可微分计算和基础模型进步的推动。
  - 开放问题：生成的CAD在复杂设计上几何保真度是否足够，评估指标能否捕捉设计意图与可制造性，以及哪种表示在下游编辑任务中泛化能力最强。
  literature_review:
    line_of_work_matrix:
    - line: Method representation and objective design
      what_it_solves: Converting multimodal inputs into editable parametric CAD models
        by designing representations (e.g., parametric patches, state-space sequences,
        LLM-generated CadQuery code), learning objectives (e.g., IoU-driven optimization,
        reinforcement learning), and architectures (e.g., Mamba, LLMs).
      what_remains_open: Which representation transfers best to downstream editing
        tasks; whether generated CAD meets real engineering constraints beyond geometric
        fit; how much of the gain comes from the model versus the curated dataset
        or training recipe.
    - line: Method evidence and ablation protocol
      what_it_solves: Isolating the contribution of proposed methods through standardized
        benchmarks (CADBench, MUSE, UniCAD) that cover multiple modalities, metrics,
        and failure analysis, moving beyond single-dataset evaluation.
      what_remains_open: Whether current metrics (e.g., executability, VLM-based functionality
        scores) reliably capture design intent and engineering quality; how to align
        benchmarks with real-world design workflows and avoid ranking instability
        across metrics.
    consensus:
    - End-to-end generation of editable parametric CAD models outperforms general-purpose
      vision-language models under idealized inputs, but performance degrades with
      geometric complexity and modality shift.
    - Evaluation must go beyond geometric similarity to include executability, manufacturability,
      and design intent; multi-modal benchmarks are essential for exposing recurring
      failure modes.
    - LLM-based code generation and differentiable surface representations are promising
      for balancing editability and geometric fidelity, yet their relative strengths
      are not fully disentangled from training data and evaluation protocols.
    disagreements:
    - 'Representation type: programmatic CAD sequences (CadQuery) versus direct B-Rep
      surface patches (Bézier surfaces) lead to different trade-offs in editability,
      compactness, and fidelity.'
    - 'Evaluation targets: some works focus on geometric fidelity and executability,
      while others introduce manufacturability, functionality, and assemblability
      criteria, causing ranking instability.'
    - 'Model design: some methods fine-tune large language models with reinforcement
      learning, while others use specialized architectures like Mamba or hybrid optimization
      without LLMs.'
    - 'Interaction mode: proactive clarification agents improve robustness to ambiguous
      prompts, in contrast to single-pass generation approaches that assume unambiguous
      input.'
    open_questions:
    - How to ensure generated CAD is ready for downstream engineering tasks (simulation,
      assembly) without manual rework, given the failure cascade from executable code
      to engineering-ready design.
    - Whether VLM-based judges can reliably assess functionality and manufacturability,
      and how their agreement with human experts varies across design complexity.
    - The extent to which model rankings change under different metrics and modalities,
      as observed in CADBench, and what this implies for method comparison and selection.
  literature_review_zh:
    研究路线矩阵:
    - 路线: 方法表示与目标设计
      解决的问题: 通过设计表示（如参数化面片、状态空间序列、LLM生成CadQuery代码）、学习目标（如IoU驱动优化、强化学习）和架构（如Mamba、LLM），将多模态输入转化为可编辑参数化CAD模型。
      尚未覆盖: 哪种表示在下游编辑任务中迁移性最好；生成的CAD是否满足几何拟合之外的工程约束；性能提升有多少来自模型本身，而非精心策划的数据集或训练配方。
    - 路线: 方法证据与消融协议
      解决的问题: 通过覆盖多模态、多指标和故障分析的标准化基准（CADBench、MUSE、UniCAD）分离方法贡献，超越单一数据集评估。
      尚未覆盖: 当前指标（如可执行性、基于VLM的功能性评分）能否可靠捕捉设计意图和工程品质；如何将基准与真实设计流程对齐，并避免跨指标的排名不稳定。
    共识:
    - 端到端生成可编辑参数化CAD模型在理想化输入下优于通用视觉语言模型，但性能随几何复杂度和模态转换而下降。
    - 评估必须超越几何相似性，纳入可执行性、可制造性和设计意图；多模态基准对暴露重复出现的失败模式至关重要。
    - 基于LLM的代码生成和可微分曲面表示在平衡可编辑性与几何保真度方面有前景，但其相对优势尚未与训练数据和评估协议完全解耦。
    分歧:
    - 表示类型：程序化CAD序列（CadQuery）与直接B-Rep曲面面片（Bézier曲面）在可编辑性、紧凑性和保真度上存在不同权衡。
    - 评估目标：部分工作关注几何保真度和可执行性，而另一些引入可制造性、功能性和可装配性标准，导致排名不稳定。
    - 模型设计：部分方法通过强化学习微调大语言模型，其他方法使用Mamba或混合优化等专用架构，而不依赖LLM。
    - 交互模式：主动澄清智能体提升了对模糊提示的鲁棒性，与假设输入明确的单次生成方法形成对比。
    开放问题:
    - 鉴于从可执行代码到工程就绪设计的失败级联，如何确保生成的CAD无需人工返工即可用于下游工程任务（仿真、装配）。
    - 基于VLM的评判器能否可靠评估功能性和可制造性，其与人类专家的一致性如何随设计复杂度变化。
    - 如CADBench所示，模型排名在不同指标和模态下变化程度如何，这对方法比较和选择有何启示。

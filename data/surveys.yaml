  literature_review:
    line_of_work_matrix:
    - line: End-to-end multimodal CAD generation pipelines
      what_it_solves: converts text, images, meshes, or point clouds into editable
        CAD programs (e.g., CadQuery scripts, B‑Rep construction trees, Bézier patches)
        and achieves high geometric fidelity and executability; examples include systems
        like FutureCAD, HierCAD, CADFit, DreamCAD, and UniCAD‑MLLM.
      what_remains_open: performance degrades under modality shift and increasing
        geometric complexity, engineering constraints such as manufacturability and
        assemblability are not yet integrated into generation, and independent deployment
        validation is missing.
    - line: Interactive clarification and agent-assisted generation
      what_it_solves: reduces invalid CAD output caused by ambiguous text prompts
        through a proactive clarifying agent that asks targeted questions before program
        synthesis, as demonstrated by ProCAD.
      what_remains_open: clarification strategies generalise to complex, multi-step
        design intents and interactive speed/overhead trade-offs are not characterised;
        only one exemplar exists in the evidence.
    - line: Benchmarks and reproducible evaluation protocols
      what_it_solves: provides standardised evaluation suites (CADBench, MUSE, UniCAD
        benchmark) covering geometric fidelity, executability, and engineering properties
        like manufacturability and functionality, together with datasets and metrics.
      what_remains_open: inconsistency across benchmarks, limited alignment of metrics
        with real-world CAD engineer workflows, and independent reproduction across
        teams and infrastructure environments.
    consensus:
    - All works aim to generate editable CAD models; programmatic representations
      (B‑Rep or scripts) are preferred to preserve editability.
    - Multi-modal input (text, image, mesh, point cloud) is a shared design choice.
    - Geometric fidelity and executability are universal evaluation dimensions, and
      code or benchmark releases are a common practice to support reproducibility.
    disagreements:
    - 'Representation: Bézier surface patches versus parametric construction trees
      versus CadQuery scripts.'
    - 'Supervision: human-annotated CAD datasets versus point-level supervision versus
      hybrid optimization.'
    - 'Interaction: one-shot generation versus multi-turn proactive clarification.'
    - 'Evaluation focus: geometric metrics (Chamfer distance, IoU) versus engineering-oriented
      metrics (manufacturability, functionality, assemblability).'
    - 'Architecture: task-specific models versus unified multi-modal large language
      models.'
    open_questions:
    - How can generation systems maintain high geometric accuracy under modality shift
      and high geometric complexity?
    - What is the gap between benchmark metrics and real engineering constraints,
      and how to bridge it?
    - Can proactive clarification scale to complex, multi-step design tasks without
      excessive interaction overhead?
    - How do these systems behave when deployed outside the original dataset and hardware
      environments?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端多模态CAD生成流水线
      解决的问题: 将文本、图像、网格或点云转化为可编辑的CAD程序（如CadQuery脚本、B-Rep构建树、贝塞尔曲面），并达到高几何保真度和可执行性；例如FutureCAD、HierCAD、CADFit、DreamCAD和UniCAD-MLLM等系统。
      尚未覆盖: 模态变化和几何复杂度增加时性能下降，可制造性、可装配性等工程约束尚未集成到生成过程，且缺乏独立部署验证。
    - 路线: 交互式澄清与代理辅助生成
      解决的问题: 通过主动澄清代理在生成程序前提出针对性问题，减少因模糊文本提示导致的无效CAD输出，如ProCAD所示。
      尚未覆盖: 澄清策略对复杂、多步设计意图的泛化能力，以及交互速度与开销的权衡尚未表征；证据中仅有一个示例。
    - 路线: 基准与可复现评估协议
      解决的问题: 提供标准化评估套件（CADBench、MUSE、UniCAD基准），涵盖几何保真度、可执行性以及可制造性、功能性等工程属性，附带数据集和度量指标。
      尚未覆盖: 不同基准之间存在不一致，度量指标与真实CAD工程师工作流对齐有限，且跨团队和基础设施环境的独立复现尚不充分。
    共识:
    - 所有工作都致力于生成可编辑的CAD模型；倾向于采用程序化表示（B-Rep或脚本）以保持可编辑性。
    - 多模态输入（文本、图像、网格、点云）是共同的设计选择。
    - 几何保真度和可执行性是普遍关注的评估维度，并且提供代码或基准发布以支持可复现性已成为常见做法。
    分歧:
    - 表示形式：贝塞尔曲面片 vs 参数化构建树 vs CadQuery脚本。
    - 监督信号：人工标注CAD数据集 vs 点级监督 vs 混合优化。
    - 交互方式：一次性生成 vs 多轮主动澄清。
    - 评估侧重点：几何度量（Chamfer距离、IoU） vs 工程导向度量（可制造性、功能性、可装配性）。
    - 架构：任务特定模型 vs 统一多模态大语言模型。
    开放问题:
    - 在模态变化和高几何复杂度下，生成系统如何保持高几何精度？
    - 基准度量与真实工程约束之间的差距有多大，如何弥合？
    - 主动澄清能否扩展到复杂的多步设计任务，同时保持较低的交互开销？
    - 这些系统在脱离原始数据集和硬件环境部署时表现如何？

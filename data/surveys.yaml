  related_work_outline:
  - 'Mainstream direction: Multi-modal generative models (LLMs, state-space models,
    differentiable surfaces) that produce editable CAD representations (B-Rep, parametric
    scripts) from text, images, or 3D inputs, evaluated on unified benchmarks.'
  - 'Shared research pattern: Represent CAD as a structured sequence or parametric
    surface, train a generative model with reconstruction or alignment objectives,
    and measure geometric fidelity plus executability/validity.'
  - 'Key differences: Representation choice (CadQuery scripts vs. Bézier patches vs.
    parametric operations), supervision signal (point clouds, meshes, text, images),
    interaction mode (one-shot generation vs. proactive clarification), and evaluation
    target (geometric similarity vs. manufacturability/functionality).'
  - 'Trend evolution: The field is moving from single-modality parametric sequence
    generation toward multi-modal, LLM-driven, and differentiable-surface methods,
    accompanied by richer benchmarks that assess engineering constraints beyond geometry.'
  - 'Open questions: How to guarantee manufacturability and assemblability of generated
    CAD; robustness under modality shift and geometric complexity; alignment of automatic
    metrics with human judgment; and scaling to multi-part assemblies.'
  related_work_outline_zh:
  - 主流方向：利用多模态生成模型（LLM、状态空间模型、可微分曲面）从文本、图像或三维输入生成可编辑的CAD表示（B-Rep、参数化脚本），并在统一基准上评估。
  - 研究共性：将CAD表示为结构化序列或参数曲面，通过重建或对齐目标训练生成模型，并测量几何保真度与可执行性/有效性。
  - 关键差异：表示选择（CadQuery脚本 vs. 贝塞尔面片 vs. 参数化操作）、监督信号（点云、网格、文本、图像）、交互模式（一次性生成 vs. 主动澄清）以及评估目标（几何相似度
    vs. 可制造性/功能性）。
  - 趋势演进：领域正从单模态参数化序列生成转向多模态、LLM驱动和可微分曲面方法，并伴随更丰富的基准来评估几何之外的工程约束。
  - 开放问题：如何保证生成CAD的可制造性和可装配性；模态转换和几何复杂度下的鲁棒性；自动指标与人类判断的一致性；以及扩展到多部件装配体。
  literature_review:
    line_of_work_matrix:
    - line: Generative CAD representations and architectures
      what_it_solves: Mapping multi-modal inputs to editable CAD formats via sequence
        models, state-space models, or differentiable parametric surfaces.
      what_remains_open: Long-sequence and complex-topology generation, cross-modal
        generalization without paired CAD annotations, and integration of engineering
        constraints into the generation process.
    - line: Interactive and controllable CAD generation
      what_it_solves: Aligning generated CAD with underspecified user intent through
        proactive clarification, natural language grounding, or iterative refinement.
      what_remains_open: Error recovery in multi-turn interactions, learning user
        preferences from limited feedback, and handling ambiguous or conflicting specifications.
    - line: CAD evaluation benchmarks and protocols
      what_it_solves: Providing unified, multi-metric evaluation of generated CAD
        across geometric fidelity, executability, and downstream engineering properties.
      what_remains_open: Coverage of real-world engineering workflows, dynamic or
        task-specific evaluation criteria, and validation of automatic judges against
        expert assessments.
    consensus:
    - Editable B-Rep or parametric programs are the preferred output representation
      for downstream use.
    - Multi-modal conditioning (text, image, point cloud, mesh) is essential for practical
      CAD generation.
    - Evaluation must go beyond geometric similarity to include validity, executability,
      and engineering intent.
    - Large language models and differentiable methods are becoming central to the
      generation pipeline.
    disagreements:
    - 'Representation granularity: some works generate high-level CadQuery scripts,
      others output low-level parametric operations or surface patches.'
    - 'Training paradigm: supervised fine-tuning on curated CAD datasets versus self-supervised
      pre-training on unannotated 3D data versus optimization-based fitting.'
    - 'Evaluation emphasis: geometric metrics (IoU, Chamfer distance) versus engineering
      criteria (manufacturability, assemblability) versus interaction robustness.'
    - 'Interaction model: one-shot generation from a prompt versus agent-based clarification
      loops that require user feedback.'
    open_questions:
    - Can high-quality CAD models be generated without large-scale paired CAD annotations,
      using only point-level or image-level supervision?
    - Do current benchmarks capture the full complexity of real-world mechanical design,
      including multi-part assemblies and tolerance constraints?
    - How can generative models balance diversity and engineering validity, especially
      for long sequences and complex topologies?
    - What is the reliability of VLM-based automatic judges compared to human engineers
      for assessing functionality and manufacturability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 生成式CAD表示与架构
      解决的问题: 通过序列模型、状态空间模型或可微分参数曲面将多模态输入映射到可编辑的CAD格式。
      尚未覆盖: 长序列与复杂拓扑生成、无配对CAD标注的跨模态泛化、以及将工程约束融入生成过程。
    - 路线: 交互式与可控CAD生成
      解决的问题: 通过主动澄清、自然语言接地或迭代优化，使生成的CAD与欠指定的用户意图对齐。
      尚未覆盖: 多轮交互中的错误恢复、从有限反馈中学习用户偏好、以及处理模糊或冲突的规格。
    - 路线: CAD评估基准与协议
      解决的问题: 提供统一的、多指标的生成CAD评估，涵盖几何保真度、可执行性和下游工程属性。
      尚未覆盖: 真实工程工作流的覆盖、动态或任务特定的评估标准、以及自动评判器与专家评估的对齐验证。
    共识:
    - 可编辑的B-Rep或参数化程序是下游应用的首选输出表示。
    - 多模态条件（文本、图像、点云、网格）对于实用的CAD生成至关重要。
    - 评估必须超越几何相似度，纳入有效性、可执行性和工程意图。
    - 大语言模型和可微分方法正在成为生成流程的核心。
    分歧:
    - 表示粒度：部分工作生成高层CadQuery脚本，其他工作输出底层参数化操作或曲面面片。
    - 训练范式：在精选CAD数据集上的监督微调 vs. 在无标注三维数据上的自监督预训练 vs. 基于优化的拟合。
    - 评估侧重：几何指标（IoU、倒角距离） vs. 工程标准（可制造性、可装配性） vs. 交互鲁棒性。
    - 交互模式：从提示一次性生成 vs. 需要用户反馈的智能体澄清循环。
    开放问题:
    - 能否仅使用点级或图像级监督，在没有大规模配对CAD标注的情况下生成高质量CAD模型？
    - 当前基准是否涵盖了真实机械设计的全部复杂性，包括多部件装配和公差约束？
    - 生成模型如何在多样性和工程有效性之间取得平衡，尤其是对于长序列和复杂拓扑？
    - 基于VLM的自动评判器在评估功能性和可制造性方面，与人类工程师相比可靠性如何？

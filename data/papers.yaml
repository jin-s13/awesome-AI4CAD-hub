  title_cn: 'FoV-Net: 基于视场光线投射的旋转不变CAD B-rep学习'
  abstract_cn: 直接从边界表示（B-rep）进行学习显著推动了3D CAD分析的发展。然而，最先进的B-rep学习方法依赖绝对坐标和法线来编码全局上下文，导致其对旋转高度敏感。我们的实验表明，在对齐基准上准确率超过95%的模型，在任意SO(3)旋转下可能骤降至10%以下。为解决此问题，我们提出FoV-Net，这是首个以旋转不变方式同时捕捉局部表面几何和全局结构上下文的B-rep学习框架。每个面通过局部参考系（LRF）UV网格表示其局部表面几何，并通过视场（FoV）网格捕捉周围3D上下文——通过投射光线并记录与相邻面的交点。轻量级CNN提取每个面的特征，并通过图注意力网络在B-rep图上传播。FoV-Net在B-rep分类和分割基准上取得了最先进性能，展现出对任意旋转的鲁棒性，同时只需更少的训练数据即可获得强劲结果。
  tldr_cn: FoV-Net通过LRF UV网格和FoV光线投射实现旋转不变的B-rep学习，在分类和分割基准上达到SOTA。
  analysis_cn:
    innovations:
    - 首个同时捕捉局部表面几何和全局结构上下文的旋转不变B-rep学习框架。
    - 局部参考系（LRF）UV网格表示，以旋转不变方式编码局部表面几何。
    - 视场（FoV）网格，通过光线投射并记录与相邻面的交点来捕捉周围3D上下文。

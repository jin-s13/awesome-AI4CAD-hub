  tldr: Zero-to-CAD uses an LLM agent to synthesize millions of executable CAD programs
    without real data, enabling image-to-CAD reconstruction.
  reasoning: The paper presents a novel agentic framework for generating large-scale
    synthetic CAD construction sequences, addressing data scarcity. Its strengths
    include scalability and demonstrated utility for downstream tasks, but it lacks
    real-world validation and may have limitations from purely synthetic data.
  has_real_world: false
  analysis:
    innovations:
    - Agentic search framework using LLM in a feedback-driven CAD environment to synthesize
      executable CAD programs
    - Synthesis of approximately one million executable, readable, editable CAD sequences
      without real construction-history data
    - Release of a curated subset of 100,000 high-quality models selected for geometric
      diversity
    - Fine-tuning a vision-language model on synthetic data to reconstruct editable
      CAD programs from multi-view images, outperforming GPT-5.2
    methodology: The framework frames CAD program synthesis as an agentic search problem,
      embedding a large language model (LLM) within a feedback-driven CAD environment
      that iteratively generates, executes, and validates code using tools and documentation
      lookup to promote geometric validity and operation diversity. The resulting
      synthetic dataset is used to fine-tune a vision-language model for CAD program
      reconstruction from multi-view images.
    key_results: The agentic approach synthesizes approximately one million executable
      CAD sequences covering diverse operations beyond sketch-and-extrude. A vision-language
      model fine-tuned on this synthetic data outperforms strong baselines including
      GPT-5.2 on reconstructing editable CAD programs from multi-view images.
    limitations: []
  grade: must_read
  title_cn: 零到CAD：无需真实数据的百万级可解释CAD程序智能体合成
  abstract_cn: 计算机辅助设计（CAD）模型由其构建历史定义：一种编码设计意图的参数化配方。然而，现有的大规模3D数据集主要由边界表示（B-Reps）或网格组成，剥离了这些关键的过程信息。为了解决这一稀缺性，我们引入了Zero-to-CAD，一个可扩展的框架，用于合成可执行的CAD构建序列。我们将合成视为一个智能体搜索问题：通过将大语言模型（LLM）嵌入反馈驱动的CAD环境中，我们的系统利用工具和文档查找迭代生成、执行和验证代码，以促进几何有效性和操作多样性。这种智能体方法能够合成约一百万条可执行、可读、可编辑的CAD序列，涵盖除草图拉伸工作流之外的丰富操作词汇。我们还发布了一个经过几何多样性筛选的10万个高质量模型子集。为了展示数据集的实用性，我们在合成数据上微调了一个视觉语言模型，从多视图图像重建可编辑CAD程序，性能优于包括GPT-5.2在内的强基线，并有效引导了序列生成能力，无需真实的构建历史训练数据。Zero-to-CAD弥合了几何规模与参数化可解释性之间的差距，为下一代CAD
    AI提供了重要资源。
  tldr_cn: 零到CAD利用LLM智能体无需真实数据合成数百万可执行CAD程序，实现图像到CAD重建。
  analysis_cn:
    innovations:
    - 使用LLM在反馈驱动的CAD环境中进行智能体搜索框架，合成可执行CAD程序
    - 无需真实构建历史数据，合成约一百万条可执行、可读、可编辑的CAD序列
    - 发布经过几何多样性筛选的10万个高质量模型子集
    - 在合成数据上微调视觉语言模型，从多视图图像重建可编辑CAD程序，性能超越GPT-5.2
    methodology: 该框架将CAD程序合成视为智能体搜索问题，将大语言模型（LLM）嵌入反馈驱动的CAD环境中，通过工具和文档查找迭代生成、执行和验证代码，以促进几何有效性和操作多样性。生成的合成数据集用于微调视觉语言模型，从多视图图像重建CAD程序。
    key_results: 智能体方法合成了约一百万条可执行CAD序列，涵盖除草图拉伸外的多种操作。在此合成数据上微调的视觉语言模型在从多视图图像重建可编辑CAD程序方面优于包括GPT-5.2在内的强基线。

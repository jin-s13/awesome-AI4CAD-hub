    evaluation tasks covering diverse inputs (mesh, image, text) and outputs (B-Rep,
    parametric sequences), focusing on geometric validity and engineering-aware metrics.'
  - 'Shared research pattern: Define multi-modal input/output settings, apply multiple
    metrics beyond geometric similarity (e.g., executability, design intent alignment),
    and analyze failure modes across complexity levels and modality shifts.'
  - 'Key differences: Representations vary (CadQuery scripts vs. B-Rep construction
    sequences); evaluation depth ranges from geometric fidelity to manufacturability/assemblability;
    interaction modes include single-shot generation and proactive clarification;
    supervision signals differ (VLM judges, geometric optimization, human annotations).'
  - 'Trend evolution: Within the 2026 frontier, benchmarks are shifting from single-task
    to unified multi-task frameworks, and from pure geometric metrics to engineering-practical
    assessments (manufacturability, functionality); the evidence packet shows a concentrated
    burst of benchmark proposals in 2026.'
  - 'Open questions: Whether benchmark task distributions cover real-world iterative
    design and constraint-solving workflows; alignment between automated proxy metrics
    and downstream engineering decisions; stability of benchmark conclusions across
    independent implementations and compute budgets.'
  related_work_outline_zh:
  - 主流方向：构建大规模多模态CAD基准，统一评估从网格/图像/文本到B-Rep/参数序列的生成，注重几何有效性与工程实用性指标。
  - 研究共性：定义多模态输入输出设置，采用超越几何相似度的多指标评估（如可执行性、设计意图对齐），并分析不同复杂度和模态偏移下的失败模式。
  - 关键差异：表示方式不同（CadQuery脚本 vs. B-Rep构建序列）；评估深度从几何保真度到可制造性/可装配性递进；交互模式包括单次生成与主动澄清；监督信号涵盖VLM评判、几何优化、人工标注。
  - 趋势演进：在2026年前沿内，基准从单一任务转向统一多任务框架，评估从几何指标扩展到工程实用性（可制造性、功能性）；证据包显示2026年基准工作集中涌现。
  - 开放问题：基准任务分布是否覆盖真实迭代设计与约束求解流程；自动代理指标与下游工程决策的一致性；基准结论在不同实现和算力预算下的稳定性。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating shared multi-modal evaluation tasks and datasets that
        make CAD program generation models comparable across input modalities and
        CAD representations.
      what_remains_open: Task coverage of real-world design workflows, including iterative
        editing, constraints, and complex surface operations; the included datasets
        are primarily synthetic and may not reflect production diversity.
    - line: Metric and stress-test design
      what_it_solves: Probing prediction quality, controllability, and robustness
        beyond aggregate scores through multi-faceted metrics (geometric fidelity,
        executability, program compactness) and staged evaluation protocols (code,
        geometry, design-intent alignment).
      what_remains_open: Alignment between these proxy metrics and the engineering
        decisions users actually care about; metric sensitivity causing model ranking
        changes under modality shifts; the reliability of VLM-based judges compared
        to human expert assessment.
    - line: Comparable baselines and reporting
      what_it_solves: Making results auditable via common benchmarks, published datasets,
        and evaluation scripts, enabling systematic comparison of specialized and
        general models.
      what_remains_open: Whether benchmark conclusions remain stable across independent
        re-implementations, different compute budgets, and the inherent variance of
        LLM-based generation; lack of third-party verification studies.
    consensus:
    - Multimodal input (clean/noisy mesh, single- and multi-view renders, text) and
      output (parametric CAD sequences) are necessary to test generalization.
    - Evaluation should go beyond geometric similarity and include executability/validity,
      program compactness, and some form of design-intent alignment.
    - Model performance degrades significantly under increased geometric complexity
      and modality shifts, and rankings depend on the chosen metric.
    - Publishing datasets, code, and evaluation protocols is essential for reproducibility,
      though actual adoption varies.
    disagreements:
    - 'CAD representation: Some benchmarks adopt CadQuery scripts, while others use
      B-Rep construction trees or neutral parametric sequences.'
    - 'Evaluation depth: Benchmarks differ in whether they stop at geometric validation
      or proceed to engineering criteria such as manufacturability, functionality,
      and assemblability.'
    - 'Interaction modes: Most benchmarks evaluate single-shot generation, but one
      work introduces proactive clarification loops, changing the evaluation setting.'
    - 'Supervision for evaluation: Methods range from geometric optimization (IoU-driven)
      and rule-based checks to VLM-based rubric judges, with varying degrees of human
      validation.'
    open_questions:
    - Do current benchmarks capture the iterative, constraint-driven nature of real
      CAD design, or do they oversimplify to single-step generation?
    - How well do automated evaluation metrics (e.g., VLM judges) correlate with human
      engineers' assessments of design intent and usability?
    - Can benchmark rankings be trusted when models are re-implemented by different
      groups or run under different inference budgets, given the brittleness observed
      under modality shifts?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 构建共享的多模态评估任务与数据集，使CAD程序生成模型在不同输入模态和CAD表示下可比较。
      尚未覆盖: 任务对真实设计工作流（迭代编辑、约束、复杂曲面操作）的覆盖；所包含数据集主要为合成数据，未必反映生产环境的多样性。
    - 路线: 指标与压力测试设计
      解决的问题: 在总分之外通过多维度指标（几何保真度、可执行性、程序紧凑性）和分阶段评估协议（代码、几何、设计意图对齐）检验预测质量、可控性和鲁棒性。
      尚未覆盖: 代理指标与用户真正关心的工程决策之间的对齐；模态偏移下指标敏感性导致的模型排名变化；基于VLM的评判器与人类专家评估的可靠性差距。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一基准、发布的数据集和评估脚本使结果可审计，支持专用模型与通用模型的系统比较。
      尚未覆盖: 基准结论在不同独立实现、不同算力预算以及LLM生成固有方差下是否稳定；缺乏第三方验证研究。
    共识:
    - 多模态输入（干净/噪声网格、单视图、多视图渲染、文本）和输出（参数化CAD序列）是测试泛化能力的必要条件。

  abstract_cn: 大型语言模型最近使得文本到CAD系统能够从自然语言提示中合成参数化CAD程序（例如CadQuery）。然而，在实际应用中，几何描述可能不完整或内部不一致：关键尺寸可能缺失，约束条件可能冲突。现有的微调模型倾向于被动地遵循用户指令，并在文本模糊时幻觉出尺寸。为了解决这个问题，我们提出了一种主动式智能体框架用于文本到CadQuery生成，命名为ProCAD，它在代码合成之前解决规格问题。我们的框架配对一个主动澄清智能体，该智能体审核提示并在必要时提出有针对性的澄清问题以生成自洽的规格，以及一个CAD编码智能体，将规格转换为可执行的CadQuery程序。我们基于精心策划的高质量文本到CadQuery数据集微调编码智能体，并通过基于智能体的监督微调在澄清轨迹上训练澄清智能体。实验表明，主动澄清显著提高了对模糊提示的鲁棒性，同时保持了较低的交互开销。ProCAD优于前沿闭源模型，包括Claude

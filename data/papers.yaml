  title_cn: SPARC：基于稀疏渲染与比较的单张RGB图像CAD模型对齐方法
  abstract_cn: 从单张图像估计静态物体的3D形状和姿态对于机器人、增强现实和数字内容创作具有重要应用。通常，这通过直接网格预测（产生不真实、过度细分的形状）或通过将形状预测视为检索任务后跟CAD模型对齐来实现。直接从2D图像特征预测CAD模型姿态困难且不准确。一些工作（如ROCA）回归归一化物体坐标并用于计算姿态。虽然这可以产生更准确的姿态估计，但预测归一化物体坐标容易受到系统性失败的影响。利用高效的Transformer架构，我们证明了一种稀疏、迭代的渲染与比较方法比依赖归一化物体坐标更准确、更鲁棒。为此，我们将2D图像信息（包括从图像直接估计的稀疏深度和表面法线）与3D
    CAD模型信息进行早期融合。具体地，我们从初始随机姿态下的CAD模型采样点，重新投影这些点并计算其深度和表面法线值。这些组合信息输入到姿态预测网络SPARC-Net，我们训练该网络预测9自由度CAD模型姿态更新。再次重新投影CAD模型并预测下一个姿态更新。我们的对齐过程仅需3次迭代即可收敛，在具有挑战性的真实世界数据集ScanNet上将实例对齐准确率从25.0%提升至31.8%。代码将在https://github.com/florianlanger/SPARC发布。
  tldr_cn: SPARC采用稀疏渲染-比较与深度法线早期融合，从单张RGB图像迭代对齐9自由度CAD模型姿态。
  analysis_cn:
    innovations:
    - 用于单张RGB图像CAD模型对齐的稀疏迭代渲染与比较方法

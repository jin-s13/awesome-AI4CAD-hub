  title_cn: 'Query2CAD: 使用自然语言查询生成CAD模型'
  abstract_cn: 计算机辅助设计（CAD）工程师通常不会在一次尝试中就达到最佳原型。相反，他们通过多次修订来迭代和完善设计，以达到最优解决方案。这种传统方法虽然有效，但耗时且严重依赖熟练工程师的专业知识。为了解决这些挑战，我们引入了Query2CAD，一个用于生成CAD设计的新框架。该框架使用大型语言模型来生成可执行的CAD宏。此外，Query2CAD借助其自我精炼循环来改进CAD模型的生成。Query2CAD无需监督数据或额外训练即可运行，将LLM同时用作生成器和精炼器。精炼器利用BLIP2模型生成的反馈，为了解决假阴性问题，我们将人在回路反馈纳入系统。此外，我们开发了一个涵盖CAD模型设计中大多数操作的数据集，并使用该数据集评估了我们的框架。我们的研究结果表明，当使用GPT-4
    Turbo作为语言模型时，该架构在首次尝试中达到了53.6%的成功率。经过后续精炼，成功率提高了23.1%。特别地，成功率的最高提升出现在第一次精炼迭代中。在后续精炼中，正确设计的准确性没有显著提高。我们已经开源了我们的数据、模型和代码（github.com/akshay140601/Query2CAD）。
  tldr_cn: Query2CAD使用LLM和自我精炼循环从自然语言生成CAD模型，无需监督训练，首次尝试成功率为53.6%。

  title_cn: 面向自动CAD生成的基础模型
  abstract_cn: 大型语言模型（LLM）和视觉-语言模型（VLM）的最新进展使得能够从自然语言规范自动生成参数化3D设计。本章对用于机械零件自动计算机辅助设计（CAD）生成的基础模型进行了实证研究，采用统一的评估流程和包含97个工程设计问题的精选基准。我们提出了LLMForge，一个多模型文本到CAD框架，集成了JSON-schema验证、分析特征评分、网格合成和多轮迭代优化，并在两种批评机制下进行研究。IterTracer使用Phong着色光线追踪渲染器，结合分析视觉指标（轮廓IoU、孔可见性、边缘间隙、长宽比符合度），在轮次间提供轻量级几何感知反馈。IterVision用VLM语义批评器（Qwen2.5-VL-72B）替代分析评分器，通过链式思维视觉推理评估渲染视图，评估空间一致性和设计意图。在涵盖四个典型几何族（带孔和螺栓圆的板、多特征盒、法兰圆柱和L形支架）的基准上，我们评估了七个基础模型：DeepSeek-V3.2、Qwen3-235B-A22B、Llama-3.3-70B、Gemma-3-27B、GLM-4.5、MiniMax-M2.1和INTELLECT。在IterTracer下，排名前四的模型形成一个紧密集群（总体均值在[0.885,
    0.890]之间），网格成功率达98.97%，表明紧凑的指令调优模型可以匹配更大的系统。IterVision中基于VLM的批评在领先模型上实现了100%的水密网格生成，同时揭示了旋转对称几何体（如圆柱）的系统性困难，其中视觉和语义评分差异最大。我们讨论了基准设计、失败模式、面向CAD的提示以及工业工作流和可扩展自动化机械设计的启示。
  tldr_cn: 文本到CAD生成基础模型实证研究，提出LLMForge迭代优化与视觉反馈，在97个机械零件设计上评估。

  - 主流方向：构建端到端系统，将多模态输入（文本、图像、点云）转换为可编辑、可执行的CAD程序，重点采用参数化B-Rep或脚本表示。
  - 研究共性：所有系统通过学习的程序合成或重建来自动化CAD建模，使用生成模型（LLM、扩散、强化学习），并发布代码、基准或工件以支持可复现性。
  - 关键差异：系统在输入模态（纯文本、图像、点云、多模态）、交互模式（一次性生成 vs. 主动澄清）、程序表示（CadQuery、B-Rep、参数化面片）和评估目标（几何保真度
    vs. 可制造性/功能评分）上存在差异。
  - 趋势演进：2020–2025年侧重单一模态重建；2026年迅速转向多模态统一框架、交互式智能体以及评估工程可行性的基准（超越几何精度）。
  - 开放问题：如何保证生成的CAD满足真实制造、装配和功能约束；如何在多样输入模态和几何复杂度下保持鲁棒性；如何在不牺牲速度的情况下集成交互式澄清。
  literature_review:
    line_of_work_matrix:
    - line: Runnable pipelines and deployment stacks
      what_it_solves: Turning multimodal inputs into executable CAD programs through
        end-to-end generation workflows, such as FutureCAD's text-to-CadQuery pipeline
        or DreamCAD's multi-modal B-Rep synthesis.
      what_remains_open: Generalization to real-world engineering constraints (functionality,
        manufacturability, assemblability) and complex assemblies beyond the training
        distribution.
    - line: Real-time and interactive serving
      what_it_solves: Enabling interactive clarification and error reduction in CAD
        generation, as shown by ProCAD's proactive agent that audits prompts and asks
        targeted questions before code synthesis.
      what_remains_open: Trade-offs between interaction overhead, generation speed,
        and geometric fidelity; integration of real-time visual feedback loops and
        user interfaces remain unexplored.
    - line: Artifacts and reproducible engineering
      what_it_solves: Providing standardized benchmarks, evaluation protocols, and
        open-source code to enable systematic comparison and reproducibility, represented
        by CADBench, MUSE, and UniCAD.
      what_remains_open: Independent reproduction across different hardware, CAD kernels,
        and dataset distributions; long-term maintenance and compatibility of released
        artifacts.
    consensus:
    - All systems adopt a programmable, editable CAD representation (B-Rep, CadQuery,
      or parametric sketches) rather than unstructured mesh outputs.
    - Evaluation increasingly combines geometric metrics (IoU, Chamfer distance) with
      task-specific checks such as executability, invalidity ratio, and human-judged
      design intent.
    - The use of large language models and vision-language models is widespread, but
      they are often fine-tuned or combined with specialized geometric modules to
      handle CAD-specific constraints.
    disagreements:
    - 'Supervision signal: some systems rely on text-only prompts, others on images,
      point clouds, or multi-view renders, leading to different robustness profiles
      under modality shift.'
    - 'Interaction mode: one-shot generation dominates, but ProCAD introduces a clarification
      loop, marking a split between fully automated and human-in-the-loop design.'
    - 'Evaluation target: geometric fidelity benchmarks (CADBench, UniCAD) contrast
      with engineering-focused benchmarks that assess manufacturability and functionality
      (MUSE).'
    - 'Program representation: CadQuery scripts offer fine-grained control but raise
      parsing complexity; B-Rep patch representations (DreamCAD) provide direct geometric
      differentiability but may sacrifice editability of parametric features.'
    open_questions:
    - Can current fine-tuned models handle the stepwise reasoning required for complex
      assemblies, or will they require explicit constraint modeling?
    - What is the minimal set of interaction turns needed to resolve ambiguous specifications
      without degrading user experience?
    - How do we verify that a generated CAD model is functionally correct and manufacturable
      without relying on expensive simulation or VLM judges that may hallucinate?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 可运行流水线与部署栈
      解决的问题: 将多模态输入转化为可执行CAD程序的端到端生成工作流，例如FutureCAD的文本到CadQuery流水线或DreamCAD的多模态B-Rep合成。
      尚未覆盖: 对真实工程约束（功能性、可制造性、可装配性）以及超出训练分布的复杂装配体的泛化。
    - 路线: 实时与交互式服务
      解决的问题: 实现交互式澄清和错误减少，如ProCAD的主动智能体在代码合成前审核提示并提出针对性问题。
      尚未覆盖: 交互开销、生成速度与几何保真度之间的权衡；实时视觉反馈回路的集成和用户界面尚未探索。
    - 路线: 工件与可复现工程
      解决的问题: 提供标准化基准、评估协议和开源代码，以实现系统化的比较和可复现性，代表系统如CADBench、MUSE和UniCAD。
      尚未覆盖: 跨不同硬件、CAD内核和数据集分布的独立复现；发布工件的长期维护和兼容性。
    共识:
    - 所有系统都采用可编程、可编辑的CAD表示（B-Rep、CadQuery或参数化草图），而非输出非结构化网格。
    - 评估越来越多地将几何指标（IoU、倒角距离）与任务特定检查（如可执行性、无效比率和人工判断的设计意图）相结合。
    - 大语言模型和视觉语言模型的使用广泛，但通常经过微调或与专用几何模块结合以处理CAD特定约束。
    分歧:
    - 监督信号：部分系统仅依赖文本提示，其他则依赖图像、点云或多视图渲染，导致在模态转换下的鲁棒性表现不同。
    - 交互模式：一次性生成占主导地位，但ProCAD引入了澄清循环，标志着全自动与人在回路设计之间的分歧。
    - 评估目标：几何保真度基准（CADBench、UniCAD）与评估可制造性和功能性的工程导向基准（MUSE）形成对比。
    - 程序表示：CadQuery脚本提供精细控制但增加解析复杂性；B-Rep面片表示（DreamCAD）提供直接的几何可微性，但可能牺牲参数化特征的可编辑性。
    开放问题:
    - 当前微调模型能否处理复杂装配体所需的逐步推理，还是需要显式约束建模？
    - 解决模糊规范所需的最少交互轮次是多少，而又不降低用户体验？
    - 如何在不依赖昂贵的仿真或可能产生幻觉的VLM评判器的情况下，验证生成的CAD模型在功能上正确且可制造？

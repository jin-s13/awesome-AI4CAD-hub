  title_cn: 扁平化复杂：通过组合$k$-细胞粒子进行联合B-Rep生成
  abstract_cn: 边界表示（B-Rep）是计算机辅助设计（CAD）和制造中广泛采用的标准。然而，由于B-Rep作为几何细胞复合体具有固有的异质性，其生成建模仍然是一个严峻的挑战——不同阶数细胞（即$k$-细胞，如顶点、边、面）之间的拓扑与几何相互纠缠。先前方法通常依赖级联序列来处理这种层次结构，但未能充分利用细胞之间的几何关系（如邻接和共享），限制了上下文感知和错误恢复能力。为填补这一空白，我们提出了一种新范式，将B-Rep重新表述为组合$k$-细胞粒子集。我们的方法将每个拓扑实体编码为粒子的组合，其中相邻细胞在界面处共享相同的潜在变量，从而促进沿共享边界的几何耦合。通过解耦刚性层次结构，我们的表示统一了顶点、边和面，实现了具有全局上下文感知的拓扑与几何联合生成。我们使用多模态流匹配框架合成这些粒子集，以处理无条件生成以及精确的条件任务，例如从单视图或点云进行3D重建。此外，我们表示的显式局部特性自然扩展到下游任务，如局部修复，并支持直接合成非流形结构（如线框）。大量实验表明，与最先进方法相比，我们的方法生成了高保真CAD模型，具有更优的有效性和可编辑性。

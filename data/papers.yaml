  title_cn: 'SolidGen: 一种用于直接B-rep合成的自回归模型'
  abstract_cn: 边界表示（B-rep）格式是计算机辅助设计（CAD）中用于建模实体和片体对象的实际形状表示。最近生成CAD模型的方法侧重于学习草图-拉伸建模序列，这些序列由实体建模内核在后处理中执行以恢复B-rep。在本文中，我们提出了一种新方法，能够从B-rep中学习并合成B-rep，而无需通过CAD建模序列数据进行监督。我们的方法SolidGen是一种自回归神经网络，通过使用基于Transformer和指针神经网络预测顶点、边和面来直接建模B-rep。实现这一点的关键是我们的索引边界表示，它在一个定义良好的层次结构中引用B-rep顶点、边和面，以捕获适合机器学习的几何和拓扑关系。SolidGen可以轻松地以上下文（例如类别标签、图像和体素）为条件，这得益于其对B-rep分布的概率建模。我们通过定性、定量和人类受试者的感知评估证明，SolidGen可以生成高质量、逼真的CAD模型。

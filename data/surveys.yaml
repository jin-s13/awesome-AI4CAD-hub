  - 研究共性：将复杂CAD结构分解为可管理的子问题（先线框后曲面、部件分解、基元装配），并利用无学习的几何先验保证有效性。
  - 关键差异：表示选择（B-rep vs. 网格 vs. CSG vs. 点云）、监督信号（无监督部件分解 vs. 全监督重建）以及交互模态（基于视频的UI vs.

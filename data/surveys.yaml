  related_work_outline:
  - 'Mainstream direction: End-to-end generation of editable parametric CAD models
    (command sequences, code, B-Rep) from multimodal inputs (images, text, point clouds)
    using large language and vision-language models, with growing emphasis on reinforcement
    learning and evolutionary optimization to improve geometric fidelity and executability.'
  - 'Shared research pattern: All works frame CAD creation as a sequence or program
    generation problem, train on large-scale synthetic or curated datasets, and evaluate
    via geometric similarity metrics (IoU, Chamfer distance) and validity/executability
    rates.'
  - 'Key differences: Representations diverge into command sequences, CadQuery/Python
    code, STEP files, and pointer-based B-Rep selections; training paradigms split
    between supervised fine-tuning, RL-based post-training, and VLM-guided program
    evolution; some target a single input modality while others unify multiple modalities
    and tasks.'
  - 'Trend evolution: The topic has surged in 2025–2026 with the adoption of LLMs/VLMs,
    moving from earlier mesh-to-CAD reconstruction toward multimodal, multi-task unified
    frameworks and from pure supervised learning to reward-driven and evolution-based
    methods that address executability and geometric precision.'
  - 'Open questions: Whether these methods generalize to real-world noisy inputs,
    complex industrial assemblies, and downstream engineering constraints; how to
    evaluate interactive editing and design intent preservation; and the lack of standardized
    benchmarks covering full CAD workflows beyond geometric reconstruction.'
  related_work_outline_zh:
  - 主流方向：利用大语言模型和视觉语言模型，从多模态输入（图像、文本、点云）端到端生成可编辑的参数化CAD模型（命令序列、代码、B-Rep），并越来越多地采用强化学习和进化优化来提升几何保真度和可执行性。
  - 研究共性：所有工作都将CAD创建形式化为序列或程序生成问题，在大规模合成或精选数据集上训练，并通过几何相似度指标（IoU、Chamfer距离）和有效性/可执行率进行评估。
  - 关键差异：表示方式分化为命令序列、CadQuery/Python代码、STEP文件和基于指针的B-Rep选择；训练范式分为监督微调、基于强化学习的后训练和VLM引导的程序进化；部分工作聚焦单一输入模态，另一些则统一多模态和多任务。
  - 趋势演进：该主题在2025–2026年随着LLM/VLM的采用而激增，从早期的网格到CAD重建转向多模态、多任务统一框架，并从纯监督学习转向奖励驱动和进化方法，以解决可执行性和几何精度问题。
  - 开放问题：这些方法能否泛化到真实世界噪声输入、复杂工业装配和下游工程约束；如何评估交互式编辑和设计意图保留；以及缺乏覆盖完整CAD工作流（超越几何重建）的标准化基准。
  literature_review:
    line_of_work_matrix:
    - line: Parametric CAD sequence generation
      what_it_solves: Learning to generate valid, long parametric CAD construction
        sequences (extrusions, revolutions, fillets) from latent representations or
        autoregressive models, enabling novel shape synthesis.
      what_remains_open: Topological correctness for complex assemblies, generalization
        beyond training distribution, and integration with engineering constraints
        like manufacturability or simulation readiness.
    - line: Multimodal end-to-end CAD generation
      what_it_solves: Directly producing editable CAD models or code from images,
        text, sketches, or point clouds using VLMs/LLMs, lowering the expertise barrier
        for design authoring.
      what_remains_open: Robustness to real-world images, ambiguous natural language,
        and unseen CAD operations; preservation of design intent during iterative
        editing; and scalability to industrial part complexity.
    - line: CAD reconstruction and reverse engineering
      what_it_solves: Recovering parametric CAD construction history from discrete
        geometry (meshes, point clouds) to enable editing and reuse of legacy or scanned
        parts.
      what_remains_open: Handling noisy, incomplete scans; reconstructing freeform
        surfaces and complex topologies; and ensuring the recovered program is human-interpretable
        and compact.
    - line: Unified CAD benchmarks and multi-task models
      what_it_solves: Providing standardized evaluation across multiple CAD tasks
        (reconstruction, generation, QA) and modalities, and building single models
        that handle them all.
      what_remains_open: Benchmarks currently emphasize geometric accuracy over engineering
        validity; they lack coverage of assembly constraints, material properties,
        and interactive design workflows.
    consensus:
    - Editable parametric representations (command sequences, code, B-Rep) are preferred
      over raw meshes or point clouds for downstream CAD use.
    - Large-scale synthetic or curated datasets are essential for training, and data
      augmentation (e.g., program evolution, reserialization) significantly boosts
      performance.
    - Geometric fidelity metrics (volumetric IoU, Chamfer distance) and validity/executability
      rates are the primary evaluation criteria.
    - Transformer-based architectures (LLMs, VLMs, state space models) currently dominate
      the state of the art for CAD generation tasks.
    disagreements:
    - 'Representation format: some works use command sequences with sketch-extrude
      steps, others generate Python/CadQuery code, STEP files, or pointer-based B-Rep
      selections, each trading off between editability, expressiveness, and compatibility
      with existing CAD engines.'
    - 'Training paradigm: supervised fine-tuning on static datasets versus reinforcement
      learning with geometric rewards versus evolutionary optimization guided by VLMs,
      reflecting different assumptions about the availability of ground-truth programs
      and the importance of executability.'
    - 'Input modality scope: single-modality systems (image-only or text-only) versus
      unified multi-modal multi-task frameworks, with the latter aiming for broader
      applicability but facing challenges in evaluation and training complexity.'
    - 'Evaluation depth: some papers report only geometric similarity, while others
      additionally measure code executability, renderability, or segmentation error,
      leading to incomplete comparability across methods.'
    open_questions:
    - How well do these methods transfer to real-world photographs, hand-drawn sketches,
      or noisy 3D scans, given that most training data consists of clean synthetic
      renderings?
    - Can the generated CAD models satisfy downstream engineering requirements such
      as finite element analysis, manufacturability checks, or assembly constraints,
      which are not captured by current geometric metrics?
    - What is the trade-off between generation diversity and validity when using RL
      or evolution, and how can we prevent mode collapse while maintaining high executability?
    - How can we build benchmarks that include interactive editing, design intent
      preservation, and user studies, moving beyond static reconstruction accuracy?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 参数化CAD序列生成
      解决的问题: 从潜在表示或自回归模型学习生成有效、长序列的参数化CAD构建步骤（拉伸、旋转、倒角），实现新颖形状合成。
      尚未覆盖: 复杂装配体的拓扑正确性、训练分布之外的泛化能力，以及与可制造性或仿真就绪等工程约束的集成。
    - 路线: 多模态端到端CAD生成
      解决的问题: 利用VLM/LLM直接从图像、文本、草图或点云生成可编辑的CAD模型或代码，降低设计创作的专业门槛。
      尚未覆盖: 对真实世界图像、模糊自然语言和未见CAD操作的鲁棒性；迭代编辑中设计意图的保留；以及向工业零件复杂度的可扩展性。
    - 路线: CAD重建与逆向工程
      解决的问题: 从离散几何（网格、点云）恢复参数化CAD构建历史，以便编辑和重用遗留或扫描零件。
      尚未覆盖: 处理噪声、不完整扫描；重建自由曲面和复杂拓扑；确保恢复的程序人类可读且紧凑。
    - 路线: 统一CAD基准与多任务模型
      解决的问题: 提供跨多个CAD任务（重建、生成、问答）和模态的标准化评估，并构建能同时处理这些任务的单一模型。
      尚未覆盖: 当前基准强调几何精度而非工程有效性；缺乏对装配约束、材料属性和交互式设计工作流的覆盖。
    共识:
    - 可编辑的参数化表示（命令序列、代码、B-Rep）优于原始网格或点云，更适合下游CAD应用。
    - 大规模合成或精选数据集对训练至关重要，数据增强（如程序进化、重序列化）能显著提升性能。
    - 几何保真度指标（体积IoU、Chamfer距离）和有效性/可执行率是主要评估标准。
    - 基于Transformer的架构（LLM、VLM、状态空间模型）目前在CAD生成任务中占据主导地位。
    分歧:
    - 表示格式：部分工作使用包含草图-拉伸步骤的命令序列，其他生成Python/CadQuery代码、STEP文件或基于指针的B-Rep选择，各自在可编辑性、表达能力和与现有CAD引擎的兼容性之间权衡。
    - 训练范式：在静态数据集上的监督微调，对比基于几何奖励的强化学习，再对比VLM引导的进化优化，反映了对真值程序可用性和可执行性重要性的不同假设。
    - 输入模态范围：单模态系统（仅图像或仅文本）对比统一多模态多任务框架，后者旨在更广泛的适用性，但面临评估和训练复杂度的挑战。
    - 评估深度：一些论文仅报告几何相似度，而另一些额外测量代码可执行性、可渲染性或分割误差，导致方法之间的可比性不完整。
    开放问题:
    - 鉴于大多数训练数据由干净的合成渲染图组成，这些方法在真实照片、手绘草图或噪声3D扫描上的迁移效果如何？
    - 生成的CAD模型能否满足下游工程需求，如有限元分析、可制造性检查或装配约束，而当前几何指标并未涵盖这些？
    - 使用强化学习或进化方法时，生成多样性与有效性之间的权衡是什么，如何在保持高可执行性的同时防止模式坍塌？
    - 如何构建包含交互式编辑、设计意图保留和用户研究的基准，超越静态重建精度？

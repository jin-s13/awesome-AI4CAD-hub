- id: towards-high-fidelity-cad-generation-via-llm-driven-program-2026
  title: Towards High-Fidelity CAD Generation via LLM-Driven Program Generation and
    Text-Based B-Rep Primitive Grounding
  authors:
  - Jiahao Li
  - Qingwang Zhang
  - Qiuyu Chen
  - Guozhan Qiu
  - Yunzhong Lou
  - Xiangdong Zhou
  abstract: 'The field of Computer-Aided Design (CAD) generation has made significant
    progress in recent years. Existing methods typically fall into two separate categories:
    parametric CAD modeling and direct boundary representation (B-Rep) synthesis.
    In modern feature-based CAD systems, parametric modeling and B-Rep are inherently
    intertwined, as advanced parametric operations (e.g., fillet and chamfer) require
    explicit selection of B-Rep geometric primitives, and the B-Rep itself is derived
    from parametric operations. Consequently, this paradigm gap remains a critical
    factor limiting AI-driven CAD modeling for complex industrial product design.
    This paper presents FutureCAD, a novel text-to-CAD framework that leverages large
    language models (LLMs) and a B-Rep grounding transformer (BRepGround) for high-fidelity
    CAD generation. Our method generates executable CadQuery scripts, and introduces
    a text-based query mechanism that enables the LLM to specify geometric selections
    via natural language, which BRepGround then grounds to the target primitives.
    To train our framework, we construct a new dataset comprising real-world CAD models.
    For the LLM, we apply supervised fine-tuning (SFT) to establish fundamental CAD
    generation capabilities, followed by reinforcement learning (RL) to improve generalization.
    Experiments show that FutureCAD achieves state-of-the-art CAD generation performance.
    Code and dataset are available at: https://github.com/JohanStackk/FutureCAD'

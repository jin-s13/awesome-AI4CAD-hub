  title_cn: 点云基元拟合的表面与边缘检测
  abstract_cn: 为点云数据拟合基元以获得结构化表示已被广泛应用于逆向工程和其他图形应用。现有的基于分割的方法仅分割基元面片，而忽略了指示基元边界的边缘，导致重建不准确且不完整。为填补这一空白，我们提出了一种新颖的表面与边缘检测网络（SED-Net），用于点云的精确几何基元拟合。关键思想是联合学习参数化曲面（包括B样条面片）和边缘，从而在一个统一且高效的框架中组装成规则化且无缝的CAD模型。SED-Net配备双分支结构，用于提取基元的类型与边缘特征以及几何特征。我们网络的核心是一种两阶段特征融合机制，以充分利用类型、边缘和几何特征。精确检测到的曲面面片可作为上下文信息，促进边缘和角点的检测。得益于表面与边缘的同步检测，我们可以获得参数化且紧凑的模型表示。这使得我们能够用预定义的基元特定网格表示CAD模型，并允许用户轻松编辑其形状。大量实验及与以往方法的比较证明了我们的有效性和优越性。

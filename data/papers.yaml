  abstract_cn: 基于Transformer的模型成功鼓励了许多研究者使用基于序列的方法来学习CAD模型。然而，学习CAD模型仍然是一个挑战，因为它们可以表示为具有长构建序列的复杂形状。此外，同一个CAD模型可以用不同的CAD构建序列来表达。我们提出了一种新颖的基于对比学习的方法，名为ContrastCAD，它能够有效捕捉CAD模型构建序列中的语义信息。ContrastCAD通过dropout技术生成增强视图，而不改变CAD模型的形状。我们还提出了一种新的CAD数据增强方法，称为随机替换与挤出（RRE）方法，以在训练不平衡的CAD数据集时增强模型的学习性能。实验结果表明，所提出的RRE增强方法显著提升了基于Transformer的自编码器的学习性能，即使对于具有非常长构建序列的复杂CAD模型也是如此。所提出的ContrastCAD模型对构建序列的排列变化具有鲁棒性，并通过生成相似CAD模型更紧密聚集的表示空间来实现更好的表示学习。我们的代码可在https://github.com/cm8908/ContrastCAD获取。
